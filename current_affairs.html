<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs · Road to IIM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --navy:      #0d1526;
  --navy-card: #162035;
  --gold:      #d4af37;
  --green:     #4ea082;
  --text:      #dde3f0;
  --text-dim:  #7a8aaa;
  --border:    rgba(255,255,255,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
}

header {
  padding: 26px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.brand-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.page-title  { font-size: 23px; font-weight: 700; }
.page-date   { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

#refresh-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .2s;
  flex-shrink: 0;
  margin-top: 2px;
}
#refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
#refresh-btn.loading { opacity: .45; pointer-events: none; }
#refresh-btn.loading .ri { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tab-bar {
  display: flex;
  padding: 20px 28px 0;
  border-bottom: 1px solid var(--border);
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-top: 16px;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 9px 16px 11px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

main { padding: 22px 28px 56px; max-width: 1040px; }

.status-bar {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 18px;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  display: none;
}
.status-bar.live .live-dot { display: block; }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
  gap: 14px;
}

.news-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 17px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color .2s, transform .15s;
  animation: fadeUp .3s ease both;
}
.news-card:hover { border-color: rgba(212,175,55,.25); transform: translateY(-2px); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.source-pill {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  background: var(--gold);
  color: #0d1526;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
}
.year-pill { background: rgba(78,160,130,.2); color: var(--green); }

.card-time { font-size: 11px; color: var(--text-dim); }

.card-headline { font-size: 14.5px; font-weight: 600; line-height: 1.45; }
.card-headline a { color: var(--text); text-decoration: none; }
.card-headline a:hover { color: var(--gold); }

.card-desc { font-size: 13px; line-height: 1.65; color: var(--text-dim); }

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--green);
  text-decoration: none;
  margin-top: 2px;
}
.card-link:hover { opacity: .75; }

/* Skeletons */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skel {
  border-radius: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.09) 50%, rgba(255,255,255,.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.8s ease-in-out infinite;
}
.skel-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 17px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Info / Error boxes */
.info-box, .err-box {
  grid-column: 1 / -1;
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 32px;
  text-align: center;
  color: var(--text-dim);
}
.info-box .icon, .err-box .icon { font-size: 36px; margin-bottom: 14px; }
.info-box h3, .err-box h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.info-box p, .err-box p { font-size: 13.5px; line-height: 1.7; margin-bottom: 6px; }

.code-block {
  display: inline-block;
  background: rgba(255,255,255,.07);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: monospace;
  font-size: 13px;
  color: var(--green);
  margin: 8px 0;
}

.retry-btn {
  background: var(--gold);
  color: #0d1526;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 9px 22px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 16px;
  display: inline-block;
}
.retry-btn:hover { opacity: .85; }

@media (max-width: 520px) {
  header { flex-direction: column; }
  .cards-grid { grid-template-columns: 1fr; }
  main { padding: 18px 16px 56px; }
}

</style>
</head>
<body>

<header>
  <div>
    <div class="brand-label">Road to IIM</div>
    <div class="page-title">Current Affairs</div>
    <div class="page-date" id="page-date"></div>
  </div>
  <button id="refresh-btn" onclick="doRefresh()">
    <svg class="ri" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Refresh
  </button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="openTab('geopolitics',this)">🌍&nbsp; Geopolitics</button>
  <button class="tab-btn"        onclick="openTab('economics',this)">📈&nbsp; Economics</button>
  <button class="tab-btn"        onclick="openTab('tech',this)">💡&nbsp; Tech</button>
  <button class="tab-btn"        onclick="openTab('sports',this)">🏏&nbsp; Sports</button>
  <button class="tab-btn"        onclick="openTab('history',this)">📜&nbsp; On This Day</button>
</div>

<main>
  <div class="status-bar" id="status-bar">
    <div class="live-dot"></div>
    <span id="status-text"></span>
  </div>
  <div class="cards-grid" id="grid"></div>
</main>

<script>

/* ─── FEEDS ─── */
const FEEDS = {
  geopolitics: [
    { url: 'https://feeds.bbci.co.uk/news/world/rss.xml',                    src: 'BBC World'  },
    { url: 'https://www.thehindu.com/news/international/feeder/default.rss', src: 'The Hindu'  }
  ],
  economics: [
    { url: 'https://economictimes.indiatimes.com/rssfeedstopstories.cms',    src: 'Econ Times' },
    { url: 'https://www.livemint.com/rss/news',                              src: 'Mint'       }
  ],
  tech: [
    { url: 'https://techcrunch.com/feed/',           src: 'TechCrunch' },
    { url: 'https://www.theverge.com/rss/index.xml', src: 'The Verge'  }
  ],
  sports: [
    { url: 'https://www.espncricinfo.com/rss/content/story/feeds/0.xml', src: 'Cricinfo'    },
    { url: 'https://sports.ndtv.com/rss/all',                            src: 'NDTV Sports' }
  ]
};

/* ─── STATE ─── */
let currentTab = 'geopolitics';
const tabCache = {};

/* ─── INIT ─── */
document.getElementById('page-date').textContent =
  new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

/* Detect local file — show helpful message instead of a silent error */
if (window.location.protocol === 'file:') {
  showLocalFileMessage();
} else {
  openTab('geopolitics', document.querySelector('.tab-btn.active'));
}

/* ─── LOCAL FILE WARNING ─── */
function showLocalFileMessage() {
  document.getElementById('grid').innerHTML = `
    <div class="info-box">
      <div class="icon">🔒</div>
      <h3>One small step needed</h3>
      <p>Browsers block external network requests when a file is opened directly from your computer. This page needs to be served over a web server — not opened as a local file.</p>
      <p style="margin-top:14px"><strong style="color:var(--text)">Option 1 — Push to GitHub Pages</strong><br>
      Just commit this file to the Road to IIM repo. It'll work immediately.</p>
      <p style="margin-top:12px"><strong style="color:var(--text)">Option 2 — Quick local test</strong><br>
      Open Terminal in the folder containing this file and run:</p>
      <div class="code-block">python -m http.server 8000</div>
      <p>Then open <span style="color:var(--green);font-family:monospace">localhost:8000/current_affairs.html</span></p>
    </div>`;
  setStatus('');
}

/* ─── TAB SWITCH ─── */
function openTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (tabCache[tab]) {
    renderCards(tabCache[tab].cards);
    setStatus('Last updated: ' + tabCache[tab].ts, true);
  } else {
    loadTab(tab);
  }
}

async function doRefresh() {
  if (window.location.protocol === 'file:') { showLocalFileMessage(); return; }
  delete tabCache[currentTab];
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  await loadTab(currentTab);
  btn.classList.remove('loading');
}

/* ─── MAIN LOAD ─── */
async function loadTab(tab) {
  showSkeletons();
  setStatus('Fetching latest headlines…');
  try {
    const cards = tab === 'history'
      ? await loadOnThisDay()
      : await loadRSS(FEEDS[tab]);

    const ts = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    tabCache[tab] = { cards, ts };
    renderCards(cards);
    setStatus('Last updated: ' + ts, true);
  } catch (err) {
    console.error('[loadTab]', err);
    document.getElementById('grid').innerHTML = `
      <div class="err-box">
        <div class="icon">⚠️</div>
        <h3>Couldn't load content</h3>
        <p>One of the news sources may be temporarily down.</p>
        <button class="retry-btn" onclick="doRefresh()">Retry</button>
      </div>`;
    setStatus('');
  }
}

/* ─── RSS — 3 fallback strategies ─── */
async function loadRSS(feeds) {
  const results = await Promise.allSettled(feeds.map(f => fetchWithFallback(f)));
  const items   = results.flatMap(r => r.status === 'fulfilled' ? r.value : []).slice(0, 8);
  if (!items.length) throw new Error('All feeds failed');
  return items;
}

async function fetchWithFallback({ url, src }) {
  /* Strategy 1: rss2json.com — returns clean JSON, no XML parsing */
  try {
    const r = await fetchTimeout(
      `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=5`
    );
    const d = await r.json();
    if (d.status === 'ok' && d.items?.length) {
      return d.items.map(i => ({
        src,
        title:   (i.title || '').trim(),
        desc:    strip(i.description || i.content || '').slice(0, 260),
        link:    i.link || i.guid || '#',
        pubDate: i.pubDate || ''
      })).filter(i => i.title.length > 5);
    }
  } catch (e) { console.warn(`rss2json failed (${src}):`, e.message); }

  /* Strategy 2: corsproxy.io + XML parse */
  try {
    const r   = await fetchTimeout(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const xml = new DOMParser().parseFromString(await r.text(), 'text/xml');
    const out = parseXML(xml, src);
    if (out.length) return out;
  } catch (e) { console.warn(`corsproxy failed (${src}):`, e.message); }

  /* Strategy 3: allorigins.win + XML parse */
  try {
    const r   = await fetchTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const d   = await r.json();
    const xml = new DOMParser().parseFromString(d.contents, 'text/xml');
    const out = parseXML(xml, src);
    if (out.length) return out;
  } catch (e) { console.warn(`allorigins failed (${src}):`, e.message); }

  return [];
}

function parseXML(xml, src) {
  return [...xml.querySelectorAll('item')].slice(0, 5).map(item => ({
    src,
    title:   (item.querySelector('title')?.textContent || '').trim(),
    desc:    strip(item.querySelector('description')?.textContent || '').slice(0, 260),
    link:    getLink(item),
    pubDate: item.querySelector('pubDate')?.textContent?.trim() || ''
  })).filter(i => i.title.length > 5);
}

function getLink(item) {
  const t = item.querySelector('link')?.textContent?.trim();
  if (t?.startsWith('http')) return t;
  const guid = item.querySelector('guid')?.textContent?.trim();
  if (guid?.startsWith('http')) return guid;
  return '#';
}

function fetchTimeout(url, ms = 8000) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal });
}

function strip(html) {
  return html.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
}

/* ─── WIKIPEDIA ON THIS DAY ─── */
async function loadOnThisDay() {
  setStatus('Fetching historical events…');
  const d   = new Date();
  const m   = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');

  const res  = await fetch(
    `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/events/${m}/${day}`
  );
  const data = await res.json();
  const pool = data.events || [];
  if (!pool.length) throw new Error('No events from Wikipedia');

  return pickDiverse(pool, 6).map(e => ({
    isHistory: true,
    src:       String(e.year),
    title:     e.text,
    desc:      '',
    link:      e.pages?.[0]?.content_urls?.desktop?.page || '#',
    pubDate:   ''
  }));
}

function pickDiverse(events, n) {
  const sorted = [...events].sort((a, b) => a.year - b.year);
  const size   = Math.ceil(sorted.length / n);
  const picked = [];
  for (let i = 0; i < n && i * size < sorted.length; i++) {
    const bucket = sorted.slice(i * size, (i + 1) * size);
    picked.push(bucket[Math.floor(Math.random() * bucket.length)]);
  }
  return picked;
}

/* ─── RENDER ─── */
function renderCards(cards) {
  if (!cards?.length) {
    document.getElementById('grid').innerHTML = `
      <div class="err-box">
        <div class="icon">📡</div>
        <h3>No stories found</h3>
        <p>Try refreshing — the feed may have been temporarily unavailable.</p>
        <button class="retry-btn" onclick="doRefresh()">Retry</button>
      </div>`;
    return;
  }
  document.getElementById('grid').innerHTML = cards.map((card, idx) => `
    <div class="news-card" style="animation-delay:${idx * 0.05}s">
      <div class="card-meta">
        <span class="source-pill ${card.isHistory ? 'year-pill' : ''}">${esc(card.src)}</span>
        ${card.pubDate ? `<span class="card-time">${fmtDate(card.pubDate)}</span>` : ''}
      </div>
      <div class="card-headline">
        <a href="${esc(card.link)}" target="_blank" rel="noopener">${esc(card.title)}</a>
      </div>
      ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
      <a class="card-link" href="${esc(card.link)}" target="_blank" rel="noopener">
        Read full article &rarr;
      </a>
    </div>`).join('');
}

/* ─── SKELETONS ─── */
function showSkeletons() {
  const rows = [
    'height:11px;width:55px', 'height:15px;width:100%', 'height:15px;width:80%',
    'height:13px;width:100%', 'height:13px;width:88%',  'height:13px;width:65%'
  ];
  document.getElementById('grid').innerHTML = Array(6).fill(
    `<div class="skel-card">${rows.map(s => `<div class="skel" style="${s}"></div>`).join('')}</div>`
  ).join('');
}

/* ─── HELPERS ─── */
function setStatus(msg, live = false) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-bar').classList.toggle('live', live);
}

function fmtDate(str) {
  try {
    return new Date(str).toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
    });
  } catch { return ''; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

</script>
</body>
</html>
