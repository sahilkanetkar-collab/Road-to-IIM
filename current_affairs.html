<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs · Road to IIM</title>
<meta name="theme-color" content="#0d1526">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Current Affairs">
<link rel="manifest" href="current-affairs.webmanifest">
<link rel="apple-touch-icon" href="icons/ca/ca-apple-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>

:root {
  --navy:      #0d1526;
  --navy-card: #111e35;
  --navy-hi:   #1a2d4a;
  --gold:      #d4af37;
  --text:      #dde3f0;
  --text-dim:  #6a7d9e;
  --border:    rgba(255,255,255,0.07);

  /* Per-tab accents */
  --c-geo:     #5b8dd9;
  --c-econ:    #4ea082;
  --c-tech:    #9b72cf;
  --c-special: #e0658a;
  --c-history: #d4af37;

  --accent: var(--c-geo); /* updated by JS */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--navy);
  background-image:
    radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  min-height: 100vh;
  position: relative;
}

/* ── HEADER ── */
header {
  padding: 28px 32px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.header-glow {
  position: absolute;
  top: -80px; left: -80px;
  width: 420px; height: 320px;
  background: radial-gradient(ellipse at 30% 40%, rgba(212,175,55,0.07) 0%, transparent 65%);
  pointer-events: none;
}

.brand-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.page-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -.5px;
  background: linear-gradient(135deg, #dde3f0 0%, #a0aec0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-date { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

#refresh-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .2s;
  flex-shrink: 0;
  margin-top: 4px;
  backdrop-filter: blur(4px);
}
#refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
#refresh-btn.loading { opacity: .45; pointer-events: none; }
#refresh-btn.loading .ri { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABS ── */
.tab-bar {
  display: flex;
  padding: 22px 32px 0;
  border-bottom: 1px solid var(--border);
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-top: 18px;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 9px 17px 11px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }

.tab-btn[data-tab="geopolitics"].active { color: var(--c-geo);     border-color: var(--c-geo);     }
.tab-btn[data-tab="economics"].active   { color: var(--c-econ);    border-color: var(--c-econ);    }
.tab-btn[data-tab="tech"].active        { color: var(--c-tech);    border-color: var(--c-tech);    }
.tab-btn[data-tab="special"].active     { color: var(--c-special); border-color: var(--c-special); }
.tab-btn[data-tab="history"].active     { color: var(--c-history); border-color: var(--c-history); }

.tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity .2s;
}
.tab-btn.active .tab-dot { opacity: 1; }
.tab-btn[data-tab="geopolitics"] .tab-dot { background: var(--c-geo);     }
.tab-btn[data-tab="economics"]   .tab-dot { background: var(--c-econ);    }
.tab-btn[data-tab="tech"]        .tab-dot { background: var(--c-tech);    }
.tab-btn[data-tab="special"]     .tab-dot { background: var(--c-special); }
.tab-btn[data-tab="history"]     .tab-dot { background: var(--c-history); }

/* ── SPECIAL TAB ── */
.special-card { border-color: rgba(224,101,138,0.28); }
.curated-badge {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--c-special); border: 1px solid rgba(224,101,138,0.45);
  padding: 2px 8px; border-radius: 20px; margin-left: auto;
}
.special-note {
  margin: 10px 0 4px; padding: 10px 12px;
  background: rgba(224,101,138,0.07);
  border-left: 2px solid var(--c-special);
  border-radius: 0 8px 8px 0;
  font-size: 13px; line-height: 1.55; color: var(--text);
}
.note-label {
  display: block; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--c-special); margin-bottom: 4px;
}

/* ── ADMIN: floating add button + modal ── */
#admin-fab {
  position: fixed; bottom: 24px; right: 24px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold); color: #0d1526;
  font-size: 26px; line-height: 1; border: none; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.45); z-index: 50;
}
#admin-fab:active { transform: scale(0.94); }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(6,10,20,0.72);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  z-index: 60; padding: 20px;
}
.modal-box {
  background: var(--navy-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px; width: 100%; max-width: 440px;
}
.modal-box h3 { font-family: 'Fraunces', Georgia, serif; margin-bottom: 14px; }
.modal-box input, .modal-box textarea {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 10px 12px; margin-bottom: 10px;
}
.modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: var(--gold); }
.modal-box textarea { min-height: 90px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-ghost {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
}
.btn-gold {
  background: var(--gold); border: none; color: #0d1526; font-weight: 600;
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
}
.btn-gold:disabled { opacity: 0.5; }
#add-status { font-size: 12px; color: var(--text-dim); margin-top: 10px; min-height: 16px; }

/* ── MAIN ── */
main { padding: 24px 32px 64px; max-width: 1060px; }

.status-bar {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 20px;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  display: none;
}
.status-bar.live .live-dot { display: block; }

/* ── GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 14px;
}

/* ── FEATURED CARD (first item, full-width) ── */
.news-card.featured {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 0;
  padding: 0;
  overflow: hidden;
}
.featured-body {
  padding: 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.featured-img-wrap {
  position: relative;
  overflow: hidden;
}
.featured-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s ease;
}
.news-card.featured:hover .featured-img-wrap img { transform: scale(1.04); }

.featured .card-headline { font-family: 'Fraunces', Georgia, serif; font-size: 20px; line-height: 1.35; }
.featured .card-desc { font-size: 13.5px; -webkit-line-clamp: 4; }

/* ── STANDARD CARD ── */
.news-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  gap: 11px;
  padding: 17px 18px;
  transition: border-color .25s, box-shadow .25s, transform .15s;
  animation: fadeUp .35s ease both;
  overflow: hidden;
  position: relative;
}
.news-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.news-card:hover {
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
  transform: translateY(-2px);
}
.news-card:hover::before { opacity: 0.6; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Card image */
.card-img-wrap {
  margin: -17px -18px 0;
  height: 150px;
  overflow: hidden;
  border-radius: 14px 14px 0 0;
  flex-shrink: 0;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s ease;
}
.news-card:hover .card-img-wrap img { transform: scale(1.05); }

/* Meta row */
.card-meta {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.favicon {
  width: 14px; height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
}

.source-pill {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .7px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.08);
}
.year-pill {
  background: rgba(212,175,55,0.12);
  color: var(--gold);
  border-color: rgba(212,175,55,0.2);
}

.card-time { font-size: 11px; color: var(--text-dim); }

.new-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: rgba(78,160,130,0.15);
  color: #4ea082;
  border: 1px solid rgba(78,160,130,0.25);
  padding: 2px 6px;
  border-radius: 4px;
}

.card-headline { font-size: 14.5px; font-weight: 600; line-height: 1.45; }
.card-headline a { color: var(--text); text-decoration: none; transition: color .15s; }
.card-headline a:hover { color: var(--accent); }

.card-desc {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-dim);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-decoration: none;
  margin-top: auto;
  padding-top: 2px;
  transition: gap .15s, opacity .15s;
}
.card-link:hover { gap: 8px; }

/* History year display */
.year-display {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 58px;
  font-weight: 700;
  color: rgba(212,175,55,0.1);
  line-height: 1;
  letter-spacing: -3px;
  margin-bottom: -4px;
  flex-shrink: 0;
}

/* ── SKELETON ── */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skel {
  border-radius: 4px;
  background: linear-gradient(90deg,
    rgba(255,255,255,.03) 25%,
    rgba(255,255,255,.08) 50%,
    rgba(255,255,255,.03) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.8s ease-in-out infinite;
}
.skel-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 17px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.skel-card.skel-featured {
  grid-column: 1 / -1;
  height: 200px;
  padding: 0;
}

/* ── INFO / ERROR ── */
.info-box, .err-box {
  grid-column: 1 / -1;
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 32px;
  text-align: center;
  color: var(--text-dim);
}
.info-box .icon, .err-box .icon { font-size: 36px; margin-bottom: 14px; }
.info-box h3, .err-box h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.info-box p, .err-box p { font-size: 13.5px; line-height: 1.7; margin-bottom: 6px; }
.code-block {
  display: inline-block;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: monospace;
  font-size: 13px;
  color: #4ea082;
  margin: 8px 0;
}
.retry-btn {
  background: var(--accent);
  color: #0d1526;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 9px 22px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 16px;
  display: inline-block;
  transition: opacity .15s;
}
.retry-btn:hover { opacity: .85; }

@media (max-width: 640px) {
  header { flex-direction: column; padding: 20px 18px 0; }
  .tab-bar { padding: 16px 18px 0; }
  main { padding: 18px 18px 56px; }
  .cards-grid { grid-template-columns: 1fr; }
  .news-card.featured { grid-template-columns: 1fr; }
  .featured-img-wrap { height: 180px; }
}

</style>
</head>
<body>

<header>
  <div class="header-glow"></div>
  <div>
    <div class="brand-label">Road to IIM</div>
    <div class="page-title">Current Affairs</div>
    <div class="page-date" id="page-date"></div>
  </div>
  <button id="refresh-btn" onclick="doRefresh()">
    <svg class="ri" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Refresh
  </button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="geopolitics" onclick="openTab('geopolitics',this)">
    <span class="tab-dot"></span>🌍 Geopolitics
  </button>
  <button class="tab-btn" data-tab="economics" onclick="openTab('economics',this)">
    <span class="tab-dot"></span>📈 Economics &amp; Finance
  </button>
  <button class="tab-btn" data-tab="tech" onclick="openTab('tech',this)">
    <span class="tab-dot"></span>💡 Tech
  </button>
  <button class="tab-btn" data-tab="special" onclick="openTab('special',this)">
    <span class="tab-dot"></span>⭐ Special
  </button>
  <button class="tab-btn" data-tab="history" onclick="openTab('history',this)">
    <span class="tab-dot"></span>📜 On This Day
  </button>
</div>

<main>
  <div class="status-bar" id="status-bar">
    <div class="live-dot"></div>
    <span id="status-text"></span>
  </div>
  <div class="cards-grid" id="grid"></div>
</main>

<button id="admin-fab" onclick="openAddModal()" title="Add article">&#65291;</button>

<div id="add-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>&#9733; Add to Special</h3>
    <input id="add-url" type="url" placeholder="Article URL (https://...)">
    <textarea id="add-note" placeholder="Your note — why this article matters"></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn-gold" id="add-submit" onclick="submitSpecial()">Post</button>
    </div>
    <div id="add-status"></div>
  </div>
</div>

<script>

/* ─── CONFIG ─── */
const FEEDS = {
  geopolitics: [
    { url: 'https://feeds.bbci.co.uk/news/world/rss.xml',                    src: 'BBC World', domain: 'bbc.co.uk'  },
    { url: 'https://www.thehindu.com/news/international/feeder/default.rss', src: 'The Hindu', domain: 'thehindu.com' }
  ],
  economics: [
    { url: 'https://economictimes.indiatimes.com/rssfeedstopstories.cms',    src: 'Econ Times', domain: 'economictimes.indiatimes.com' },
    { url: 'https://www.livemint.com/rss/news',                              src: 'Mint',       domain: 'livemint.com' },
    { url: 'https://www.moneycontrol.com/rss/business.xml',                  src: 'Moneycontrol', domain: 'moneycontrol.com' }
  ],
  tech: [
    { url: 'https://techcrunch.com/feed/',           src: 'TechCrunch', domain: 'techcrunch.com' },
    { url: 'https://www.theverge.com/rss/index.xml', src: 'The Verge',  domain: 'theverge.com'  }
  ]
};

/* Special tab — Apps Script endpoint (deploy CA_Special_AppsScript.gs, paste /exec URL) */
const SPECIAL_API = 'https://script.google.com/macros/s/AKfycbzt5wiqP4XsogeKYr83NG0Lb9-V1KVTfO6xuWVVA0T-zrRSrCA4TlhODsepciGBk_Lf/exec';

const TAB_ACCENT = {
  geopolitics: '#5b8dd9',
  economics:   '#4ea082',
  tech:        '#9b72cf',
  special:     '#e0658a',
  history:     '#d4af37'
};

/* ─── STATE ─── */
let currentTab = 'geopolitics';
const tabCache = {};

/* ─── INIT ─── */
document.getElementById('page-date').textContent =
  new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

if (window.location.protocol === 'file:') {
  showLocalMsg();
} else {
  openTab('geopolitics', document.querySelector('.tab-btn.active'));
}

/* ─── TAB SWITCH ─── */
function openTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  // Update CSS accent variable
  document.documentElement.style.setProperty('--accent', TAB_ACCENT[tab]);
  updateAdminBtn();

  if (tabCache[tab]) {
    renderCards(tabCache[tab].cards, tab);
    setStatus('Last updated: ' + tabCache[tab].ts, true);
  } else {
    loadTab(tab);
  }
}

async function doRefresh() {
  if (window.location.protocol === 'file:') { showLocalMsg(); return; }
  delete tabCache[currentTab];
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  await loadTab(currentTab);
  btn.classList.remove('loading');
}

/* ─── LOAD ─── */
async function loadTab(tab) {
  showSkeletons();
  setStatus('Fetching latest headlines…');
  try {
    const cards = tab === 'history'  ? await loadOnThisDay()
                : tab === 'special'  ? await loadSpecial()
                : await loadRSS(FEEDS[tab]);

    const ts = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    tabCache[tab] = { cards, ts };
    renderCards(cards, tab);
    setStatus('Last updated: ' + ts, true);
  } catch (err) {
    console.error('[loadTab]', err);
    document.getElementById('grid').innerHTML = `
      <div class="err-box">
        <div class="icon">⚠️</div>
        <h3>Couldn't load content</h3>
        <p>A news source may be temporarily down.</p>
        <button class="retry-btn" onclick="doRefresh()">Retry</button>
      </div>`;
    setStatus('');
  }
}

/* ─── RSS — 3 fallback strategies ─── */
async function loadRSS(feeds) {
  const results = await Promise.allSettled(feeds.map(fetchWithFallback));
  const items   = results.flatMap(r => r.status === 'fulfilled' ? r.value : []).slice(0, 8);
  if (!items.length) throw new Error('All feeds failed');
  return items;
}

async function fetchWithFallback({ url, src, domain }) {
  /* Strategy 1: rss2json — clean JSON + thumbnail field */
  try {
    const r = await t_fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=5`);
    const d = await r.json();
    if (d.status === 'ok' && d.items?.length) {
      return d.items.map(i => ({
        src, domain,
        title:   (i.title || '').trim(),
        desc:    strip(i.description || i.content || '').slice(0, 300),
        link:    i.link || i.guid || '#',
        pubDate: i.pubDate || '',
        image:   i.thumbnail || i.enclosure?.link || ''
      })).filter(i => i.title.length > 5);
    }
  } catch(e) { console.warn(`rss2json (${src}):`, e.message); }

  /* Strategy 2: corsproxy.io */
  try {
    const r   = await t_fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const xml = new DOMParser().parseFromString(await r.text(), 'text/xml');
    const out = parseXML(xml, src, domain);
    if (out.length) return out;
  } catch(e) { console.warn(`corsproxy (${src}):`, e.message); }

  /* Strategy 3: allorigins.win */
  try {
    const r   = await t_fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const d   = await r.json();
    const xml = new DOMParser().parseFromString(d.contents, 'text/xml');
    const out = parseXML(xml, src, domain);
    if (out.length) return out;
  } catch(e) { console.warn(`allorigins (${src}):`, e.message); }

  return [];
}

function parseXML(xml, src, domain) {
  return [...xml.querySelectorAll('item')].slice(0, 5).map(item => {
    const mediaUrl = item.getElementsByTagNameNS('*','content')[0]?.getAttribute('url') || '';
    const encUrl   = item.querySelector('enclosure')?.getAttribute('url') || '';
    return {
      src, domain,
      title:   item.querySelector('title')?.textContent?.trim() || '',
      desc:    strip(item.querySelector('description')?.textContent || '').slice(0, 300),
      link:    getLink(item),
      pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
      image:   mediaUrl || encUrl || ''
    };
  }).filter(i => i.title.length > 5);
}

function getLink(item) {
  const t = item.querySelector('link')?.textContent?.trim();
  if (t?.startsWith('http')) return t;
  const guid = item.querySelector('guid')?.textContent?.trim();
  if (guid?.startsWith('http')) return guid;
  return '#';
}

function t_fetch(url, ms = 8000) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal });
}

function strip(h) { return h.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim(); }

/* ─── SPECIAL TAB (curated via Apps Script) ─── */
async function loadSpecial() {
  const r = await t_fetch(`${SPECIAL_API}?action=list`, 12000);
  const d = await r.json();
  if (!d.ok) throw new Error('Special feed failed');
  return (d.articles || []).map(a => {
    let domain = '';
    try { domain = new URL(a.link).hostname.replace(/^www\./, ''); } catch (e) {}
    return {
      isSpecial: true,
      src: a.src || 'Curated', domain,
      title: a.title, desc: '', note: a.note || '',
      link: a.link, pubDate: a.ts || '', image: ''
    };
  });
}

/* ─── ADMIN (Sahil only — PIN verified server-side) ─── */
function isAdmin() { return localStorage.getItem('ca_admin') === '1'; }

function updateAdminBtn() {
  const fab = document.getElementById('admin-fab');
  if (fab) fab.style.display = (currentTab === 'special' && isAdmin()) ? 'flex' : 'none';
}

async function unlockAdmin() {
  const pin = prompt('Admin PIN:');
  if (!pin) return false;
  try {
    const r = await t_fetch(`${SPECIAL_API}?action=auth&pin=${encodeURIComponent(pin)}`, 10000);
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('ca_admin', '1');
      localStorage.setItem('ca_pin', pin);
      return true;
    }
  } catch (e) {}
  alert('Invalid PIN');
  return false;
}

function openAddModal(prefillUrl) {
  document.getElementById('add-url').value = prefillUrl || '';
  document.getElementById('add-note').value = '';
  document.getElementById('add-status').textContent = '';
  document.getElementById('add-modal').style.display = 'flex';
  (prefillUrl ? document.getElementById('add-note') : document.getElementById('add-url')).focus();
}

function closeAddModal() {
  document.getElementById('add-modal').style.display = 'none';
}

async function submitSpecial() {
  const url    = document.getElementById('add-url').value.trim();
  const note   = document.getElementById('add-note').value.trim();
  const status = document.getElementById('add-status');
  if (!/^https?:\/\//i.test(url)) { status.textContent = 'Please paste a valid URL.'; return; }

  const btn = document.getElementById('add-submit');
  btn.disabled = true;
  status.textContent = 'Posting\u2026';
  try {
    const r = await fetch(SPECIAL_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ pin: localStorage.getItem('ca_pin') || '', url, note })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Failed');
    status.textContent = 'Posted \u2713';
    delete tabCache.special;
    setTimeout(() => {
      closeAddModal();
      if (currentTab === 'special') loadTab('special');
    }, 700);
  } catch (err) {
    status.textContent = 'Failed: ' + err.message;
  }
  btn.disabled = false;
}

/* ─── SHARE TARGET + ?admin=1 handling ─── */
(async function handleIncomingParams() {
  const p = new URLSearchParams(location.search);
  const hasShare = p.has('url') || p.has('text') || p.has('title');
  const wantAdmin = p.get('admin') === '1';
  if (!hasShare && !wantAdmin) return;

  history.replaceState({}, '', location.pathname);   // clean the URL

  if (!isAdmin()) {
    const ok = await unlockAdmin();
    if (!ok) return;
  }

  if (hasShare) {
    const raw = [p.get('url'), p.get('text'), p.get('title')].filter(Boolean).join(' ');
    const m = raw.match(/https?:\/\/\S+/);
    const specialBtn = document.querySelector('.tab-btn[data-tab="special"]');
    openTab('special', specialBtn);
    openAddModal(m ? m[0] : '');
  } else {
    updateAdminBtn();
  }
})();

/* ─── WIKIPEDIA ON THIS DAY ─── */
async function loadOnThisDay() {
  const d   = new Date();
  const m   = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const res  = await fetch(`https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/events/${m}/${day}`);
  const data = await res.json();
  const pool = data.events || [];
  if (!pool.length) throw new Error('No Wikipedia events');
  return pickDiverse(pool, 6).map(e => ({
    isHistory: true, src: String(e.year),
    title: e.text, desc: '',
    link: e.pages?.[0]?.content_urls?.desktop?.page || '#',
    pubDate: '', image: ''
  }));
}

function pickDiverse(events, n) {
  const sorted = [...events].sort((a,b) => a.year - b.year);
  const size   = Math.ceil(sorted.length / n);
  return Array.from({length: n}, (_,i) => {
    const bucket = sorted.slice(i*size, (i+1)*size);
    return bucket[Math.floor(Math.random()*bucket.length)];
  }).filter(Boolean);
}

/* ─── RENDER ─── */
function renderCards(cards, tab) {
  const grid = document.getElementById('grid');
  if (!cards?.length) {
    grid.innerHTML = tab === 'special'
      ? `<div class="info-box"><div class="icon">⭐</div><h3>Nothing here yet</h3><p>Hand-picked articles from Sahil Sir will appear here. Check back soon!</p></div>`
      : `<div class="err-box"><div class="icon">📡</div><h3>No stories found</h3><p>Try refreshing.</p><button class="retry-btn" onclick="doRefresh()">Retry</button></div>`;
    return;
  }

  grid.innerHTML = cards.map((card, idx) => {
    const isFirst   = idx === 0;
    const isNew     = card.pubDate && (Date.now() - new Date(card.pubDate)) < 6 * 3600000;
    const faviconUrl = card.domain
      ? `https://www.google.com/s2/favicons?domain=${card.domain}&sz=32`
      : '';
    const timeStr = relTime(card.pubDate);
    const delay   = `animation-delay:${idx * 0.06}s`;

    if (card.isHistory) {
      return `
      <div class="news-card" style="${delay}">
        <div class="year-display">${esc(card.src)}</div>
        <div class="card-meta">
          <span class="source-pill year-pill">${esc(card.src)} AD</span>
        </div>
        <div class="card-headline">
          <a href="${esc(card.link)}" target="_blank" rel="noopener">${esc(card.title)}</a>
        </div>
        <a class="card-link" href="${esc(card.link)}" target="_blank" rel="noopener">
          Read on Wikipedia &rarr;
        </a>
      </div>`;
    }

    if (card.isSpecial) {
      return `
      <div class="news-card special-card" style="${delay}">
        <div class="card-meta">
          ${faviconUrl ? `<img class="favicon" src="${faviconUrl}" onerror="this.remove()" alt="">` : ''}
          <span class="source-pill">${esc(card.src)}</span>
          ${timeStr ? `<span class="card-time">${timeStr}</span>` : ''}
          <span class="curated-badge">&#9733; Curated</span>
        </div>
        <div class="card-headline">
          <a href="${esc(card.link)}" target="_blank" rel="noopener">${esc(card.title)}</a>
        </div>
        ${card.note ? `<div class="special-note"><span class="note-label">Sahil Sir's Note</span>${esc(card.note)}</div>` : ''}
        <a class="card-link" href="${esc(card.link)}" target="_blank" rel="noopener">
          Read full article &rarr;
        </a>
      </div>`;
    }

    if (isFirst && card.image) {
      return `
      <div class="news-card featured" style="${delay}">
        <div class="featured-body">
          <div class="card-meta">
            ${faviconUrl ? `<img class="favicon" src="${faviconUrl}" onerror="this.remove()" alt="">` : ''}
            <span class="source-pill">${esc(card.src)}</span>
            ${timeStr ? `<span class="card-time">${timeStr}</span>` : ''}
            ${isNew ? `<span class="new-badge">New</span>` : ''}
          </div>
          <div class="card-headline">
            <a href="${esc(card.link)}" target="_blank" rel="noopener">${esc(card.title)}</a>
          </div>
          <div class="card-desc">${esc(card.desc)}</div>
          <a class="card-link" href="${esc(card.link)}" target="_blank" rel="noopener">
            Read full article &rarr;
          </a>
        </div>
        <div class="featured-img-wrap">
          <img src="${esc(card.image)}" alt="" onerror="this.closest('.news-card').classList.remove('featured');this.closest('.featured-img-wrap').remove()">
        </div>
      </div>`;
    }

    return `
    <div class="news-card" style="${delay}">
      ${card.image ? `
        <div class="card-img-wrap">
          <img src="${esc(card.image)}" alt="" onerror="this.closest('.card-img-wrap').remove()">
        </div>` : ''}
      <div class="card-meta">
        ${faviconUrl ? `<img class="favicon" src="${faviconUrl}" onerror="this.remove()" alt="">` : ''}
        <span class="source-pill">${esc(card.src)}</span>
        ${timeStr ? `<span class="card-time">${timeStr}</span>` : ''}
        ${isNew ? `<span class="new-badge">New</span>` : ''}
      </div>
      <div class="card-headline">
        <a href="${esc(card.link)}" target="_blank" rel="noopener">${esc(card.title)}</a>
      </div>
      ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
      <a class="card-link" href="${esc(card.link)}" target="_blank" rel="noopener">
        Read full article &rarr;
      </a>
    </div>`;
  }).join('');
}

/* ─── HELPERS ─── */
function setStatus(msg, live = false) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-bar').classList.toggle('live', live);
}

function relTime(str) {
  if (!str) return '';
  try {
    const diff = Date.now() - new Date(str).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (m < 2)  return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    if (d < 7)  return `${d}d ago`;
    return new Date(str).toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  } catch { return ''; }
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
