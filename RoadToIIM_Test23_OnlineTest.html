<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM — Test 23</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;
-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{
--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;
--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;
--purple:#9b59b6;--panel:280px;
}
body{background:var(--navy);color:var(--white);
font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── LOGIN ── */
#loginScreen{display:flex;flex-direction:column;align-items:center;
justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);
border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);
margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;
border:1px solid #2a4060;border-radius:6px;padding:10px 12px;
color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);
color:var(--navy);font-size:1rem;font-weight:700;border:none;
border-radius:8px;cursor:pointer;}
#loginErr{margin-top:10px;color:var(--red);font-size:.83rem;display:none;}

/* ── TOP BAR ── */
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;
padding:10px 20px;display:flex;align-items:center;
justify-content:space-between;position:sticky;top:0;z-index:100;
padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);
background:#0a2a1a;padding:6px 16px;border-radius:20px;
border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}

/* ── PROGRESS ── */
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}

/* ── LAYOUT ── */
#mainLayout{display:flex;min-height:calc(100vh - 57px);}

/* ── RC SPLIT PANEL ── */
#rcSplit{
  display:flex;
  flex:1;
  max-width:calc(100% - var(--panel));
  height:calc(100vh - 57px);
  overflow:hidden;
}

/* Left: passage */
#passagePane{
  flex:1;
  overflow-y:auto;
  padding:20px 22px 80px 24px;
  border-right:1px solid #1e3a5a;
  scroll-behavior:smooth;
}
#passageBlock{
  background:#111e2e;
  border:1px solid #1e3a5a;
  border-radius:10px;
  padding:18px 20px;
  line-height:1.75;
  font-size:.92rem;
  color:#c8d8e8;
  border-left:4px solid var(--gold);
}
#passageTitle{
  color:var(--gold);font-size:.72rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
#passageSource{
  color:var(--grey);font-size:.73rem;margin-top:10px;
  font-style:italic;border-top:1px solid #1e3a5a;padding-top:8px;
}
#passageText p{margin:0 0 8px 0;}
#passageText p:last-child{margin-bottom:0;}

/* Right: question + options */
#questionPane{
  width:46%;
  min-width:340px;
  max-width:520px;
  overflow-y:auto;
  padding:20px 20px 80px 20px;
  display:flex;
  flex-direction:column;
}

/* ── QUESTION ── */
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);
font-size:.72rem;font-weight:700;letter-spacing:.08em;
padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.83rem;margin-bottom:6px;}
#questionStem{font-size:.97rem;line-height:1.65;color:var(--white);
margin-bottom:16px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;
padding:11px 14px;cursor:pointer;text-align:left;font-size:.9rem;
color:var(--white);transition:all .2s;width:100%;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1a2e12;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;width:24px;font-weight:700;color:var(--gold);}

/* ── PALETTE ── */
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;
z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);
border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;
pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;
background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;
margin-right:4px;vertical-align:middle;}

/* ── PASSAGE MAP IN PALETTE ── */
.pal-passage-label{color:var(--gold);font-size:.72rem;font-weight:700;
letter-spacing:.06em;margin:12px 0 6px 0;text-transform:uppercase;}

/* ── NAV BAR ── */
.bs{display:none;}
.bl{display:inline;}
#navBar{position:fixed;bottom:0;left:50%;right:var(--panel);
background:var(--navy2);border-top:1px solid #1e3a5a;
display:flex;align-items:center;gap:4px;
padding:8px 10px;z-index:150;box-sizing:border-box;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;
border-radius:6px;padding:8px 4px;cursor:pointer;font-size:.8rem;font-weight:600;
white-space:nowrap;flex:1;text-align:center;min-width:0;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;flex:1.2;}

/* ── RESULTS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;
text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;
overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);
padding:10px 14px;font-size:.83rem;line-height:1.7;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;
font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;
margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;
align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.review-passage{background:#0d1b2a;border-left:3px solid var(--gold);
padding:10px 14px;font-size:.82rem;line-height:1.7;color:#8899aa;
margin:0 16px 8px 16px;border-radius:4px;}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;
padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;
border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;
font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);
border:1px solid var(--gold);color:var(--gold);border-radius:6px;
font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;
margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;
border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;
color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}

/* ── QUESTION TIME BAR ── */
.q-time-bar{display:flex;gap:16px;align-items:center;padding:8px 16px 10px;
border-top:1px solid #1e3a5a;flex-wrap:wrap;}
.q-time-mine{font-size:.78rem;color:var(--grey);}
.q-time-fast{font-size:.78rem;color:var(--gold);font-weight:700;}

/* ── MOBILE ── */
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #rcSplit{flex-direction:column;height:auto;overflow:visible;}
  #passagePane{height:auto;overflow-y:visible;border-right:none;border-bottom:1px solid #1e3a5a;padding:16px 14px 14px;}
  #questionPane{width:100%;max-width:100%;padding:14px 14px 80px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{left:0 !important;right:0 !important;padding:6px 8px;gap:4px;}
  .nav-btn{padding:8px 4px;font-size:.78rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;padding:16px;}
}
@media (max-width:768px){
  #paletteOverlay.mobile-open{display:flex;}
}
</style>

<script>
// ── APPS SCRIPT URL ───────────────────────────────────────────────────────────
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwGGxswx4hcBUFiT0QJIglowhKcJCv47MOR5LKBv9sILl-evsgZeKCms5y6s5zEXOUo6Q/exec';

// ── TIMER ─────────────────────────────────────────────────────────────────────
const timer_duration=25;

// ── PASSAGES ─────────────────────────────────────────────────────────────────
const PASSAGES=[
  {
    id:1,
    title:"Passage 1 -- Science / Thermodynamics",
    source:"Original passage based on the ideas of David Albert and Sean Carroll.",
    text:`The second law of thermodynamics does not merely describe what happens in laboratories. It describes the direction of time itself. Entropy -- the measure of disorder in a closed system -- always increases. A broken cup does not reassemble. Heat does not spontaneously flow from a cold body to a warm one. These asymmetries, trivial in themselves, point to something profound: the universe has a direction, and that direction is the one in which disorder grows.\n\nWhat makes this remarkable is that the underlying laws of physics are time-symmetric. The equations governing particle collisions work equally well run forwards or backwards. Nothing in the fundamental laws selects one direction over another. Yet the world we experience is radically asymmetric. The arrow we observe is not written into the laws themselves but into the initial conditions of the universe. The early universe was in a state of extraordinarily low entropy -- a condition so improbable that some physicists treat it as the deepest mystery in cosmology.\n\nThe implication is unsettling. The past feels fixed and the future open not because of any law but because of where the universe started. Memory, causation, the sense that time flows -- all of these depend not on physics as such but on the accident of a very particular beginning. The arrow of time is real. Its source, however, is not a law. It is a boundary condition.`
  },
  {
    id:2,
    title:"Passage 2 -- Abstract / Philosophy of Mind",
    source:"Original passage based on the ideas of Ludwig Wittgenstein and P.F. Strawson.",
    text:`We cannot verify from the inside that any other person is conscious. This is not an epistemic limitation that better instruments could overcome -- it is a structural feature of the situation. Consciousness, whatever it is, is first-personal. To know that another mind exists, one would need access to that mind's interior, which is precisely what no external vantage point can provide. We infer other minds from behaviour, but behaviour is compatible with the complete absence of inner experience.\n\nThe force of this problem is easy to underestimate. We are so habituated to assuming the presence of minds in others that the assumption feels like perception rather than inference. But the assumption carries no logical guarantee. A being that behaved in every way as a human behaves -- speaking, wincing, expressing preference -- might, for all we can establish, be what philosophers call a zombie: physically complete but experientially empty.\n\nWhat follows from this is not scepticism about other minds as a practical matter, but a deeper recognition: the concepts we use to describe mental life are built for the first person. When we apply them to others, we are extending them beyond the conditions in which they were forged. That extension may be inevitable, and perhaps warranted -- but it is an extension, not a perception. The confidence with which we speak of other people feeling, intending, and believing outstrips the grounds we actually have.`
  },
  {
    id:3,
    title:"Passage 3 -- Psychology / Behavioural Economics",
    source:"Original passage based on the ideas of Jon Elster.",
    text:`When people are systematically denied options, they sometimes come to prefer not having them. This is not simply resignation. The preferences themselves are restructured so that what was once desired is no longer desired -- or is actively deprecated. Jon Elster, who named this process adaptive preference formation, distinguished it carefully from rational updating. Rational updating is a response to new evidence about the world. Adaptive preference formation is a response to powerlessness: the person does not learn that the unavailable option is bad; they come to feel that it was never worth wanting.\n\nThe distinction matters enormously for theories of welfare. If we measure wellbeing by preference satisfaction, and preferences have been shaped by deprivation, then we may be measuring adaptation to injustice rather than genuine flourishing. A person who has internalised the limits imposed on them will report high satisfaction even as they live within conditions that a less adapted person would find intolerable. Their preferences are satisfied, but the satisfaction is constructed from the material of their constraint.\n\nThis is why preference satisfaction is a treacherous guide to welfare. The metric that seems most respectful of autonomy -- asking people what they want and giving it to them -- can, in conditions of structural inequality, quietly ratify the damage done. The satisfied preference may be the most reliable evidence of the wound.`
  },
  {
    id:4,
    title:"Passage 4 -- Philosophy / Epistemology",
    source:"Adapted from An Enquiry Concerning Human Understanding (1748) by David Hume. Public domain.",
    text:`Hume observed that when we say one event causes another, we never actually perceive the connection. We see the first event, we see the second event, and we see that they have followed each other on every occasion we have observed. But the necessity -- the sense that the second must follow the first -- is nowhere in the data. It is added by the mind. Causation, on this analysis, is a habit of expectation projected onto a world that contains only constant conjunction.\n\nThis claim was explosive because it threatened to dissolve one of the most basic categories of human thought. If causation is not in the world but in us, then our confidence that the future will resemble the past has no rational grounding. We expect the sun to rise not because we have established that it must, but because it always has -- and the move from always has to always will is precisely the leap that Hume showed could not be justified.\n\nWhat is left after Hume is not nihilism but a more modest epistemology. We can describe regularities. We can rely on them. What we cannot do is claim that our reliance is anything more than a habit made stable by the uniformity of past experience. The cement of the universe -- to use his phrase -- turns out to be psychological, not metaphysical. The world holds together because we are built to expect it to, not because it is bound to.`
  },
  {
    id:5,
    title:"Passage 5 -- Literature / Criticism",
    source:"Original passage based on the ideas of Vladimir Nabokov.",
    text:`Nabokov distrusted autobiography because he distrusted memory. Not memory's accuracy -- he was precise to the point of obsession about specific sensory details -- but its innocence. The memoirist, he believed, cannot help but impose a retrospective design on events that were, as they occurred, innocent of that design. The act of remembering is an act of composition: the self that writes is not the self that lived, and the gap between them is filled, inevitably, with art.\n\nThis suspicion drove him toward what he called the aesthetics of memory -- the frank acknowledgment that recollection is construction. In Speak, Memory, the most celebrated of his autobiographical writings, he does not pretend to transparency. He draws attention to the patterning, offers the shaped thing as a shaped thing, and asks the reader to admire the architecture rather than trust the glass. Memory, he suggests, is most honest when it admits it is a mirror that has been polished.\n\nThe paradox is that this aestheticisation produces a kind of truth that naive realism cannot. The reader who knows they are being shown a constructed past is in a better epistemic position than the reader who is handed a reconstruction disguised as a record. Nabokov's artifice is more trustworthy than a lesser writer's sincerity -- not despite its self-consciousness, but because of it.`
  }
];


// ── QUESTIONS ─────────────────────────────────────────────────────────────────
const QUESTIONS=[
{id:1,section:"RC -- Passage 1",passage:1,qtype:"Main Idea",
stem:`Which of the following best states the central claim of this passage?`,
opts:["The asymmetry of time is a consequence not of physical laws but of the universe's initial conditions","The second law of thermodynamics explains why disorder always increases in all closed systems","Entropy proves that the fundamental laws of physics are incompatible with time-reversal","The arrow of time demonstrates that physics alone cannot account for human experience"],
answer:"A",
exp:`Correct Answer: A. The asymmetry of time is a consequence not of physical laws but of the universe's initial conditions.\n\nPassage type: Argumentative. Skeleton at end (final paragraph delivers the resolution).\n\nA covers the full arc: the passage introduces entropy and time's direction, reveals the paradox (the underlying laws are time-symmetric), and resolves it -- the arrow comes not from the laws but from the initial conditions of the universe.\n\nB is the premise, not the argument. The passage uses the second law as its starting point, not its conclusion.\nC directly contradicts the passage: it explicitly states that the laws ARE time-symmetric.\nD overgeneralises beyond what the passage claims. The passage does mention memory and causation, but the core claim is about the source of the arrow, not the limits of physics as a discipline.`},

{id:2,section:"RC -- Passage 1",passage:1,qtype:"Primary Purpose",
stem:`The author's primary purpose in writing this passage is to --`,
opts:["Describe the second law of thermodynamics and its implications for closed systems","Challenge the assumption that the physical laws of nature are sufficient to explain the direction of time","Demonstrate that entropy is the most fundamental concept in cosmology","Explain why physicists regard the low-entropy origin of the universe as problematic"],
answer:"B",
exp:`Correct Answer: B. Challenge the assumption that the physical laws of nature are sufficient to explain the direction of time.\n\nB is the argumentative move the passage executes: it shows that while we might assume the laws of physics explain time's direction, they do not -- the laws are symmetric, and the arrow comes from initial conditions instead.\n\nA describes only the first paragraph and misses the argument.\nC overstates: entropy is a vehicle for the argument, not the thesis itself. The passage does not claim entropy is cosmology's most fundamental concept.\nD is too narrow: the low-entropy origin is one sentence in paragraph two. It is not the purpose of the passage.`},

{id:3,section:"RC -- Passage 1",passage:1,qtype:"Vocabulary",
stem:`As used in the passage, the term <b>boundary condition</b> most nearly means --`,
opts:["A constraint on the initial or final state of a system, distinct from the laws governing its evolution","A physical law that governs how systems change and develop over time","An experimental limitation that prevents physicists from observing certain phenomena directly","A mathematical expression describing the relationship between entropy and temperature"],
answer:"A",
exp:`Correct Answer: A. A constraint on the initial or final state of a system, distinct from the laws governing its evolution.\n\nThe passage uses "boundary condition" in the final sentence as the contrasting term to "law." The entire third paragraph builds toward this distinction: the arrow of time is not explained by a rule of how systems evolve (a law), but by the specification of the state in which the universe began (a boundary condition).\n\nA is confirmed by the passage's own logic: it explicitly contrasts boundary condition with law.\nB defines what a law is -- the opposite of what the passage is saying.\nC introduces experimental limitation, which has no basis in the passage. The passage frames the boundary condition as an explanation, not an obstacle.\nD is a technical distractor with no connection to how the term is used here.`},

{id:4,section:"RC -- Passage 1",passage:1,qtype:"Vocabulary",
stem:`When the author says "the past feels fixed and the future open not because of any law but because of where the universe started," the statement implies that --`,
opts:["Memory and causation are illusions created by the human mind with no grounding in physical reality","Physics has failed to explain memory and causation because it focuses on laws rather than experience","The experience of time as directed is a contingent feature of the universe rather than a necessary one","The asymmetry between past and future is a psychological phenomenon rather than a physical one"],
answer:"C",
exp:`Correct Answer: C. The experience of time as directed is a contingent feature of the universe rather than a necessary one.\n\nThis is a two-step inference. Step one: the arrow of time is not written into the laws of physics but into the initial conditions. Step two: initial conditions are not necessary -- a different beginning would have produced a different arrow. Therefore: the direction of time as we experience it is contingent (it happened to be this way) not necessary (it had to be this way).\n\nA is too strong. The passage says the arrow of time is "real" -- it does not call memory and causation illusions. It merely relocates their source.\nD is a half-truth that reverses the argument. The passage is not saying time's asymmetry is only psychological -- it IS physical, grounded in the initial conditions. The point is about the source, not the reality.\nB misreads the passage. Physics does explain it -- through boundary conditions. The passage does not say physics has failed.`},

{id:5,section:"RC -- Passage 2",passage:2,qtype:"Main Idea",
stem:`The passage is primarily concerned with --`,
opts:["Why the problem of other minds cannot be resolved by any scientific observation or experiment","The philosophical zombie thought experiment and what it reveals about consciousness","Why the attribution of mental states to others involves extending first-personal concepts beyond their justificatory conditions","The practical consequences of scepticism about whether other minds exist"],
answer:"C",
exp:`Correct Answer: C. Why the attribution of mental states to others involves extending first-personal concepts beyond their justificatory conditions.\n\nPassage type: Argumentative. Skeleton at end (the final paragraph delivers the central thesis).\n\nD captures the full argument: the problem is structural (not instrumental), we are habituated to inference, and the root cause is that mental-life concepts are first-personal and cannot be straightforwardly applied to others.\n\nA is one point made in paragraph one, not the central concern of the whole passage.\nB is a supporting example in paragraph two. The zombie is used to illustrate the problem, not to be the subject of the passage.\nC is explicitly rejected: the passage says "What follows from this is not scepticism about other minds as a practical matter." Practical scepticism is what the passage distances itself from.`},

{id:6,section:"RC -- Passage 2",passage:2,qtype:"Primary Purpose",
stem:`The author's primary purpose in writing this passage is to --`,
opts:["Argue that our confidence in attributing mental states to others exceeds the grounds we actually have for doing so","Defend philosophical scepticism about the existence of other minds as a theoretical position","Explain why the problem of other minds cannot be resolved by advances in neuroscience or technology","Introduce the concept of the philosophical zombie and assess its implications for consciousness studies"],
answer:"A",
exp:`Correct Answer: A. Argue that our confidence in attributing mental states to others exceeds the grounds we actually have for doing so.\n\nA is confirmed by the passage's final sentence, which is the thesis statement: "The confidence with which we speak of other people feeling, intending, and believing outstrips the grounds we actually have."\n\nB is explicitly rejected in paragraph three: "What follows from this is not scepticism about other minds as a practical matter." The passage takes care to distance itself from practical scepticism.\nC is one point from paragraph one but it is not the purpose -- it is a premise. The purpose is the normative conclusion about confidence and grounds.\nD: the zombie is one illustrative example in paragraph two. The passage does not assess its implications for consciousness studies -- it uses it to make a point about inference.`},

{id:7,section:"RC -- Passage 2",passage:2,qtype:"Vocabulary",
stem:`As used in the passage, the phrase <b>structural feature of the situation</b> most nearly means --`,
opts:["A limitation that is in principle solvable with more advanced technology or methodology","A pattern that recurs across different instances of the same kind of phenomenon","A characteristic that belongs to the problem itself rather than to our current inability to address it","A feature of human psychology that makes objective knowledge of other minds impossible"],
answer:"C",
exp:`Correct Answer: C. A characteristic that belongs to the problem itself rather than to our current inability to address it.\n\nThe passage draws a precise contrast: the inability to verify other minds is "not an epistemic limitation that better instruments could overcome -- it is a structural feature of the situation." Structural here means inherent to the logical structure of the problem, not a removable obstacle.\n\nC is confirmed directly by the contrast the passage draws.\nA is what "structural" explicitly is NOT -- the passage says instruments cannot overcome it.\nB describes statistical recurrence, which is not the sense intended here.\nD introduces human psychology as the cause, but the passage locates the problem in the logical structure of first-personal access, not in psychological limitations.`},

{id:8,section:"RC -- Passage 2",passage:2,qtype:"Vocabulary",
stem:`When the author says that applying mental-life concepts to others is "an extension, not a perception," the distinction implies that --`,
opts:["Perception is always more reliable than inference in matters involving psychological knowledge","The attribution of mental states to others, however necessary, is not underwritten by direct access to those states","We are biologically programmed to see minds in others even in the absence of genuine evidence","Only first-person reports can serve as genuine evidence of another person's mental states"],
answer:"B",
exp:`Correct Answer: B. The attribution of mental states to others, however necessary, is not underwritten by direct access to those states.\n\nThis is a two-step inference. Step one: perception = direct, unmediated access; extension = going beyond the conditions that justify the concept. Step two: if attributing minds to others is extension not perception, then we lack direct access to what we are attributing. B follows directly.\n\nA makes a general claim about perception vs inference that the passage does not argue. The passage is not ranking epistemic methods.\nC introduces a biological explanation that has no basis in the passage.\nD is too strong. The passage does not say only first-person reports count as evidence -- it says our attributions outstrip our grounds, not that there are no grounds whatsoever.`},

{id:9,section:"RC -- Passage 3",passage:3,qtype:"Main Idea",
stem:`Which of the following best captures the central argument of this passage?`,
opts:["People who live under structural inequality are psychologically incapable of forming authentic preferences","Welfare theory must abandon preference satisfaction and adopt an objective list of human goods instead","Adaptive preference formation is more useful than rational updating for understanding decisions made under constraint","When preferences have been shaped by deprivation, measuring welfare by preference satisfaction ratifies injustice rather than capturing genuine flourishing"],
answer:"D",
exp:`Correct Answer: D. When preferences have been shaped by deprivation, measuring welfare by preference satisfaction ratifies injustice rather than capturing genuine flourishing.\n\nPassage type: Argumentative. Skeleton at end (the final paragraph delivers the damning conclusion).\n\nD covers the full arc: the definition of adaptive preference formation, its corruption of the welfare metric, and the conclusion that satisfied preferences can evidence the wound.\n\nA is too strong. The passage says preferences are restructured, not that people are incapable of forming authentic preferences. Incapable is an absolute claim the passage does not make.\nB is not argued. The passage diagnoses the problem with preference satisfaction but does not prescribe an objective list as the solution.\nC misreads the relationship: Elster distinguishes the two to define APF, not to rank them for usefulness.`},

{id:10,section:"RC -- Passage 3",passage:3,qtype:"Primary Purpose",
stem:`The author's primary purpose is to --`,
opts:["Explain the psychological mechanism by which people adjust to circumstances they cannot change","Distinguish adaptive preference formation from rational updating and show why the distinction matters for welfare theory","Challenge all theories of justice that rely on subjective wellbeing as a primary metric","Demonstrate that no preference formed under social conditions can be trusted as a guide to genuine welfare"],
answer:"B",
exp:`Correct Answer: B. Distinguish adaptive preference formation from rational updating and show why the distinction matters for welfare theory.\n\nBoth moves are explicit in the passage. The first paragraph defines APF and distinguishes it from rational updating. The second and third paragraphs show what follows for welfare theory. B names both the method and the purpose accurately.\n\nA describes the mechanism but misses the normative argument about welfare. The passage is not just explaining how people adapt -- it is showing why that adaptation corrupts measurement.\nC overstates. The passage targets preference satisfaction specifically; it does not attack all theories of justice relying on subjective wellbeing.\nD is too sweeping. The passage focuses on preferences shaped by deprivation, not all preferences formed under social conditions.`},

{id:11,section:"RC -- Passage 3",passage:3,qtype:"Vocabulary",
stem:`As used in the passage, the word <b>deprecated</b> most nearly means --`,
opts:["Forgotten through the gradual accumulation of new experiences over time","Rationally reassessed and found to be inferior to currently available alternatives","Actively devalued so that what was once wanted comes to seem not worth having","Suppressed by external social pressure until the person no longer feels safe expressing the desire"],
answer:"C",
exp:`Correct Answer: C. Actively devalued so that what was once wanted comes to seem not worth having.\n\nThe passage uses "deprecated" in contrast to simply "no longer desired" -- the word "actively" in the passage signals something stronger than mere absence of desire. Deprecated means the option has been downgraded in value, not merely forgotten or suppressed.\n\nC captures both the active nature and the result: the person comes to feel the option was not worth wanting.\nB is precisely what Elster distinguishes APF from. Rational reassessment based on new evidence is rational updating -- the opposite of what is happening in APF.\nA describes passive forgetting. Deprecated is active -- the desire is not forgotten; it is worked against.\nD places the cause externally (social pressure) and the mechanism as suppression. The passage describes an internal restructuring of preference, not external suppression.`},

{id:12,section:"RC -- Passage 3",passage:3,qtype:"Vocabulary",
stem:`When the author says "the satisfied preference may be the most reliable evidence of the wound," the statement implies that --`,
opts:["People who report high satisfaction are more likely to have experienced prior deprivation than those who report dissatisfaction","Welfare researchers should disregard self-reported satisfaction and rely on objective measures instead","The most deprived members of a society will always report lower satisfaction than those with greater access to options","Preference satisfaction becomes a trustworthy welfare metric only when people have access to a full range of options"],
answer:"A",
exp:`Correct Answer: A. People who report high satisfaction are more likely to have experienced prior deprivation than those who report dissatisfaction.\n\nA is the direct implication of the metaphor within the passage's specific context of structural deprivation. The "wound" is the deprivation that restructured the preference. The "satisfied preference" is the preference that was adapted to that deprivation. If satisfaction is evidence of the wound, then among individuals in structurally unequal conditions, high satisfaction signals prior adaptation -- which signals prior deprivation. The passage is not making a universal claim about all satisfied people; it is making a claim about satisfaction within conditions of structural inequality.\n\nB is a plausible prescription but is not what the metaphor implies. Implication questions ask what follows from the statement, not what policy one should adopt.\nC directly contradicts the passage. The whole point is that deprived people report HIGH satisfaction -- that is the problem.\nD is a reasonable qualification but not what the metaphor implies. The statement is about what satisfaction signals, not about when it becomes reliable.`},

{id:13,section:"RC -- Passage 4",passage:4,qtype:"Main Idea",
stem:`Which of the following best states the central argument of this passage?`,
opts:["Hume's analysis of induction demonstrates that science cannot establish necessary connections between any events","The laws of nature are psychological constructs that reflect human habit rather than features of an independent world","Science can reliably describe regularities in nature even though it cannot establish why those regularities hold","The concept of causal necessity is not a feature of the world but a habit of expectation generated by observed regularities"],
answer:"D",
exp:`Correct Answer: D. The concept of causal necessity is not a feature of the world but a habit of expectation generated by observed regularities.\n\nPassage type: Argumentative. Skeleton in the middle (paragraph two names what is at stake) and resolved in paragraph three.\n\nD covers the full argument: we perceive constant conjunction only (not necessity); the necessity is added by the mind; what remains after Hume is regularity we can rely on but not claim as necessary.\n\nA conflates causation with induction and overstates. The passage references the problem of induction but the central subject is causation specifically.\nB overstates. The passage makes a claim about causal necessity, not about all laws of nature.\nC is the modest conclusion Hume reaches in paragraph three, but it is not the central argument -- it is what survives after the argument is made.`},

{id:14,section:"RC -- Passage 4",passage:4,qtype:"Primary Purpose",
stem:`The author's primary purpose in this passage is to --`,
opts:["Defend Hume's account of causation against objections raised by subsequent philosophers","Demonstrate that the concept of causation is ultimately incoherent and should be abandoned","Challenge theories that claim scientific knowledge is impossible because of the problem of induction","Explain and endorse Hume's argument that causal necessity is a product of psychological habit rather than a feature of the world"],
answer:"D",
exp:`Correct Answer: D. Explain and endorse Hume's argument that causal necessity is a product of psychological habit rather than a feature of the world.\n\nThe passage both expounds the argument (what Hume observed, why it was explosive, what follows) and endorses the conclusion (paragraph three adopts Hume's modest epistemology without qualification). D captures both moves.\n\nA introduces objections from subsequent philosophers -- none appear in the passage. The passage does not defend Hume against anything.\nB is too strong. Paragraph three explicitly says we CAN rely on regularities. The concept of causation is not called incoherent -- it is reanalysed as habit.\nC: induction appears but is not the target. The passage is about causation. And impossibility of scientific knowledge is not claimed.`},

{id:15,section:"RC -- Passage 4",passage:4,qtype:"Vocabulary",
stem:`As used in the passage, the term <b>constant conjunction</b> most nearly means --`,
opts:["A logical relationship between a cause and its inevitable effect in a closed system","The repeated co-occurrence of events from which the mind constructs an expectation of necessity","The simultaneous presence of two phenomena that are correlated but not causally related","A scientific method for establishing causal relationships through controlled and repeated experimentation"],
answer:"B",
exp:`Correct Answer: B. The repeated co-occurrence of events from which the mind constructs an expectation of necessity.\n\nHume uses "constant conjunction" as his technical term for what we actually observe: two events reliably following each other. The necessity -- the "must" -- is not in the conjunction itself but is constructed by the mind from the pattern.\n\nB is confirmed by the passage's own logic: we see the two events, we see they follow each other on every occasion, and from this the mind adds the necessity.\nA defines necessity -- precisely what Hume says is NOT in the data of constant conjunction.\nC introduces "simultaneous" -- conjunction here is sequential (one event follows another), not simultaneous.\nD introduces experimental method, which has no basis in the passage. Constant conjunction is an observation, not a procedure.`},

{id:16,section:"RC -- Passage 4",passage:4,qtype:"Vocabulary",
stem:`When the author says "the cement of the universe turns out to be psychological, not metaphysical," the phrase implies that --`,
opts:["The physical laws governing the universe are ultimately derived from patterns of accumulated human thought","What we call causal connection operates at a psychological level rather than at a physical one","The apparent order and coherence of the world is sustained by the mind's projection of regularities onto experience","Metaphysical explanations of causation are less rigorous than psychological ones because they appeal to unobservable entities"],
answer:"C",
exp:`Correct Answer: C. The apparent order and coherence of the world is sustained by the mind's projection of regularities onto experience.\n\nTwo steps required. Step one: "cement" = what binds things together / makes the world cohere. Step two: psychological not metaphysical = the binding is in the mind's habits, not in the world's intrinsic structure. Together: the world's apparent coherence is held in place by the mind projecting expectations of regularity.\n\nC is the precise implication.\nA is too strong: the passage does not claim laws are derived from human thought -- only that causal necessity is added by the mind.\nB misreads the contrast. The passage does not say causation operates at a psychological level of reality -- it says the necessity is a mental projection, not that there is a psychological level in the world.\nD directly contradicts the passage's argument. The passage endorses the psychological account; it does not compare its rigour to metaphysical accounts.`},

{id:17,section:"RC -- Passage 5",passage:5,qtype:"Main Idea",
stem:`The passage argues that --`,
opts:["Nabokov's memoirs are more accurate than those of other writers because of his obsessive attention to sensory detail","The deliberate acknowledgment that memory is a construction makes autobiographical writing more epistemically honest than the pretence of transparent recall","Literary artifice and factual truth are fundamentally incompatible, and autobiography should therefore be classified as fiction","Nabokov's distrust of autobiography led him to abandon the genre in favour of purely fictional narratives"],
answer:"B",
exp:`Correct Answer: B. The deliberate acknowledgment that memory is a construction makes autobiographical writing more epistemically honest than the pretence of transparent recall.\n\nPassage type: Argumentative with a paradox at the centre (paragraph three). The passage moves from Nabokov's distrust of memory's innocence to his aesthetics of memory to the paradox: artifice produces a kind of truth naive realism cannot.\n\nB covers the full arc and names the paradox correctly.\nA confuses the sensory accuracy of Nabokov's recall (which the passage acknowledges but immediately moves past) with the argument. Accuracy of detail is the premise, not the thesis.\nC: the passage does not argue incompatibility or call for reclassification. Nabokov embraced autobiography -- he reshaped it.\nD directly contradicts the passage. Speak, Memory is Nabokov's autobiography. He did not abandon the genre.`},

{id:18,section:"RC -- Passage 5",passage:5,qtype:"Primary Purpose",
stem:`The author's primary purpose in writing this passage is to --`,
opts:["Explain why Nabokov considered memory unreliable and chose to prioritise fiction over autobiography","Describe the narrative techniques Nabokov employed in Speak, Memory and evaluate their literary effectiveness","Argue that a writer who openly acknowledges the constructed nature of memory is more epistemically trustworthy than one who does not","Contrast Nabokov's approach to autobiographical memory with that of other memoirists who aspire to factual accuracy"],
answer:"C",
exp:`Correct Answer: C. Argue that a writer who openly acknowledges the constructed nature of memory is more epistemically trustworthy than one who does not.\n\nThe passage builds to the paradox in the final paragraph: Nabokov's artifice is more trustworthy than a lesser writer's sincerity, not despite its self-consciousness but because of it. C names this argument precisely.\n\nA contains two errors: Nabokov did not consider memory unreliable in the accuracy sense (the passage says he was precise about sensory details), and he did not choose fiction over autobiography -- Speak, Memory is autobiography.\nB: the passage does not evaluate literary effectiveness. It makes an epistemic argument about honesty and trust.\nD names no other memoirists and the comparison is general, not specific. More importantly, the purpose is to make an argument about epistemic honesty, which C captures.`},

{id:19,section:"RC -- Passage 5",passage:5,qtype:"Vocabulary",
stem:`As used in the passage, the phrase <b>aesthetics of memory</b> most nearly means --`,
opts:["A belief that autobiographical writing should prioritise elegant prose style over fidelity to fact","The practice of selecting only the most vivid and emotionally resonant memories for inclusion in an autobiography","The deliberate acknowledgment that recollection is an act of construction rather than transparent retrieval","A critical framework for judging autobiographical writing by aesthetic rather than factual standards"],
answer:"C",
exp:`Correct Answer: C. The deliberate acknowledgment that recollection is an act of construction rather than transparent retrieval.\n\nThe passage provides its own gloss immediately after introducing the phrase: "the frank acknowledgment that recollection is construction." C is a direct and accurate paraphrase of this definition.\n\nA focuses on prose style -- but the aesthetics of memory is not about how beautifully one writes; it is about what one acknowledges about the nature of recollection.\nB describes selective recall for vividness -- a reasonable inference about how Nabokov wrote, but not what the phrase means in context.\nD frames the aesthetics of memory as a critical framework for judging others' writing. The passage uses it to describe Nabokov's own approach to his autobiography.`},

{id:20,section:"RC -- Passage 5",passage:5,qtype:"Vocabulary",
stem:`When Nabokov says memory is most honest "when it admits it is a mirror that has been polished," the metaphor implies that --`,
opts:["A memory consciously shaped and declared as such offers a clearer account of the past than one that disguises its own construction","Memory, like a mirror, passively receives and reflects experience without introducing any distortion of its own","The most accurate autobiographical writing is that which has been most carefully edited for stylistic clarity and elegance","Memory becomes reliable only when the distortions introduced by the act of recollection are identified and minimised"],
answer:"A",
exp:`Correct Answer: A. A memory consciously shaped and declared as such offers a clearer account of the past than one that disguises its own construction.\n\nTwo-step inference required. Step one: a polished mirror reflects more clearly than an unpolished one -- polishing improves the reflection. Step two: polishing = deliberate artifice, and the mirror has been polished = the construction has been acknowledged. Together: deliberate shaping + acknowledgment of that shaping = clearer reflection of the past.\n\nA follows directly.\nB says memory passively receives without distortion -- the opposite of everything the passage argues. The whole point is that memory actively constructs.\nC takes "polished" too literally as editing for style. The metaphor is about epistemic honesty, not stylistic refinement.\nD proposes minimising distortion -- the naive approach that Nabokov explicitly rejects. He does not minimise the construction; he acknowledges and declares it.`}
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let studentName="", studentPin="", studentBatch="";
let currentQ=0, secondsLeft=timer_duration*60, timerInterval=null;
let userAnswers=new Array(20).fill(null);
let markedForReview=new Array(20).fill(false);
let testSubmitted=false;
let questionTimestamps=new Array(20).fill(null); // epoch ms when student first lands on each Q
let questionTimes=new Array(20).fill(null);      // seconds spent per Q (computed at submit)

// ── ADMIN PINS ────────────────────────────────────────────────────────────────
const adminPins=["IMS1111111111","IMS2222222222","IMS3333333333","IMS4444444444","IMS5555555555"];

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function startTest(){
  const name=document.getElementById('inputName').value.trim();
  const pin=document.getElementById('inputPin').value.trim().toUpperCase();
  const batch=document.getElementById('inputBatch').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!name||!pin||!batch){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  const validPin=/^(STU|IMS)\d{10}$/.test(pin);
  if(!validPin){err.textContent='PIN must be STU or IMS followed by 10 digits.';err.style.display='block';return;}
  studentName=name; studentPin=pin; studentBatch=batch;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('testScreen').style.display='block';
  buildPalette();
  renderQuestion(0);
  startTimer();
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(){
  const disp=document.getElementById('timerDisplay');
  timerInterval=setInterval(()=>{
    secondsLeft--;
    const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
    disp.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if(secondsLeft<=300) disp.classList.add('urgent');
    if(secondsLeft<=0){clearInterval(timerInterval);autoSubmit();}
  },1000);
}

function autoSubmit(){
  if(!testSubmitted) submitTest();
}

// ── PALETTE ───────────────────────────────────────────────────────────────────
function buildPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  QUESTIONS.forEach((_,i)=>{
    const btn=document.createElement('button');
    btn.className='pal-btn';
    btn.id='pal-'+i;
    btn.textContent=i+1;
    btn.onclick=()=>renderQuestion(i);
    grid.appendChild(btn);
  });
}

function updatePalette(){
  QUESTIONS.forEach((_,i)=>{
    const btn=document.getElementById('pal-'+i);
    btn.className='pal-btn'+(i===currentQ?' current':'')+(markedForReview[i]?' marked':userAnswers[i]!==null?' answered':'');
  });
}

function togglePalette(){
  document.getElementById('paletteOverlay').classList.toggle('mobile-open');
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion(idx){
  // Log time when student leaves the previous question
  if(currentQ!==idx && questionTimestamps[currentQ]!==null){
    const elapsed=Math.round((Date.now()-questionTimestamps[currentQ])/1000);
    questionTimes[currentQ]=(questionTimes[currentQ]||0)+elapsed;
  }
  currentQ=idx;
  // Start timing this question if not yet visited
  if(questionTimestamps[idx]===null) questionTimestamps[idx]=Date.now();
  else questionTimestamps[idx]=Date.now(); // restart clock each visit; accumulate above
  const q=QUESTIONS[idx];
  const p=PASSAGES[q.passage-1];

  // passage block
  document.getElementById('passageTitle').textContent=p.title;
  document.getElementById('passageText').innerHTML=p.text.split('\n').map(para=>para.trim()?'<p>'+para+'</p>':'').join('');
  document.getElementById('passageSource').textContent='Source: '+p.source;

  // section / number
  document.getElementById('sectionTag').textContent=q.section+' -- '+q.qtype;
  document.getElementById('questionNumber').textContent='Question '+(idx+1)+' of '+QUESTIONS.length;

  // stem
  document.getElementById('questionStem').innerHTML=q.stem;

  // options
  const ul=document.getElementById('optionsList');
  ul.innerHTML='';
  const labels=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.className='option-btn'+(userAnswers[idx]===i?' selected':'');
    btn.innerHTML='<span class="opt-label">'+labels[i]+'</span> '+opt;
    btn.onclick=()=>selectAnswer(idx,i);
    li.appendChild(btn);
    ul.appendChild(li);
  });

  // progress
  const answered=userAnswers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(answered/QUESTIONS.length*100)+'%';

  // submit btn
  // submit btn shown only on Q20 (index 19)
  document.getElementById('submitBtn').style.display=(currentQ===19)?'inline-block':'none';

  updatePalette();
}

// ── SELECT ANSWER ─────────────────────────────────────────────────────────────
function selectAnswer(qIdx,optIdx){
  userAnswers[qIdx]=optIdx;
  renderQuestion(qIdx);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function navigate(dir){
  const next=currentQ+dir;
  if(next>=0&&next<QUESTIONS.length) renderQuestion(next);
}

function markForReview(){
  markedForReview[currentQ]=!markedForReview[currentQ];
  updatePalette();
}

function clearAnswer(){
  userAnswers[currentQ]=null;
  renderQuestion(currentQ);
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function confirmSubmit(){
  const unanswered=userAnswers.filter(a=>a===null).length;
  const msg=unanswered>0
    ?'You have '+unanswered+' unanswered question(s). Submit anyway?'
    :'Submit the test? This cannot be undone.';
  if(confirm(msg)) submitTest();
}

function submitTest(){
  if(testSubmitted) return;
  testSubmitted=true;
  clearInterval(timerInterval);
  // Finalise time for whichever question was active at submit
  if(questionTimestamps[currentQ]!==null){
    const elapsed=Math.round((Date.now()-questionTimestamps[currentQ])/1000);
    questionTimes[currentQ]=(questionTimes[currentQ]||0)+elapsed;
  }
  const labels=['A','B','C','D'];
  let correct=0,wrong=0,skipped=0;
  const sectionErrors={};
  const wrongQuestions=[];
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const correctIdx=labels.indexOf(q.answer);
    if(ua===null){skipped++;}
    else if(ua===correctIdx){correct++;}
    else{
      wrong++;
      if(!sectionErrors[q.section]) sectionErrors[q.section]=0;
      sectionErrors[q.section]++;
      wrongQuestions.push({q:i+1,section:q.section,chosen:labels[ua],correct:q.answer});
    }
  });
  const score=correct*4-wrong*1;
  showResults(score,correct,wrong,skipped);
  saveToTracker(score,correct,wrong,skipped);
  logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions);
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults(score,correct,wrong,skipped){
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='block';
  const acc=(correct/(20-skipped||1)*100).toFixed(1);
  document.getElementById('scoreHero').innerHTML=
    '<div class="score-num">'+score+'</div>'+
    '<div class="score-sub">out of 80 &nbsp;&#183;&nbsp; '+studentName+' &nbsp;&#183;&nbsp; '+studentPin+' &nbsp;&#183;&nbsp; '+studentBatch+'</div>';
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-box correct"><div class="val">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="stat-box wrong"><div class="val">'+wrong+'</div><div class="lbl">Wrong</div></div>'+
    '<div class="stat-box"><div class="val" style="color:var(--grey)">'+skipped+'</div><div class="lbl">Skipped</div></div>'+
    '<div class="stat-box accuracy"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div>';
  buildMisses();
  buildRetry();
  // Fetch fastest times from Apps Script, then build review
  const url=APPS_SCRIPT_URL.replace('/exec','')+'/../exec?mode=fastestTimes&testName='+encodeURIComponent('Road to IIM Test 23');
  fetch(APPS_SCRIPT_URL+'?mode=fastestTimes&testName='+encodeURIComponent('Road to IIM Test 23'))
    .then(r=>r.json())
    .then(data=>{
      const fastest=(data.status==='success'&&data.fastest)?data.fastest:[];
      buildReview(fastest);
    })
    .catch(()=>buildReview([]));
}

function buildReview(fastestTimes){
  fastestTimes=fastestTimes||[];
  const list=document.getElementById('review-list');
  list.innerHTML='';
  const labels=['A','B','C','D'];
  let lastPassage=-1;
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const correctIdx=labels.indexOf(q.answer);
    const isCorrect=(ua===correctIdx);
    const isSkipped=(ua===null);
    if(q.passage!==lastPassage){
      lastPassage=q.passage;
      const ph=document.createElement('div');
      ph.style.cssText='color:var(--gold);font-size:.8rem;font-weight:700;margin:20px 0 8px 0;letter-spacing:.06em;text-transform:uppercase;';
      ph.textContent=PASSAGES[q.passage-1].title;
      list.appendChild(ph);
      const pt=document.createElement('div');
      pt.className='review-passage';
      pt.innerHTML=PASSAGES[q.passage-1].text.split('\n').map(para=>para.trim()?'<p style="margin:0 0 6px 0">'+para+'</p>':'').join('');
      list.appendChild(pt);
    }
    const card=document.createElement('div');
    card.className='review-card '+(isSkipped?'':isCorrect?'correct':'wrong');
    const badgeClass=isSkipped?'badge-skipped':isCorrect?'badge-correct':'badge-wrong';
    const badgeText=isSkipped?'--':isCorrect?'&#10003;':'&#10007;';
    const opts=q.opts.map((o,idx)=>{
      let cls='review-opt';
      if(idx===correctIdx) cls+=' correct-opt';
      if(ua!==null&&ua===idx&&idx!==correctIdx) cls+=' your-wrong';
      return '<div class="'+cls+'"><span class="opt-label">'+labels[idx]+'</span> '+o+'</div>';
    }).join('');
    // Your time on this question
    const myTime=questionTimes[i];
    const myTimeStr=myTime!=null?formatSecs(myTime):null;
    // Fastest time across all students
    const fastSecs=fastestTimes[i];
    const fastStr=fastSecs!=null?formatSecs(fastSecs):null;
    // Build time badge
    let timeBadge='';
    if(myTimeStr||fastStr){
      timeBadge='<div class="q-time-bar">';
      if(myTimeStr) timeBadge+='<span class="q-time-mine">&#128336; Your time: '+myTimeStr+'</span>';
      if(fastStr) timeBadge+='<span class="q-time-fast">&#9889; Fastest: '+fastStr+'</span>';
      timeBadge+='</div>';
    }
    card.innerHTML=
      '<div class="review-card-header">'+
      '<div class="review-badge '+badgeClass+'">'+badgeText+'</div>'+
      '<div class="review-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &nbsp;&#183;&nbsp; '+q.section+' &nbsp;&#183;&nbsp; '+q.qtype+'</span><br>'+q.stem+'</div>'+
      '</div>'+
      '<div class="review-opts">'+opts+'</div>'+
      '<div class="review-exp">'+q.exp.replace(/\n/g,'<br>')+'</div>'+
      timeBadge;
    list.appendChild(card);
  });
}

function formatSecs(s){
  if(s==null) return null;
  const m=Math.floor(s/60);
  const sec=s%60;
  return m>0?m+'m '+String(sec).padStart(2,'0')+'s':s+'s';
}

function buildMisses(){
  const labels=['A','B','C','D'];
  const wrongQs=[];
  QUESTIONS.forEach((q,i)=>{
    const correctIdx=labels.indexOf(q.answer);
    if(userAnswers[i]!==null&&userAnswers[i]!==correctIdx){
      wrongQs.push('Q'+(i+1)+' ['+q.section+' -- '+q.qtype+'] Correct: '+q.answer+'. '+q.opts[correctIdx]);
    }
  });
  document.getElementById('missesText').value=wrongQs.length?wrongQs.join('\n'):'No misses -- perfect score!';
}

function copyMisses(e){
  e.preventDefault();
  const txt=document.getElementById('missesText').value;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.target;
    btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent='Copy Misses';},2000);
  });
}

function buildRetry(){
  const labels=['A','B','C','D'];
  const retrySection=document.getElementById('retrySection');
  retrySection.innerHTML='';
  const wrongIdxs=[];
  QUESTIONS.forEach((q,i)=>{
    const correctIdx=labels.indexOf(q.answer);
    if(userAnswers[i]!==null&&userAnswers[i]!==correctIdx) wrongIdxs.push(i);
  });
  if(!wrongIdxs.length) return;
  retrySection.innerHTML='<h3 style="color:var(--gold);margin:24px 0 16px 0;">Retry Wrong Questions ('+wrongIdxs.length+')</h3>';
  let lastPassage=-1;
  wrongIdxs.forEach(i=>{
    const q=QUESTIONS[i];
    const p=PASSAGES[q.passage-1];
    const correctIdx=labels.indexOf(q.answer);
    // Show passage block if this is a new passage
    if(q.passage!==lastPassage){
      lastPassage=q.passage;
      const pBlock=document.createElement('div');
      pBlock.style.cssText='background:#111e2e;border:1px solid #1e3a5a;border-left:4px solid var(--gold);border-radius:10px;padding:16px 18px;margin-bottom:12px;font-size:.88rem;line-height:1.75;color:#c8d8e8;';
      pBlock.innerHTML='<div style="color:var(--gold);font-size:.75rem;font-weight:700;margin-bottom:8px;">'+ p.title +'</div>'+
        p.text.split('\n').map(para=>para.trim()?'<p style="margin-bottom:.7em;">'+para+'</p>':''). join('')+
        '<div style="color:var(--grey);font-size:.72rem;margin-top:8px;">Source: '+p.source+'</div>';
      retrySection.appendChild(pBlock);
    }
    const card=document.createElement('div');
    card.className='retry-card';
    card.innerHTML='<div class="r-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &nbsp;&#183;&nbsp; '+q.section+' &nbsp;&#183;&nbsp; '+q.qtype+'</span><br>'+q.stem+'</div>';
    q.opts.forEach((o,idx)=>{
      const btn=document.createElement('button');
      btn.className='retry-opt';
      btn.innerHTML='<span class="opt-label">'+labels[idx]+'</span> '+o;
      btn.onclick=()=>{
        card.querySelectorAll('.retry-opt').forEach(b=>b.disabled=true);
        if(idx===correctIdx) btn.classList.add('r-correct');
        else{btn.classList.add('r-wrong');card.querySelectorAll('.retry-opt')[correctIdx].classList.add('r-correct');}
      };
      card.appendChild(btn);
    });
    retrySection.appendChild(card);
  });
}

// ── SAVE / LOG ────────────────────────────────────────────────────────────────
function saveToTracker(score,correct,wrong,skipped){
  const s=timer_duration*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  const data={
    testName:'Road to IIM Test 23',name:studentName,pin:studentPin,batch:studentBatch,
    score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:80,
    timeTaken:mm+':'+ss,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})
  };
  try{
    const existing=JSON.parse(localStorage.getItem('riim_results')||'[]');
    existing.unshift(data);
    localStorage.setItem('riim_results',JSON.stringify(existing.slice(0,200)));
  }catch(e){}
}

function logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions){
  const notice=document.getElementById('sheet-notice');
  notice.className='submitting';
  notice.textContent='Submitting results to server...';
  notice.style.display='block';
  const s=timer_duration*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  const payload={
    testName:'Road to IIM Test 23',
    name:studentName,
    pin:studentPin,
    batch:studentBatch,
    score:score,
    correct:correct,
    wrong:wrong,
    skipped:skipped,
    maxMarks:80,
    timeTaken:mm+':'+ss,
    timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),
    sectionErrors:JSON.stringify(sectionErrors),
    wrongQuestions:JSON.stringify(wrongQuestions),
    studentAnswers:JSON.stringify(userAnswers.map(a=>a===null?null:a)),
    questionTimes:JSON.stringify(questionTimes)
  };
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{notice.className='success';notice.textContent='Results saved successfully.';})
    .catch(()=>{notice.className='failure';notice.textContent='Could not reach server. Results saved locally.';});
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function generatePDF(){
  const el=document.getElementById('review-list');
  html2pdf().set({
    margin:10,filename:'RoadToIIM_Test23_'+studentName.replace(/\s+/g,'_')+'.pdf',
    html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(el).save();
}
