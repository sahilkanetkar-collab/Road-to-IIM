<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM - Test 13</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;--purple:#9b59b6;--panel:280px;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;border:1px solid #2a4060;border-radius:6px;padding:10px 12px;color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);color:var(--navy);font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;}
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);background:#0a2a1a;padding:6px 16px;border-radius:20px;border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}
#mainLayout{display:flex;min-height:calc(100vh - 54px);}
#questionArea{flex:1;padding:28px 32px 80px 32px;max-width:calc(100% - var(--panel));}
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.85rem;margin-bottom:8px;}
#questionStem{font-size:1.05rem;line-height:1.7;color:var(--white);margin-bottom:22px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--white);transition:all .2s;width:100%;display:flex;align-items:flex-start;gap:8px;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1e2e10;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;min-width:24px;font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-text{flex:1;}
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
#navBar{position:fixed;bottom:0;left:0;right:var(--panel);background:var(--navy2);border-top:1px solid #1e3a5a;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:150;gap:4px;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);padding:10px 14px;font-size:.83rem;line-height:1.6;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #questionArea{max-width:100%;padding:16px 16px 80px 16px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{right:0;padding:8px 6px;}
  .nav-btn{padding:7px 4px;font-size:.72rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;}
}
@media (max-width:768px){#paletteOverlay.mobile-open{display:flex;}}
</style>
</head>
<body>

<div id="loginScreen">
<div class="login-box">
  <h1>Road to IIM</h1>
  <p>Test 13 &nbsp;&middot;&nbsp; Vocabulary & Word Selection &nbsp;&middot;&nbsp; 45 Questions &nbsp;&middot;&nbsp; 30 Minutes</p>
  <label>Full Name</label>
  <input type="text" id="inputName" placeholder="Your full name" autocomplete="off">
  <label>IMS PIN</label>

  <label>Batch</label>
  <select id="inputBatch">
    <option value="">-- Select batch --</option>
    <optgroup label="Classroom">
      <option>A2701</option><option>A2702</option><option>A2703</option>

      <option>A2710</option><option>A2711</option><option>A2712</option>
      <option>A2714</option><option>A2715</option><option>A2716</option>

    <span style="color:var(--gold);font-weight:700;">Road to IIM &middot; Test 13 &mdash; Results</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx5Ojm_zp4LfsMeelx5e06KNjVH1wfsXdV0keS4407m4FO1HU4EpVb7GKj-ibAsxnspeA/exec";
const TIMER_DURATION=30;
const ADMIN_PINS=['IMS1111111111','IMS2222222222','IMS3333333333','IMS4444444444','IMS5555555555'];

const QUESTIONS = [
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The court chose to (A) censure / (B) censor the minister for his conduct, issuing a formal reprimand.\n2. Heavy rains had an (A) averse / (B) adverse effect on the harvest.\n3. The billionaire continued to (A) flaunt / (B) flout his wealth, arriving in a gold-plated car.\n4. The lawyer tried to (A) elicit / (B) illicit a confession from the witness.\n5. He was (A) discreet / (B) discrete about the details of the merger.",opts:["ABABA","BBAAA","ABAAB","ABAAA"],ans:3,exp:"Correct Answer: D (ABAAA). 1. Censure = officially reprimand; censor = suppress content. 2. Adverse = harmful (of things); averse = opposed (of people, averse to). 3. Flaunt = display showily; flout = openly disobey. 4. Elicit = draw out (verb); illicit = illegal (adjective). 5. Discreet = tactfully secretive; discrete = separate and distinct."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The (A) eminent / (B) imminent scientist addressed the conference.\n2. The team must (A) adapt / (B) adopt to the new rules quickly.\n3. Her speech made an (A) illusion / (B) allusion to Greek mythology.\n4. The manager will (A) apprise / (B) appraise the staff of the policy change.\n5. The refugees hoped to (A) emigrate / (B) immigrate from their homeland before winter.",opts:["AABAA","AABAB","ABBAA","AABBA"],ans:0,exp:"Correct Answer: A (AABAA). 1. Eminent = distinguished; imminent = about to happen. 2. Adapt to = adjust; adopt = take up (no to). 3. Allusion = indirect reference; illusion = false perception. 4. Apprise of = inform; appraise = assess value. 5. Emigrate from = leave a country; immigrate to = enter one."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The judge's (A) judicious / (B) judicial handling of the media kept the trial calm.\n2. The clerk's (A) official / (B) officious interference annoyed everyone; no one had asked for his help.\n3. The (A) continual / (B) continuous hum of the generator ran without a single break all night.\n4. Her (A) childlike / (B) childish wonder at the northern lights charmed the guides.\n5. Buying in bulk is more (A) economic / (B) economical for large families.",opts:["ABBAA","BBBAB","ABABB","ABBAB"],ans:3,exp:"Correct Answer: D (ABBAB). 1. Judicious = wise, showing good judgement; judicial = relating to courts. 2. Officious = intrusively meddlesome (no one had asked); official = authorised. 3. Continuous = unbroken (without a single break); continual = recurring with pauses. 4. Childlike = innocent (positive); childish = immature (negative). 5. Economical = money-saving; economic = relating to the economy."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Expressing opinions loudly and forcefully","Speaking in a whisper","Stubbornly refusing to cooperate","Excessively praising others"],ans:0,exp:"Correct Answer: A. Expressing opinions loudly and forcefully. Vociferous comes from the Latin vox (voice) + ferre (to carry). It means expressing opinions loudly and forcefully. Recalcitrant = stubborn; obsequious = sycophantic — common confusable words."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Easily influenced by others","Deeply remorseful for past actions","Stubbornly resistant to authority or control","Excessively talkative in social situations"],ans:2,exp:"Correct Answer: C. Stubbornly resistant to authority or control. Recalcitrant means stubbornly resistant to authority or control. From the Latin recalcitrare = to kick back. Malleable (easily influenced) is its antonym. Often used in political or institutional contexts."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Excessively compliant and eager to please those in power","Proudly independent and self-reliant","Deeply suspicious of others' motives","Fiercely argumentative and combative"],ans:0,exp:"Correct Answer: A. Excessively compliant and eager to please those in power. Obsequious means excessively eager to please or serve those in authority — to the point of being servile. Synonym: sycophantic. Antonym: assertive, independent."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Openly aggressive and confrontational","Proceeding gradually in a harmful way without being noticed","Extremely enthusiastic and energetic","Excessively cautious and hesitant"],ans:1,exp:"Correct Answer: B. Proceeding gradually in a harmful way without being noticed. Insidious means proceeding in a gradual, subtle way that causes harm before being noticed. Classic use: 'an insidious disease'. Distinct from overt harm — the key is stealth and slow progression."},
  {section:"Spelling",stem:"Spelling",opts:["Punctillius","Punctillious","Punctilious","Punctileous"],ans:2,exp:"Correct Answer: C. Punctilious. Punctilious = very attentive to correct behaviour or procedure. One L, ends in -ious. Common error: doubling the L (Punctillious)."},
  {section:"Spelling",stem:"Spelling",opts:["Querullous","Querilous","Querulous","Querialous"],ans:2,exp:"Correct Answer: C. Querulous. Querulous = complaining in a petulant or whining manner. Spelled Q-U-E-R-U-L-O-U-S. Common error: doubling the L or changing the vowel."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["repair; undermined; contradictory; exacerbate","dissolve; supported; consistent; stabilise","maintain; assisted; cooperative; reduce","ignore; enhanced; diplomatic; resolve"],ans:0,exp:"Correct Answer: A. repair; undermined; contradictory; exacerbate. The diplomat attempts to repair (positive intent), but his own government's contradictory statements undermine his efforts and exacerbate (worsen) the situation. All four blanks build one coherent narrative of self-sabotage."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["credible; validate; certain; accuracy","contested; confirm; doubtful; methodology","plausible; undermine; sceptical; validity","rejected; challenge; optimistic; relevance"],ans:2,exp:"Correct Answer: C. plausible; undermine; sceptical; validity. Hypothesis was initially plausible (reasonable), but experiments undermine it — making the community sceptical about its validity. The arc is: promising start → erosion of confidence. Option B breaks down: if experiments confirm, the community wouldn't be doubtful."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["foster; prescriptive; stifled; impossible","suppress; flexible; liberated; certain","encourage; vague; motivated; guaranteed","develop; optional; engaged; inevitable"],ans:0,exp:"Correct Answer: A. foster; prescriptive; stifled; impossible. The workshop aimed to foster creativity, but its prescriptive rules stifled participants — making innovation impossible. The contrast between intent and outcome (foster...but...stifled) is the key structural signal."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["crystalline; turgid; meandering; obscure","dense; accessible; focused; apparent","poetic; refined; relevant; persuasive","ornate; simplified; concise; transparent"],ans:0,exp:"Correct Answer: A. crystalline; turgid; meandering; obscure. Once celebrated for crystalline (perfectly clear) clarity, the prose grew turgid (pompously inflated), burdening readers with meandering digressions and making the argument obscure. Each word reinforces the decline narrative."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["rigorous; resulted; minimal; enhancing","lax; culminated; intense; damaging","careful; ended; routine; protecting","thorough; succeeded; limited; strengthening"],ans:1,exp:"Correct Answer: B. lax; culminated; intense; damaging. Lax (careless) approach to safety culminated in accidents, drawing intense scrutiny and damaging reputation. Culminated is the precise word for a gradual build-up resulting in a significant outcome. Resulted (option A) is possible but weaker — lax+minimal scrutiny contradicts the scale of damage."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["dubious; minor; defend; praise","mediocre; deliberate; applaud; admiration","impeccable; glaring; scrutinise; challenge","controversial; obvious; ignore; support"],ans:2,exp:"Correct Answer: C. impeccable; glaring; scrutinise; challenge. Impeccable reputation + glaring errors = paradox that forces colleagues to scrutinise her methodology and leaves conclusions open to challenge. The contrast between her past standing and current failure drives all four blanks."},
  {section:"Grammar",stem:"From the following options, select the sentence that is grammatically incorrect.",opts:["Seldom does the committee reach a unanimous decision on the first vote.","The professor insisted that every student submit their final draft by Monday.","Had the trial been conducted fairly, the verdict would have been different.","She behaved as if she has been the director for decades."],ans:3,exp:"Correct Answer: D. She behaved as if she has been the director for decades.. 'As if' introduces a hypothetical — it requires the subjunctive/past tense: 'as if she had been', not 'as if she has been'. The present perfect 'has been' treats the hypothetical as a real fact."},
  {section:"Grammar",stem:"Find the sentence that violates grammatical rules from the following options.",opts:["It is crucial that the evidence be preserved before the investigation begins.","No sooner had the verdict been announced than the crowd erupted in protest.","Many a student have struggled with the ambiguity of conditional tenses.","Were the committee to reconsider, the outcome might be entirely different."],ans:2,exp:"Correct Answer: C. Many a student have struggled with the ambiguity of conditional tenses.. 'Many a' takes a singular verb. Correct form: 'Many a student has struggled'. This is a classic SVA trap — the plural sense of 'many' misleads students into using a plural verb."},
  {section:"Grammar",stem:"Identify the grammatically incorrect sentence.",opts:["The board recommended that the proposal be reviewed before the deadline.","Barely had the ink dried when fresh disputes arose over the agreement.","She speaks about the treaty as though she had personally drafted it.","Neither the director nor the producers was willing to comment on the leak."],ans:3,exp:"Correct Answer: D. Neither the director nor the producers was willing to comment on the leak.. With 'Neither...nor', the verb agrees with the subject closer to it. 'The producers' is plural — so the verb must be 'were', not 'was'."},
  {section:"Grammar",stem:"Which one of the following sentences is grammatically wrong?",opts:["By the time the results are announced, the candidates will have waited for six months.","The findings suggest that the new policy had failed to achieve its intended goals.","No sooner did the scandal break than the minister tendered his resignation.","Had she been more prepared, the presentation would have been far more effective."],ans:1,exp:"Correct Answer: B. The findings suggest that the new policy had failed to achieve its intended goals.. 'Suggest' in present tense reporting a current finding requires present tense or present perfect: 'has failed'. 'Had failed' implies the failure is complete and in the past relative to another past event — inconsistent with a current report."},
  {section:"Grammar",stem:"Which one of the following sentences is grammatically wrong?",opts:["It is essential that every applicant provide proof of identity at registration.","The mayor announced that the bridge will be repaired within three months.","Rarely have scholars agreed so comprehensively on a single interpretation.","I wish I would have studied the contract more carefully before signing it."],ans:3,exp:"Correct Answer: D. I wish I would have studied the contract more carefully before signing it.. After 'I wish', use the past perfect 'had studied', not 'would have studied'. 'Would' cannot follow 'wish' — this is a common error with regret expressions."},
  {section:"Grammar",stem:"Find the sentence that violates grammatical rules.",opts:["The committee required that the audit be conducted by an independent firm.","Only after the final report was submitted did the manager approve the payment.","She looked at the accusation as if she never heard it before.","Long had the villagers endured the consequences of the dam's neglect."],ans:2,exp:"Correct Answer: C. She looked at the accusation as if she never heard it before.. 'As if' introduces a hypothetical. The correct form is 'as if she had never heard it' — past perfect to signal the hypothetical/unreal nature. 'Never heard' (simple past) treats it as a real fact."},
  {section:"Grammar",stem:"Identify the grammatically incorrect sentence.",opts:["Scarcely had the ceremony begun when the power went out across the hall.","If I were in his position, I would have approached the problem differently.","The judge ordered that the documents be sealed pending further review.","Each of the participants have submitted their forms before the deadline."],ans:3,exp:"Correct Answer: D. Each of the participants have submitted their forms before the deadline.. 'Each of' takes a singular verb. Correct: 'Each of the participants has submitted'. The plural 'participants' misleads students into using 'have' — classic SVA trap with distributive pronouns."},
  {section:"Story Vocabulary",stem:"Complete the narrative: Years of failed harvests had reduced the once-prosperous zamindar family to _______; by winter they were selling the last of the silver to buy grain.",opts:["LANGUOR","VICISSITUDE","MERETRICIOUS","PENURY"],ans:3,exp:"Correct Answer: D. Penury (Latin penuria: want, scarcity) means extreme poverty, locked by selling the last of the silver to buy grain. Languor is dreamy sluggishness, a vicissitude is a change of fortune, and meretricious (an adjective) means falsely attractive."},
  {section:"Story Vocabulary",stem:"Complete the narrative: The showroom's gold-plated fittings looked impressive from the street, but the _______ glamour fooled no one who stepped inside; the plating flaked at a touch.",opts:["MERETRICIOUS","FASTIDIOUS","PENURY","LANGUOR"],ans:0,exp:"Correct Answer: A. Meretricious (Latin meretrix: prostitute) means attractive in a cheap, false way, locked by the flaking gold plating that fools no one. Fastidious means excessively particular; penury and languor are nouns and do not fit an adjective slot describing glamour."},
  {section:"Story Vocabulary",stem:"Complete the narrative: Fortune and ruin visited him by turns; every _______ of the market found him either a millionaire or a debtor, never anything in between.",opts:["PENURY","FASTIDIOUS","MERETRICIOUS","VICISSITUDE"],ans:3,exp:"Correct Answer: D. A vicissitude (Latin vicis: change, turn) is an unpredictable change of fortune, locked by fortune and ruin visiting by turns. Penury is only the downward state, and fastidious and meretricious are adjectives describing character and false attractiveness respectively."},
  {section:"Story Vocabulary",stem:"Complete the narrative: The tailor was so _______ about his stitching that he would unpick an entire seam for one crooked thread.",opts:["LANGUOR","VICISSITUDE","FASTIDIOUS","MERETRICIOUS"],ans:2,exp:"Correct Answer: C. Fastidious (Latin fastidium: loathing, squeamishness) means excessively attentive to detail and hard to please, locked by unpicking an entire seam for one crooked thread. Meretricious means falsely showy, and languor and vicissitude are nouns."},
  {section:"Story Vocabulary",stem:"Complete the narrative: The afternoon heat wrapped the courtroom in a heavy _______; even the judge struggled to keep his eyes open.",opts:["VICISSITUDE","PENURY","FASTIDIOUS","LANGUOR"],ans:3,exp:"Correct Answer: D. Languor (Latin languere: to be faint) is a pleasant or heavy sluggishness of body and mind, locked by the heat making even the judge drowsy. A vicissitude is a change of fortune, penury is a state of poverty, and fastidious is an adjective that cannot follow a heavy."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Recently formed or newly established","Having a habit so long established it is unlikely to change","Openly rebellious against authority","Easily persuaded to change one's view"],ans:1,exp:"Correct Answer: B. Having a habit so long established it is unlikely to change. Inveterate means having a habit or activity so firmly established it is unlikely to change — e.g., 'an inveterate liar'. From Latin inveterare = to make old. Antonym: malleable, flexible."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Careless and haphazard in one's approach","Showing dedication and diligent effort in one's work","Openly deceptive and manipulative","Reluctant to act without prompting"],ans:1,exp:"Correct Answer: B. Showing dedication and diligent effort in one's work. Sedulous means showing dedication and diligent, careful effort in one's work. Used in Q32 sentence E — 'sedulous effort sustained over many years'. Antonym: slipshod, negligent."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Giving a sign of future failure","Excessively cautious and risk-averse","Giving a sign of future success or good fortune","Stubbornly persistent against all odds"],ans:2,exp:"Correct Answer: C. Giving a sign of future success or good fortune. Propitious means giving a sign of future success or favour — propitious circumstances/timing/conditions. From Latin propitius = favourable. Antonym: inauspicious, ominous."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Fully developed and carefully refined","Just begun and not yet fully formed or developed","Intensely focused and goal-oriented","Deliberately vague and ambiguous"],ans:1,exp:"Correct Answer: B. Just begun and not yet fully formed or developed. Inchoate means just begun and not yet fully formed or developed. Used in Q40 sentence D — 'ideas were inchoate in their discipline' = pioneering but not yet complete. From Latin inchoare = to begin. Antonym: fully formed, developed."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The soldiers received a (A) complement / (B) compliment from the general for their discipline.\n2. The (A) principal / (B) principle reason for the delay was funding.\n3. He refused to (A) waive / (B) wave his right to counsel.\n4. The dictator's (A) reign / (B) rein lasted three decades.\n5. Grandmother (A) poured / (B) pored over the old photographs for hours.",opts:["BAABB","AAAAB","BAAAA","BAAAB"],ans:3,exp:"Correct Answer: D (BAAAB). 1. Compliment = expression of praise; complement = something that completes. 2. Principal = main; principle = rule or belief. 3. Waive = voluntarily give up; wave = move the hand. 4. Reign = period of rule; rein = strap controlling a horse. 5. Pore over = study closely; pour = cause to flow."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The scandal could (A) effect / (B) affect the election results.\n2. The committee sought legal (A) council / (B) counsel before responding.\n3. The famine left the region's (A) hoards / (B) hordes of displaced families without shelter.\n4. He was (A) loath / (B) loathe to admit his mistake.\n5. The company hoped to (A) insure / (B) ensure timely delivery of every order.",opts:["BBAAB","BBBAB","BBBAA","ABBAB"],ans:1,exp:"Correct Answer: B (BBBAB). 1. Affect (verb) = influence; effect as a verb means to bring about, which does not fit could ___ the results in this sense of influence. 2. Counsel = advice or adviser; council = assembly. 3. Hordes = large crowds of people; hoards = hidden stockpiles. 4. Loath (adjective) = reluctant; loathe (verb) = to hate. 5. Ensure = make certain; insure = arrange financial cover."},
  {section:"Spelling",stem:"Spelling",opts:["Lugubrious","Lugubrius","Lugubreous","Lugubreious"],ans:0,exp:"Correct Answer: A. Lugubrious. Lugubrious = looking or sounding sad and dismal. Spelled L-U-G-U-B-R-I-O-U-S. The ending is -ious not -eous or -eus. Seen in Q3 sentence C — 'lugubrious quality of his later portraits'."},
  {section:"Spelling",stem:"Spelling",opts:["Egregious","Egriegious","Egregeous","Egreigious"],ans:0,exp:"Correct Answer: A. Egregious. Egregious means outstandingly bad or shocking. Spelled E-G-R-E-G-I-O-U-S — one G, no extra vowels. Common error: inserting an extra vowel before -ious."},
  {section:"Grammar",stem:"From the following options, select the sentence that is grammatically incorrect.",opts:["Scarcely had the debate concluded when protestors stormed the venue.","She described the ruins as though she visited them in another lifetime.","The tribunal insisted that all witnesses appear in person before the board.","If he were more cautious, the agreement could have been avoided altogether."],ans:1,exp:"Correct Answer: B. She described the ruins as though she visited them in another lifetime.. 'As though' requires the past perfect for a hypothetical past event: 'as though she had visited'. Using simple past 'visited' treats the hypothetical as a real past fact — grammatically incorrect."},
  {section:"Grammar",stem:"Which one of the following sentences is grammatically wrong?",opts:["Had the funds been available, the project would have proceeded on schedule.","No sooner did the bell ring than the students rushed out of the classroom.","Every student and every teacher were expected to attend the ceremony.","It is imperative that the manager be informed before any decision is finalised."],ans:2,exp:"Correct Answer: C. Every student and every teacher were expected to attend the ceremony.. When two subjects are joined by 'Every...and every...', the verb is singular. Correct: 'Every student and every teacher was expected'. The distributive use of 'every' treats each individually."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["methodical; commitment; satisfied; casual","professional; opposition; reassured; superficial","cavalier; suitability; alarmed; rigorous","cautious; exposure; concerned; lenient"],ans:2,exp:"Correct Answer: C. cavalier; suitability; alarmed; rigorous. Cavalier (careless/dismissive) manner raises questions about his suitability, leaving bodies alarmed and prompting calls for a rigorous review. The negative arc — carelessness → alarm → demand for rigour — is consistent throughout."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["reveal; deliberate; engaged; elevating","conceal; accidental; distracted; reducing","introduce; hasty; confused; diminishing","ignore; calculated; satisfied; resolving"],ans:0,exp:"Correct Answer: A. reveal; deliberate; engaged; elevating. The novelist reveals the backstory deliberately (intentional craft choice), which keeps readers engaged and simultaneously elevates the emotional stakes. All four blanks reinforce the positive narrative of skilled storytelling."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The mountain road was (A) tortuous / (B) torturous, winding through forty hairpin bends.\n2. His lateness was a (A) venial / (B) venal offence, quickly forgiven.\n3. The ship struck a reef and (A) floundered / (B) foundered within minutes.\n4. The critics continued to (A) deprecate / (B) depreciate the film's crude humour.\n5. The charity commission accused the trustees of trying to (A) perpetrate / (B) perpetuate the fraud for another decade.",opts:["AABAB","AABBB","ABBAB","AABAA"],ans:0,exp:"Correct Answer: A (AABAB). 1. Tortuous = full of twists (hairpin bends); torturous = causing torture. 2. Venial = minor and forgivable; venal = corrupt, open to bribery. 3. Foundered = sank or failed completely; floundered = struggled clumsily. 4. Deprecate = express disapproval of; depreciate = fall in value. 5. Perpetuate = cause to continue (for another decade); perpetrate = commit an act."},
  {section:"Grammar",stem:"Identify the grammatically incorrect sentence.",opts:["The archaeologist spoke about the site as if she had excavated it herself.","It is vital that the shipment be tracked at every stage of the process.","No sooner had the contract been signed than both parties raised new objections.","Hardly had the verdict been delivered than the appeals process was initiated."],ans:3,exp:"Correct Answer: D. Hardly had the verdict been delivered than the appeals process was initiated.. 'Hardly...when' is the correct construction, not 'Hardly...than'. 'No sooner...than' is correct but 'Hardly/Scarcely/Barely' must be followed by 'when' or 'before', never 'than'."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Easily excitable and emotionally volatile","Calm and unemotional, not easily agitated","Excessively irritable and prone to outbursts","Deeply melancholic and socially withdrawn"],ans:1,exp:"Correct Answer: B. Calm and unemotional, not easily agitated. Phlegmatic means calm and unemotional, not easily excited or agitated. From the four humours — phlegm was associated with calmness. Used in Q32 sentence C. Antonym: excitable, volatile."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Aggressive and openly confrontational","Not telling the truth; given to lying","Overly cautious and hesitant to commit","Excessively generous to the point of excess"],ans:1,exp:"Correct Answer: B. Not telling the truth; given to lying. Mendacious means not telling the truth; given to lying. Used in Q2 sentence A — 'speech was widely condemned as mendacious'. From Latin mendax = lying. Synonym: duplicitous, dishonest."},
  {section:"Grammar",stem:"From the following options, select the sentence that is grammatically incorrect.",opts:["Long had the coastal communities endured the consequences of the delayed policy.","The committee required that every submission include a signed declaration.","Were the proposal to be accepted, the entire budget would need revision.","She acted as if she was the only person affected by the decision."],ans:3,exp:"Correct Answer: D. She acted as if she was the only person affected by the decision.. 'As if' with a present or past situation requires the subjunctive: 'as if she were', not 'as if she was'. 'Was' treats the as-if scenario as real; 'were' correctly signals it is hypothetical or contrary to fact."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["partisan; one-sided; straightforward; inevitable","balanced; nuanced; complex; independent","sensational; distorted; simple; obvious","biased; objective; minor; predetermined"],ans:1,exp:"Correct Answer: B. balanced; nuanced; complex; independent. The documentary avoided taking sides → balanced portrayal. It offered a nuanced account that acknowledged the complex nature of grievances, leaving audiences to draw independent conclusions. All four words reinforce the same idea: impartiality and depth."}
];

let studentName="",studentPin="",studentBatch="";
let currentQ=0,secondsLeft=TIMER_DURATION*60,timerInterval=null;
let userAnswers=new Array(45).fill(null);
let markedForReview=new Array(45).fill(false);
let questionTimes=new Array(45).fill(0);
let lastQ=null,qEnterTs=null;
function logQTime(){
  if(lastQ!==null&&qEnterTs!==null){questionTimes[lastQ]+=Math.round((Date.now()-qEnterTs)/1000);}
  qEnterTs=Date.now();
}
let testSubmitted=false;
/* ── SAFETY NET + MISTAKE BANK (numbered-family adapter v2) ── */
const SN_SESSION_KEY='riim_session_Test13';
const SN_PENDING_KEY='riim_pending';
const SN_STRICT_CLOCK=true;
function saveSession(){
  if(testSubmitted||!studentName)return;
  try{localStorage.setItem(SN_SESSION_KEY,JSON.stringify({
    name:studentName,pin:studentPin,batch:studentBatch,
    userAnswers:userAnswers,currentQ:currentQ,secondsLeft:secondsLeft,
    marked:(typeof markedForReview!=='undefined')?markedForReview:((typeof marked!=='undefined')?marked:null),
    visited:(typeof visitedQ!=='undefined')?visitedQ:null,
    qTimes:(typeof questionTimes!=='undefined')?questionTimes:null,
    savedAt:Date.now(),file:location.pathname.split('/').pop()
  }));}catch(e){}
}
function clearSession(){try{localStorage.removeItem(SN_SESSION_KEY);}catch(e){}}
function tryResume(){
  let s=null;
  try{s=JSON.parse(localStorage.getItem(SN_SESSION_KEY)||'null');}catch(e){}
  if(!s)return;
  let remaining=s.secondsLeft;
  if(SN_STRICT_CLOCK) remaining-=Math.floor((Date.now()-s.savedAt)/1000);
  if(remaining>0){
    const m=String(Math.floor(remaining/60)).padStart(2,'0');
    const sec=String(remaining%60).padStart(2,'0');
    if(!confirm('An unfinished attempt by '+s.name+' was found.\n\nOK = Resume with '+m+':'+sec+' remaining\nCancel = Discard it and start fresh')){clearSession();return;}
  }else{
    alert('An unfinished attempt by '+s.name+' was found, but its time has run out. It will be submitted as-is.');
  }
  document.getElementById('inputName').value=s.name;
  document.getElementById('inputPin').value=s.pin;
  document.getElementById('inputBatch').value=s.batch;
  startTest();
  const ts=document.getElementById('testScreen');
  if(!ts||ts.style.display!=='block')return;
  userAnswers=s.userAnswers;currentQ=s.currentQ;
  try{if(s.marked&&typeof markedForReview!=='undefined')markedForReview=s.marked;}catch(e){}
  try{if(s.marked&&typeof marked!=='undefined')marked=s.marked;}catch(e){}
  try{if(s.visited&&typeof visitedQ!=='undefined')visitedQ=s.visited;}catch(e){}
  try{if(s.qTimes&&typeof questionTimes!=='undefined')questionTimes=s.qTimes;}catch(e){}
  secondsLeft=Math.max(0,remaining);
  try{if(typeof buildSectionTabs==='function')buildSectionTabs();}catch(e){}
  try{if(typeof buildPalette==='function')buildPalette();}catch(e){}
  renderQuestion(currentQ);
  saveSession();
  if(secondsLeft<=0){submitTest();}
}
function queuePending(payload){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    const qid=Date.now()+'_'+Math.random().toString(36).slice(2,8);
    q.push(Object.assign({_qid:qid},payload));
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q));
    return qid;
  }catch(e){return null;}
}
function unqueuePending(qid){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q.filter(p=>p._qid!==qid)));
  }catch(e){}
}
function snSendWithQueue(opts){
  let qid=null;
  try{qid=queuePending(JSON.parse(opts.body));}catch(e){}
  const p=fetch(APPS_SCRIPT_URL,opts);
  p.then(()=>{if(qid)unqueuePending(qid);}).catch(()=>{});
  return p;
}
function flushPending(){
  let q=[];
  try{q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');}catch(e){}
  q.forEach(p=>{
    const body=Object.assign({},p); delete body._qid;
    fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
      .then(()=>unqueuePending(p._qid)).catch(()=>{});
  });
}
function bankMistakes(){
  try{
    let bank=JSON.parse(localStorage.getItem('riim_mistakes')||'[]');
    const now=Date.now(), day=86400000;
    const L=(typeof LABELS!=='undefined')?LABELS:['A','B','C','D'];
    QUESTIONS.forEach((q,i)=>{
      const ua=userAnswers[i];
      if(ua===null||ua===undefined) return;
      if(q.passage) return;
      const stem=q.stem||q.q; const opts=q.opts||q.options||q.o;
      if(!stem||!opts) return;
      const cand=(q.answer!==undefined)?q.answer:((q.ans!==undefined)?q.ans:q.a);
      let ci=-1;
      if(typeof cand==='number')ci=cand; else if(typeof cand==='string')ci=L.indexOf(cand);
      if(ci<0||ua===ci) return;
      const key='Test13-q'+(q.id||i+1);
      const card={k:key,stem:stem,opts:opts,ans:ci,chosen:ua,
        exp:q.exp||q.e||'',sub:q.qtype||q.sub||q.section||'',src:'Test 13',ts:now,box:1,due:now+day};
      const idx=bank.findIndex(c=>c.k===key);
      if(idx>=0){card.ts=bank[idx].ts;bank[idx]=card;}
      else bank.push(card);
    });
    if(bank.length>300) bank=bank.slice(bank.length-300);
    localStorage.setItem('riim_mistakes',JSON.stringify(bank));
  }catch(e){}
}
window.addEventListener('load',function(){flushPending();tryResume();});



/* ── LOGIN WHITELIST (added 8 Jul 2026) ─────────────────────
   List lives in whitelist.json at repo root. Fail-open on
   network error. PINs compared digits-only, no leading zeros. */
const WHITELIST_URL="https://sahilkanetkar-collab.github.io/Road-to-IIM/whitelist.json";
let __wl=null,__wlFetch=null;
function normPin(p){const d=String(p||"").replace(/\D/g,"");return d.replace(/^0+/,"");}
function loadWhitelist(){if(__wlFetch)return __wlFetch;__wlFetch=fetch(WHITELIST_URL,{cache:"no-store"}).then(r=>r.ok?r.json():null).then(j=>{__wl=j;return j;}).catch(()=>null);return __wlFetch;}
loadWhitelist();
async function isWhitelisted(pin,batch){const wl=__wl||(await loadWhitelist());if(!wl||!Array.isArray(wl.pins))return true;const b=String(batch||"").trim().toUpperCase();if((wl.bypass_batches||[]).includes(b))return true;const key=normPin(pin);if(!key)return false;if((wl.admin_pins||[]).includes(key))return true;return wl.pins.includes(key);}
/* ──────────────────────────────────────────────────────────── */
async function startTest(){
  const name=document.getElementById('inputName').value.trim();
  const pin=document.getElementById('inputPin').value.trim().toUpperCase();
  const batch=document.getElementById('inputBatch').value;
  const err=document.getElementById('loginErr');
  if(!name||!pin||!batch){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!/^(STU|IMS)\d{10}$/.test(pin)){err.textContent='PIN must be STU or IMS followed by exactly 10 digits.';err.style.display='block';return;}
  const isAdmin=ADMIN_PINS.includes(pin);
  if(isAdmin&&batch!=='Admin'){err.textContent='Admin PIN must be used with the Admin batch only.';err.style.display='block';return;}
  if(!isAdmin&&batch==='Admin'){err.textContent='Only Admin PINs may select the Admin batch.';err.style.display='block';return;}
  if(!(await isWhitelisted(pin,batch))){err.textContent="This PIN isn't on the active student list. Message Sahil Sir if you think this is a mistake.";err.style.display='block';return;}
  studentName=name;studentPin=pin;studentBatch=batch;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('testScreen').style.display='block';
  if(window.innerWidth>768)document.getElementById('paletteOverlay').style.display='flex';
  else document.getElementById('paletteOverlay').style.display='none';
  buildPalette();renderQuestion();startTimer();
}

function startTimer(){
  timerInterval=setInterval(()=>{
    secondsLeft--; if(secondsLeft%10===0)saveSession();
    const m=String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s=String(secondsLeft%60).padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    el.textContent=m+':'+s;
    if(secondsLeft<=300)el.classList.add('urgent');
    if(secondsLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function renderQuestion(){saveSession();
  if(lastQ!==currentQ){logQTime();lastQ=currentQ;}
  const q=QUESTIONS[currentQ];
  document.getElementById('sectionTag').textContent=q.section;
  document.getElementById('questionNumber').textContent='Question '+(currentQ+1)+' of 45';
  document.getElementById('questionStem').innerHTML=q.stem.replace(/\n/g,'<br>');
  const ol=document.getElementById('optionsList');
  ol.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.className='option-btn';
    if(userAnswers[currentQ]===i)btn.classList.add('selected');
    if(markedForReview[currentQ])btn.classList.add('marked');
    btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][i]+'</span><span class="opt-text">'+opt+'</span>';
    btn.onclick=()=>selectAnswer(i);
    li.appendChild(btn);ol.appendChild(li);
  });
  document.getElementById('submitBtn').style.display=(currentQ===44)?'block':'none';
  updatePalette();updateProgress();
}

function selectAnswer(idx){userAnswers[currentQ]=idx;renderQuestion();}
function clearAnswer(){userAnswers[currentQ]=null;renderQuestion();}
function navigate(dir){const n=currentQ+dir;if(n>=0&&n<45){currentQ=n;renderQuestion();}}

let paletteOpen=window.innerWidth>768;
function togglePalette(){
  paletteOpen=!paletteOpen;
  const mob=window.innerWidth<=768;
  const ov=document.getElementById('paletteOverlay');
  const nb=document.getElementById('navBar');
  const qa=document.getElementById('questionArea');
  if(mob){ov.classList.toggle('mobile-open',paletteOpen);}
  else{ov.style.display=paletteOpen?'flex':'none';nb.style.right=paletteOpen?'var(--panel)':'0';qa.style.maxWidth=paletteOpen?'calc(100% - var(--panel))':'100%';}
}

function markForReview(){markedForReview[currentQ]=!markedForReview[currentQ];renderQuestion();}

function buildPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  for(let i=0;i<45;i++){
    const btn=document.createElement('button');
    btn.className='pal-btn';btn.id='pb'+(i+1);btn.textContent=i+1;
    btn.onclick=(()=>{const idx=i;return()=>{currentQ=idx;renderQuestion();}})();
    grid.appendChild(btn);
  }
}

function updatePalette(){
  for(let i=0;i<45;i++){
    const btn=document.getElementById('pb'+(i+1));if(!btn)continue;
    btn.className='pal-btn';
    if(markedForReview[i])btn.classList.add('marked');
    else if(userAnswers[i]!==null)btn.classList.add('answered');
    if(i===currentQ)btn.classList.add('current');
  }
}

function updateProgress(){
  const ans=userAnswers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(ans/45*100)+'%';
}

function confirmSubmit(){
  const u=userAnswers.filter(a=>a===null).length;
  let msg='Submit the test?';
  if(u>0)msg='You have '+u+' unanswered question'+(u>1?'s':'')+'. Submit anyway?';
  if(confirm(msg))submitTest();
}

function submitTest(){
  if(testSubmitted)return;
  testSubmitted=true; clearSession(); bankMistakes();clearInterval(timerInterval);
  logQTime();
  let correct=0,wrong=0,skipped=0;
  const sectionErrors={};const wrongQuestions=[];
  QUESTIONS.forEach((q,i)=>{
    const sec=q.section;
    if(userAnswers[i]===null){skipped++;}
    else if(userAnswers[i]===q.ans){correct++;}
    else{wrong++;wrongQuestions.push(i+1);sectionErrors[sec]=(sectionErrors[sec]||0)+1;}
  });
  const score=correct*4-wrong;
  showResults(score,correct,wrong,skipped);
  saveToTracker(score,correct,wrong,skipped);
  logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions);
}

function showResults(score,correct,wrong,skipped){
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='block';
  const acc=((correct/(45-skipped||1))*100).toFixed(1);
  document.getElementById('scoreHero').innerHTML=
    '<div class="score-num">'+score+'</div>'+
    '<div class="score-sub">out of 180 &nbsp;&middot;&nbsp; '+studentName+' &nbsp;&middot;&nbsp; '+studentPin+' &nbsp;&middot;&nbsp; '+studentBatch+'</div>';
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-box correct"><div class="val">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="stat-box wrong"><div class="val">'+wrong+'</div><div class="lbl">Wrong</div></div>'+
    '<div class="stat-box"><div class="val" style="color:var(--grey)">'+skipped+'</div><div class="lbl">Skipped</div></div>'+
    '<div class="stat-box accuracy"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div>';
  buildReview();buildMisses();buildRetry();
}

function buildReview(){
  const list=document.getElementById('review-list');
  list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const isC=(ua===q.ans),isSk=(ua===null);
    const card=document.createElement('div');
    card.className='review-card '+(isSk?'':isC?'correct':'wrong');
    const bClass=isSk?'badge-skipped':isC?'badge-correct':'badge-wrong';
    const bText=isSk?'&mdash;':isC?'&#10003;':'&#10007;';
    const opts=q.opts.map((o,idx)=>{
      let cls='review-opt';
      if(idx===q.ans)cls+=' correct-opt';
      if(ua!==null&&ua===idx&&idx!==q.ans)cls+=' your-wrong';
      return '<div class="'+cls+'"><span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o+'</div>';
    }).join('');
    const expHtml=q.exp?'<div class="review-exp">'+q.exp+'</div>':''
    card.innerHTML=
      '<div class="review-card-header">'+
      '<div class="review-badge '+bClass+'">'+bText+'</div>'+
      '<div class="review-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>'+
      '</div><div class="review-opts">'+opts+'</div>'+expHtml;
    list.appendChild(card);
  });
}

function buildMisses(){
  const wrongQs=[];
  QUESTIONS.forEach((q,i)=>{
    if(userAnswers[i]!==null&&userAnswers[i]!==q.ans){
      wrongQs.push('Q'+(i+1)+' ['+q.section+'] '+['A','B','C','D'][q.ans]+'. '+q.opts[q.ans]);
    }
  });
  document.getElementById('missesText').value=wrongQs.length?wrongQs.join('\n'):'No misses -- perfect score!';
}

function copyMisses(e){
  e.preventDefault();
  const txt=document.getElementById('missesText').value;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.target;btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent='Copy Misses';},2000);
  });
}

function buildRetry(){
  const rs=document.getElementById('retrySection');rs.innerHTML='';
  const wrong=[];
  QUESTIONS.forEach((q,i)=>{if(userAnswers[i]!==null&&userAnswers[i]!==q.ans)wrong.push(i);});
  if(!wrong.length)return;
  rs.innerHTML='<h3>Retry Wrong Questions ('+wrong.length+')</h3>';
  wrong.forEach(i=>{
    const q=QUESTIONS[i];
    const card=document.createElement('div');card.className='retry-card';
    card.innerHTML='<div class="r-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>';
    q.opts.forEach((o,idx)=>{
      const btn=document.createElement('button');btn.className='retry-opt';
      btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o;
      btn.onclick=()=>{
        card.querySelectorAll('.retry-opt').forEach(b=>b.disabled=true);
        if(idx===q.ans)btn.classList.add('r-correct');
        else{btn.classList.add('r-wrong');card.querySelectorAll('.retry-opt')[q.ans].classList.add('r-correct');}
      };
      card.appendChild(btn);
    });
    rs.appendChild(card);
  });
}

function saveToTracker(score,correct,wrong,skipped){
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const data={testName:'Road to IIM Test 13',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})};
  try{const ex=JSON.parse(localStorage.getItem('riim_results')||'[]');ex.unshift(data);localStorage.setItem('riim_results',JSON.stringify(ex.slice(0,200)));}
  catch(e){}
}

function logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions){
  const notice=document.getElementById('sheet-notice');
  notice.className='submitting';notice.textContent='Submitting results...';notice.style.display='block';
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const payload={testName:'Road to IIM Test 13',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),sectionErrors:JSON.stringify(sectionErrors),wrongQuestions:JSON.stringify(wrongQuestions),studentAnswers:JSON.stringify(userAnswers.map(a=>a===null?null:a)),questionTimes:JSON.stringify(questionTimes)};
  snSendWithQueue({method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{notice.className='success';notice.textContent='Results saved successfully.';})
    .catch(()=>{notice.className='failure';notice.textContent='Could not reach server. Results saved locally.';});
}

function generatePDF(){
  const el=document.getElementById('review-list');
  html2pdf().set({margin:10,filename:'RoadToIIM_Test13_'+studentName.replace(/\s+/g,'_')+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['c','a','u','s','p'].includes(e.key.toLowerCase()))e.preventDefault();});
</script>
