<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM - Test 17</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;--purple:#9b59b6;--panel:280px;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;border:1px solid #2a4060;border-radius:6px;padding:10px 12px;color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);color:var(--navy);font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;}
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);background:#0a2a1a;padding:6px 16px;border-radius:20px;border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}
#mainLayout{display:flex;min-height:calc(100vh - 54px);}
#questionArea{flex:1;padding:28px 32px 80px 32px;max-width:calc(100% - var(--panel));}
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.85rem;margin-bottom:8px;}
#questionStem{font-size:1.05rem;line-height:1.7;color:var(--white);margin-bottom:22px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--white);transition:all .2s;width:100%;display:flex;align-items:flex-start;gap:8px;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1e2e10;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;min-width:24px;font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-text{flex:1;}
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
#navBar{position:fixed;bottom:0;left:0;right:var(--panel);background:var(--navy2);border-top:1px solid #1e3a5a;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:150;gap:4px;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);padding:10px 14px;font-size:.83rem;line-height:1.6;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #questionArea{max-width:100%;padding:16px 16px 80px 16px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{right:0;padding:8px 6px;}
  .nav-btn{padding:7px 4px;font-size:.72rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;}
}
@media (max-width:768px){#paletteOverlay.mobile-open{display:flex;}}
</style>

<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx5Ojm_zp4LfsMeelx5e06KNjVH1wfsXdV0keS4407m4FO1HU4EpVb7GKj-ibAsxnspeA/exec";
const TIMER_DURATION=30;
const ADMIN_PINS=['IMS1111111111','IMS2222222222','IMS3333333333','IMS4444444444','IMS5555555555'];

const QUESTIONS = [
  {section:"Grammar",stem:"Choose the option that best corrects the underlined portion: <em>\"By the time the auditors arrived, the accountant <u>has already destroyed</u> the evidence.\"</em>",opts:["had already destroyed","was already destroying","already destroyed","No correction required"],ans:0,exp:"Correct Answer: A. had already destroyed. <strong>Rule — Past Perfect with 'By the time':</strong> When 'by the time' introduces a past reference point ('arrived'), the action in the main clause that preceded it requires past perfect. <strong>A (had already destroyed)</strong> — correct: past perfect places the destruction before the auditors' arrival. <strong>B (was already destroying)</strong> — past continuous describes an ongoing action at a moment in the past; it does not establish completion before a deadline. <strong>C (already destroyed)</strong> — omits the auxiliary entirely, making it a bare past participle — not a finite verb; the sentence becomes ungrammatical. <strong>D (No correction required)</strong> — the original 'has already destroyed' is present perfect, which requires a connection to the present moment; the timeline here is entirely in the past."},
  {section:"Grammar",stem:"Identify the sentence that correctly uses a participial modifier:",opts:["Walking briskly through the corridor, the files fell off the shelf.","Walking briskly through the corridor, she knocked the files off the shelf.","Her luggage seemed heavier than ever, exhausted by the twelve-hour flight.","To submit the application, three referees must be named."],ans:1,exp:"Correct Answer: B. Walking briskly through the corridor, she knocked the files off the shelf.. <strong>Rule — Participial Phrase Attachment:</strong> A fronted participial phrase must attach to the grammatical subject of the main clause that immediately follows it. <strong>A</strong> — 'Walking briskly through the corridor' attaches to 'the files'; files cannot walk — dangling modifier. <strong>B</strong> — correct: 'Walking briskly' attaches to 'she' — the subject directly after the comma. <strong>C</strong> — 'exhausted by the twelve-hour flight' is placed after the main clause; its nearest subject is 'luggage,' which cannot be exhausted — dangling. <strong>D</strong> — 'To submit the application' is an infinitive phrase implying a human agent; the grammatical subject is 'three recommendation letters,' which cannot submit anything — dangling infinitive."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"The professor _______ this theory for over thirty years when he finally published his findings.\"</em>",opts:["was developing","had been developing","developed","has been developing"],ans:1,exp:"Correct Answer: B. had been developing. <strong>Rule — Past Perfect Continuous for Duration up to a Past Point:</strong> When an action continued over a period of time right up to a specific past moment, past perfect continuous is required. <strong>A (was developing)</strong> — past continuous describes an action in progress at a past moment but does not convey duration leading up to the anchor event ('finally published'). The phrase 'for over thirty years' demands a perfect form. <strong>B (developed)</strong> — simple past states a completed fact with no sense of duration or sequence relative to the publication. <strong>C (had been developing)</strong> — correct: past perfect continuous captures both the extended duration ('for over thirty years') and the completion of that duration before the past anchor ('when he finally published'). <strong>D (has been developing)</strong> — present perfect continuous places the action in a frame extending to the present; but the anchor event ('published') is in the past, so the present perfect frame is inconsistent."},
  {section:"Grammar",stem:"Two-sentence pair. Choose the option where both blanks are tense-consistent: <em>\"The committee _______ its decision before the chairman arrived. He _______ that no vote had taken place.\"</em>",opts:["had announced / insisted","announced / had insisted","has announced / insists","announced / insisted"],ans:0,exp:"Correct Answer: A. had announced / insisted. <strong>Rule — Past Perfect for Earlier Past Event:</strong> When two past events are described and one clearly precedes the other, past perfect is used for the earlier event. <strong>A (had announced / insisted)</strong> — correct: the announcement preceded the chairman's arrival, requiring past perfect; 'insisted' is simple past for his reaction upon arriving. <strong>B (announced / had insisted)</strong> — reverses the logic: now the insisting is placed before the announcement, which contradicts the sequence implied by the sentence. <strong>C (has announced / insists)</strong> — present perfect and simple present are both wrong in a context where both events are firmly in the past. <strong>D (announced / insisted)</strong> — simple past for both loses the chronological distinction; 'announced' and 'insisted' appear simultaneous rather than sequential."},
  {section:"Grammar",stem:"Identify the sentence with NO error in modifier placement:",opts:["Exhausted by the twelve-hour flight, her luggage seemed heavier than ever.","She found her luggage heavier than ever, exhausted by the twelve-hour flight.","Exhausted by the twelve-hour flight, she found her luggage heavier than ever.","Exhausted by the twelve-hour flight, it was clear the journey had worn her out."],ans:2,exp:"Correct Answer: C. Exhausted by the twelve-hour flight, she found her luggage heavier than ever.. <strong>Rule — Fronted Participial Must Attach to the Grammatical Subject:</strong> <strong>A</strong> — 'Exhausted by the twelve-hour flight' is fronted; the grammatical subject of the main clause is 'her luggage.' Luggage cannot be exhausted — dangling modifier. <strong>B</strong> — 'exhausted by the twelve-hour flight' is placed after the complete main clause, separated by a comma. This rear-placement creates ambiguity: it is unclear whether 'she' or 'her luggage' was exhausted. <strong>C</strong> — correct: 'Exhausted' fronts the clause and the subject is 'she' — a human being who can logically be exhausted. <strong>D</strong> — 'Exhausted by the twelve-hour flight' is fronted, but the grammatical subject of the main clause is the impersonal 'it.' An impersonal subject cannot be the referent of a participial of physical exhaustion — the modifier dangles."},
  {section:"Grammar",stem:"Original: <em>\"She has been waiting for the results since Monday.\"</em> Which rewrite preserves the exact meaning?",opts:["She waited for the results from Monday onwards.","She was waiting for the results since Monday.","She has waited for the results since Monday.","She is waiting for the results and has been doing so since Monday."],ans:3,exp:"Correct Answer: D. She is waiting for the results and has been doing so since Monday.. <strong>Rule — Present Perfect Continuous for Unbroken Duration to the Present:</strong> The original ('has been waiting since Monday') emphasises ongoing, uninterrupted duration from Monday up to the present moment. <strong>A</strong> — simple past 'waited' treats the waiting as a completed action; it severs the connection to the present and loses 'since.' <strong>B</strong> — 'was waiting' (past continuous) describes an action in progress at a past point in time; it cannot be paired with 'since' in formal grammar, because 'since' requires a perfect tense to establish a span reaching the present. <strong>C</strong> — present perfect simple 'has waited' is grammatically acceptable with 'since' but typically describes a state ('I have waited long enough'); it does not stress the continuous, unbroken nature of the activity the way 'has been waiting' does — the meaning shifts slightly. <strong>D</strong> — correct: explicitly states she is currently waiting ('is waiting') and specifies the duration has been ongoing since Monday ('has been doing so since Monday') — both components of the original meaning are preserved."},
  {section:"Grammar",stem:"Original: <em>\"Driving along the highway, a deer suddenly appeared in the headlights.\"</em> A correction has been applied: <em>\"Driving along the highway, the driver saw a deer suddenly appear in the headlights.\"</em> Is this correction:",opts:["Correct — the dangling modifier is resolved","Incorrect — it introduces a new grammatical error","Unnecessary — the original is grammatically acceptable","Correct but \"suddenly\" is now redundant"],ans:0,exp:"Correct Answer: A. Correct — the dangling modifier is resolved. <strong>Rule — Dangling Modifier and the Correction Audit:</strong> Original: 'Driving along the highway, a deer suddenly appeared in the headlights.' The participial 'Driving' must attach to the subject of the main clause. 'A deer' cannot drive — the modifier dangles. <strong>A (Correct — dangling modifier resolved)</strong> — correct: the rewrite supplies 'the driver' as the grammatical subject, to whom 'driving' logically attaches. No new error is introduced. <strong>B (Incorrect — introduces a new error)</strong> — no new error exists; subject-verb agreement, tense, and modifier attachment are all sound in the corrected version. <strong>C (Unnecessary — original is grammatically acceptable)</strong> — the original is not acceptable in formal written English; a deer driving a car is not a recoverable reading. <strong>D (Correct but 'suddenly' is redundant)</strong> — 'suddenly' modifies 'appear' and is not redundant; it conveys the abruptness of the deer's appearance, which is meaningful and not implied by any other word in the sentence."},
  {section:"Grammar",stem:"Contextual cloze. Choose the pair that correctly fills both blanks: <em>\"The minister claimed that the report _______ submitted on time, but journalists later revealed that it _______ delayed by nearly a week.\"</em>",opts:["had been / was","has been / was","was / had been","was / was"],ans:2,exp:"Correct Answer: C. was / had been. <strong>Rule — Reported Speech Tense + Past Perfect for Prior Event:</strong> Two separate rules apply to the two blanks. Blank 1: The minister 'claimed' (past) that the report [blank] submitted on time. In the minister's reported assertion, the submission is presented as contemporaneous with the claim — backshift of simple present gives simple past 'was.' Blank 2: Journalists 'revealed' that the report [blank] delayed. The delay preceded the journalists' revelation, so past perfect is required for that earlier event. <strong>A (had been / was)</strong> — reverses both: past perfect for the first blank implies the submission preceded the claim itself (not supported), and simple past for the second loses the prior-event sequence. <strong>B (has been / was)</strong> — present perfect 'has been' in reported speech after a past reporting verb is incorrect; backshift must occur. <strong>C (was / had been)</strong> — correct: 'was' for the contemporaneous reported claim; 'had been' for the delay that preceded the revelation. <strong>D (was / was)</strong> — simple past for both loses the sequence; the delay preceded the revelation and must be marked as prior."},
  {section:"Grammar",stem:"Choose the option that best corrects the underlined portion: <em>\"The board <u>was knowing</u> about the irregularities long before the investigation began.\"</em>",opts:["has known","had been knowing","was having knowledge of","knew"],ans:3,exp:"Correct Answer: D. knew. <strong>Rule — Stative Verbs Cannot Be Used in Progressive Forms:</strong> 'Know' is a stative verb of cognition. Stative verbs express a state of being, not an action, and do not take progressive aspect in formal English. <strong>A (has known)</strong> — present perfect is grammatically formed, but the sentence is set entirely in the past ('before the investigation began'). Switching to present perfect breaks the past tense frame and implies the knowing continues to the present. <strong>B (had been knowing)</strong> — compounds two errors: past perfect continuous uses progressive aspect, which is impermissible with stative 'know'; even 'had known' would be questionable here since no earlier-past anchor is needed. <strong>C (was having knowledge of)</strong> — a circumlocution using 'have' as a stative verb in past continuous; 'have' in the sense of possession is also stative and cannot be used progressively. This does not resolve the core error. <strong>D (knew)</strong> — correct: simple past states the board's knowledge at that past time, consistent with the past tense frame and the rules governing stative verbs."},
  {section:"Grammar",stem:"Three sentences below are correct. Identify the one with a grammatical error:",opts:["Baffled by the contradictory evidence, the detective reexamined every witness statement.","To apply for the scholarship, three recommendation letters must be submitted.","Having completed the audit, the firm submitted its final report to the regulator.","Clearly frustrated by the delay, the client terminated the contract without notice."],ans:1,exp:"Correct Answer: B. To apply for the scholarship, three recommendation letters must be submitted.. <strong>Rule — Dangling Infinitive:</strong> An infinitive phrase of purpose implies a human agent who performs the action. That agent must be the grammatical subject of the main clause. <strong>A</strong> — correct: 'Baffled by the contradictory evidence' attaches to 'the detective' — a human who can logically be baffled. <strong>B</strong> — error: 'To apply for the scholarship' implies a human applicant; the grammatical subject of the main clause is 'three recommendation letters,' which cannot apply for anything. This is a dangling infinitive. <strong>C</strong> — correct: 'Having completed the audit' attaches to 'the firm' — a grammatically acceptable subject for completing an audit. <strong>D</strong> — correct: 'Clearly frustrated by the delay' attaches to 'the client' — a human who can be frustrated."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"By the time this infrastructure project is completed, the government _______ over three trillion rupees on it.\"</em>",opts:["will spend","is going to spend","would have spent","will have spent"],ans:3,exp:"Correct Answer: D. will have spent. <strong>Rule — Future Perfect with 'By the time':</strong> 'By the time + present tense clause' signals that the main clause action will be completed before a future reference point — requiring future perfect. <strong>A (will spend)</strong> — simple future states that spending will happen, but does not capture that the spending will be complete by the project's completion. It implies the spending is still ongoing at that point. <strong>B (is going to spend)</strong> — expresses present intention or prediction; like simple future, it lacks the completion-before-deadline aspect that 'by the time' demands. <strong>C (would have spent)</strong> — conditional perfect ('would have') is used in hypothetical or conditional contexts, typically in the main clause of a Type 2 or Type 3 conditional. No conditional structure is present here. <strong>D (will have spent)</strong> — correct: future perfect states that the spending will be fully completed before (or by) the time the project is done."},
  {section:"Grammar",stem:"Two-sentence pair. Choose the option where both blanks are tense-consistent: <em>\"The architect _______ the blueprints three times before the client finally approved them. She _______ the revisions were necessary due to a change in building regulations.\"</em>",opts:["had revised / explained","revised / had explained","has revised / explains","revised / explained"],ans:0,exp:"Correct Answer: A. had revised / explained. <strong>Rule — Past Perfect for Earlier Past Action:</strong> 'Before the client finally approved' is the anchor; the revisions occurred before this point. <strong>A (had revised / explained)</strong> — correct: 'had revised' marks the revisions as prior to the approval; 'explained' (simple past) is the architect's subsequent action after the approval was given. <strong>B (revised / had explained)</strong> — reverses the past perfect: 'revised' (simple past) loses the prior-event marking; 'had explained' (past perfect) implies the explanation occurred before something else — but nothing in the sentence establishes what that earlier anchor is. <strong>C (has revised / explains)</strong> — both present tense forms are incompatible with a sentence set entirely in the past. <strong>D (revised / explained)</strong> — simple past for both is grammatically possible but loses the chronological signal that the revisions preceded and led to the approval; the sentence becomes merely sequential rather than causally structured."},
  {section:"Grammar",stem:"Original: <em>\"No sooner had the lights gone out than the audience began to panic.\"</em> Which rewrite is grammatically equivalent?",opts:["The lights had no sooner gone out when the audience began to panic.","The moment the lights went out, the audience began to panic.","Hardly had the lights gone out before the audience began to panic.","The lights went out, and then the audience began to panic."],ans:2,exp:"Correct Answer: C. Hardly had the lights gone out before the audience began to panic.. <strong>Rule — Inverted Negative Adverbials and Their Fixed Collocations:</strong> 'No sooner...than' is a fixed negative adverbial collocation triggering subject-auxiliary inversion. Its grammatical equivalent is 'Hardly/Scarcely...before/when.' <strong>A</strong> — substitutes 'when' for 'than'; the fixed collocation 'no sooner' requires 'than' as its paired conjunction. 'No sooner...when' is incorrect in formal grammar. <strong>B</strong> — grammatically correct ('the moment' introduces a time clause without inversion) but structurally different; it is not an inverted construction and does not replicate the stylistic and emphatic force of the original. <strong>C</strong> — correct: 'Hardly...before' is the grammatical equivalent of 'No sooner...than' — both trigger inversion, both use past perfect + simple past, and both express immediate sequence. <strong>D</strong> — grammatically correct but uses a simple coordinating conjunction ('and then'); it conveys sequence but lacks the inversion, the negative adverbial construction, and the emphasis on immediacy."},
  {section:"Grammar",stem:"Choose the option that correctly places the word <strong>only</strong>: <em>\"The report _______ submitted after repeated reminders from the director.\"</em>",opts:["only was","only was ever","was submitted only after","was only submitted after"],ans:2,exp:"Correct Answer: C. was submitted only after. <strong>Rule — Placement of 'Only':</strong> The adverb 'only' modifies the element it immediately precedes. Its position in the sentence determines meaning. <strong>A (only was)</strong> — placing 'only' before the auxiliary 'was' modifies the verb phrase, implying the report merely existed or was (rather than being submitted, reviewed, or acted upon) — not the intended meaning. <strong>B (only was ever)</strong> — adds 'ever,' which is not part of the original sentence and introduces an unjustified emphasis; 'only was ever' is awkward and does not resolve the placement problem. <strong>C (was submitted only after)</strong> — correct: 'only' immediately precedes 'after repeated reminders,' the adverbial phrase it logically qualifies. The sentence now means: the submission happened, and it happened only under the condition of repeated reminders. <strong>D (was only submitted after)</strong> — 'only' precedes 'submitted,' modifying the verb; this shifts the meaning to 'the report was merely submitted (not reviewed, evaluated, or acted upon) after reminders' — a different and unintended meaning."},
  {section:"Grammar",stem:"Identify the sentence with NO grammatical error:",opts:["She wished she studied harder before the examination.","She wished she would have studied harder before the examination.","She wished she has studied harder before the examination.","She wished she had studied harder before the examination."],ans:3,exp:"Correct Answer: D. She wished she had studied harder before the examination.. <strong>Rule — 'Wish' + Past Perfect for Unfulfilled Past Desire:</strong> 'Wish' followed by a past perfect expresses regret about something that did not happen in the past. <strong>A (studied)</strong> — simple past after 'wish' expresses a present desire for something currently unreal ('I wish I knew'). It cannot express regret about a past event that has already concluded, like studying before an exam. <strong>B (would have studied)</strong> — 'would have' in the that-clause of 'wish' is not permitted in formal grammar; 'wish' does not take 'would have' in its complement. This construction is a common learner error. <strong>C (has studied)</strong> — present perfect after a past reporting verb ('wished') creates a tense inconsistency; present perfect cannot be backshifted into a past wish construction. <strong>D (had studied)</strong> — correct: past perfect after 'wished' correctly expresses an unfulfilled wish about the past — the studying did not happen as much as she would have liked, and she now regrets it."},
  {section:"Grammar",stem:"Contextual cloze. Choose the pair that correctly fills both blanks: <em>\"By the time she _______ her doctoral thesis, she _______ in the field for nearly a decade.\"</em>",opts:["submits / will have worked","will submit / has worked","submits / would have worked","submitted / had worked"],ans:0,exp:"Correct Answer: A. submits / will have worked. <strong>Rule — Future Perfect with 'By the time' (Present Tense Time Clause):</strong> In time clauses introduced by 'by the time,' the present tense is used (not future), and the main clause uses future perfect to express completion before a future point. <strong>A (submits / will have worked)</strong> — correct: 'submits' correctly uses present tense in the time clause; 'will have worked' (future perfect) expresses that the decade of work will be complete by the time of submission. <strong>B (will submit / has worked)</strong> — 'will submit' incorrectly uses future tense in a time clause; 'will' is not used in time clauses in formal English. 'Has worked' (present perfect) fails to frame the work as completing before a future point. <strong>C (submits / would have worked)</strong> — 'submits' is correct, but 'would have worked' is conditional perfect — used in hypothetical contexts, not in a straightforward future-perfect construction with no conditional clause present. <strong>D (submitted / had worked)</strong> — shifts the entire sentence to the past; both verbs suggest the submission and the work are already in the past, which contradicts the future-oriented meaning."},
  {section:"Grammar",stem:"Original: <em>\"The company was founded in 1998 and has grown rapidly in its early years.\"</em> A correction has been applied: <em>\"The company was founded in 1998 and grew rapidly in its early years.\"</em> Is this correction:",opts:["Incorrect — \"grew\" should be replaced with \"had grown\"","Unnecessary — \"has grown\" is acceptable with \"in its early years\"","Correct — present perfect cannot be used with a specific past time reference","Incorrect — \"has grown\" should be retained to show ongoing relevance"],ans:2,exp:"Correct Answer: C. Correct — present perfect cannot be used with a specific past time reference. <strong>Rule — Present Perfect Cannot Be Used with Specific Past Time Expressions:</strong> <strong>A (Incorrect — 'had grown')</strong> — past perfect would imply the rapid growth preceded yet another past event within the same sentence; no such prior anchor exists. 'Had grown' is not appropriate here. <strong>B (Unnecessary — 'has grown' is acceptable)</strong> — this is false; 'in its early years' is a closed, specific past period. Present perfect is categorically incompatible with specific past time markers in formal English. <strong>C (Correct)</strong> — correct: the rule is absolute — present perfect cannot appear with a specific past time reference. 'In its early years' anchors the growth to a concluded past period. Simple past 'grew' is required, and the correction is fully valid. <strong>D (Incorrect — 'has grown' retained for ongoing relevance)</strong> — 'in its early years' does not indicate ongoing relevance; it defines a closed historical window. The present perfect cannot override a specific past time expression."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"The spokesperson announced yesterday that the company _______ its expansion plans due to market volatility.\"</em>",opts:["has suspended","suspended","was suspending","had suspended"],ans:3,exp:"Correct Answer: D. had suspended. <strong>Rule — Backshift in Reported Speech (Past Reporting Verb):</strong> After a past reporting verb ('announced'), all tenses in the reported clause shift back one tense level. <strong>A (has suspended)</strong> — present perfect 'has suspended' must backshift to past perfect 'had suspended' after a past reporting verb; retaining present perfect violates reported speech rules in formal written English. <strong>B (suspended)</strong> — simple past 'suspended' is the backshift of simple present; however, the action being reported ('suspension of plans') is itself a completed recent action, which in direct speech would be expressed as present perfect ('has suspended') — making the correct backshift past perfect ('had suspended'), not simple past. Simple past is accepted informally but is not the formally correct choice. <strong>C (was suspending)</strong> — past continuous implies the suspension was an ongoing process at the exact moment of the announcement. The context does not support this reading — the suspension is a decision, not an ongoing activity. <strong>D (had suspended)</strong> — correct: past perfect is the formal backshift of present perfect after a past reporting verb."},
  {section:"Grammar",stem:"Examine the sentence: <em>\"The scientist published a paper on climate change that won three international awards.\"</em> What does the relative clause \"that won three international awards\" modify <strong>as the sentence is written</strong>?",opts:["It unambiguously modifies \"paper\"","It ambiguously modifies either \"paper\" or \"climate change\"","It modifies \"climate change\" — the paper is the antecedent error","It modifies \"scientist\""],ans:1,exp:"Correct Answer: B. It ambiguously modifies either \"paper\" or \"climate change\". <strong>Rule — Relative Clause Antecedent (Proximity Principle):</strong> A relative clause attaches to its nearest preceding noun unless context makes another reading unavoidable. <strong>A (unambiguously modifies 'paper')</strong> — incorrect: the nearest preceding noun is 'climate change,' not 'paper.' The clause is grammatically attached to 'climate change,' making it ambiguous at best, and technically misattached. <strong>B (ambiguously modifies 'paper' or 'climate change')</strong> — correct: the clause sits closer to 'climate change' grammatically but is semantically intended for 'paper.' The sentence is therefore ambiguous — a reader applying strict proximity rules would attach it to 'climate change'; a reader using semantic logic would attach it to 'paper.' Both readings are possible, making the sentence ambiguous rather than clearly correct. <strong>C (modifies 'climate change' only — paper is the error)</strong> — overstates; it is not purely an antecedent error, it is an ambiguity. The sentence does not definitively assign the clause only to 'climate change' — it merely fails to anchor it clearly to 'paper.' <strong>D (modifies 'scientist')</strong> — 'scientist' is too far removed to be a plausible antecedent; both proximity and semantics rule this out."},
  {section:"Grammar",stem:"Two-sentence pair. Choose the option where both blanks are tense-consistent: <em>\"The prime minister _______ that inflation _______ under control by the end of the fiscal year.\"</em>",opts:["promises / will be brought","had promised / was brought","promised / will be brought","promised / would be brought"],ans:3,exp:"Correct Answer: D. promised / would be brought. <strong>Rule — Reported Speech Backshift (Future → Would):</strong> After a past reporting verb ('promised'), future 'will' must backshift to 'would.' <strong>A (promises / will be brought)</strong> — uses present tense 'promises'; this would only be appropriate if the promise is a general, habitual, or ongoing truth quoted directly. The sentence uses past narrative framing, making present tense incorrect. <strong>B (had promised / was brought)</strong> — 'had promised' (past perfect) implies the promise preceded another past event in the same sentence; no such event is mentioned. 'Was brought' (simple past passive) loses the future-in-past meaning — it states the inflation was actually brought under control, which is not what a promise means. <strong>C (promised / will be brought)</strong> — 'promised' (past) is correct for the reporting verb, but 'will be brought' retains the non-backshifted future; after a past reporting verb, 'will' must shift to 'would.' <strong>D (promised / would be brought)</strong> — correct: 'promised' (past) is the appropriate reporting verb; 'would be brought' correctly backshifts 'will be brought' to future-in-past form."},
  {section:"Grammar",stem:"Choose the option that best corrects the underlined portion: <em>\"The research team <u>has completed</u> the first phase of the study last Tuesday.\"</em>",opts:["had completed","has been completing","completed","No correction required"],ans:2,exp:"Correct Answer: C. completed. <strong>Rule — Present Perfect Incompatible with Specific Past Time Markers:</strong> <strong>A (had completed)</strong> — past perfect implies the completion preceded another past event in the sentence; but the only other past element is 'last Tuesday,' which is a time marker, not an event that the completion preceded. Past perfect is unjustified. <strong>B (has been completing)</strong> — present perfect continuous with 'last Tuesday' is doubly wrong: (1) present perfect cannot co-occur with a specific past time expression; (2) progressive aspect is odd for a completion — 'completing' suggests an ongoing process, contradicting the finality of 'completed.' <strong>C (completed)</strong> — correct: simple past 'completed' is the only form compatible with 'last Tuesday,' a definite past time marker. <strong>D (No correction required)</strong> — the original 'has completed...last Tuesday' is ungrammatical; present perfect and a specific past time adverbial cannot coexist in formal English."},
  {section:"Grammar",stem:"Identify the sentence with NO grammatical error:",opts:["The train is leaving at six tomorrow morning, so you better had be ready by five-thirty.","The train will leave at six tomorrow morning, so you better be ready by five-thirty.","The train will be leaving at six tomorrow morning, so you had best be ready by five-thirty.","The train leaves at six tomorrow morning, so you had better be ready by five-thirty."],ans:3,exp:"Correct Answer: D. The train leaves at six tomorrow morning, so you had better be ready by five-thirty.. <strong>Rule — Scheduled Future (Simple Present) and Semi-Modal 'Had Better':</strong> Two independent rules apply. Rule 1: For future events on a fixed timetable (trains, flights, schedules), formal English uses simple present ('the train leaves'), not future continuous ('is leaving') or simple future ('will leave'). Rule 2: The semi-modal expressing advice/warning is 'had better' — the word order is fixed; 'better had' (A) is an inversion that does not exist in standard English; 'better' alone without 'had' (B) is informal and not accepted in formal written English. <strong>A</strong> — 'is leaving' (present continuous for scheduled future) is acceptable in informal British English but not preferred in formal written English; 'you better had' is an incorrect inversion — the form is 'had better,' not 'better had.' <strong>B</strong> — 'will leave' is simple future — not the preferred form for timetabled events in formal English; 'you better be' omits 'had' from the semi-modal — informal only. <strong>C</strong> — 'will be leaving' (future continuous) describes an action in progress at a future point, not a scheduled timetable; 'had best' is British informal. <strong>D</strong> — correct on both counts: 'leaves' (simple present for scheduled future) and 'had better' (standard semi-modal form)."},
  {section:"Grammar",stem:"Original: <em>\"Not having received a response, the applicant sent a follow-up email.\"</em> Which rewrite preserves the structure most closely?",opts:["Having not received a response, the applicant sent a follow-up email.","Because no response had been received, the applicant sent a follow-up email.","The applicant, not having received a response, sent a follow-up email.","Without receiving a response, the applicant sent a follow-up email."],ans:2,exp:"Correct Answer: C. The applicant, not having received a response, sent a follow-up email.. <strong>Rule — Negation of a Perfect Participle:</strong> The correct position for 'not' in a perfect participial phrase is before 'having': 'not having done X.' Placing 'not' after 'having' ('having not done X') is non-standard in formal written English. <strong>A (Having not received)</strong> — incorrect word order for formal English negation of a perfect participle; 'not' must precede 'having.' This is a common error modelled on split infinitive logic but does not apply here. <strong>B (Because no response had been received)</strong> — grammatically correct but changes the structure from participial to a finite causal subordinate clause; it is not structurally equivalent to the original. <strong>C (not having received, mid-sentence)</strong> — correct: preserves 'not having received' (correct negation order) and repositions the participial as a mid-sentence appositive — still attached to 'the applicant,' the logical subject of the non-receipt. <strong>D (Without receiving a response)</strong> — uses a prepositional phrase rather than a participial construction; structurally different and loses the participial form of the original."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"I _______ this novel three times, and I find something new each time.\"</em>",opts:["read","had read","have read","was reading"],ans:1,exp:"Correct Answer: B. had read. <strong>Rule — Present Perfect for Past Experience with Present Relevance:</strong> <strong>A (read)</strong> — simple past requires a specific time reference ('I read it last year,' 'I read it in school'). Without a time marker, simple past is incomplete and suggests a single, isolated past event rather than an accumulated experience. <strong>B (have read)</strong> — correct: present perfect 'have read' expresses a repeated past experience ('three times') whose relevance is ongoing — demonstrated by 'I find something new each time' (present tense). The accumulation of readings informs the present observation. <strong>C (had read)</strong> — past perfect requires a subsequent past event as a reference point ('I had read it before the discussion began'). No such anchor exists in this sentence. <strong>D (was reading)</strong> — past continuous describes an action in progress at a specific past moment. It cannot express a completed experience repeated three times, nor does it link to the present observation."},
  {section:"Grammar",stem:"Original: <em>\"To become a successful entrepreneur, hard work and resilience are required.\"</em> A correction has been applied: <em>\"To become a successful entrepreneur, one must possess hard work and resilience.\"</em> Is this correction:",opts:["Correct — the dangling infinitive is fully resolved","Incorrect — the original sentence is grammatically acceptable","Correct but \"possess hard work\" is semantically awkward — \"hard work\" is not something one possesses","Incorrect — the correction should use \"you\" instead of \"one\""],ans:1,exp:"Correct Answer: B. Incorrect — the original sentence is grammatically acceptable. <strong>Rule — Dangling Infinitive + Semantic Audit of the Correction:</strong> Original: 'To become a successful entrepreneur, hard work and resilience are required.' 'To become' implies a human subject; 'hard work and resilience' cannot become entrepreneurs — dangling infinitive. The correction supplies 'one' as the logical subject. <strong>A (Correct — fully resolved)</strong> — overstates; the dangler is fixed, but 'possess hard work' is semantically awkward. 'Hard work' is a behaviour or approach, not a possession. One works hard; one does not possess hard work. <strong>B (Incorrect — original acceptable)</strong> — incorrect: the original is ungrammatical due to the dangling infinitive. 'Hard work and resilience' are not capable of 'becoming' anything. <strong>C (Correct but 'possess hard work' is awkward)</strong> — correct assessment: the grammatical fix is valid, but the collocation 'possess hard work' is semantically imprecise in formal English. The answer acknowledges both the improvement and the residual flaw. <strong>D (Incorrect — should use 'you')</strong> — 'one' is the standard formal indefinite pronoun in academic writing; 'you' is informal. The choice of 'one' is appropriate, not an error."},
  {section:"Grammar",stem:"Contextual cloze. Choose the pair that correctly fills both blanks: <em>\"Historians now argue that the treaty _______ without the full knowledge of parliament, and that several key provisions _______ secretly amended before ratification.\"</em>",opts:["was signed / had been","had been signed / were","was signed / were","has been signed / had been"],ans:0,exp:"Correct Answer: A. was signed / had been. <strong>Rule — Simple Past for Historical Events; Past Perfect for Prior Events:</strong> The sentence describes a historical treaty and amendments that preceded it. <strong>A (was signed / had been)</strong> — correct: 'was signed' (simple past) for the treaty event, which has no earlier reference point in the sentence; 'had been secretly amended' (past perfect passive) for the amendments, which preceded the signing. <strong>B (had been signed / were)</strong> — past perfect 'had been signed' implies the signing preceded something else in the sentence; no such earlier anchor is established. 'Were' (simple past) for the amendments loses the prior-to-signing sequence. <strong>C (was signed / were)</strong> — 'was signed' is correct, but 'were secretly amended' (simple past) loses the sequence; it implies the amendments happened at the same time as or after the signing rather than before ratification. <strong>D (has been signed / had been)</strong> — present perfect 'has been signed' is inappropriate for a historical past event with no present relevance marker; the sentence is entirely about a historical record."},
  {section:"Grammar",stem:"Three sentences below are correct. Identify the one with a grammatical error:",opts:["She had barely sat down when the phone rang again.","The jury deliberated for six hours before it reached a verdict.","He was writing the report when his supervisor had entered the room.","By the time the rescue team arrived, three survivors had been found."],ans:2,exp:"Correct Answer: C. He was writing the report when his supervisor had entered the room.. <strong>Rule — Past Continuous + Simple Past for Interrupted Action:</strong> When an ongoing past action is interrupted, past continuous describes the ongoing action and simple past describes the interruption. <strong>A</strong> — correct: 'had barely sat down' (past perfect with negative adverbial) + 'rang' (simple past) — valid negative adverbial construction. <strong>B</strong> — correct: 'deliberated' and 'reached' are both simple past — two sequential completed actions. <strong>C</strong> — error: 'was writing' (past continuous) correctly describes the ongoing action; 'had entered' (past perfect) implies the entry preceded the writing — but the entry is the interruption, which must be expressed as simple past 'entered.' Past perfect here reverses the intended chronology. <strong>D</strong> — correct: 'arrived' (simple past) is the anchor; 'had been found' (past perfect passive) correctly places the survivors' discovery before the rescue team's arrival."},
  {section:"Grammar",stem:"Choose the option that best corrects the underlined portion: <em>\"Based on the preliminary findings, further investigation <u>is strongly recommended</u>.\"</em>",opts:["Having reviewed the preliminary findings, further investigation is strongly recommended.","Based on the preliminary findings, the committee strongly recommends further investigation.","The preliminary findings strongly recommend further investigation.","No correction required"],ans:3,exp:"Correct Answer: D. No correction required. <strong>Rule — 'Based on' as an Accepted Passive Participial:</strong> <strong>A</strong> — 'Having reviewed the preliminary findings, further investigation is strongly recommended' — introduces a new dangling modifier; 'further investigation' cannot have reviewed anything. This is worse than the original. <strong>B</strong> — a valid rewrite supplying 'the committee' as the agent; but the question asks whether the original needs correction — not whether a rewrite exists. The original is not incorrect. <strong>C</strong> — 'The preliminary findings strongly recommend further investigation' — personifies findings as capable of recommending; anthropomorphism of inanimate nouns is a stylistic error in formal writing. <strong>D (No correction required)</strong> — correct: 'Based on the preliminary findings' is a well-established reduced passive participial that modifies the entire proposition rather than the grammatical subject alone. It appears routinely in academic, legal, and scientific writing and is not classified as a dangling modifier in formal grammar authorities."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"The board _______ the implications of the merger ever since the announcement was made.\"</em>",opts:["considered","is considering","had considered","has been considering"],ans:2,exp:"Correct Answer: C. had considered. <strong>Rule — 'Ever Since' Requires Present Perfect in Main Clause:</strong> 'Ever since' establishes a past starting point and implies the action/state has continued unbroken to the present — requiring present perfect. <strong>A (considered)</strong> — simple past breaks the link to the present; 'considered' implies the board's deliberation is over, which contradicts 'ever since.' <strong>B (is considering)</strong> — present continuous describes an ongoing action at the present moment but ignores the duration established by 'ever since'; it cannot express 'from the moment of the announcement until now.' <strong>C (had considered)</strong> — past perfect implies the deliberation was completed before another past event; no such subsequent event is mentioned. Past perfect severs the connection to the present entirely. <strong>D (has been considering)</strong> — correct: present perfect continuous expresses an action that began at a specific past point ('ever since the announcement was made') and has continued uninterruptedly to the present."},
  {section:"Grammar",stem:"Two-sentence pair. Choose the option where both blanks are tense-consistent: <em>\"The factory _______ in 1974 and _______ the region's largest employer for nearly four decades.\"</em>",opts:["was established / had been","had been established / was","established / has remained","was established / remained"],ans:3,exp:"Correct Answer: D. was established / remained. <strong>Rule — Simple Past for Completed Historical Narrative; No Unjustified Past Perfect:</strong> <strong>A (was established / had been)</strong> — 'was established' is correct; 'had been' (past perfect) for the second verb implies the factory's status as largest employer preceded another past event within the same sentence. No such anchor exists; the past perfect is unjustified. <strong>B (had been established / was)</strong> — past perfect 'had been established' implies the establishment preceded another past event; nothing in the sentence requires this. 'Was' (simple past) for 'remained' loses the duration emphasis of 'for nearly four decades.' <strong>C (established / has remained)</strong> — bare 'established' omits the auxiliary 'was' — not a grammatical passive; 'has remained' (present perfect) implies the factory is still the largest employer, contradicting 'for nearly four decades' (a closed past period). <strong>D (was established / remained)</strong> — correct: both simple past forms are appropriate for a chronological historical account of two completed past facts with no sequence ambiguity."},
  {section:"Grammar",stem:"The sentence: <em>\"The executive delivered a speech.\"</em> A relative clause \"which lasted three hours\" must be inserted. Choose the version where it is correctly placed:",opts:["The executive, which lasted three hours, delivered a speech.","Which lasted three hours, the executive delivered a speech.","The executive delivered, which lasted three hours, a speech.","The executive delivered a speech which lasted three hours."],ans:3,exp:"Correct Answer: D. The executive delivered a speech which lasted three hours.. <strong>Rule — Relative Clause Must Immediately Follow Its Antecedent:</strong> <strong>A (The executive, which lasted three hours, delivered a speech)</strong> — 'which lasted three hours' is placed after 'executive'; executives do not last three hours — wrong antecedent, and the relative clause is non-restrictive (commas present) but the antecedent is impossible. <strong>B (Which lasted three hours, the executive...)</strong> — fronting a relative clause is ungrammatical in English; relative clauses are embedded, not fronted. <strong>C (The executive delivered, which lasted three hours, a speech)</strong> — inserts the relative clause between the verb 'delivered' and its direct object 'a speech'; this is an ungrammatical interruption of the verb-object bond. <strong>D (The executive delivered a speech which lasted three hours)</strong> — correct: 'which lasted three hours' immediately follows 'a speech,' the noun it modifies. (Note: in formal written English, a comma before 'which' would make it non-restrictive; without the comma, it is restrictive — both are grammatically acceptable.)"},
  {section:"Grammar",stem:"Identify the sentence with NO modifier error:",opts:["The professor distributed notes to the students that were printed on recycled paper.","Printed on recycled paper, the professor distributed notes to the students.","The professor distributed notes printed on recycled paper to the students.","The notes were distributed to students, printed on recycled paper, by the professor."],ans:2,exp:"Correct Answer: C. The professor distributed notes printed on recycled paper to the students.. <strong>Rule — Participial Modifier Must Be Placed Immediately After Its Antecedent:</strong> <strong>A</strong> — 'that were printed on recycled paper' is a relative clause placed after 'students'; it ambiguously modifies 'students' rather than 'notes.' Students being printed on recycled paper is illogical, but grammatically the clause is attached to the wrong noun. <strong>B</strong> — 'Printed on recycled paper' fronts the sentence; the grammatical subject is 'the professor,' who cannot be printed on recycled paper — dangling participial. <strong>C</strong> — correct: 'printed on recycled paper' is a reduced relative clause placed immediately after 'notes,' leaving no ambiguity about what was printed. <strong>D</strong> — 'printed on recycled paper' is inserted mid-sentence as an interrupting modifier between 'students' and the passive verb; its antecedent is ambiguous — it could modify 'notes' (intended) or 'students' (nearest noun). The passive construction also adds unnecessary awkwardness."},
  {section:"Grammar",stem:"Original: <em>\"The director had already left when the crisis broke out.\"</em> Which rewrite is NOT equivalent in meaning?",opts:["By the time the crisis broke out, the director had already left.","The director left before the crisis broke out.","The crisis broke out after the director had already left.","The director was already leaving when the crisis broke out."],ans:3,exp:"Correct Answer: D. The director was already leaving when the crisis broke out.. <strong>Rule — Past Perfect States Completed Action; Past Continuous States Action in Progress:</strong> The original uses past perfect 'had already left' — the departure was fully complete before the crisis. <strong>A</strong> — 'By the time the crisis broke out, the director had already left' — equivalent: past perfect in a 'by the time' construction. Meaning preserved. <strong>B</strong> — 'The director left before the crisis broke out' — simple past + 'before' clause. Equivalent: the departure is still presented as completed before the crisis. Meaning preserved. <strong>C</strong> — 'The crisis broke out after the director had already left' — past perfect retained; 'after' establishes the same sequence. Meaning preserved. <strong>D</strong> — 'The director was already leaving when the crisis broke out' — past continuous 'was leaving' means the departure was in progress when the crisis occurred. The director may not have fully left. This is a different meaning from 'had already left' (fully completed departure). This is the answer."},
  {section:"Grammar",stem:"Original: <em>\"The results, which have been published in 1998, were later disputed.\"</em> A correction has been applied: <em>\"The results, which were published in 1998, were later disputed.\"</em> Is this correction:",opts:["Incorrect — \"had been published\" would be more appropriate","Correct — present perfect cannot be used with a specific year","Incorrect — the original uses a passive construction correctly","Unnecessary — \"have been published\" is acceptable with \"in 1998\""],ans:1,exp:"Correct Answer: B. Correct — present perfect cannot be used with a specific year. <strong>Rule — Present Perfect Incompatible with Specific Past Time Expressions:</strong> <strong>A (Incorrect — 'had been published' more appropriate)</strong> — past perfect 'had been published' would imply the results were published before another past event mentioned in the same sentence. The subsequent event 'were later disputed' occurs after publication, making past perfect for publication unjustified. Simple past is sufficient. <strong>B (Correct)</strong> — correct: 'in 1998' is a definite past time marker. Present perfect 'have been published' is categorically incompatible with it in formal English. The correction to 'were published' is fully valid and necessary. <strong>C (Incorrect — passive construction is correct)</strong> — the passive construction ('were published') is not the issue; the correction maintains the passive voice. The error is tense, not voice. <strong>D (Unnecessary — 'have been published' acceptable with '1998')</strong> — false: the rule prohibiting present perfect with specific past time markers is absolute in formal written English. 'Have been published in 1998' is never acceptable."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"When she accepted the offer last year, she _______ that the role would require relocation.\"</em>",opts:["didn't know","hadn't known","doesn't know","wouldn't know"],ans:0,exp:"Correct Answer: A. didn't know. <strong>Rule — Simple Past for State of Knowledge at a Specific Past Moment:</strong> 'When she accepted the offer last year' fixes the time frame firmly in the past. <strong>A (didn't know)</strong> — correct: simple past negative describes her state of knowledge at that specific past moment. It does not imply she later found out; it simply states what she did not know then. <strong>B (hadn't known)</strong> — past perfect negative implies she subsequently came to know — that at some later point she acquired this knowledge, completing a before/after sequence. The sentence does not state or imply that she ever found out about the relocation requirement. Past perfect is unjustified. <strong>C (doesn't know)</strong> — present tense breaks the past tense frame established by 'when she accepted...last year.' It implies she still does not know today, which is a different sentence with a different meaning. <strong>D (wouldn't know)</strong> — 'wouldn't know' is either conditional ('if X, she wouldn't know') or future-in-past ('she said she wouldn't know'). Neither reading is supported by the sentence structure."},
  {section:"Grammar",stem:"Choose the option that best corrects the underlined portion: <em>\"Not until the final results were declared did the tension in the room finally <u>eased</u>.\"</em>",opts:["eases","eased away","was eased","ease"],ans:3,exp:"Correct Answer: D. ease. <strong>Rule — Base Form After Auxiliary in Negative Adverbial Inversion:</strong> 'Not until + clause + did + subject + base verb' is the inverted form. The auxiliary 'did' carries the past tense; the main lexical verb reverts to base form. <strong>A (eases)</strong> — third-person singular present; entirely wrong tense. <strong>B (eased away)</strong> — 'eased' is the past form — incorrect after 'did' in an inverted construction. 'Away' adds a particle ('ease away' = fade gradually) that changes the meaning and is unjustified. <strong>C (was eased)</strong> — passive voice 'was eased' changes the sentence from active to passive construction, altering meaning. The tension eased (intransitive active); it was not eased by an external agent. <strong>D (ease)</strong> — correct: base form of the intransitive verb. 'Did...ease' correctly distributes tense onto the auxiliary and returns the lexical verb to its base form."},
  {section:"Grammar",stem:"Contextual cloze. Choose the pair that correctly fills both blanks: <em>\"The CEO acknowledged that profits _______ steadily for two consecutive quarters but insisted that the company _______ a recovery by year-end.\"</em>",opts:["had fallen / would achieve","fell / will achieve","have fallen / would achieve","had fallen / will achieve"],ans:0,exp:"Correct Answer: A. had fallen / would achieve. <strong>Rule — Double Backshift in Reported Speech:</strong> Both reporting verbs ('acknowledged,' 'insisted') are in the past, requiring backshift for both reported clauses. <strong>A (had fallen / would achieve)</strong> — correct: 'had fallen' is the past perfect backshift of present perfect 'have fallen' after 'acknowledged'; 'would achieve' is the backshift of future 'will achieve' after 'insisted.' <strong>B (fell / will achieve)</strong> — 'fell' (simple past) is the backshift of simple present, not of present perfect; the decline 'for two quarters' implies duration, making present perfect the more natural direct speech form, which backshifts to past perfect. 'Will achieve' is not backshifted — incorrect after past 'insisted.' <strong>C (have fallen / would achieve)</strong> — 'have fallen' retains present perfect without backshift after a past reporting verb — incorrect in formal reported speech. 'Would achieve' is correct. <strong>D (had fallen / will achieve)</strong> — 'had fallen' is correct; 'will achieve' is not backshifted — 'will' must become 'would' after a past reporting verb."},
  {section:"Grammar",stem:"Three sentences below are correct. Identify the one with a dangling or misplaced modifier:",opts:["Disappointed by the verdict, the family immediately filed an appeal.","The manuscript, written over a period of twelve years, was finally accepted for publication.","Carefully restored by the conservators, visitors can now view the original painting.","Having missed the last train, she decided to book a hotel near the station."],ans:2,exp:"Correct Answer: C. Carefully restored by the conservators, visitors can now view the original painting.. <strong>Rule — Passive Participial Must Attach to Logical Subject:</strong> <strong>A</strong> — correct: 'Disappointed by the verdict' attaches to 'the family' — the family is the one who is disappointed. <strong>B</strong> — correct: 'written over a period of twelve years' is a passive participial in a non-restrictive clause modifying 'the manuscript' — the manuscript is what was written. <strong>C</strong> — error: 'Carefully restored by the conservators' attaches to 'visitors' (the grammatical subject). Visitors were not restored; the painting was. The participial has been separated from its intended antecedent ('the original painting') by the subject 'visitors.' <strong>D</strong> — correct: 'Having missed the last train' attaches to 'she' — she is the one who missed the train."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"Research _______ that prolonged sleep deprivation significantly impairs cognitive function.\"</em>",opts:["showed","had shown","has shown","was showing"],ans:2,exp:"Correct Answer: C. has shown. <strong>Rule — Present Perfect for Research Findings with Present Relevance:</strong> <strong>A (showed)</strong> — simple past implies the research demonstrated something at a specific past time, and the finding is now complete or archived. It would require a time marker: 'Research in 2019 showed...' Without one, it suggests the finding is no longer current. <strong>B (had shown)</strong> — past perfect implies the research findings were superseded or overturned by a more recent study mentioned in the same discourse. No such contrast is present; using past perfect here implies the conclusion is no longer accepted. <strong>C (has shown)</strong> — correct: present perfect connects the research to a currently accepted scientific conclusion. 'Has shown' is the standard academic citation form when findings remain valid and relevant. <strong>D (was showing)</strong> — past continuous describes an ongoing process at a past moment; research does not 'show' something progressively over time — it produces a finding. Past continuous is semantically and grammatically inappropriate for empirical citation."},
  {section:"Grammar",stem:"Two-sentence pair. Choose the option where both blanks are tense-consistent: <em>\"The auditors _______ the discrepancy three months before the board was notified. The delay _______ a significant oversight in the firm's reporting procedures.\"</em>",opts:["had identified / revealed","identified / had revealed","had identified / had revealed","identified / revealed"],ans:0,exp:"Correct Answer: A. had identified / revealed. <strong>Rule — Past Perfect for Prior Event; Simple Past for Subsequent Disclosure:</strong> <strong>A (had identified / revealed)</strong> — correct: 'three months before the board was notified' firmly establishes that the identification preceded notification — past perfect required. 'Revealed' (simple past) is correct for the disclosure, which is the later event being narrated. <strong>B (identified / had revealed)</strong> — reverses the logic: 'identified' (simple past) loses the prior-event marking; 'had revealed' (past perfect) implies the disclosure preceded something else — but the disclosure is the later event; nothing follows it in the sentence. <strong>C (had identified / had revealed)</strong> — 'had identified' is correct, but 'had revealed' implies the disclosure also preceded a further past event, which is not established. Using past perfect for both events collapses the sequence. <strong>D (identified / revealed)</strong> — simple past for both loses the three-months-prior distinction; without past perfect on 'identified,' the sentence implies both events occurred simultaneously or in undifferentiated sequence."},
  {section:"Grammar",stem:"Original: <em>\"The committee, who met last Tuesday, has submitted its report.\"</em> A correction has been applied: <em>\"The committee, which met last Tuesday, has submitted its report.\"</em> Is this correction:",opts:["Incorrect — collective nouns referring to people may take \"who\"","Unnecessary — both \"who\" and \"which\" are acceptable for collective nouns","Correct — \"which\" is used for non-human entities; \"who\" is incorrect in formal usage","Incorrect — the relative clause should be \"that met last Tuesday\""],ans:2,exp:"Correct Answer: C. Correct — \"which\" is used for non-human entities; \"who\" is incorrect in formal usage. <strong>Rule — 'Who' vs 'Which' for Collective Institutional Nouns; 'That' in Non-Restrictive Clauses:</strong> <strong>A (Incorrect — collective nouns may take 'who')</strong> — in informal British English, collective nouns can sometimes take 'who' when the emphasis is on the members as people ('the team who played'). However, in formal written English — the standard for academic and professional contexts — institutional bodies ('the committee,' 'the board,' 'the government') take 'which.' The correction to 'which' is valid. <strong>B (Unnecessary — both acceptable)</strong> — incorrect in formal grammar: 'who' for non-person entities is not sanctioned in formal written English. <strong>C (Correct)</strong> — correct: 'which' is the formal relative pronoun for non-human entities in non-restrictive clauses. 'The committee' is an institution, not a person. <strong>D (Incorrect — 'that met')</strong> — relative pronoun 'that' is used in restrictive clauses only. The clause here is non-restrictive (bounded by commas), requiring 'which,' not 'that.' 'That met last Tuesday' would also require removal of the commas, fundamentally changing the structure."},
  {section:"Grammar",stem:"The sentence: <em>\"The defendant's lawyer argued passionately that the evidence was circumstantial.\"</em> The modifier \"in his closing statement\" must be inserted. Choose the version where it is correctly placed:",opts:["In his closing statement, the defendant's lawyer argued passionately that the evidence was circumstantial.","The defendant's lawyer argued passionately in his closing statement that the evidence was circumstantial.","The defendant's lawyer argued passionately that in his closing statement the evidence was circumstantial.","The defendant's lawyer in his closing statement argued passionately that the evidence was circumstantial."],ans:0,exp:"Correct Answer: A. In his closing statement, the defendant's lawyer argued passionately that the evidence was circumstantial.. <strong>Rule — Adverbial Placement for Scope Clarity:</strong> 'In his closing statement' is a contextual adverbial that should have scope over the entire act of arguing. <strong>A (Fronted)</strong> — correct: fronting the adverbial gives it the widest scope — it unambiguously modifies the entire event of arguing passionately. This is the preferred formal placement for contextual adverbials. <strong>B (Between 'passionately' and 'that' clause)</strong> — grammatical but creates a split between the manner adverb ('passionately') and the content clause ('that the evidence was circumstantial'). The reader must bridge the interruption. Less clear than A, though not incorrect. <strong>C (Inside the 'that' clause)</strong> — this embeds 'in his closing statement' within the reported content, implying the evidence was circumstantial specifically within the closing statement and not otherwise — a distorted meaning not intended. <strong>D (After subject, before verb)</strong> — grammatical but the mid-subject-verb placement ('the defendant's lawyer [in his closing statement] argued') is more formal-sounding than it is clear; the adverbial is tucked between subject and predicate in a way that makes it feel parenthetical, weakening its scope signal."},
  {section:"Grammar",stem:"Identify the sentence with NO grammatical error:",opts:["Ever since the scandal broke, the minister is avoiding all media contact.","Ever since the scandal broke, the minister has avoided all media contact.","Ever since the scandal broke, the minister avoided all media contact.","Ever since the scandal broke, the minister had avoided all media contact."],ans:1,exp:"Correct Answer: B. Ever since the scandal broke, the minister has avoided all media contact.. <strong>Rule:</strong> \"Ever since + simple past\" establishes a past starting point for an action/state that continues to the present — requiring present perfect in the main clause. A uses present continuous — ignores the duration from the past. B uses simple past — breaks the link to the present. D uses past perfect — implies the avoidance ended before another past event, not indicated. C (present perfect \"has avoided\") is the only correct option."},
  {section:"Grammar",stem:"Original: <em>\"The candidate who performed best in the written test was shortlisted for the interview.\"</em> Which rewrite <strong>changes</strong> the meaning?",opts:["The best-performing candidate in the written test was shortlisted for the interview.","Only the candidate who performed best was shortlisted for the interview.","The candidate shortlisted for the interview had performed best in the written test.","Of those who took the written test, the top performer was shortlisted for the interview."],ans:1,exp:"Correct Answer: B. Only the candidate who performed best was shortlisted for the interview.. <strong>Rule — Identifying a Meaning Change Through Addition of a Restrictor:</strong> The original states one fact: the best-performing candidate was shortlisted. It says nothing about other candidates. <strong>A</strong> — 'The best-performing candidate in the written test was shortlisted' — rephrases using a compound adjective; same fact, same scope. No meaning change. <strong>B</strong> — adds 'only': 'Only the candidate who performed best was shortlisted.' 'Only' restricts the shortlisting exclusively to the top performer, implying all others were not shortlisted. The original makes no such claim — it is silent on whether others were shortlisted. This adds information that changes the meaning. <strong>C</strong> — 'The candidate shortlisted for the interview had performed best' — reorders the information (focus shifts to the interview, identifying the candidate by their ranking). Same factual content. No meaning change. <strong>D</strong> — 'Of those who took the written test, the top performer was shortlisted' — adds a scope phrase ('of those who took the test') but the core fact (top performer was shortlisted) is unchanged."},
  {section:"Grammar",stem:"Fill in the blank: <em>\"The project will not be approved until the safety protocols _______ in full.\"</em>",opts:["will be implemented","would be implemented","are implemented","have been implemented"],ans:3,exp:"Correct Answer: D. have been implemented. <strong>Rule — Time Clauses with 'Until'; Present Perfect for Completion as Condition:</strong> <strong>A (will be implemented)</strong> — 'will' is not used in subordinate time clauses introduced by 'until,' 'when,' 'before,' 'after,' or 'as soon as' in English. 'The project will not be approved until the safety protocols will be implemented' is ungrammatical. <strong>B (would be implemented)</strong> — 'would be' is conditional form, used in hypothetical or reported speech contexts. No conditional structure is present; this is a straightforward statement of a future condition. <strong>C (are implemented)</strong> — simple present is grammatically permissible in a time clause after 'until,' but it frames the occurrence (the protocols being implemented) as the threshold, not their completion. The sentence is about approval pending full implementation, making the completion — not just the act — the relevant condition. <strong>D (have been implemented)</strong> — correct: present perfect passive in the time clause specifies that the protocols must be fully and completely implemented before approval. The perfect aspect explicitly captures completion as the condition, which is the appropriate and precise choice in formal written English."}
];

let studentName="",studentPin="",studentBatch="";
let currentQ=0,secondsLeft=TIMER_DURATION*60,timerInterval=null;
let userAnswers=new Array(45).fill(null);
let markedForReview=new Array(45).fill(false);
let questionTimes=new Array(45).fill(0);
let lastQ=null,qEnterTs=null;
function logQTime(){
  if(lastQ!==null&&qEnterTs!==null){questionTimes[lastQ]+=Math.round((Date.now()-qEnterTs)/1000);}
  qEnterTs=Date.now();
}
let testSubmitted=false;
/* ── SAFETY NET + MISTAKE BANK (numbered-family adapter v2) ── */
const SN_SESSION_KEY='riim_session_Test17';
const SN_PENDING_KEY='riim_pending';
const SN_STRICT_CLOCK=true;
function saveSession(){
  if(testSubmitted||!studentName)return;
  try{localStorage.setItem(SN_SESSION_KEY,JSON.stringify({
    name:studentName,pin:studentPin,batch:studentBatch,
    userAnswers:userAnswers,currentQ:currentQ,secondsLeft:secondsLeft,
    marked:(typeof markedForReview!=='undefined')?markedForReview:((typeof marked!=='undefined')?marked:null),
    visited:(typeof visitedQ!=='undefined')?visitedQ:null,
    qTimes:(typeof questionTimes!=='undefined')?questionTimes:null,
    savedAt:Date.now(),file:location.pathname.split('/').pop()
  }));}catch(e){}
}
function clearSession(){try{localStorage.removeItem(SN_SESSION_KEY);}catch(e){}}
function tryResume(){
  let s=null;
  try{s=JSON.parse(localStorage.getItem(SN_SESSION_KEY)||'null');}catch(e){}
  if(!s)return;
  let remaining=s.secondsLeft;
  if(SN_STRICT_CLOCK) remaining-=Math.floor((Date.now()-s.savedAt)/1000);
  if(remaining>0){
    const m=String(Math.floor(remaining/60)).padStart(2,'0');
    const sec=String(remaining%60).padStart(2,'0');
    if(!confirm('An unfinished attempt by '+s.name+' was found.\n\nOK = Resume with '+m+':'+sec+' remaining\nCancel = Discard it and start fresh')){clearSession();return;}
  }else{
    alert('An unfinished attempt by '+s.name+' was found, but its time has run out. It will be submitted as-is.');
  }
  document.getElementById('inputName').value=s.name;
  document.getElementById('inputPin').value=s.pin;
  document.getElementById('inputBatch').value=s.batch;
  startTest();
  const ts=document.getElementById('testScreen');
  if(!ts||ts.style.display!=='block')return;
  userAnswers=s.userAnswers;currentQ=s.currentQ;
  try{if(s.marked&&typeof markedForReview!=='undefined')markedForReview=s.marked;}catch(e){}
  try{if(s.marked&&typeof marked!=='undefined')marked=s.marked;}catch(e){}
  try{if(s.visited&&typeof visitedQ!=='undefined')visitedQ=s.visited;}catch(e){}
  try{if(s.qTimes&&typeof questionTimes!=='undefined')questionTimes=s.qTimes;}catch(e){}
  secondsLeft=Math.max(0,remaining);
