<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM - Test 12</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;--purple:#9b59b6;--panel:280px;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;border:1px solid #2a4060;border-radius:6px;padding:10px 12px;color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);color:var(--navy);font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;}
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);background:#0a2a1a;padding:6px 16px;border-radius:20px;border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}
#mainLayout{display:flex;min-height:calc(100vh - 54px);}
#questionArea{flex:1;padding:28px 32px 80px 32px;max-width:calc(100% - var(--panel));}
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.85rem;margin-bottom:8px;}
#questionStem{font-size:1.05rem;line-height:1.7;color:var(--white);margin-bottom:22px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--white);transition:all .2s;width:100%;display:flex;align-items:flex-start;gap:8px;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1e2e10;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;min-width:24px;font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-text{flex:1;}
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
#navBar{position:fixed;bottom:0;left:0;right:var(--panel);background:var(--navy2);border-top:1px solid #1e3a5a;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:150;gap:4px;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);padding:10px 14px;font-size:.83rem;line-height:1.6;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #questionArea{max-width:100%;padding:16px 16px 80px 16px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{right:0;padding:8px 6px;}
  .nav-btn{padding:7px 4px;font-size:.72rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;}
}
@media (max-width:768px){#paletteOverlay.mobile-open{display:flex;}}
</style>
</head>
<body>

<div id="loginScreen">
<div class="login-box">
  <h1>Road to IIM</h1>
  <p>Test 12 &nbsp;&middot;&nbsp; Vocabulary & Word Usage &nbsp;&middot;&nbsp; 45 Questions &nbsp;&middot;&nbsp; 30 Minutes</p>
  <label>Full Name</label>

  <label>Batch</label>
  <select id="inputBatch">
    <option value="">-- Select batch --</option>

  <div id="topBar">
    <span class="logo">Road to IIM &middot; Test 12</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwGGxswx4hcBUFiT0QJIglowhKcJCv47MOR5LKBv9sILl-evsgZeKCms5y6s5zEXOUo6Q/exec";
const TIMER_DURATION=30;
const ADMIN_PINS=['IMS1111111111','IMS2222222222','IMS3333333333','IMS4444444444','IMS5555555555'];

const QUESTIONS = [
  {section:"Fill in the Blanks",stem:"The minister's _______ during the press conference — answering every question with a question — frustrated journalists who had expected at least a partial admission.",opts:["Equivocation","Evasiveness","Prevarication","Circumlocution"],ans:2,exp:"Correct Answer: C. Prevarication. Prevarication means deliberately stalling or avoiding a direct answer — distinct from equivocation (using ambiguous language) and circumlocution (excessive wordiness). The act of answering every question with a question is classic prevarication."},
  {section:"Fill in the Blanks",stem:"The policy paper was _______ in its assumptions; it presumed public cooperation that no government had ever successfully secured.",opts:["Naive","Sanguine","Utopian","Optimistic"],ans:1,exp:"Correct Answer: B. Sanguine. Sanguine means unrealistically optimistic, especially about forecasts or plans. Naive and optimistic are too generic; utopian implies an idealistic vision rather than a faulty assumption about cooperation."},
  {section:"Fill in the Blanks",stem:"The professor's lectures were _______ — every concept buried under so many qualifications that students left more confused than when they arrived.",opts:["Abstruse","Opaque","Recondite","Convoluted"],ans:3,exp:"Correct Answer: D. Convoluted. Convoluted means unnecessarily complex in structure — exactly what burying concepts under qualifications produces. Abstruse and recondite describe obscurity by nature, not by poor construction. Opaque = unclear but not structurally tangled."},
  {section:"Fill in the Blanks",stem:"She delivered the bad news with _______ — no preamble, no softening, just the facts stated plainly and without apology.",opts:["Asperity","Bluntness","Forthrightness","Candour"],ans:0,exp:"Correct Answer: A. Asperity. Asperity means harshness of tone or manner. The phrase 'without apology' signals something sharper than candour (openness) or forthrightness (directness). Bluntness is close but lacks the edge asperity carries."},
  {section:"Fill in the Blanks",stem:"The general's _______ in the face of mounting casualties drew admiration from his troops and condemnation from the opposition.",opts:["Equanimity","Sang-froid","Impassivity","Stoicism"],ans:3,exp:"Correct Answer: D. Stoicism. Stoicism means enduring hardship without complaint. Equanimity is calm under difficulty but more internal and passive. Sang-froid is cool-headedness in crisis. Stoicism best fits the context of facing mounting casualties with visible resolve."},
  {section:"Fill in the Blanks",stem:"The treaty was _______ by a faction within the ruling party; their opposition was enough to stall ratification for three years.",opts:["Impugned","Contested","Opposed","Obstructed"],ans:0,exp:"Correct Answer: A. Impugned. Impugned means to call into question or attack the validity of something — specifically the treaty's legitimacy. Contested and opposed are too generic. Obstructed means blocked, not challenged in principle."},
  {section:"Fill in the Blanks",stem:"The novelist's prose was _______ — each sentence so precisely weighted that removing a single word would collapse the meaning.",opts:["Terse","Economical","Sparse","Lapidary"],ans:3,exp:"Correct Answer: D. Lapidary. Lapidary means elegantly concise, as if carved in stone — it implies artistry in brevity. Terse and sparse just mean brief. Economical is close but does not carry the sense of precision and polish that lapidary does."},
  {section:"Fill in the Blanks",stem:"The journalist's _______ report on the pharmaceutical company's trials prompted three parliamentary inquiries and a share price collapse.",opts:["Incendiary","Damning","Scathing","Exposing"],ans:1,exp:"Correct Answer: B. Damning. Damning means presenting overwhelming evidence of wrongdoing — appropriate when the consequence is three parliamentary inquiries and a share price collapse. Incendiary = inflammatory. Scathing = harshly critical but not necessarily evidence-based."},
  {section:"Fill in the Blanks",stem:"The critic was known for her _______ — she could identify a forgery from across the room before the provenance documents had even been opened.",opts:["Acuity","Perspicacity","Discernment","Acumen"],ans:1,exp:"Correct Answer: B. Perspicacity. Perspicacity means having a ready, penetrating insight into complex matters. Acuity = sharpness of perception (more physical/sensory). Discernment = good judgment. Acumen = practical shrewdness. Perspicacity best fits identifying a forgery by sight alone."},
  {section:"Fill in the Blanks",stem:"The chairman's resignation letter was _______ with bitterness; between every line of formal courtesy lay an unmistakable sense of betrayal.",opts:["Freighted","Riddled","Suffused","Saturated"],ans:0,exp:"Correct Answer: A. Freighted. Freighted means loaded or weighted with meaning or emotion — it carries a sense of burden that riddled (full of holes), suffused (spread through gently), and saturated (filled completely) do not. The letter is heavy with unexpressed bitterness."},
  {section:"Fill in the Blanks",stem:"The new CEO's approach was _______ — she dismantled three divisions, restructured two more, and replaced half the board within her first year.",opts:["Radical","Trenchant","Sweeping","Ruthless"],ans:1,exp:"Correct Answer: B. Trenchant. Trenchant means vigorous, effective, and direct. The CEO's actions — dismantling, restructuring, replacing — are decisive and sharp. Radical and sweeping describe scope; ruthless describes method without implying effectiveness."},
  {section:"Fill in the Blanks",stem:"The ambassador's remarks were so _______ that diplomats from five countries requested clarification before close of business.",opts:["Ambiguous","Cryptic","Oblique","Gnomic"],ans:3,exp:"Correct Answer: D. Gnomic. Gnomic means mysterious and aphoristic — remarks that are deliberately hard to interpret. Cryptic = deliberately obscure. Oblique = indirect. Ambiguous = having two meanings. Gnomic specifically implies the oracular, aphoristic quality that requires five countries to seek clarification."},
  {section:"Fill in the Blanks",stem:"His _______ at the negotiating table — conceding minor points to win major ones — made him one of the most effective trade envoys in the country's history.",opts:["Cunning","Guile","Shrewdness","Astuteness"],ans:1,exp:"Correct Answer: B. Guile. Guile means the strategic use of clever or cunning tactics — specifically implying deception in service of a goal. Cunning and shrewdness are generic. Astuteness = perceptiveness. Guile captures the deliberate tactical deception at the negotiating table."},
  {section:"Fill in the Blanks",stem:"The committee's report was _______ in its conclusions — it named no one, blamed no system, and recommended nothing that would require anyone to change their behaviour.",opts:["Toothless","Anodyne","Vacuous","Nugatory"],ans:1,exp:"Correct Answer: B. Anodyne. Anodyne means deliberately inoffensive and unlikely to cause controversy. The report named no one and recommended nothing — classic anodyne output. Toothless = ineffective. Vacuous = empty of meaning. Nugatory = of no importance (distractor from earlier tests)."},
  {section:"Fill in the Blanks",stem:"The activist's _______ tone throughout the documentary alienated viewers who might otherwise have been sympathetic to the cause.",opts:["Tendentious","Strident","Polemical","Hectoring"],ans:3,exp:"Correct Answer: D. Hectoring. Hectoring means bullying or intimidating through an aggressive, domineering tone. This explains alienating even sympathetic viewers. Tendentious = biased. Polemical = arguing a position. Strident = loud and harsh. Hectoring is the only one that implies the listener feels bullied."},
  {section:"Fill in the Blanks",stem:"The researcher's _______ approach — revisiting every assumption before drawing any conclusion — produced findings that withstood a decade of scrutiny.",opts:["Rigorous","Meticulous","Scrupulous","Painstaking"],ans:2,exp:"Correct Answer: C. Scrupulous. Scrupulous means having careful attention to doing what is right — both ethically and procedurally. Meticulous = very careful about details. Rigorous = thorough. Painstaking = very careful. Scrupulous captures the ethical dimension of revisiting every assumption."},
  {section:"Fill in the Blanks",stem:"The speaker's argument was _______ — each point built upon the last with such logical precision that the conclusion seemed inevitable from the opening sentence.",opts:["Lucid","Coherent","Watertight","Cogent"],ans:3,exp:"Correct Answer: D. Cogent. Cogent means clear, logical, and convincing — it implies both clarity and persuasive force. Lucid = clearly expressed. Coherent = logical and consistent. Watertight = impossible to fault. Cogent specifically captures arguments that build to an inevitable conclusion."},
  {section:"Fill in the Blanks",stem:"The politician's _______ — claiming credit for a policy she had publicly opposed three years earlier — was noted by every journalist in the room.",opts:["Duplicity","Hypocrisy","Tergiversation","Effrontery"],ans:2,exp:"Correct Answer: C. Tergiversation. Tergiversation means making conflicting or evasive statements and reversing one's position. Claiming credit for a policy you publicly opposed is tergiversation. Duplicity = deception. Hypocrisy = not living by one's stated values. Effrontery = shameless boldness."},
  {section:"Word in Context",stem:"The LACHRYMOSE nature of the eulogy surprised those who had known the deceased as a man who found public displays of emotion distasteful.",opts:["Marked by weeping and deep sorrow","Unexpectedly brief and understated","Filled with genuine personal anecdotes","Formal in tone despite the personal loss"],ans:0,exp:"Correct Answer: A. Marked by weeping and deep sorrow. Lachrymose means tearful and marked by weeping or sorrow. The contrast with the deceased's distaste for public displays of emotion makes the answer clear — the eulogy was unexpectedly sorrowful."},
  {section:"Word in Context",stem:"The board found the auditor's report TENDENTIOUS — it presented the evidence selectively in a way that led inexorably to a predetermined conclusion.",opts:["Technically flawed in its methodology","Unusually harsh in its language","Biased toward a particular interpretation","Difficult to follow without specialist knowledge"],ans:2,exp:"Correct Answer: C. Biased toward a particular interpretation. Tendentious means biased toward a particular interpretation. Presenting evidence selectively to reach a predetermined conclusion is the definition of tendentious — the board identified the bias, not a technical flaw."},
  {section:"Word in Context",stem:"The PUSILLANIMOUS handling of the crisis — issuing vague statements rather than taking any decisive action — cost the administration its credibility.",opts:["Excessively cautious but ultimately justified","Technically sound but poorly communicated","Cowardly and lacking any decisive resolve","Diplomatically sensitive given the circumstances"],ans:2,exp:"Correct Answer: C. Cowardly and lacking any decisive resolve. Pusillanimous means cowardly and lacking decisive resolve. Issuing vague statements instead of taking action under pressure is the defining example. The cost to credibility confirms the cowardice reading."},
  {section:"Word in Context",stem:"The novelist's PELLUCID style made even the most complex philosophical ideas feel accessible to an ordinary reader.",opts:["Unusually dense and requiring re-reading","Deliberately ambiguous to invite interpretation","Stylistically ornate and self-consciously literary","Admirably clear and easy to understand"],ans:3,exp:"Correct Answer: D. Admirably clear and easy to understand. Pellucid means admirably clear and easy to understand. The context — complex philosophical ideas feeling accessible — directly signals clarity. Dense, ambiguous, and ornate are all opposites."},
  {section:"Word in Context",stem:"The PROLIX testimony of the expert witness tried the patience of the jury; the judge eventually asked him to confine himself to the question asked.",opts:["Technically accurate but unnecessarily detailed","Delivered in an unnecessarily aggressive tone","Using far more words than the matter required","Difficult to follow due to specialist terminology"],ans:2,exp:"Correct Answer: C. Using far more words than the matter required. Prolix means using far more words than the matter requires, to the point of being tedious. The judge's intervention and the jury's patience being tried confirm this is about excessive length, not aggression or specialism."},
  {section:"Word in Context",stem:"His MORDANT wit made him a favourite at dinner tables and an enemy in boardrooms; people laughed until they realised the joke was at their expense.",opts:["Cutting and sharply critical in a clever way","Unexpectedly self-deprecating for a man of his status","Warm and inclusive despite its apparent edge","Deliberately provocative to test people's reactions"],ans:0,exp:"Correct Answer: A. Cutting and sharply critical in a clever way. Mordant means sharp, biting, and critical in a clever way. The key is that targets laughed — the criticism was witty, not merely harsh. This rules out options that imply warmth or deliberate provocation without wit."},
  {section:"Word in Context",stem:"The DIFFIDENT junior minister surprised everyone by delivering the sharpest cross-examination the committee had seen in years.",opts:["Notoriously combative despite a mild manner","Modest and lacking in self-confidence","Recently appointed and therefore inexperienced","Widely regarded as a future party leader"],ans:1,exp:"Correct Answer: B. Modest and lacking in self-confidence. Diffident means modest and lacking in self-confidence. The surprise at the sharp cross-examination is precisely because diffidence does not predict such performance — the contrast is the point of the sentence."},
  {section:"Word in Context",stem:"The PERFIDIOUS ally abandoned the coalition at the moment of greatest vulnerability, switching sides when victory had seemed certain.",opts:["Strategically cautious given the military situation","Motivated purely by self-interest","Deliberately treacherous and disloyal","Exhausted by prolonged engagement in the conflict"],ans:2,exp:"Correct Answer: C. Deliberately treacherous and disloyal. Perfidious means deceitfully treacherous and disloyal. Switching sides at the moment of greatest vulnerability, when victory seemed certain, is the defining act of perfidy. Motivated by self-interest is plausible but less precise."},
  {section:"Word in Context",stem:"The IMPECUNIOUS artist refused every commission that compromised his vision, preferring genuine poverty to comfortable compromise.",opts:["Having very little money","Principled to the point of professional isolation","Widely respected but poorly compensated","Temperamentally unsuited to collaborative work"],ans:0,exp:"Correct Answer: A. Having very little money. Impecunious means having very little money. The sentence itself tells you — preferring genuine poverty to comfortable compromise. The word directly states the financial condition, not a personality trait."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Duplicity","Candour","Forthrightness","Probity"],ans:0,exp:"Correct Answer: A. Duplicity. Duplicity means deception and double-dealing — it is the opposite of the others. Candour, forthrightness, and probity all relate to honesty and integrity. Duplicity is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Prolix","Verbose","Garrulous","Laconic"],ans:3,exp:"Correct Answer: D. Laconic. Laconic means brief and using few words — the opposite of the others. Prolix, verbose, and garrulous all mean using too many words. Laconic is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Diffident","Reticent","Demure","Assertive"],ans:3,exp:"Correct Answer: D. Assertive. Assertive means confident and direct — the opposite of the others. Diffident, reticent, and demure all describe restraint, shyness, or reserve. Assertive is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Mordant","Benign","Acerbic","Caustic"],ans:1,exp:"Correct Answer: B. Benign. Benign means gentle and harmless — the opposite of the others. Mordant, acerbic, and caustic all mean sharp, biting, and critical. Benign is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Abstruse","Pellucid","Lucid","Perspicuous"],ans:0,exp:"Correct Answer: A. Abstruse. Abstruse means obscure and difficult to understand — the opposite of the others. Pellucid, lucid, and perspicuous all mean clear and easy to understand. Abstruse is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Steadfast","Perfidious","Treacherous","Duplicitous"],ans:0,exp:"Correct Answer: A. Steadfast. Steadfast means loyal and unwavering — the opposite of the others. Perfidious, treacherous, and duplicitous all mean disloyal or deceitful. Steadfast is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Impecunious","Indigent","Penurious","Opulent"],ans:3,exp:"Correct Answer: D. Opulent. Opulent means wealthy and luxurious — the opposite of the others. Impecunious, indigent, and penurious all mean poor or lacking money. Opulent is the odd one out."},
  {section:"Odd One Out",stem:"Which word does NOT belong with the others?",opts:["Cogent","Compelling","Persuasive","Specious"],ans:3,exp:"Correct Answer: D. Specious. Specious means seemingly reasonable but actually unsound — the opposite of the others. Cogent, compelling, and persuasive all mean genuinely convincing. Specious is the odd one out."},
  {section:"Analogy Pairs",stem:"TERGIVERSATION : CONSISTENCY",opts:["Prevarication : Honesty","Perfidy : Loyalty","Equivocation : Clarity","Diffidence : Confidence"],ans:1,exp:"Correct Answer: B. Perfidy : Loyalty. Tergiversation is the absence of consistency — it means changing one's position evasively. Perfidy is the absence of loyalty. The relationship is word : what it fundamentally lacks. Prevarication:Honesty is close but prevarication is about evasion, not the betrayal of a position."},
  {section:"Analogy Pairs",stem:"LAPIDARY : PROSE",opts:["Mordant : Humour","Pellucid : Argument","Prolix : Speech","Cogent : Reasoning"],ans:0,exp:"Correct Answer: A. Mordant : Humour. Lapidary describes the quality of being elegantly precise when applied to prose. Mordant describes the quality of being sharply biting when applied to humour. Both follow the pattern: adjective describes the defining quality of the noun at its finest or sharpest."},
  {section:"Analogy Pairs",stem:"A DEMAGOGUE uses rhetoric to manipulate the masses. In the same way, _______ uses _______ to gain personal favour from those in power.",opts:["A charlatan : deception","A sycophant : flattery","A tyrant : fear","A pedant : precision"],ans:1,exp:"Correct Answer: B. A sycophant : flattery. A demagogue uses rhetoric as the tool to manipulate masses for power. A sycophant uses flattery as the tool to gain favour from those in power. The parallel is: person uses tool to achieve goal at others' expense. Charlatan uses deception but for personal gain from victims, not from those above."},
  {section:"Analogy Pairs",stem:"IMPUGN : CREDIBILITY",opts:["Mollify : Anger","Enervate : Vigour","Tarnish : Reputation","Squelch : Dissent"],ans:2,exp:"Correct Answer: C. Tarnish : Reputation. To impugn credibility means to attack and undermine it. To tarnish a reputation means to damage and undermine it. Both pairs follow the pattern: verb that attacks or diminishes : the thing being diminished. Mollify reduces anger; enervate weakens vigour — different relationships."},
  {section:"Analogy Pairs",stem:"VERBOSE is to economy of words as PUSILLANIMOUS is to _______",opts:["Moral courage","Equanimity","Forthrightness","Sang-froid"],ans:0,exp:"Correct Answer: A. Moral courage. Verbose means lacking economy of words — the word names what is absent. Pusillanimous means lacking moral courage — same structure. The analogy is: word : the quality it lacks. Equanimity, forthrightness, and sang-froid are all qualities but not what pusillanimous specifically lacks."},
  {section:"Analogy Pairs",stem:"ELEGY : GRIEF :: PANEGYRIC : _______",opts:["Admiration","Reverence","Praise","Eulogy"],ans:2,exp:"Correct Answer: C. Praise. An elegy is a form of expression whose defining emotional content is grief. A panegyric is a form of expression whose defining emotional content is praise. Admiration and reverence are emotions but not what panegyric expresses — it specifically conveys praise as a public act."},
  {section:"One Word Substitution",stem:"The use of deliberately vague or ambiguous language to avoid committing to a clear position.",opts:["Equivocation","Prevarication","Circumlocution","Tergiversation"],ans:0,exp:"Correct Answer: A. Equivocation. Equivocation means using deliberately vague or ambiguous language to avoid committing to a clear position. Prevarication means stalling or avoiding through evasion. Circumlocution means excessive wordiness. Tergiversation means changing one's position. Equivocation is the precise term for strategic ambiguity."},
  {section:"One Word Substitution",stem:"A speech or piece of writing that lavishes extravagant and elaborate praise on its subject.",opts:["Elegy","Eulogy","Panegyric","Encomium"],ans:2,exp:"Correct Answer: C. Panegyric. Panegyric is a public speech or piece of writing that lavishes elaborate praise on its subject. A eulogy is specifically a funeral speech. An encomium is a formal expression of praise but less public and elaborate. Elegy is a lament. Panegyric is the most precise match."},
  {section:"One Word Substitution",stem:"Excessively long and tediously detailed in speech or writing, to the point of trying the listener's patience.",opts:["Verbose","Prolix","Loquacious","Garrulous"],ans:1,exp:"Correct Answer: B. Prolix. Prolix means excessively long and tediously detailed — it specifically implies the listener's patience is tried. Verbose = wordy. Loquacious and garrulous = talkative. Prolix alone captures the tedious length that wears out an audience."},
  {section:"One Word Substitution",stem:"The quality of being open and direct in stating one's views or the truth, especially when it may be unwelcome.",opts:["Probity","Forthrightness","Candour","Asperity"],ans:2,exp:"Correct Answer: C. Candour. Candour means the quality of being open and direct, especially when the truth may be unwelcome. Probity = moral uprightness. Forthrightness = being direct and outspoken. Asperity = harshness of tone. Candour specifically captures the willingness to say difficult things openly."}
];

let studentName="",studentPin="",studentBatch="";
let currentQ=0,secondsLeft=TIMER_DURATION*60,timerInterval=null;
let userAnswers=new Array(45).fill(null);
let markedForReview=new Array(45).fill(false);
let testSubmitted=false;

function startTest(){
  const name=document.getElementById('inputName').value.trim();
  const pin=document.getElementById('inputPin').value.trim().toUpperCase();
  const batch=document.getElementById('inputBatch').value;
  const err=document.getElementById('loginErr');
  if(!name||!pin||!batch){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!/^(STU|IMS)\d{10}$/.test(pin)){err.textContent='PIN must be STU or IMS followed by exactly 10 digits.';err.style.display='block';return;}
  const isAdmin=ADMIN_PINS.includes(pin);
  if(isAdmin&&batch!=='Admin'){err.textContent='Admin PIN must be used with the Admin batch only.';err.style.display='block';return;}
  if(!isAdmin&&batch==='Admin'){err.textContent='Only Admin PINs may select the Admin batch.';err.style.display='block';return;}
  studentName=name;studentPin=pin;studentBatch=batch;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('testScreen').style.display='block';
  if(window.innerWidth>768)document.getElementById('paletteOverlay').style.display='flex';
  else document.getElementById('paletteOverlay').style.display='none';
  buildPalette();renderQuestion();startTimer();
}

function startTimer(){
  timerInterval=setInterval(()=>{
    secondsLeft--;
    const m=String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s=String(secondsLeft%60).padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    el.textContent=m+':'+s;
    if(secondsLeft<=300)el.classList.add('urgent');
    if(secondsLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function renderQuestion(){
  const q=QUESTIONS[currentQ];
  document.getElementById('sectionTag').textContent=q.section;
  document.getElementById('questionNumber').textContent='Question '+(currentQ+1)+' of 45';
  document.getElementById('questionStem').innerHTML=q.stem.replace(/\n/g,'<br>');
  const ol=document.getElementById('optionsList');
  ol.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.className='option-btn';
    if(userAnswers[currentQ]===i)btn.classList.add('selected');
    if(markedForReview[currentQ])btn.classList.add('marked');
    btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][i]+'</span><span class="opt-text">'+opt+'</span>';
    btn.onclick=()=>selectAnswer(i);
    li.appendChild(btn);ol.appendChild(li);
  });
  document.getElementById('submitBtn').style.display=(currentQ===44)?'block':'none';
  updatePalette();updateProgress();
}

function selectAnswer(idx){userAnswers[currentQ]=idx;renderQuestion();}
function clearAnswer(){userAnswers[currentQ]=null;renderQuestion();}
function navigate(dir){const n=currentQ+dir;if(n>=0&&n<45){currentQ=n;renderQuestion();}}

let paletteOpen=window.innerWidth>768;
function togglePalette(){
  paletteOpen=!paletteOpen;
  const mob=window.innerWidth<=768;
  const ov=document.getElementById('paletteOverlay');
  const nb=document.getElementById('navBar');
  const qa=document.getElementById('questionArea');
  if(mob){ov.classList.toggle('mobile-open',paletteOpen);}
  else{ov.style.display=paletteOpen?'flex':'none';nb.style.right=paletteOpen?'var(--panel)':'0';qa.style.maxWidth=paletteOpen?'calc(100% - var(--panel))':'100%';}
}

function markForReview(){markedForReview[currentQ]=!markedForReview[currentQ];renderQuestion();}

function buildPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  for(let i=0;i<45;i++){
    const btn=document.createElement('button');
    btn.className='pal-btn';btn.id='pb'+(i+1);btn.textContent=i+1;
    btn.onclick=(()=>{const idx=i;return()=>{currentQ=idx;renderQuestion();}})();
    grid.appendChild(btn);
  }
}

function updatePalette(){
  for(let i=0;i<45;i++){
    const btn=document.getElementById('pb'+(i+1));if(!btn)continue;
    btn.className='pal-btn';
    if(markedForReview[i])btn.classList.add('marked');
    else if(userAnswers[i]!==null)btn.classList.add('answered');
    if(i===currentQ)btn.classList.add('current');
  }
}

function updateProgress(){
  const ans=userAnswers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(ans/45*100)+'%';
}

function confirmSubmit(){
  const u=userAnswers.filter(a=>a===null).length;
  let msg='Submit the test?';
  if(u>0)msg='You have '+u+' unanswered question'+(u>1?'s':'')+'. Submit anyway?';
  if(confirm(msg))submitTest();
}

function submitTest(){
  if(testSubmitted)return;
  testSubmitted=true;clearInterval(timerInterval);
  let correct=0,wrong=0,skipped=0;
  const sectionErrors={};const wrongQuestions=[];
  QUESTIONS.forEach((q,i)=>{
    const sec=q.section;
    if(userAnswers[i]===null){skipped++;}
    else if(userAnswers[i]===q.ans){correct++;}
    else{wrong++;wrongQuestions.push(i+1);sectionErrors[sec]=(sectionErrors[sec]||0)+1;}
  });
  const score=correct*4-wrong;
  showResults(score,correct,wrong,skipped);
  saveToTracker(score,correct,wrong,skipped);
  logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions);
}

function showResults(score,correct,wrong,skipped){
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='block';
  const acc=((correct/(45-skipped||1))*100).toFixed(1);
  document.getElementById('scoreHero').innerHTML=
    '<div class="score-num">'+score+'</div>'+
    '<div class="score-sub">out of 180 &nbsp;&middot;&nbsp; '+studentName+' &nbsp;&middot;&nbsp; '+studentPin+' &nbsp;&middot;&nbsp; '+studentBatch+'</div>';
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-box correct"><div class="val">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="stat-box wrong"><div class="val">'+wrong+'</div><div class="lbl">Wrong</div></div>'+
    '<div class="stat-box"><div class="val" style="color:var(--grey)">'+skipped+'</div><div class="lbl">Skipped</div></div>'+
    '<div class="stat-box accuracy"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div>';
  buildReview();buildMisses();buildRetry();
}

function buildReview(){
  const list=document.getElementById('review-list');
  list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const isC=(ua===q.ans),isSk=(ua===null);
    const card=document.createElement('div');
    card.className='review-card '+(isSk?'':isC?'correct':'wrong');
    const bClass=isSk?'badge-skipped':isC?'badge-correct':'badge-wrong';
    const bText=isSk?'&mdash;':isC?'&#10003;':'&#10007;';
    const opts=q.opts.map((o,idx)=>{
      let cls='review-opt';
      if(idx===q.ans)cls+=' correct-opt';
      if(ua!==null&&ua===idx&&idx!==q.ans)cls+=' your-wrong';
      return '<div class="'+cls+'"><span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o+'</div>';
    }).join('');
    const expHtml=q.exp?'<div class="review-exp">'+q.exp+'</div>':''
    card.innerHTML=
      '<div class="review-card-header">'+
      '<div class="review-badge '+bClass+'">'+bText+'</div>'+
      '<div class="review-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>'+
      '</div><div class="review-opts">'+opts+'</div>'+expHtml;
    list.appendChild(card);
  });
}

function buildMisses(){
  const wrongQs=[];
  QUESTIONS.forEach((q,i)=>{
    if(userAnswers[i]!==null&&userAnswers[i]!==q.ans){
      wrongQs.push('Q'+(i+1)+' ['+q.section+'] '+['A','B','C','D'][q.ans]+'. '+q.opts[q.ans]);
    }
  });
  document.getElementById('missesText').value=wrongQs.length?wrongQs.join('\n'):'No misses -- perfect score!';
}

function copyMisses(e){
  e.preventDefault();
  const txt=document.getElementById('missesText').value;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.target;btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent='Copy Misses';},2000);
  });
}

function buildRetry(){
  const rs=document.getElementById('retrySection');rs.innerHTML='';
  const wrong=[];
  QUESTIONS.forEach((q,i)=>{if(userAnswers[i]!==null&&userAnswers[i]!==q.ans)wrong.push(i);});
  if(!wrong.length)return;
  rs.innerHTML='<h3>Retry Wrong Questions ('+wrong.length+')</h3>';
  wrong.forEach(i=>{
    const q=QUESTIONS[i];
    const card=document.createElement('div');card.className='retry-card';
    card.innerHTML='<div class="r-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>';
    q.opts.forEach((o,idx)=>{
      const btn=document.createElement('button');btn.className='retry-opt';
      btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o;
      btn.onclick=()=>{
        card.querySelectorAll('.retry-opt').forEach(b=>b.disabled=true);
        if(idx===q.ans)btn.classList.add('r-correct');
        else{btn.classList.add('r-wrong');card.querySelectorAll('.retry-opt')[q.ans].classList.add('r-correct');}
      };
      card.appendChild(btn);
    });
    rs.appendChild(card);
  });
}

function saveToTracker(score,correct,wrong,skipped){
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const data={testName:'Road to IIM Test 12',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})};
  try{const ex=JSON.parse(localStorage.getItem('riim_results')||'[]');ex.unshift(data);localStorage.setItem('riim_results',JSON.stringify(ex.slice(0,200)));}
  catch(e){}
}

function logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions){
  const notice=document.getElementById('sheet-notice');
  notice.className='submitting';notice.textContent='Submitting results...';notice.style.display='block';
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const payload={testName:'Road to IIM Test 12',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),sectionErrors:JSON.stringify(sectionErrors),wrongQuestions:JSON.stringify(wrongQuestions),studentAnswers:JSON.stringify(userAnswers.map(a=>a===null?null:a))};
  fetch('https://script.google.com/macros/s/AKfycbwGGxswx4hcBUFiT0QJIglowhKcJCv47MOR5LKBv9sILl-evsgZeKCms5y6s5zEXOUo6Q/exec',{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{notice.className='success';notice.textContent='Results saved successfully.';})
    .catch(()=>{notice.className='failure';notice.textContent='Could not reach server. Results saved locally.';});
}

function generatePDF(){
  const el=document.getElementById('review-list');
  html2pdf().set({margin:10,filename:'RoadToIIM_Test12_'+studentName.replace(/\s+/g,'_')+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['c','a','u','s','p'].includes(e.key.toLowerCase()))e.preventDefault();});
</script>
