<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula Constellation · Road to IIM</title>
<meta name="theme-color" content="#070B1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#070B1A; --panel:#0D1428; --panel2:#111A33;
  --gold:#E8C36A; --gold-dim:#B99548; --star:#EEF2FF;
  --ink:#DCE4F7; --ink2:#8FA3D0; --line:rgba(143,163,208,0.18);
  --known:#5DCAA5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--sky);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 20px 80px}
header{text-align:center;padding:64px 0 40px}
.eyebrow{font-size:12px;letter-spacing:0.28em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:14px}
h1{font-family:'Marcellus',serif;font-size:clamp(34px,6vw,56px);font-weight:400;color:var(--star);letter-spacing:0.02em}
h1 .g{color:var(--gold)}
.sub{color:var(--ink2);font-size:15px;margin-top:12px}
.searchbox{max-width:520px;margin:32px auto 0;position:relative}
.searchbox input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:13px 22px;color:var(--ink);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.searchbox input:focus{border-color:var(--gold-dim)}
.searchbox input::placeholder{color:var(--ink2);opacity:.7}
#progressline{text-align:center;color:var(--ink2);font-size:13px;margin-top:18px}
#progressline b{color:var(--gold);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:36px}
.ccard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;transition:transform .18s,border-color .18s;position:relative;overflow:hidden}
.ccard:hover{transform:translateY(-3px);border-color:var(--gold-dim)}
.ccard svg{display:block;width:100%;height:110px;margin-bottom:10px}
.cname{font-family:'Marcellus',serif;font-size:20px;color:var(--star);letter-spacing:0.02em}
.ctopic{font-size:13px;color:var(--gold-dim);margin-top:3px}
.cmeta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--ink2)}
.cbar{height:3px;background:rgba(143,163,208,0.15);border-radius:2px;margin-top:8px;overflow:hidden}
.cbar i{display:block;height:100%;background:var(--known);border-radius:2px;transition:width .3s}
#results{margin-top:28px;display:none}
.rrow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer}
.rrow:hover{border-color:var(--gold-dim)}
.rname{font-size:14px;font-weight:500;color:var(--ink)}
.rfrom{font-size:12px;color:var(--gold-dim);margin-top:2px}
.overlay{position:fixed;inset:0;z-index:10;background:rgba(4,7,16,0.72);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--panel2);border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;width:100%;max-width:760px;max-height:88vh;display:flex;flex-direction:column;animation:rise .28s ease}
@keyframes rise{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheethead{padding:22px 26px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.shname{font-family:'Marcellus',serif;font-size:24px;color:var(--star)}
.shtopic{font-size:13px;color:var(--gold-dim);margin-top:3px}
.shcount{font-size:12px;color:var(--ink2);margin-top:6px}
.closebtn{background:none;border:1px solid var(--line);color:var(--ink2);border-radius:999px;width:34px;height:34px;font-size:16px;cursor:pointer;flex-shrink:0;line-height:1}
.closebtn:hover{border-color:var(--gold-dim);color:var(--gold)}
.sheetbody{overflow-y:auto;padding:14px 26px 40px}
.frow{border-bottom:1px solid var(--line)}
.fhead{display:flex;align-items:center;gap:12px;padding:14px 2px;cursor:pointer}
.fstar{flex-shrink:0;font-size:17px;color:rgba(143,163,208,0.4);cursor:pointer;transition:color .15s,transform .15s;background:none;border:none;padding:4px}
.fstar.on{color:var(--gold);transform:scale(1.15)}
.fname{font-size:14.5px;font-weight:500;color:var(--ink);flex:1}
.fchev{color:var(--ink2);font-size:12px;transition:transform .2s}
.frow.open .fchev{transform:rotate(90deg)}
.fbody{display:none;padding:2px 8px 18px 40px}
.frow.open .fbody{display:block}
.ftex{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow-x:auto;color:var(--star)}
.ftex .katex{font-size:1.12em}
.fnote{font-size:13px;color:var(--ink2);margin-top:10px;line-height:1.6}
.fnote b{color:var(--gold);font-weight:500}
footer{text-align:center;margin-top:64px;color:var(--ink2);font-size:12px;letter-spacing:0.06em}
footer .g{color:var(--gold-dim)}
@media (max-width:640px){
  header{padding:44px 0 28px}
  .grid{grid-template-columns:1fr;gap:14px}
  .sheetbody{padding:12px 18px 36px}
  .sheethead{padding:18px 18px 14px}
}
@media (prefers-reduced-motion: reduce){
  .ccard,.sheet{animation:none;transition:none}
}
</style>
</head>
<body>
<canvas id="starfield" aria-hidden="true"></canvas>
<div class="wrap">
<header>
  <div class="eyebrow">Road to IIM · IPMAT Indore · Quantitative Ability</div>
  <h1>The Formula <span class="g">Constellation</span></h1>
  <p class="sub">Twelve constellations. Every formula that matters. Tap a star to chart it.</p>
  <div class="searchbox"><input type="text" id="search" placeholder="Search a formula… (e.g. compound interest, cos 2A)" aria-label="Search formulas"></div>
  <div id="progressline"></div>
  <button id="installbtn" style="display:none;margin:16px auto 0;background:none;border:1px solid var(--gold-dim);color:var(--gold);border-radius:999px;padding:9px 22px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:0.04em">✦ Install as app</button>
</header>
<div id="results"></div>
<div class="grid" id="grid"></div>
<footer>Road to IIM · <span class="g">Formula Constellation v1</span> · Sahil Sir</footer>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheethead">
      <div>
        <div class="shname" id="shname"></div>
        <div class="shtopic" id="shtopic"></div>
        <div class="shcount" id="shcount"></div>
      </div>
      <button class="closebtn" id="closebtn" aria-label="Close">✕</button>
    </div>
    <div class="sheetbody" id="sheetbody"></div>
  </div>
</div>
<script>
const TOPICS = [
{name:"The Prime Cluster", topic:"Number System", stars:[
{n:"HCF × LCM rule", f:"\\text{HCF}(a,b)\\times\\text{LCM}(a,b)=a\\times b", x:"Works only for TWO numbers — a favourite trap."},
{n:"Number of factors", f:"N=p^a q^b \\Rightarrow d(N)=(a+1)(b+1)", x:"72 = 2³·3² → 4×3 = <b>12 factors</b>. Perfect squares have an odd count."},
{n:"Sum of factors", f:"\\sigma(N)=\\frac{p^{a+1}-1}{p-1}\\cdot\\frac{q^{b+1}-1}{q-1}", x:""},
{n:"Product of factors", f:"\\text{Product}=N^{\\,d(N)/2}", x:""},
{n:"Trailing zeroes in n!", f:"Z=\\left\\lfloor\\tfrac{n}{5}\\right\\rfloor+\\left\\lfloor\\tfrac{n}{25}\\right\\rfloor+\\left\\lfloor\\tfrac{n}{125}\\right\\rfloor+\\cdots", x:"100! → 20+4 = <b>24 zeroes</b>."},
{n:"Cyclicity of last digits", f:"7^1,7^2,7^3,7^4 \\to 7,9,3,1 \\text{ (cycle 4)}", x:"All digits cycle with period 1, 2 or 4. 7¹⁰⁰ ends in 1 since 100 ÷ 4 leaves 0."},
{n:"Fermat's little theorem", f:"a^{p-1}\\equiv 1 \\pmod p", x:"p prime, a not divisible by p. Rem(2¹⁰⁰ ÷ 7): 2⁶≡1, so 2¹⁰⁰=2⁹⁶·2⁴ → rem 2."},
{n:"Euler's theorem", f:"a^{\\varphi(n)}\\equiv 1\\pmod n,\\quad \\varphi(n)=n\\prod\\left(1-\\tfrac1p\\right)", x:"φ(10)=4, φ(100)=40. Use when divisor is composite."},
{n:"Division identity", f:"\\text{Dividend}=\\text{Divisor}\\times Q+R", x:""},
{n:"Sum of first n odd numbers", f:"1+3+5+\\cdots+(2n-1)=n^2", x:""}
]},
{name:"The Merchant's Wheel", topic:"Percentages · Profit & Loss · Interest", stars:[
{n:"Successive % change", f:"\\text{Net}=a+b+\\frac{ab}{100}", x:"+20% then −10% → 20−10−2 = <b>+8%</b>. Also works for discounts and P&L combos."},
{n:"Price up, consumption down", f:"\\text{Cut}=\\frac{100r}{100+r}\\%", x:"Price rises 25% → cut consumption 20% to keep spend equal."},
{n:"Profit percentage", f:"P\\%=\\frac{SP-CP}{CP}\\times100", x:"Always on CP unless the question says otherwise."},
{n:"Discount chain", f:"SP=MP\\left(1-\\tfrac{d_1}{100}\\right)\\left(1-\\tfrac{d_2}{100}\\right)", x:""},
{n:"Same SP, +x% and −x%", f:"\\text{Net loss}=\\frac{x^2}{100}\\%", x:"Two items sold at same price, one at +10%, one at −10% → overall <b>1% loss</b>, always a loss."},
{n:"Simple interest", f:"SI=\\frac{P\\times R\\times T}{100}", x:""},
{n:"Compound amount", f:"A=P\\left(1+\\frac{r}{100}\\right)^{t}", x:"Half-yearly: rate ÷ 2, time × 2. Quarterly: rate ÷ 4, time × 4."},
{n:"CI − SI for 2 years", f:"\\Delta=P\\left(\\frac{r}{100}\\right)^{2}", x:"₹10,000 at 10% → difference = <b>₹100</b>."},
{n:"CI − SI for 3 years", f:"\\Delta=P\\left(\\frac{r}{100}\\right)^{2}\\left(3+\\frac{r}{100}\\right)", x:""},
{n:"Rule of 72 (doubling)", f:"t_{double}\\approx\\frac{72}{r}", x:"At 8% CI, money doubles in ≈ 9 years. Quick SA-question estimate."}
]},
{name:"The Alligation Scales", topic:"Ratio · Mixtures · Averages", stars:[
{n:"Componendo–dividendo", f:"\\frac{a}{b}=\\frac{c}{d}\\Rightarrow\\frac{a+b}{a-b}=\\frac{c+d}{c-d}", x:""},
{n:"Alligation rule", f:"\\frac{\\text{cheaper qty}}{\\text{dearer qty}}=\\frac{d-m}{m-c}", x:"Mix ₹20 and ₹30 rice for mean ₹24 → ratio 6:4 = <b>3:2</b>."},
{n:"Weighted average", f:"\\bar{x}=\\frac{n_1x_1+n_2x_2}{n_1+n_2}", x:""},
{n:"Repeated replacement", f:"\\text{Left}=V\\left(1-\\frac{x}{V}\\right)^{n}", x:"40L milk, remove 4L & replace with water, twice → milk = 40(0.9)² = 32.4L."},
{n:"Mean proportional", f:"x=\\sqrt{ab}", x:"Third proportional to a, b is b²/a."},
{n:"Average of first n naturals", f:"\\bar{x}=\\frac{n+1}{2}", x:""},
{n:"New entrant shifts average", f:"\\text{Entrant}=\\bar{x}_{old}+(n+1)\\,k", x:"Average of n people rises by k when one joins → the value the newcomer brought."},
{n:"Partnership profit split", f:"P_1:P_2=I_1t_1:I_2t_2", x:"Profit shares follow investment × time."}
]},
{name:"The Traveller's Path", topic:"Time & Work · Speed & Distance", stars:[
{n:"Two workers together", f:"T=\\frac{ab}{a+b}", x:"A in 12 days, B in 6 → together 12·6/18 = <b>4 days</b>. LCM method is faster for 3+."},
{n:"Chain rule (MDH/W)", f:"\\frac{M_1D_1H_1}{W_1}=\\frac{M_2D_2H_2}{W_2}", x:""},
{n:"Efficiency inverse rule", f:"\\text{Efficiency}\\propto\\frac{1}{\\text{time}}", x:"A is twice as efficient as B → time ratio 1 : 2."},
{n:"Pipes and cisterns", f:"\\text{Net rate}=\\sum\\text{inlets}-\\sum\\text{outlets}", x:""},
{n:"Average speed, equal distances", f:"v_{avg}=\\frac{2xy}{x+y}", x:"60 km/h out, 40 km/h back → 48, never 50. Harmonic, not arithmetic."},
{n:"Relative speed", f:"v_{rel}=u+v \\;(\\text{opp}),\\quad |u-v|\\;(\\text{same})", x:""},
{n:"Train crossing", f:"t=\\frac{L_{train}+L_{platform}}{v}", x:"Crossing a pole: platform length = 0."},
{n:"Boats and streams", f:"v_{boat}=\\frac{D+U}{2},\\quad v_{stream}=\\frac{D-U}{2}", x:"D, U = downstream and upstream speeds."},
{n:"Circular track: first meeting", f:"t=\\frac{C}{u+v}\\;(\\text{opp}),\\quad \\frac{C}{|u-v|}\\;(\\text{same})", x:"Meeting at the start again = LCM of individual lap times."},
{n:"Race beat distance", f:"v_A:v_B=L:(L-x)", x:"A beats B by x metres in an L-metre race."}
]},
{name:"The Quadratic Spiral", topic:"Algebra & Identities", stars:[
{n:"Sum and product of roots", f:"\\alpha+\\beta=-\\frac{b}{a},\\qquad \\alpha\\beta=\\frac{c}{a}", x:""},
{n:"Nature of roots", f:"D=b^2-4ac", x:"D>0 real distinct · D=0 equal · D<0 imaginary. D a perfect square → rational."},
{n:"Extreme value of quadratic", f:"x=-\\frac{b}{2a},\\qquad y_{ext}=-\\frac{D}{4a}", x:"Minimum if a>0, maximum if a<0."},
{n:"Equation from roots", f:"x^2-(\\alpha+\\beta)x+\\alpha\\beta=0", x:""},
{n:"Cube sum identity", f:"a^3+b^3=(a+b)(a^2-ab+b^2)", x:"Also (a+b)³ = a³+b³+3ab(a+b)."},
{n:"Three-variable cube identity", f:"a^3+b^3+c^3-3abc=(a+b+c)(a^2+b^2+c^2-ab-bc-ca)", x:"If a+b+c = 0 then a³+b³+c³ = <b>3abc</b> — appears constantly in SA."},
{n:"AM–GM inequality", f:"\\frac{a+b}{2}\\ge\\sqrt{ab}", x:"Min of x + 1/x for x>0 is <b>2</b>. Equality when all terms equal."},
{n:"Modulus inequality", f:"|x-a|<r\\iff a-r<x<a+r", x:""},
{n:"Remainder theorem", f:"p(x)\\div(x-a)\\;\\text{leaves}\\;p(a)", x:"(x−a) is a factor ⟺ p(a) = 0."},
{n:"Reciprocal square trick", f:"x+\\tfrac1x=k\\Rightarrow x^2+\\tfrac1{x^2}=k^2-2", x:"And x³+1/x³ = k³−3k."}
]},
{name:"The Logarithm Arc", topic:"Logs · Surds · Indices · Functions", stars:[
{n:"Product and quotient laws", f:"\\log mn=\\log m+\\log n,\\quad \\log\\tfrac{m}{n}=\\log m-\\log n", x:""},
{n:"Power law", f:"\\log_a m^k=k\\log_a m", x:""},
{n:"Change of base", f:"\\log_a b=\\frac{\\log b}{\\log a},\\qquad \\log_a b\\cdot\\log_b a=1", x:""},
{n:"Base power shortcut", f:"\\log_{a^k} b=\\tfrac1k\\log_a b", x:""},
{n:"Fundamental identity", f:"a^{\\log_a x}=x", x:""},
{n:"Number of digits", f:"\\text{digits}(N)=\\lfloor\\log_{10}N\\rfloor+1", x:"2¹⁰: 10 × 0.301 = 3.01 → <b>4 digits</b> (1024). Given log 2 = 0.301, log 3 = 0.477."},
{n:"Laws of indices", f:"a^m a^n=a^{m+n},\\quad (a^m)^n=a^{mn}", x:""},
{n:"Rationalising surds", f:"\\frac{1}{\\sqrt a+\\sqrt b}=\\frac{\\sqrt a-\\sqrt b}{a-b}", x:""},
{n:"Composite functions", f:"(f\\circ g)(x)=f(g(x))", x:"Order matters: fog ≠ gof in general."},
{n:"Even and odd functions", f:"f(-x)=f(x)\\;(\\text{even}),\\quad f(-x)=-f(x)\\;(\\text{odd})", x:""},
{n:"Graph shifting", f:"f(x)+k\\uparrow,\\quad f(x-k)\\to\\text{right}", x:"Vertical shifts outside, horizontal shifts inside (and reversed in sign)."}
]},
{name:"The Ladder of Means", topic:"Progressions & Series", stars:[
{n:"AP nth term", f:"T_n=a+(n-1)d", x:""},
{n:"AP sum", f:"S_n=\\frac{n}{2}\\bigl[2a+(n-1)d\\bigr]=\\frac{n}{2}(a+l)", x:""},
{n:"GP nth term and sum", f:"T_n=ar^{n-1},\\qquad S_n=\\frac{a(r^n-1)}{r-1}", x:""},
{n:"Infinite GP", f:"S_\\infty=\\frac{a}{1-r},\\quad |r|<1", x:"4 + 2 + 1 + ½ + … = 4/(1−½) = <b>8</b>."},
{n:"Harmonic mean", f:"HM=\\frac{2ab}{a+b}", x:""},
{n:"AM, GM, HM relation", f:"AM\\times HM=GM^2,\\qquad AM\\ge GM\\ge HM", x:""},
{n:"Sum of n naturals", f:"\\sum n=\\frac{n(n+1)}{2}", x:""},
{n:"Sum of squares", f:"\\sum n^2=\\frac{n(n+1)(2n+1)}{6}", x:""},
{n:"Sum of cubes", f:"\\sum n^3=\\left[\\frac{n(n+1)}{2}\\right]^2", x:"Sum of cubes = (sum of naturals)². 1³+…+10³ = 55² = 3025."},
{n:"Assuming terms smartly", f:"\\text{AP: }a-d,\\,a,\\,a+d\\qquad\\text{GP: }\\tfrac{a}{r},\\,a,\\,ar", x:"For 3 unknown terms with a given sum/product — kills SA questions fast."},
{n:"Term from sums", f:"T_n=S_n-S_{n-1}", x:""}
]},
{name:"The Grid Nebula", topic:"Matrices & Determinants", stars:[
{n:"Multiplication condition", f:"(m\\times n)(n\\times p)\\to m\\times p", x:"Inner dimensions must match; result takes the outer ones."},
{n:"Transpose of product", f:"(AB)^T=B^T A^T", x:"Order reverses. Same for inverse: (AB)⁻¹ = B⁻¹A⁻¹."},
{n:"Determinant of product", f:"|AB|=|A||B|", x:""},
{n:"Scalar multiple", f:"|kA|=k^n|A|", x:"n = order of the matrix. |2A| for a 3×3 = 8|A| — classic trap."},
{n:"Inverse formula", f:"A^{-1}=\\frac{\\text{adj}\\,A}{|A|}", x:"Exists only when |A| ≠ 0."},
{n:"Adjoint identity", f:"A(\\text{adj}\\,A)=|A|\\,I,\\qquad |\\text{adj}\\,A|=|A|^{n-1}", x:""},
{n:"Singular matrix", f:"|A|=0", x:"Rows/columns are linearly dependent; no inverse."},
{n:"Determinant properties", f:"R_i\\leftrightarrow R_j\\Rightarrow -|A|,\\quad R_i=R_j\\Rightarrow 0", x:"Row swap flips sign · identical rows → 0 · common factor pulls out of one row."},
{n:"Symmetric split", f:"A=\\underbrace{\\tfrac{A+A^T}{2}}_{\\text{sym}}+\\underbrace{\\tfrac{A-A^T}{2}}_{\\text{skew}}", x:"Skew-symmetric matrices have zero diagonal; odd-order skew → |A| = 0."},
{n:"Cramer's rule", f:"x=\\frac{\\Delta_1}{\\Delta},\\quad y=\\frac{\\Delta_2}{\\Delta}", x:"Δ = 0 with Δᵢ ≠ 0 → no solution; all zero → infinitely many."}
]},
{name:"The Wave Crown", topic:"Trigonometry", stars:[
{n:"Pythagorean identities", f:"\\sin^2\\theta+\\cos^2\\theta=1,\\;\\; 1+\\tan^2\\theta=\\sec^2\\theta", x:"And 1 + cot²θ = cosec²θ."},
{n:"Standard angles", f:"\\sin: 0,\\tfrac12,\\tfrac{1}{\\sqrt2},\\tfrac{\\sqrt3}{2},1", x:"For 0°, 30°, 45°, 60°, 90°. Cosine runs the same list backwards."},
{n:"Compound angle: sine", f:"\\sin(A\\pm B)=\\sin A\\cos B\\pm\\cos A\\sin B", x:""},
{n:"Compound angle: cosine", f:"\\cos(A\\pm B)=\\cos A\\cos B\\mp\\sin A\\sin B", x:"Watch the sign flip — cosine is the contrarian."},
{n:"Compound angle: tangent", f:"\\tan(A\\pm B)=\\frac{\\tan A\\pm\\tan B}{1\\mp\\tan A\\tan B}", x:""},
{n:"Double angle: sine", f:"\\sin 2A=2\\sin A\\cos A", x:"Max of sinθcosθ = ½ at θ = 45°."},
{n:"Double angle: cosine", f:"\\cos 2A=\\cos^2 A-\\sin^2 A=2\\cos^2 A-1=1-2\\sin^2 A", x:"Three forms — pick whichever cancels."},
{n:"Range of a sin θ + b cos θ", f:"-\\sqrt{a^2+b^2}\\;\\le\\; a\\sin\\theta+b\\cos\\theta \\;\\le\\;\\sqrt{a^2+b^2}", x:"3sinθ + 4cosθ ∈ [−5, 5]. Add c → shift the whole range by c."},
{n:"Range of A sin x + B", f:"y\\in[\\,B-|A|,\\;B+|A|\\,]", x:"The graph we explored: |A| swings around the midline y = B."},
{n:"Complementary angles", f:"\\sin(90^\\circ-\\theta)=\\cos\\theta", x:"sin θ · sec θ chains and ASTC quadrant signs flow from allied angles."},
{n:"Heights and distances", f:"\\tan\\theta=\\frac{\\text{height}}{\\text{base}}", x:"30°–60° pair: distances in ratio 1 : √3. Angle of depression = elevation (alternate angles)."}
]},
{name:"The Triangle Temple", topic:"Geometry & Coordinate", stars:[
{n:"Exterior angle theorem", f:"\\text{ext}\\;\\angle=\\text{sum of opposite interior}\\;\\angle s", x:""},
{n:"Pythagoras and triplets", f:"a^2+b^2=c^2", x:"Memorise: (3,4,5) (5,12,13) (7,24,25) (8,15,17) (9,40,41) and multiples."},
{n:"Similar triangles", f:"\\frac{\\text{Area}_1}{\\text{Area}_2}=\\left(\\frac{s_1}{s_2}\\right)^2", x:"Sides ratio k → areas ratio k²."},
{n:"Area of a triangle", f:"\\Delta=\\tfrac12 bh=\\sqrt{s(s-a)(s-b)(s-c)}=\\tfrac12 ab\\sin C", x:""},
{n:"Equilateral triangle", f:"\\Delta=\\frac{\\sqrt3}{4}a^2,\\qquad h=\\frac{\\sqrt3}{2}a", x:"Also R = 2r, with r = a/(2√3)."},
{n:"Inradius and circumradius", f:"r=\\frac{\\Delta}{s},\\qquad R=\\frac{abc}{4\\Delta}", x:""},
{n:"Apollonius theorem", f:"AB^2+AC^2=2(AD^2+BD^2)", x:"AD is the median to BC."},
{n:"Circle angle facts", f:"\\angle\\text{ in semicircle}=90^\\circ", x:"Angles in same segment equal · centre angle = 2 × circumference angle · tangent ⊥ radius."},
{n:"Power of a point", f:"PT^2=PA\\times PB", x:"Tangent-secant from external point P."},

{n:"Distance and section", f:"d=\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2},\\;\\; P=\\left(\\tfrac{mx_2+nx_1}{m+n},\\tfrac{my_2+ny_1}{m+n}\\right)", x:""},

let known = {};
try { known = JSON.parse(localStorage.getItem('rtiim_formula_constellation_v1')) || {}; } catch(e) { known = {}; }
function saveKnown(){ try { localStorage.setItem('rtiim_formula_constellation_v1', JSON.stringify(known)); } catch(e) {} }
function keyOf(ti, si){ return ti + ':' + si; }
function totalStars(){ return TOPICS.reduce((s,t)=>s+t.stars.length,0); }
function knownCount(ti){ return TOPICS[ti].stars.reduce((s,_,si)=>s+(known[keyOf(ti,si)]?1:0),0); }
function knownTotal(){ return Object.values(known).filter(Boolean).length; }

function mulberry(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function constellationSVG(ti){
  const rnd = mulberry(ti*97+13);
  const n = 5 + Math.floor(rnd()*3);
  const pts = [];
  for(let i=0;i<n;i++){ pts.push([18+rnd()*244, 14+rnd()*82]); }
  pts.sort((a,b)=>a[0]-b[0]);
  let lines='', stars='';
  for(let i=0;i<n-1;i++){
    lines += '<line x1="'+pts[i][0].toFixed(1)+'" y1="'+pts[i][1].toFixed(1)+'" x2="'+pts[i+1][0].toFixed(1)+'" y2="'+pts[i+1][1].toFixed(1)+'" stroke="rgba(232,195,106,0.35)" stroke-width="1"/>';
  }
  for(let i=0;i<n;i++){
    const r = 1.6 + rnd()*2.2;
    const dur = (2+rnd()*3).toFixed(1);
    stars += '<circle cx="'+pts[i][0].toFixed(1)+'" cy="'+pts[i][1].toFixed(1)+'" r="'+r.toFixed(1)+'" fill="#EEF2FF"><animate attributeName="opacity" values="1;0.35;1" dur="'+dur+'s" repeatCount="indefinite"/></circle>';
  }
  return '<svg viewBox="0 0 280 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'+lines+stars+'</svg>';
}

const grid = document.getElementById('grid');
function renderGrid(){
  grid.innerHTML = '';
  TOPICS.forEach((t,ti)=>{
    const kc = knownCount(ti);
    const card = document.createElement('div');
    card.className = 'ccard';
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.innerHTML = constellationSVG(ti) +
      '<div class="cname">'+t.name+'</div>' +
      '<div class="ctopic">'+t.topic+'</div>' +
      '<div class="cmeta"><span>'+t.stars.length+' formulae</span><span>'+kc+' charted</span></div>' +
      '<div class="cbar"><i style="width:'+(kc/t.stars.length*100).toFixed(0)+'%"></i></div>';
    card.addEventListener('click', ()=>openSheet(ti));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openSheet(ti);} });
    grid.appendChild(card);
  });
  document.getElementById('progressline').innerHTML = 'Sky charted: <b>'+knownTotal()+'</b> / '+totalStars()+' formulae';
}

const overlay = document.getElementById('overlay');
const sheetbody = document.getElementById('sheetbody');
let currentTopic = null;

function openSheet(ti){
  currentTopic = ti;
  const t = TOPICS[ti];
  document.getElementById('shname').textContent = t.name;
  document.getElementById('shtopic').textContent = t.topic;
  refreshSheetCount();
  sheetbody.innerHTML = '';
  t.stars.forEach((st,si)=>{
    const row = document.createElement('div');
    row.className = 'frow';
    const isOn = known[keyOf(ti,si)] ? ' on' : '';
    row.innerHTML =
      '<div class="fhead">' +
        '<button class="fstar'+isOn+'" aria-label="Mark as charted">★</button>' +
        '<div class="fname">'+st.n+'</div>' +
        '<div class="fchev">▶</div>' +
      '</div>' +
      '<div class="fbody"><div class="ftex"></div>' + (st.x ? '<div class="fnote">'+st.x+'</div>' : '') + '</div>';
    const texEl = row.querySelector('.ftex');
    try { katex.render(st.f, texEl, {throwOnError:false, displayMode:true}); }
    catch(e){ texEl.textContent = st.f; }
    row.querySelector('.fhead').addEventListener('click', e=>{
      if(e.target.classList.contains('fstar')) return;
      row.classList.toggle('open');
    });
    row.querySelector('.fstar').addEventListener('click', e=>{
      e.stopPropagation();
      const k = keyOf(ti,si);
      known[k] = !known[k];
      e.target.classList.toggle('on', !!known[k]);
      saveKnown();
      refreshSheetCount();
      renderGrid();
    });
    sheetbody.appendChild(row);
  });
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function refreshSheetCount(){
  const t = TOPICS[currentTopic];
  document.getElementById('shcount').textContent = knownCount(currentTopic)+' of '+t.stars.length+' charted';
}
function closeSheet(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('closebtn').addEventListener('click', closeSheet);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeSheet(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');
searchEl.addEventListener('input', ()=>{
  const q = searchEl.value.trim().toLowerCase();
  if(!q){ resultsEl.style.display='none'; grid.style.display='grid'; return; }
  const hits = [];
  TOPICS.forEach((t,ti)=>t.stars.forEach((st,si)=>{
    if(st.n.toLowerCase().includes(q) || t.topic.toLowerCase().includes(q) || (st.x||'').toLowerCase().includes(q)) hits.push([ti,si]);
  }));
  grid.style.display='none';
  resultsEl.style.display='block';
  resultsEl.innerHTML = hits.length ? '' : '<div class="rrow"><div class="rname">No stars found for “'+searchEl.value+'”</div><div class="rfrom">Try a topic word like “interest”, “roots”, or “circle”.</div></div>';
  hits.slice(0,30).forEach(([ti,si])=>{
    const row = document.createElement('div');
    row.className = 'rrow';
    row.innerHTML = '<div class="rname">'+TOPICS[ti].stars[si].n+'</div><div class="rfrom">'+TOPICS[ti].name+' · '+TOPICS[ti].topic+'</div>';
    row.addEventListener('click', ()=>{
      openSheet(ti);
      setTimeout(()=>{
        const rows = sheetbody.querySelectorAll('.frow');
        if(rows[si]){ rows[si].classList.add('open'); rows[si].scrollIntoView({block:'center'}); }
      }, 60);
    });
    resultsEl.appendChild(row);
  });
});

const cv = document.getElementById('starfield');
const cx = cv.getContext('2d');
let bgStars = [];
function initField(){
  cv.width = innerWidth; cv.height = innerHeight;
  bgStars = [];
  const count = Math.floor(innerWidth*innerHeight/9000);
  for(let i=0;i<count;i++){
    bgStars.push({x:Math.random()*cv.width, y:Math.random()*cv.height, r:Math.random()*1.3+0.3, p:Math.random()*Math.PI*2, s:0.3+Math.random()*0.8});
  }
}
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function tick(t){
  cx.clearRect(0,0,cv.width,cv.height);
  bgStars.forEach(s=>{
    const a = reduceMotion ? 0.6 : 0.35 + 0.45*Math.abs(Math.sin(t/1600*s + s.p));
    cx.globalAlpha = a;
    cx.fillStyle = '#EEF2FF';
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 7); cx.fill();
  });
  cx.globalAlpha = 1;
  if(!reduceMotion) requestAnimationFrame(tick);
}
addEventListener('resize', initField);
initField();
requestAnimationFrame(tick);

renderGrid();

if ('serviceWorker' in navigator) {
  addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
let deferredPrompt = null;
const installBtn = document.getElementById('installbtn');
addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});
installBtn.addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
});
addEventListener('appinstalled', ()=>{ installBtn.style.display = 'none'; });
</script>
