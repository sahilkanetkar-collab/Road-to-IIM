<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM - Test 18</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;--purple:#9b59b6;--panel:280px;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;border:1px solid #2a4060;border-radius:6px;padding:10px 12px;color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);color:var(--navy);font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;}
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);background:#0a2a1a;padding:6px 16px;border-radius:20px;border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}
#mainLayout{display:flex;min-height:calc(100vh - 54px);}
#questionArea{flex:1;padding:28px 32px 80px 32px;max-width:calc(100% - var(--panel));}
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.85rem;margin-bottom:8px;}
#questionStem{font-size:1.05rem;line-height:1.7;color:var(--white);margin-bottom:22px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--white);transition:all .2s;width:100%;display:flex;align-items:flex-start;gap:8px;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1e2e10;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;min-width:24px;font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-text{flex:1;}
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
#navBar{position:fixed;bottom:0;left:0;right:var(--panel);background:var(--navy2);border-top:1px solid #1e3a5a;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:150;gap:4px;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);padding:10px 14px;font-size:.83rem;line-height:1.6;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #questionArea{max-width:100%;padding:16px 16px 80px 16px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{right:0;padding:8px 6px;}
  .nav-btn{padding:7px 4px;font-size:.72rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;}
}
@media (max-width:768px){#paletteOverlay.mobile-open{display:flex;}}
</style>
</head>
<body>

<div id="loginScreen">
<div class="login-box">
  <h1>Road to IIM</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx5Ojm_zp4LfsMeelx5e06KNjVH1wfsXdV0keS4407m4FO1HU4EpVb7GKj-ibAsxnspeA/exec";
const TIMER_DURATION=30;
const ADMIN_PINS=['IMS1111111111','IMS2222222222','IMS3333333333','IMS4444444444','IMS5555555555'];

const QUESTIONS = [
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"The committee neither reviewed the proposal <u>or</u> discussed its implications.\"",opts:["The committee neither reviewed the proposal nor discussed its implications.","The committee either reviewed the proposal or discussed its implications.","The committee neither reviewed the proposal nor had discussed its implications.","The committee neither reviewed nor the proposal discussed its implications."],ans:0,exp:"Correct Answer: A. The committee neither reviewed the proposal nor discussed its implications.. The error is a broken correlative pair: 'neither...or' is incorrect — the correct pair is 'neither...nor'. Option A fixes this cleanly. Option B changes the meaning entirely (neither→either). Option C fixes 'or→nor' but introduces a tense inconsistency (reviewed vs had discussed). Option D breaks parallelism by disrupting the verb phrase structure."},
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"She is interested in <u>to learn</u> classical music, painting landscapes, and reading poetry.\"",opts:["She is interested in to learn classical music, to paint landscapes, and to read poetry.","She is interested to learn classical music, painting landscapes, and reading poetry.","She is interested in learning classical music, to paint landscapes, and reading poetry.","She is interested in learning classical music, painting landscapes, and reading poetry."],ans:3,exp:"Correct Answer: D. She is interested in learning classical music, painting landscapes, and reading poetry.. 'Interested in' must be followed by a gerund, not an infinitive — prepositions govern gerunds. The error is 'to learn' after 'in'. Option D fixes this and preserves the parallel gerund series (learning/painting/reading). Option A uses infinitives after a preposition — wrong. Option C creates a mixed series (gerund/infinitive/gerund) — breaks parallelism. Option B removes 'in' entirely — 'interested to' is a different construction that does not fix the parallel series."},
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"The director, along with his producers, <u>were</u> present at the premiere.\"",opts:["The director and his producers were present at the premiere.","The director, along with his producers, are present at the premiere.","The director, along with his producers, was present at the premiere.","The director, with his producers, were present at the premiere."],ans:2,exp:"Correct Answer: C. The director, along with his producers, was present at the premiere.. 'Along with' is a parenthetical phrase, not a conjunction. The grammatical subject remains 'the director' (singular) — requiring 'was'. Option C fixes this correctly. Option A is grammatically correct but changes the sentence structure by converting a parenthetical into a compound subject — a structural rewrite, not a correction. Option B substitutes 'are' for 'were' — still wrong number. Option D retains 'were' — error persists."},
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"<u>Running</u> the experiment three times, the results were still inconclusive.\"",opts:["Running the experiment three times, the results were still found inconclusive.","After running the experiment three times, the results were still inconclusive.","The experiment was run three times, and the results were still inconclusive.","Having run the experiment three times, the researchers found the results still inconclusive."],ans:3,exp:"Correct Answer: D. Having run the experiment three times, the researchers found the results still inconclusive.. The error is a dangling modifier. 'Running the experiment' must attach to a subject that can perform the action — 'results' cannot run experiments. Option D supplies 'the researchers' as the logical subject and fixes the dangler. Option A retains 'results' as subject — dangling modifier persists. Option B uses 'After running...' — 'results' still cannot run; dangler remains. Option C restructures into two independent clauses — grammatically valid but is a complete rewrite, not a correction of the original construction."},
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"The data <u>suggests</u> that the phenomenon is more widespread than previously assumed.\"",opts:["The data is suggesting that the phenomenon is more widespread than previously assumed.","The data suggest that the phenomenon is more widespread than previously assumed.","The data suggested that the phenomenon is more widespread than previously assumed.","The data suggests that the phenomena are more widespread than previously assumed."],ans:1,exp:"Correct Answer: B. The data suggest that the phenomenon is more widespread than previously assumed.. 'Data' is the Latin plural of 'datum' and in formal academic English takes a plural verb: 'suggest'. Option B fixes this cleanly. Option A uses progressive tense with a reporting verb — unacceptable in formal written English. Option C changes to past tense ('suggested') but creates a tense inconsistency with 'is' in the subordinate clause. Option D retains 'suggests' (the original error) and unjustifiably changes 'phenomenon' to 'phenomena'."},
  {section:"Grammar",stem:"<b>Ripple Effect:</b> The sentence below contains one error. Four corrections are offered. Choose the option that fixes the error <i>without</i> introducing a new one.<br><br>\"Not only did she win <u>but</u> she broke the record.\"",opts:["Not only did she win but also she broke the record.","Not only she won but she also broke the record.","Not only did she win, but she also broke the record.","Not only did she win but she also had broken the record."],ans:2,exp:"Correct Answer: C. Not only did she win, but she also broke the record.. The correlative 'not only...but also' requires 'also' after 'but'. Additionally, a comma before 'but' is standard in formal written English when joining two clauses. Option C supplies both the comma and 'also' — correct. Option A adds 'also' but places it before 'she' rather than after 'but' — standard formal position is 'but...also + verb'. Option B loses the required inversion after 'not only'. Option D introduces 'had broken' — an unjustified tense shift."},
  {section:"Grammar",stem:"<b>Odd Pair Out:</b> Three of the following pairs contain two grammatically correct sentences. One pair contains a grammatically incorrect sentence. Identify the pair with the error.<br><br><b>A.</b> (i) She looked at me as if she were upset. &nbsp;&nbsp; (ii) She looked at me as though she were upset.<br><b>B.</b> (i) He spoke to the press; she remained silent. &nbsp;&nbsp; (ii) He spoke to the press, and she remained silent.<br><b>C.</b> (i) The data are inconclusive. &nbsp;&nbsp; (ii) The criteria has not been met.<br><b>D.</b> (i) The team has won its third consecutive match. &nbsp;&nbsp; (ii) The team have won their third consecutive match.",opts:["Pair A","Pair B","Pair D","Pair C"],ans:3,exp:"Correct Answer: D. Pair C. Pair A: Both correct — 'as if' and 'as though' are fully interchangeable in formal written English; both correctly use the subjunctive 'were' for a counterfactual/uncertain comparison. Pair B: Both correct — semicolon and comma+conjunction are both valid ways to join independent clauses. Pair C: 'The data are' is correct (data = Latin plural). 'The criteria has' is wrong — 'criteria' is plural; it requires 'have'. This is the error pair. Pair D: Both correct — 'the team has...its' treats the collective noun as a singular unit (standard in formal written English); 'the team have...their' treats it as a group of individuals (accepted in British formal English). Both are defensible."},
  {section:"Grammar",stem:"<b>Odd Pair Out:</b> Three of the following pairs contain two grammatically correct sentences. One pair contains a grammatically incorrect sentence. Identify the pair with the error.<br><br><b>A.</b> (i) He is an MBA graduate. &nbsp;&nbsp; (ii) She holds a BA degree.<br><b>B.</b> (i) The committee reached its decision. &nbsp;&nbsp; (ii) The committee reached their decision.<br><b>C.</b> (i) Neither the manager nor the employees was informed. &nbsp;&nbsp; (ii) Neither the employees nor the manager was informed.<br><b>D.</b> (i) She runs faster than he does. &nbsp;&nbsp; (ii) She runs faster than he.",opts:["Pair A","Pair B","Pair C","Pair D"],ans:2,exp:"Correct Answer: C. Pair C. Pair A: 'an MBA' — correct ('MBA' is pronounced 'em-bee-ay', vowel sound). 'a BA' — correct ('BA' is 'bee-ay', consonant sound). Pair B: Collective noun 'committee' — 'its' (singular unit) and 'their' (group of individuals) are both acceptable. Pair C: With 'neither...nor', verb agrees with the nearer subject (proximity rule). In (i), nearer subject is 'employees' (plural) → verb should be 'were', not 'was'. ERROR. In (ii), nearer subject is 'manager' (singular) → 'was' is correct. Pair D: Both correct — full clause ('than he does') and elliptical clause ('than he') are both formally acceptable."},
  {section:"Grammar",stem:"<b>Odd Pair Out:</b> Three of the following pairs contain two grammatically correct sentences. One pair contains a grammatically incorrect sentence. Identify the pair with the error.<br><br><b>A.</b> (i) The boy whose bag was stolen reported it to the principal. &nbsp;&nbsp; (ii) The boy who's bag was stolen reported it to the principal.<br><b>B.</b> (i) He said he would return by noon. &nbsp;&nbsp; (ii) He said he will return by noon.<br><b>C.</b> (i) The phenomenon was poorly understood. &nbsp;&nbsp; (ii) The phenomena were poorly understood.<br><b>D.</b> (i) She neither called nor wrote. &nbsp;&nbsp; (ii) She neither wrote nor called.",opts:["Pair A","Pair B","Pair C","Pair D"],ans:0,exp:"Correct Answer: A. Pair A. 'Whose' is the possessive relative pronoun — correct in sentence (i) of Pair A. 'Who's' is a contraction of 'who is' — used here where possession ('whose') is structurally required in sentence (ii) of Pair A. This is a definitive structural error. Pair B: Both correct — 'would' (backshifted reported speech) and 'will' (retained tense when statement still holds) are both acceptable. Pair C: Both correct — singular 'phenomenon/was' and plural 'phenomena/were'. Pair D: Both correct — order within 'neither...nor' is flexible when meaning is unambiguous."},
  {section:"Grammar",stem:"<b>Odd Pair Out:</b> Three of the following pairs contain two grammatically correct sentences. One pair contains a grammatically incorrect sentence. Identify the pair with the error.<br><br><b>A.</b> (i) I like coffee; she prefers tea. &nbsp;&nbsp; (ii) I like coffee, she prefers tea.<br><b>B.</b> (i) Each of the students has submitted his or her assignment. &nbsp;&nbsp; (ii) Every student has submitted his or her assignment.<br><b>C.</b> (i) He is one of those managers who micromanage their teams. &nbsp;&nbsp; (ii) He is a manager who always micromanages his team.<br><b>D.</b> (i) The results were better than expected. &nbsp;&nbsp; (ii) The results were better than what was expected.",opts:["Pair A","Pair B","Pair C","Pair D"],ans:0,exp:"Correct Answer: A. Pair A. Pair A contains a definitive error: sentence (ii) is a classic comma splice where two independent clauses are joined strictly with a comma and no coordinating conjunction. Pair B is fully correct using singular distributors with proper matching pronouns. Pair C sentences are both completely correct (isolating Pair A as the only error). Pair D features standard full and elliptical comparison mechanisms acceptable in formal prose."},
  {section:"Grammar",stem:"<b>Odd Pair Out:</b> Three of the following pairs contain two grammatically correct sentences. One pair contains a grammatically incorrect sentence. Identify the pair with the error.<br><br><b>A.</b> (i) He is a unique talent. &nbsp;&nbsp; (ii) She is a fairly unique designer.<br><b>B.</b> (i) The CEO, as well as the board members, was present. &nbsp;&nbsp; (ii) The CEO and the board members were present.<br><b>C.</b> (i) If I were you, I would reconsider. &nbsp;&nbsp; (ii) If she were here, she would understand.<br><b>D.</b> (i) The book that I borrowed was overdue. &nbsp;&nbsp; (ii) The book which I borrowed was overdue.",opts:["Pair B","Pair C","Pair D","Pair A"],ans:3,exp:"Correct Answer: D. Pair A. 'Unique' means one of a kind — it is an absolute adjective and cannot be qualified by degree adverbs. 'A unique talent' (i) is correct. 'A fairly unique designer' (ii) is wrong — 'fairly unique' is a contradiction; uniqueness admits no degrees. This is the error — Pair A, which is option D. Pair B: Both correct — 'as well as' is parenthetical → singular 'was'; 'and' creates compound subject → plural 'were'. Pair C: Both correct — subjunctive 'were' applies to all persons in hypothetical conditions. Pair D: Both correct — 'that' and 'which' are both used for restrictive clauses in formal written English."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) The alumni has donated generously to the fund.<br>(ii) The alumni have donated generously to the fund.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (i) correct","Only (ii) correct","Both incorrect"],ans:2,exp:"Correct Answer: C. Only (ii) correct. 'Alumni' is the Latin plural of 'alumnus'. In formal written English, 'alumni' is always plural and takes a plural verb ('have'). 'The alumni has' treats a plural noun as singular — incorrect. 'The alumni have' is the only correct form. For a single graduate, 'alumnus' (male) or 'alumna' (female) is used."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) She is the most capable of the two candidates.<br>(ii) She is the more capable of the two candidates.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (i) correct","Only (ii) correct","Both incorrect"],ans:2,exp:"Correct Answer: C. Only (ii) correct. When comparing exactly two items, the comparative degree ('more') is required, not the superlative ('most'). Superlatives are reserved for comparisons of three or more. 'The most capable of the two' is a formal error. 'The more capable of the two' is correct. This rule is strictly enforced in academic written English."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) The professor insisted that the student resubmit the paper.<br>(ii) The professor insisted that the student resubmits the paper.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (i) correct","Only (ii) correct","Both incorrect"],ans:1,exp:"Correct Answer: B. Only (i) correct. 'Insist that' triggers the mandative subjunctive. The subjunctive requires the base form of the verb regardless of person or number — 'resubmit' (not 'resubmits'). Option (ii) adds a third-person singular '-s', which is indicative mood — incorrect after mandative verbs. Other mandative triggers: recommend, demand, suggest, require, propose."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) He is a historian who specialises in medieval Europe.<br>(ii) He is an historian who specialises in medieval Europe.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (i) correct","Only (ii) correct","Both incorrect"],ans:0,exp:"Correct Answer: A. Both correct. Both are formally acceptable. In standard modern English, 'historian' begins with a pronounced /h/ — making 'a historian' the default. However, 'an historian' reflects an older British tradition where the 'h' was less aspirated — this usage persists in formal British written English and is not an error. Students who mark only one correct are overconfident; the answer is 'Both correct'."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) The government announced new measures; however, many experts remained sceptical.<br>(ii) The government announced new measures, however, many experts remained sceptical.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (ii) correct","Both incorrect","Only (i) correct"],ans:3,exp:"Correct Answer: D. Only (i) correct. 'However' as a conjunctive adverb joining two independent clauses requires a semicolon before it. A comma before 'however' creates a comma splice — a serious punctuation error in formal written English. Sentence (i) uses the semicolon correctly. Sentence (ii) uses a comma before 'however' — comma splice. The comma after 'however' in both sentences is correct."},
  {section:"Grammar",stem:"<b>Minimal Pair Judgment:</b> Two sentences differ by one element only. Judge which is/are grammatically correct in formal written English.<br><br>(i) Neither the report nor the annexures were submitted on time.<br>(ii) Neither the annexures nor the report were submitted on time.<br><br><b>A.</b> Both correct &nbsp; <b>B.</b> Only (i) correct &nbsp; <b>C.</b> Only (ii) correct &nbsp; <b>D.</b> Both incorrect",opts:["Both correct","Only (i) correct","Only (ii) correct","Both incorrect"],ans:1,exp:"Correct Answer: B. Only (i) correct. With 'neither...nor', the verb agrees with the nearer subject (proximity rule). In (i), nearer subject is 'annexures' (plural) → 'were' is correct. In (ii), nearer subject is 'report' (singular) → verb should be 'was', not 'were'. Sentence (ii) violates proximity agreement. Only (i) is correct."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> The blank sits at a grammatical junction. The word or phrase you choose determines the structure of the entire sentence. Choose the option that makes the sentence grammatically correct in formal written English.<br><br>\"The findings were significant _______ they could not be replicated in subsequent trials.\"",opts:["; however,",", and","because","; therefore,"],ans:0,exp:"Correct Answer: A. ; however,. The two clauses express contrast — significant findings that could not be replicated. Option A ('; however,') correctly signals contrast between two independent clauses — semicolon joins them, 'however' marks the adversative relationship, and the comma after 'however' is required. Option B (',and') signals addition, not contrast — semantically wrong. Option C ('because') makes the second clause a cause, inverting the logic entirely. Option D ('; therefore,') signals consequence — wrong direction."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> Choose the option that correctly fills the blank and maintains grammatical accuracy throughout.<br><br>\"She wanted three things from the negotiation _______ a higher salary, additional leave, and a flexible schedule.\"",opts:[", that is",":","; which were",", these being"],ans:1,exp:"Correct Answer: B. :. A colon is the standard punctuation for introducing a list after a complete independent clause. 'She wanted three things from the negotiation' is complete — the colon alone does all the introducing work; no further connector is needed. Option A (', that is') — 'that is' after a complete clause requires a semicolon or colon, not a comma; additionally, 'that is' typically clarifies a preceding term rather than introducing a list of items. Option C ('; which were') — semicolons precede independent clauses; 'which were...' is a relative clause, not an independent clause. Option D (', these being') creates a non-standard participial construction."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> Choose the option that correctly fills the blank and maintains grammatical accuracy throughout.<br><br>\"The proposal was rejected _______ it was poorly structured and lacked supporting evidence.\"",opts:["; since",", given that","because","for"],ans:2,exp:"Correct Answer: C. because. 'Because' is the most precise causal subordinating conjunction and is correct here. Option A ('; since') — a semicolon before a subordinating conjunction is incorrect; subordinating conjunctions introduce dependent clauses and do not require a semicolon. Option B (',given that') — 'given that' as a mid-sentence causal connective after the main clause is stylistically awkward in formal writing and the comma placement is non-standard. Option D ('for') as a coordinating causal conjunction requires a comma before it ('rejected, for') — the option provides none."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> Choose the option that correctly fills the blank and maintains grammatical accuracy throughout.<br><br>\"The new policy affects all employees _______ those on probation.\"",opts:["; including",": including","— it includes",", including"],ans:3,exp:"Correct Answer: D. , including. 'Including' adds a specification to 'all employees' — it is not introducing an independent clause. A comma before 'including' is the standard punctuation for mid-sentence specification. Option A ('; including') — semicolons join independent clauses; 'including those on probation' is not one. Option B (': including') — colons are too heavy for a simple specification; they introduce formal lists or explanations after complete clauses. Option C ('— it includes') restructures the sentence into a second independent clause — a rewrite, not a completion."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> Choose the option that correctly fills the blank and maintains grammatical accuracy throughout.<br><br>\"The manager asked _______ the quarterly targets had been met.\"",opts:["that","whether","if whether","as to whether"],ans:1,exp:"Correct Answer: B. whether. In formal written English, indirect yes/no questions use 'whether' when the embedded question is the object of a verb like 'asked'. 'Whether' is unambiguous; 'if' can be confused with a conditional. Option A ('that') — 'asked that' triggers the mandative subjunctive; 'asked that the targets had been met' is semantically incoherent. Option C ('if whether') — redundant; never use both. Option D ('as to whether') — grammatically possible but 'as to' is redundant; 'asked whether' is the cleaner formal form."},
  {section:"Grammar",stem:"<b>Loaded Blank:</b> Choose the option that correctly fills the blank and maintains grammatical accuracy throughout.<br><br>\"He is the kind of leader _______ inspires through action rather than words.\"",opts:["which","whom","who","whose"],ans:2,exp:"Correct Answer: C. who. The antecedent is 'leader' — a person. For persons, 'who' (subject) or 'whom' (object) is used, never 'which'. The relative pronoun is the subject of 'inspires' — subject position requires 'who'. Option A ('which') — non-human antecedents only. Option B ('whom') — object form; the pronoun here is the subject of 'inspires', so 'whom' is incorrect. Option D ('whose') — 'whose' is the possessive relative pronoun; the blank requires a subject pronoun (the pronoun is the subject of 'inspires'), not a possessive. 'Whose' would be correct only if the sentence read 'the kind of leader whose actions inspire', not here."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"burn one's bridges\"</b> is used correctly below:<br><i>\"By publicly criticising his former employer, he had burned his bridges and made a return to that company impossible.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["After resigning without notice and filing a complaint, she had burned her bridges with the firm beyond any hope of reconciliation.","The fire burned the bridges connecting the two villages, cutting off all communication.","He burned his bridges carefully so that he could still return if the new venture failed.","They burned bridges with investors by delivering late, but managed to recover their reputation over time."],ans:0,exp:"Correct Answer: A. After resigning without notice and filing a complaint, she had burned her bridges with the firm beyond any hope of reconciliation.. 'Burn one's bridges' means to permanently destroy a relationship or option, leaving no possibility of return. Option A uses it correctly — resigning badly and filing a complaint irreversibly ends the professional relationship. Option B is literal (actual fire, actual bridges) — not idiomatic. Option C contradicts the idiom — 'burned bridges carefully so one can return' is an oxymoron; the idiom implies irreversibility. Option D: 'burned bridges...but managed to recover' contradicts the irreversibility the idiom requires."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"pass muster\"</b> is used correctly below:<br><i>\"The revised report barely passed muster with the editorial board, who noted several remaining weaknesses.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["She passed the muster of examinations with distinction, earning the top rank in her cohort.","The new software passed muster quickly; within days, the team had moved on to the next module.","His presentation passed muster with the senior partners, who approved it for the client pitch.","The recruits were asked to pass muster at the parade ground before being assigned to units."],ans:2,exp:"Correct Answer: C. His presentation passed muster with the senior partners, who approved it for the client pitch.. 'Pass muster' means to meet a required standard or gain approval after scrutiny. Option C correctly uses it — a presentation meeting the approval threshold of senior partners. Option A distorts the idiom by adding 'the' and embedding it in an exam context — 'passed the muster of examinations' is not idiomatic. Option B: 'passed muster quickly' implies speed rather than the evaluation-against-a-standard the idiom requires. Option D confuses the idiomatic use with the military-literal origin ('muster at the parade ground' = gathering of troops, not meeting standards)."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"read between the lines\"</b> is used correctly below:<br><i>\"His resignation letter was polite, but reading between the lines, it was clear he had been pushed out.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["Reading between the lines of the novel, the student appreciated the author's poetic style.","She read between the lines of his contract and realised the bonus clause had been quietly removed.","He read between the lines carefully, making sure not to miss any of the printed terms.","They read between the lines of the agreement and found a clause that had been overlooked by everyone."],ans:1,exp:"Correct Answer: B. She read between the lines of his contract and realised the bonus clause had been quietly removed.. 'Read between the lines' means to perceive an unstated or implicit meaning beyond what is explicitly written. Option B correctly uses it — she infers an unstated change (silent removal of a bonus clause) by reading critically beyond the surface. Option A misapplies it — 'appreciating poetic style' is a literary-analytical act, not inference of hidden meaning. Option C is literal — 'not missing printed terms' is the opposite of looking beyond the literal. Option D describes finding a clause that was literally there but unnoticed — the idiom implies inferring the unstated, not discovering an overlooked stated clause."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"steal a march\"</b> is used correctly below:<br><i>\"By filing the patent application a week early, the startup stole a march on its competitors.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["He tried to steal a march by walking faster than the others during the parade.","She stole a march from her colleague's presentation and used it in her own pitch without credit.","The army stole a march across enemy territory under cover of night.","The retailer stole a march on rivals by launching its loyalty programme three months before the festival season."],ans:3,exp:"Correct Answer: D. The retailer stole a march on rivals by launching its loyalty programme three months before the festival season.. 'Steal a march' means to gain an advantage over a competitor by acting before they do. Option D correctly uses it — launching earlier than rivals for a strategic advantage. Option A is literal ('walking faster in a march/parade') — not idiomatic. Option B confuses 'steal a march' with 'steal from' — the idiom does not mean plagiarism. Option C is the historical-literal origin of the expression — armies literally marched secretly ahead — but the modern idiomatic meaning (gaining strategic advantage) is what is being tested."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"on the fence\"</b> is used correctly below:<br><i>\"After weeks of deliberation, the board remained on the fence about whether to approve the merger.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["The senator was on the fence about the bill, reluctant to commit to either side before the vote.","The child sat on the fence watching the game, unable to join either team.","The two parties were on the fence about the terms — each had already committed to its position.","He got off the fence only when his manager pressured him into taking a side."],ans:0,exp:"Correct Answer: A. The senator was on the fence about the bill, reluctant to commit to either side before the vote.. 'On the fence' means unwilling to commit to a decision or take a side. Option A correctly uses it — a senator withholding commitment before a vote. Option B is literal (a child physically on a fence) — not idiomatic. Option C contradicts the idiom — 'each had already committed to its position' is the opposite of being undecided. Option D: 'got off the fence' is the negation of the idiom (deciding after being undecided) — the question tests 'on the fence' specifically."},
  {section:"Grammar",stem:"<b>Idiom Transplant:</b> The idiom <b>\"throw caution to the wind\"</b> is used correctly below:<br><i>\"Throwing caution to the wind, she quit her stable job to launch her own business.\"</i><br><br>Which of the following uses the same idiom correctly?",opts:["She threw caution to the wind, carefully weighing each risk before making her decision.","Throwing caution to the wind, the team followed all prescribed safety protocols without exception.","He threw caution to the wind and invested his entire savings in a single, untested venture.","He threw caution to the wind by conducting a thorough feasibility study before committing funds."],ans:2,exp:"Correct Answer: C. He threw caution to the wind and invested his entire savings in a single, untested venture.. 'Throw caution to the wind' means to act boldly, ignoring risks or prudence. Option C correctly uses it — investing all savings in an untested venture is a reckless, bold act consistent with the idiom. Option A contradicts it — 'carefully weighing each risk' is the opposite of throwing caution away. Option B contradicts it — 'following all prescribed safety protocols' is cautious behaviour. Option D contradicts it — 'conducting a thorough feasibility study' is a careful, measured act."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"The committee comprises of five members, each with a distinct area of expertise.\"",opts:["The committee is comprised of five members, each with a distinct area of expertise.","The committee comprises five members, each with a distinct area of expertise.","The committee comprises of five members, all having distinct areas of expertise.","The committee is comprising five members, each with a distinct area of expertise."],ans:1,exp:"Correct Answer: B. The committee comprises five members, each with a distinct area of expertise.. 'Comprise' means 'to consist of' — it is a transitive verb that takes a direct object without a preposition. 'Comprises of' is non-standard; the 'of' is redundant. Correct: 'the committee comprises five members'. Option A ('is comprised of') is widely used but in strict formal English reverses the logic — 'comprised of' implies the parts comprise the whole. For IPMAT formal standards, B is the only correct option. Options C and D retain the erroneous 'of'."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"Between you and I, the decision was entirely politically motivated.\"",opts:["Between you and me, the decision was entirely politically motivated.","Between you and I, it was a decision entirely politically motivated.","Between you and myself, the decision was entirely politically motivated.","As between you and I, the decision was entirely politically motivated."],ans:0,exp:"Correct Answer: A. Between you and me, the decision was entirely politically motivated.. 'Between' is a preposition and requires object pronouns. 'Between you and I' is a hypercorrection — prepositions govern the objective case: 'me', not 'I'. The correct form is 'between you and me'. Option C ('between you and myself') — reflexive pronouns cannot serve as objects of prepositions unless reflexive or emphatic; this is an informal avoidance construction. Options B and D retain the original error."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"The number of applications have increased significantly this year.\"",opts:["A number of applications has increased significantly this year.","The numbers of applications have increased significantly this year.","The number of applications has increased significantly this year.","The number of applications are increasing significantly this year."],ans:2,exp:"Correct Answer: C. The number of applications has increased significantly this year.. 'The number of' is a fixed phrase where 'number' is the singular subject — it takes a singular verb ('has'). Students instinctively agree with the nearest noun 'applications' (plural) and choose 'have' — proximity error. Contrast: 'A number of applications have...' — 'a number of' means 'several/many' and the verb agrees with 'applications' (plural). Option A reverses this — 'a number of' with 'has' is wrong. Option B ('the numbers') changes the meaning. Option D uses present progressive — inappropriate for a completed trend."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"He is one of the few executives who understands the technical side of the business.\"",opts:["He is one of the few executives that understands the technical side of the business.","He is one of the few executives who is understanding the technical side of the business.","He is one of the few executives, who understands the technical side of the business.","He is one of the few executives who understand the technical side of the business."],ans:3,exp:"Correct Answer: D. He is one of the few executives who understand the technical side of the business.. In 'one of the few executives who...', the antecedent of 'who' is 'executives' (plural), not 'one' (singular). The verb must be plural: 'understand'. 'Understands' agrees with 'one' — sounds natural but is formally wrong (Prestige Error). Option B ('is understanding') — progressive tense is unacceptable here; 'understand' is used as a stative verb and cannot take the progressive aspect. Option A retains 'understands' and substitutes 'that' for 'who' — both errors. Option C adds a comma making the clause non-restrictive — wrong."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"Each of the board members have submitted their individual reports.\"",opts:["Each of the board members has submitted his or her individual report.","Each of the board members have submitted their individual reports.","Each of the board members has submitted their individual reports.","Each of the board members have submitted his or her individual report."],ans:0,exp:"Correct Answer: A. Each of the board members has submitted his or her individual report.. 'Each' is a singular indefinite pronoun — it takes a singular verb ('has') and, in formal written English, singular pronouns ('his or her'). Two errors exist in the original: (1) 'have' instead of 'has'; (2) 'their' instead of 'his or her'. Option A corrects both. Option B retains both errors. Option C fixes the verb but retains 'their' — in formal academic English, 'their' with a singular antecedent is not acceptable. Option D fixes the pronoun but retains 'have' — still wrong."},
  {section:"Grammar",stem:"<b>Prestige Question:</b> This sentence appears correct on first read. Identify the error and choose the correct version.<br><br>\"The reason for his resignation is because he disagreed with the board's direction.\"",opts:["The reason for his resignation is that he disagreed with the board's direction.","The reason for his resignation is because of his disagreement with the board's direction.","His resignation is because he disagreed with the board's direction.","The reason for his resignation is due to his disagreement with the board's direction."],ans:0,exp:"Correct Answer: A. The reason for his resignation is that he disagreed with the board's direction.. 'The reason is because' is a redundancy error — 'because' means 'for the reason that', making the construction circular. The correct form is 'the reason is that' — a noun clause introduced by 'that'. Option A fixes this cleanly. Option B replaces 'because' with 'because of' — a preposition after a linking verb ('is because of') is non-standard. Option C removes 'the reason for' — restructures rather than corrects. Option D ('due to his disagreement') — 'due to' as a causal adjective after a linking verb is technically arguable but the sentence loses the explanatory 'that' clause."},
  {section:"Grammar",stem:"<b>Error Identification:</b> One of the underlined portions contains a grammatical error. Identify it.<br><br>\"Not only <u>(A)</u> did the new policy reduce costs <u>(B)</u> but increased <u>(C)</u> employee morale <u>(D)</u> across all departments.\"",opts:["(A) did the new policy","(B) but increased","(C) employee morale","(D) across all departments"],ans:1,exp:"Correct Answer: B. (B) but increased. 'Not only...but also' requires 'also' after 'but'. The error is in (B): 'but increased' should be 'but also increased'. The correlative pair is incomplete without 'also'. No error in A (correct inversion after 'not only'), C (noun phrase), or D (prepositional phrase)."},
  {section:"Grammar",stem:"<b>Error Identification:</b> One of the underlined portions contains a grammatical error. Identify it.<br><br>\"The phenomena <u>(A)</u> observed in the first trial <u>(B)</u> was replicated <u>(C)</u> in every subsequent <u>(D)</u> experiment.\"",opts:["(A) phenomena observed","(B) in the first trial","(C) was replicated","(D) subsequent experiment"],ans:2,exp:"Correct Answer: C. (C) was replicated. 'Phenomena' is the plural of 'phenomenon' — it requires a plural verb: 'were replicated', not 'was replicated'. The error is in (C). Latin plural trap — students default to 'was' because 'phenomena' sounds abstract and singular. No error in A (correct plural noun), B (prepositional phrase), or D (adjective-noun pair)."},
  {section:"Grammar",stem:"<b>Error Identification:</b> One of the underlined portions contains a grammatical error. Identify it.<br><br>\"The panel recommended <u>(A)</u> that the candidate completes <u>(B)</u> an additional module <u>(C)</u> before the final assessment <u>(D)</u>.\"",opts:["(A) recommended that","(B) the candidate completes","(C) an additional module","(D) the final assessment"],ans:1,exp:"Correct Answer: B. (B) the candidate completes. 'Recommend that' triggers the mandative subjunctive — the verb must be in the base form: 'complete', not 'completes'. 'Completes' is indicative mood (third-person singular) — incorrect after mandative verbs. The error is in (B). No error in A (correct mandative construction), C (article + adjective + noun), or D (article + noun)."},
  {section:"Grammar",stem:"<b>Error Identification:</b> One of the underlined portions contains a grammatical error. Identify it.<br><br>\"The manager distributed the incentives <u>(A)</u> between the three <u>(B)</u> departments equally <u>(C)</u>, ensuring no team <u>(D)</u> felt overlooked.\"",opts:["(A) distributed the incentives","(B) between the three","(C) departments equally","(D) no team felt overlooked"],ans:1,exp:"Correct Answer: B. (B) between the three. 'Between' is used for exactly two parties; 'among' is used for three or more. With three departments, 'among the three' is required. The error is in (B). No error in A, C, or D."},
  {section:"Grammar",stem:"<b>Error Identification:</b> One of the underlined portions contains a grammatical error. Identify it.<br><br>\"She prefers <u>(A)</u> to work independently <u>(B)</u> rather than <u>(C)</u> working in a team <u>(D)</u>.\"",opts:["(A) prefers to work","(B) independently","(C) rather than","(D) working in a team"],ans:3,exp:"Correct Answer: D. (D) working in a team. 'Prefer to do X rather than do Y' requires parallel infinitive structure. 'Prefers to work...rather than working' breaks parallelism — first element uses a to-infinitive ('to work') while the second uses a gerund ('working'). The correct form is 'rather than work' (bare infinitive). The error is in (D)."},
  {section:"Grammar",stem:"<b>Identify the Correct Sentence:</b> Three sentences contain errors. One is grammatically correct in formal written English. Identify it.",opts:["The jury has delivered its verdict after three days of deliberation.","The jury have delivered their verdict after three days of deliberation.","The jury has delivered their verdict after three days of deliberation.","The jury have delivered its verdict after three days of deliberation."],ans:0,exp:"Correct Answer: A. The jury has delivered its verdict after three days of deliberation.. In formal written English (IPMAT standards), collective nouns like 'jury' are treated as singular units — 'the jury has...its'. Option A is internally consistent: singular verb ('has') + singular pronoun ('its'). Options C and D mix singular and plural — inconsistent. Option B is British English (both plural) — acceptable in British formal writing, but IPMAT formal written English treats collective nouns as singular."},
  {section:"Grammar",stem:"<b>Identify the Correct Sentence:</b> Three sentences contain errors. One is grammatically correct in formal written English. Identify it.",opts:["He is the most talented of the two finalists.","He is the more talented of the two finalists.","He is the most talented among the two finalists.","He is more talented than either of the two finalists."],ans:1,exp:"Correct Answer: B. He is the more talented of the two finalists.. Comparative degree ('more') is required when comparing exactly two items. Option A uses superlative 'most' with two — wrong. Option B uses 'more' with two — correct. Option C uses 'among' (three or more) with two — wrong preposition. Option D ('more talented than either of the two finalists') — he IS one of the two finalists; comparing himself to both of them as a group is structurally incoherent."},
  {section:"Grammar",stem:"<b>Identify the Correct Sentence:</b> Three sentences contain errors. One is grammatically correct in formal written English. Identify it.",opts:["Having completed the audit, the report was submitted to the board.","Completing the audit, the report was then submitted by us to the board.","Having completed the audit, we submitted the report to the board.","To complete the audit, the report was submitted to the board."],ans:2,exp:"Correct Answer: C. Having completed the audit, we submitted the report to the board.. Option A: dangling modifier — 'Having completed the audit' must attach to the subject performing the action; 'the report' cannot complete an audit. Option C correctly supplies 'we' as the logical subject who completed the audit. Option B: 'Completing the audit' still dangles — 'the report' cannot complete an audit. Option D: 'To complete the audit, the report was submitted' implies the report was submitted in order to complete the audit — illogical."},
  {section:"Grammar",stem:"<b>Identify the Correct Sentence:</b> Three sentences contain errors. One is grammatically correct in formal written English. Identify it.",opts:["The results of the experiment was published in three leading journals.","The results of the experiment were published in three leading journals.","The result of the experiments were published in three leading journals.","The results of the experiment have been publishing in three leading journals."],ans:1,exp:"Correct Answer: B. The results of the experiment were published in three leading journals.. Option B: 'The results' (plural) — 'were published' (plural passive) — correct. Option A: plural subject 'results' with singular verb 'was' — SVA error. Option C: singular 'result' with plural verb 'were' — SVA error. Option D: 'have been publishing' is active progressive — results do not publish themselves; passive ('have been published') is required, and even then the tense is inappropriate for a completed action."},
  {section:"Grammar",stem:"<b>Identify the Correct Sentence:</b> Three sentences contain errors. One is grammatically correct in formal written English. Identify it.",opts:["The board of directors have decided to postpone the annual general meeting.","The board of directors are deciding to postpone the annual general meeting.","The board of directors has decided to postpone the annual general meeting.","The board of directors were decided to postpone the annual general meeting."],ans:2,exp:"Correct Answer: C. The board of directors has decided to postpone the annual general meeting.. 'Board of directors' is a collective noun treated as singular in formal written English — takes a singular verb ('has decided'). Option A ('have') — plural, incorrect for formal collective noun treatment. Option B ('are deciding') — progressive tense for a formal institutional decision is inappropriate; also plural. Option D ('were decided') — passive construction that is semantically wrong; a board is not 'decided upon'."}
];

let studentName="",studentPin="",studentBatch="";
let currentQ=0,secondsLeft=TIMER_DURATION*60,timerInterval=null;
let userAnswers=new Array(45).fill(null);
let markedForReview=new Array(45).fill(false);
let questionTimes=new Array(45).fill(0);
let lastQ=null,qEnterTs=null;
function logQTime(){
  if(lastQ!==null&&qEnterTs!==null){questionTimes[lastQ]+=Math.round((Date.now()-qEnterTs)/1000);}
  qEnterTs=Date.now();
}
let testSubmitted=false;
/* ── SAFETY NET + MISTAKE BANK (numbered-family adapter v2) ── */
const SN_SESSION_KEY='riim_session_Test18';
const SN_PENDING_KEY='riim_pending';
const SN_STRICT_CLOCK=true;
function saveSession(){
  if(testSubmitted||!studentName)return;
  try{localStorage.setItem(SN_SESSION_KEY,JSON.stringify({
    name:studentName,pin:studentPin,batch:studentBatch,
    userAnswers:userAnswers,currentQ:currentQ,secondsLeft:secondsLeft,
    marked:(typeof markedForReview!=='undefined')?markedForReview:((typeof marked!=='undefined')?marked:null),
    visited:(typeof visitedQ!=='undefined')?visitedQ:null,
    qTimes:(typeof questionTimes!=='undefined')?questionTimes:null,
    savedAt:Date.now(),file:location.pathname.split('/').pop()
  }));}catch(e){}
}
function clearSession(){try{localStorage.removeItem(SN_SESSION_KEY);}catch(e){}}
function tryResume(){
  let s=null;
  try{s=JSON.parse(localStorage.getItem(SN_SESSION_KEY)||'null');}catch(e){}
  if(!s)return;
  let remaining=s.secondsLeft;
  if(SN_STRICT_CLOCK) remaining-=Math.floor((Date.now()-s.savedAt)/1000);
  if(remaining>0){
    const m=String(Math.floor(remaining/60)).padStart(2,'0');
    const sec=String(remaining%60).padStart(2,'0');
    if(!confirm('An unfinished attempt by '+s.name+' was found.\n\nOK = Resume with '+m+':'+sec+' remaining\nCancel = Discard it and start fresh')){clearSession();return;}
  }else{
    alert('An unfinished attempt by '+s.name+' was found, but its time has run out. It will be submitted as-is.');
  }
  document.getElementById('inputName').value=s.name;
  document.getElementById('inputPin').value=s.pin;
  document.getElementById('inputBatch').value=s.batch;
  startTest();
  const ts=document.getElementById('testScreen');
  if(!ts||ts.style.display!=='block')return;
  userAnswers=s.userAnswers;currentQ=s.currentQ;
  try{if(s.marked&&typeof markedForReview!=='undefined')markedForReview=s.marked;}catch(e){}
  try{if(s.marked&&typeof marked!=='undefined')marked=s.marked;}catch(e){}
  try{if(s.visited&&typeof visitedQ!=='undefined')visitedQ=s.visited;}catch(e){}
  try{if(s.qTimes&&typeof questionTimes!=='undefined')questionTimes=s.qTimes;}catch(e){}
  secondsLeft=Math.max(0,remaining);
  try{if(typeof buildSectionTabs==='function')buildSectionTabs();}catch(e){}
  try{if(typeof buildPalette==='function')buildPalette();}catch(e){}
  renderQuestion(currentQ);
  saveSession();
  if(secondsLeft<=0){submitTest();}
}
function queuePending(payload){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    const qid=Date.now()+'_'+Math.random().toString(36).slice(2,8);
    q.push(Object.assign({_qid:qid},payload));
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q));
    return qid;
  }catch(e){return null;}
}
function unqueuePending(qid){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q.filter(p=>p._qid!==qid)));
  }catch(e){}
}
function snSendWithQueue(opts){
  let qid=null;
  try{qid=queuePending(JSON.parse(opts.body));}catch(e){}
  const p=fetch(APPS_SCRIPT_URL,opts);
  p.then(()=>{if(qid)unqueuePending(qid);}).catch(()=>{});
  return p;
}
function flushPending(){
  let q=[];
  try{q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');}catch(e){}
  q.forEach(p=>{
    const body=Object.assign({},p); delete body._qid;
    fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
      .then(()=>unqueuePending(p._qid)).catch(()=>{});
  });
}
function bankMistakes(){
  try{
    let bank=JSON.parse(localStorage.getItem('riim_mistakes')||'[]');
    const now=Date.now(), day=86400000;
    const L=(typeof LABELS!=='undefined')?LABELS:['A','B','C','D'];
    QUESTIONS.forEach((q,i)=>{
      const ua=userAnswers[i];
      if(ua===null||ua===undefined) return;
      if(q.passage) return;
      const stem=q.stem||q.q; const opts=q.opts||q.options||q.o;
      if(!stem||!opts) return;
      const cand=(q.answer!==undefined)?q.answer:((q.ans!==undefined)?q.ans:q.a);
      let ci=-1;
      if(typeof cand==='number')ci=cand; else if(typeof cand==='string')ci=L.indexOf(cand);
      if(ci<0||ua===ci) return;
      const key='Test18-q'+(q.id||i+1);
      const card={k:key,stem:stem,opts:opts,ans:ci,chosen:ua,
        exp:q.exp||q.e||'',sub:q.qtype||q.sub||q.section||'',src:'Test 18',ts:now,box:1,due:now+day};
      const idx=bank.findIndex(c=>c.k===key);
      if(idx>=0){card.ts=bank[idx].ts;bank[idx]=card;}
      else bank.push(card);
    });
    if(bank.length>300) bank=bank.slice(bank.length-300);
    localStorage.setItem('riim_mistakes',JSON.stringify(bank));
  }catch(e){}
}
window.addEventListener('load',function(){flushPending();tryResume();});



/* ── LOGIN WHITELIST (added 8 Jul 2026) ─────────────────────
   List lives in whitelist.json at repo root. Fail-open on
   network error. PINs compared digits-only, no leading zeros. */
const WHITELIST_URL="https://sahilkanetkar-collab.github.io/Road-to-IIM/whitelist.json";
let __wl=null,__wlFetch=null;
function normPin(p){const d=String(p||"").replace(/\D/g,"");return d.replace(/^0+/,"");}
function loadWhitelist(){if(__wlFetch)return __wlFetch;__wlFetch=fetch(WHITELIST_URL,{cache:"no-store"}).then(r=>r.ok?r.json():null).then(j=>{__wl=j;return j;}).catch(()=>null);return __wlFetch;}
loadWhitelist();
async function isWhitelisted(pin,batch){const wl=__wl||(await loadWhitelist());if(!wl||!Array.isArray(wl.pins))return true;const b=String(batch||"").trim().toUpperCase();if((wl.bypass_batches||[]).includes(b))return true;const key=normPin(pin);if(!key)return false;if((wl.admin_pins||[]).includes(key))return true;return wl.pins.includes(key);}
/* ──────────────────────────────────────────────────────────── */
async function startTest(){
  const name=document.getElementById('inputName').value.trim();
  const pin=document.getElementById('inputPin').value.trim().toUpperCase();
  const batch=document.getElementById('inputBatch').value;
  const err=document.getElementById('loginErr');
  if(!name||!pin||!batch){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!/^(STU|IMS)\d{10}$/.test(pin)){err.textContent='PIN must be STU or IMS followed by exactly 10 digits.';err.style.display='block';return;}
  const isAdmin=ADMIN_PINS.includes(pin);
  if(isAdmin&&batch!=='Admin'){err.textContent='Admin PIN must be used with the Admin batch only.';err.style.display='block';return;}
  if(!isAdmin&&batch==='Admin'){err.textContent='Only Admin PINs may select the Admin batch.';err.style.display='block';return;}
  if(!(await isWhitelisted(pin,batch))){err.textContent="This PIN isn't on the active student list. Message Sahil Sir if you think this is a mistake.";err.style.display='block';return;}
  studentName=name;studentPin=pin;studentBatch=batch;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('testScreen').style.display='block';
  if(window.innerWidth>768)document.getElementById('paletteOverlay').style.display='flex';
  else document.getElementById('paletteOverlay').style.display='none';
  buildPalette();renderQuestion();startTimer();
}

function startTimer(){
  timerInterval=setInterval(()=>{
    secondsLeft--; if(secondsLeft%10===0)saveSession();
    const m=String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s=String(secondsLeft%60).padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    el.textContent=m+':'+s;
    if(secondsLeft<=300)el.classList.add('urgent');
    if(secondsLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function renderQuestion(){saveSession();
  if(lastQ!==currentQ){logQTime();lastQ=currentQ;}
  const q=QUESTIONS[currentQ];
  document.getElementById('sectionTag').textContent=q.section;
  document.getElementById('questionNumber').textContent='Question '+(currentQ+1)+' of 45';
  document.getElementById('questionStem').innerHTML=q.stem.replace(/\n/g,'<br>');
  const ol=document.getElementById('optionsList');
  ol.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.className='option-btn';
    if(userAnswers[currentQ]===i)btn.classList.add('selected');
    if(markedForReview[currentQ])btn.classList.add('marked');
    btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][i]+'</span><span class="opt-text">'+opt+'</span>';
    btn.onclick=()=>selectAnswer(i);
    li.appendChild(btn);ol.appendChild(li);
  });
  document.getElementById('submitBtn').style.display=(currentQ===44)?'block':'none';
  updatePalette();updateProgress();
}

function selectAnswer(idx){userAnswers[currentQ]=idx;renderQuestion();}
function clearAnswer(){userAnswers[currentQ]=null;renderQuestion();}
function navigate(dir){const n=currentQ+dir;if(n>=0&&n<45){currentQ=n;renderQuestion();}}

let paletteOpen=window.innerWidth>768;
function togglePalette(){
  paletteOpen=!paletteOpen;
  const mob=window.innerWidth<=768;
  const ov=document.getElementById('paletteOverlay');
  const nb=document.getElementById('navBar');
  const qa=document.getElementById('questionArea');
  if(mob){ov.classList.toggle('mobile-open',paletteOpen);}
  else{ov.style.display=paletteOpen?'flex':'none';nb.style.right=paletteOpen?'var(--panel)':'0';qa.style.maxWidth=paletteOpen?'calc(100% - var(--panel))':'100%';}
}

function markForReview(){markedForReview[currentQ]=!markedForReview[currentQ];renderQuestion();}

function buildPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  for(let i=0;i<45;i++){
    const btn=document.createElement('button');
    btn.className='pal-btn';btn.id='pb'+(i+1);btn.textContent=i+1;
    btn.onclick=(()=>{const idx=i;return()=>{currentQ=idx;renderQuestion();}})();
    grid.appendChild(btn);
  }
}

function updatePalette(){
  for(let i=0;i<45;i++){
    const btn=document.getElementById('pb'+(i+1));if(!btn)continue;
    btn.className='pal-btn';
    if(markedForReview[i])btn.classList.add('marked');
    else if(userAnswers[i]!==null)btn.classList.add('answered');
    if(i===currentQ)btn.classList.add('current');
  }
}

function updateProgress(){
  const ans=userAnswers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(ans/45*100)+'%';
}

function confirmSubmit(){
  const u=userAnswers.filter(a=>a===null).length;
  let msg='Submit the test?';
  if(u>0)msg='You have '+u+' unanswered question'+(u>1?'s':'')+'. Submit anyway?';
  if(confirm(msg))submitTest();
}

function submitTest(){
  if(testSubmitted)return;
  testSubmitted=true; clearSession(); bankMistakes();clearInterval(timerInterval);
  logQTime();
  let correct=0,wrong=0,skipped=0;
  const sectionErrors={};const wrongQuestions=[];
  QUESTIONS.forEach((q,i)=>{
    const sec=q.section;
    if(userAnswers[i]===null){skipped++;}
    else if(userAnswers[i]===q.ans){correct++;}
    else{wrong++;wrongQuestions.push(i+1);sectionErrors[sec]=(sectionErrors[sec]||0)+1;}
  });
  const score=correct*4-wrong;
  showResults(score,correct,wrong,skipped);
  saveToTracker(score,correct,wrong,skipped);
  logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions);
}

function showResults(score,correct,wrong,skipped){
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='block';
  const acc=((correct/(45-skipped||1))*100).toFixed(1);
  document.getElementById('scoreHero').innerHTML=
    '<div class="score-num">'+score+'</div>'+
    '<div class="score-sub">out of 180 &nbsp;&middot;&nbsp; '+studentName+' &nbsp;&middot;&nbsp; '+studentPin+' &nbsp;&middot;&nbsp; '+studentBatch+'</div>';
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-box correct"><div class="val">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="stat-box wrong"><div class="val">'+wrong+'</div><div class="lbl">Wrong</div></div>'+
    '<div class="stat-box"><div class="val" style="color:var(--grey)">'+skipped+'</div><div class="lbl">Skipped</div></div>'+
    '<div class="stat-box accuracy"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div>';
  buildReview();buildMisses();buildRetry();
}

function buildReview(){
  const list=document.getElementById('review-list');
  list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const isC=(ua===q.ans),isSk=(ua===null);
    const card=document.createElement('div');
    card.className='review-card '+(isSk?'':isC?'correct':'wrong');
    const bClass=isSk?'badge-skipped':isC?'badge-correct':'badge-wrong';
    const bText=isSk?'&mdash;':isC?'&#10003;':'&#10007;';
    const opts=q.opts.map((o,idx)=>{
      let cls='review-opt';
      if(idx===q.ans)cls+=' correct-opt';
      if(ua!==null&&ua===idx&&idx!==q.ans)cls+=' your-wrong';
      return '<div class="'+cls+'"><span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o+'</div>';
    }).join('');
    const expHtml=q.exp?'<div class="review-exp">'+q.exp+'</div>':''
    card.innerHTML=
      '<div class="review-card-header">'+
      '<div class="review-badge '+bClass+'">'+bText+'</div>'+
      '<div class="review-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>'+
      '</div><div class="review-opts">'+opts+'</div>'+expHtml;
    list.appendChild(card);
  });
}

function buildMisses(){
  const wrongQs=[];
  QUESTIONS.forEach((q,i)=>{
    if(userAnswers[i]!==null&&userAnswers[i]!==q.ans){
      wrongQs.push('Q'+(i+1)+' ['+q.section+'] '+['A','B','C','D'][q.ans]+'. '+q.opts[q.ans]);
    }
  });
  document.getElementById('missesText').value=wrongQs.length?wrongQs.join('\n'):'No misses -- perfect score!';
}

function copyMisses(e){
  e.preventDefault();
  const txt=document.getElementById('missesText').value;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.target;btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent='Copy Misses';},2000);
  });
}

function buildRetry(){
  const rs=document.getElementById('retrySection');rs.innerHTML='';
  const wrong=[];
  QUESTIONS.forEach((q,i)=>{if(userAnswers[i]!==null&&userAnswers[i]!==q.ans)wrong.push(i);});
  if(!wrong.length)return;
  rs.innerHTML='<h3>Retry Wrong Questions ('+wrong.length+')</h3>';
  wrong.forEach(i=>{
    const q=QUESTIONS[i];
    const card=document.createElement('div');card.className='retry-card';
    card.innerHTML='<div class="r-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>';
    q.opts.forEach((o,idx)=>{
      const btn=document.createElement('button');btn.className='retry-opt';
      btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o;
      btn.onclick=()=>{
        card.querySelectorAll('.retry-opt').forEach(b=>b.disabled=true);
        if(idx===q.ans)btn.classList.add('r-correct');
        else{btn.classList.add('r-wrong');card.querySelectorAll('.retry-opt')[q.ans].classList.add('r-correct');}
      };
      card.appendChild(btn);
    });
    rs.appendChild(card);
  });
}

function saveToTracker(score,correct,wrong,skipped){
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const data={testName:'Road to IIM Test 18',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})};
  try{const ex=JSON.parse(localStorage.getItem('riim_results')||'[]');ex.unshift(data);localStorage.setItem('riim_results',JSON.stringify(ex.slice(0,200)));}
  catch(e){}
}

function logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions){
  const notice=document.getElementById('sheet-notice');
  notice.className='submitting';notice.textContent='Submitting results...';notice.style.display='block';
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const payload={testName:'Road to IIM Test 18',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),sectionErrors:JSON.stringify(sectionErrors),wrongQuestions:JSON.stringify(wrongQuestions),studentAnswers:JSON.stringify(userAnswers.map(a=>a===null?null:a)),questionTimes:JSON.stringify(questionTimes)};
  snSendWithQueue({method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{notice.className='success';notice.textContent='Results saved successfully.';})
    .catch(()=>{notice.className='failure';notice.textContent='Could not reach server. Results saved locally.';});
}

function generatePDF(){
  const el=document.getElementById('review-list');
  html2pdf().set({margin:10,filename:'RoadToIIM_Test18_'+studentName.replace(/\s+/g,'_')+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['c','a','u','s','p'].includes(e.key.toLowerCase()))e.preventDefault();});
</script>
