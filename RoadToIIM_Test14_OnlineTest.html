<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Road to IIM - Test 14</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
:root{--navy:#0d1b2a;--navy2:#1a2e45;--gold:#c9a84c;--gold2:#e8c76a;--green:#2ecc71;--red:#e74c3c;--grey:#8899aa;--white:#f0f4f8;--purple:#9b59b6;--panel:280px;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--navy2);border:1px solid var(--gold);border-radius:12px;padding:40px 36px;width:100%;max-width:440px;}
.login-box h1{color:var(--gold);font-size:1.5rem;text-align:center;margin-bottom:6px;}
.login-box p{color:var(--grey);font-size:.85rem;text-align:center;margin-bottom:28px;}
.login-box label{display:block;font-size:.8rem;color:var(--grey);margin-bottom:4px;margin-top:14px;}
.login-box input,.login-box select{width:100%;background:#0d1b2a;border:1px solid #2a4060;border-radius:6px;padding:10px 12px;color:var(--white);font-size:.95rem;}
#startBtn{width:100%;margin-top:24px;padding:12px;background:var(--gold);color:var(--navy);font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;}
#topBar{background:var(--navy2);border-bottom:1px solid #1e3a5a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;padding-right:calc(var(--panel) + 20px);}
#topBar .logo{color:var(--gold);font-weight:700;font-size:1rem;}
#timerDisplay{font-size:1.1rem;font-weight:700;color:var(--green);background:#0a2a1a;padding:6px 16px;border-radius:20px;border:1px solid var(--green);}
#timerDisplay.urgent{color:var(--red);background:#2a0a0a;border-color:var(--red);}
#progressBar{height:3px;background:#1e3a5a;margin-right:var(--panel);}
#progressFill{height:100%;background:var(--gold);transition:width .3s;}
#mainLayout{display:flex;min-height:calc(100vh - 54px);}
#questionArea{flex:1;padding:28px 32px 80px 32px;max-width:calc(100% - var(--panel));}
#sectionTag{display:inline-block;background:#1e3a5a;color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
#questionNumber{color:var(--grey);font-size:.85rem;margin-bottom:8px;}
#questionStem{font-size:1.05rem;line-height:1.7;color:var(--white);margin-bottom:22px;word-break:break-word;overflow-wrap:break-word;}
.options-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.option-btn{background:#0d1b2a;border:1px solid #1e3a5a;border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--white);transition:all .2s;width:100%;display:flex;align-items:flex-start;gap:8px;}
.option-btn:hover{border-color:var(--gold);background:#162030;}
.option-btn.selected{border-color:var(--gold);background:#1e2e10;color:var(--gold2);}
.option-btn.marked{border-color:var(--purple);}
.opt-label{display:inline-block;min-width:24px;font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-text{flex:1;}
#paletteOverlay{position:fixed;top:0;right:0;width:100%;height:100%;z-index:200;pointer-events:none;display:flex;justify-content:flex-end;}
#palettePanel{width:280px;height:100%;background:var(--navy2);border-left:1px solid #1e3a5a;padding:16px 12px;overflow-y:auto;pointer-events:all;}
#paletteGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.pal-btn{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #1e3a5a;background:#0d1b2a;color:var(--grey);font-size:.78rem;font-weight:600;cursor:pointer;}
.pal-btn.answered{background:var(--green);color:#fff;border-color:var(--green);}
.pal-btn.marked{background:var(--purple);color:#fff;border-color:var(--purple);}
.pal-btn.current{border:2px solid var(--gold);color:var(--gold);}
#navBar{position:fixed;bottom:0;left:0;right:var(--panel);background:var(--navy2);border-top:1px solid #1e3a5a;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;z-index:150;gap:4px;}
.nav-btn{background:#1e3a5a;color:var(--white);border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1;}
#submitBtn{background:var(--gold);color:var(--navy);font-weight:700;display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--navy2);border-radius:8px;padding:16px;text-align:center;border:1px solid #1e3a5a;}
.stat-box .val{font-size:1.6rem;font-weight:800;}
.stat-box .lbl{font-size:.75rem;color:var(--grey);margin-top:4px;}
.stat-box.correct .val{color:var(--green);}
.stat-box.wrong .val{color:var(--red);}
.stat-box.accuracy .val{color:var(--gold);}
.review-card{background:var(--navy2);border-radius:10px;margin-bottom:14px;overflow:hidden;border-left:4px solid var(--grey);word-break:break-word;overflow-wrap:break-word;}
.review-card.correct{border-left-color:var(--green);}
.review-card.wrong{border-left-color:var(--red);}
.review-exp{background:#0a2a15;border-left:3px solid var(--green);padding:10px 14px;font-size:.83rem;line-height:1.6;color:#a8e6c0;margin-top:8px;}
#testScreen{display:none;}
#resultsScreen{display:none;padding:28px 32px;max-width:calc(100% - var(--panel));}
.score-hero{text-align:center;margin-bottom:28px;}
.score-hero .score-num{font-size:3.5rem;font-weight:900;color:var(--gold);}
.score-hero .score-sub{font-size:1rem;color:var(--grey);margin-top:4px;}
.result-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;margin:0 6px;}
.result-btn.gold{background:var(--gold);color:var(--navy);}
.result-btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
#sheet-notice{padding:10px 14px;border-radius:6px;font-size:.85rem;margin-bottom:16px;display:none;}
#sheet-notice.submitting{background:#1a2e10;color:#c9e88a;border:1px solid #4a7a20;}
#sheet-notice.success{background:#0a2a15;color:#2ecc71;border:1px solid #2ecc71;}
#sheet-notice.failure{background:#2a0a0a;color:#e74c3c;border:1px solid #e74c3c;}
.review-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.review-badge{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;}
.badge-correct{background:var(--green);color:#fff;}
.badge-wrong{background:var(--red);color:#fff;}
.badge-skipped{background:var(--grey);color:#fff;}
.review-stem{font-size:.9rem;line-height:1.6;flex:1;}
.review-opts{padding:0 16px 8px;}
.review-opt{font-size:.83rem;padding:4px 0;color:var(--grey);}
.review-opt.correct-opt{color:var(--green);font-weight:700;}
.review-opt.your-wrong{color:var(--red);}
.misses-box{background:#0d1b2a;border:1px solid #2a4060;border-radius:8px;padding:14px;margin-top:20px;}
.misses-box h3{color:var(--gold);font-size:.9rem;margin-bottom:8px;}
.misses-box textarea{width:100%;background:#0a1520;border:1px solid #1e3a5a;border-radius:6px;padding:10px;color:var(--white);font-size:.83rem;font-family:'Segoe UI',sans-serif;resize:vertical;min-height:80px;}
.copy-btn{margin-top:8px;padding:6px 14px;background:var(--navy2);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:.8rem;cursor:pointer;}
#retrySection{margin-top:24px;}
#retrySection h3{color:var(--gold);margin-bottom:16px;}
.retry-card{background:var(--navy2);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5a;}
.retry-card .r-stem{font-size:.95rem;line-height:1.6;margin-bottom:12px;}
.retry-opt{display:block;width:100%;background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:9px 14px;text-align:left;font-size:.88rem;color:var(--white);cursor:pointer;margin-bottom:6px;}
.retry-opt.r-correct{border-color:var(--green);background:#0a2a15;color:var(--green);}
.retry-opt.r-wrong{border-color:var(--red);background:#2a0a0a;color:var(--red);}
.pal-legend{font-size:.72rem;color:var(--grey);margin-top:8px;}
.pal-legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
@media (max-width:768px){
  #paletteOverlay{display:none;}
  #questionArea{max-width:100%;padding:16px 16px 80px 16px;}
  #topBar{padding-right:16px;}
  #progressBar{margin-right:0;}
  #navBar{right:0;padding:8px 6px;}
  .nav-btn{padding:7px 4px;font-size:.72rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .login-box input,.login-box select{font-size:1rem;}
  .score-hero .score-num{font-size:2.4rem;}
  #resultsScreen{max-width:100%;}
}
@media (max-width:768px){#paletteOverlay.mobile-open{display:flex;}}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx5Ojm_zp4LfsMeelx5e06KNjVH1wfsXdV0keS4407m4FO1HU4EpVb7GKj-ibAsxnspeA/exec";
const TIMER_DURATION=30;
const ADMIN_PINS=['IMS1111111111','IMS2222222222','IMS3333333333','IMS4444444444','IMS5555555555'];

const QUESTIONS = [
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The manager tried to (A) diffuse / (B) defuse the tension with a joke.\n2. Take my (A) advice / (B) advise and read the contract twice.\n3. The new evidence may (A) alter / (B) altar the course of the trial.\n4. The palace was (A) formally / (B) formerly a fortress.\n5. Wearing seatbelts can (A) lessen / (B) lesson the risk of injury.",opts:["BAABB","AAABA","BABBA","BAABA"],ans:3,exp:"Correct Answer: D (BAABA). 1. Defuse = reduce danger or tension; diffuse = spread out. 2. Advice = noun; advise = verb. 3. Alter = change; altar = table of worship. 4. Formerly = in the past; formally = in a formal manner. 5. Lessen = reduce; lesson = something learned."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Boldly presumptuous and forward in manner","Stubbornly contrary and difficult to deal with","Prone to sudden and unprovoked outbursts","Excessively eager to please those in authority"],ans:1,exp:"Correct Answer: B. Stubbornly contrary and difficult to deal with. Froward (archaic) = stubbornly contrary and perversely disobedient. The trap is A — 'froward' resembles 'forward' but means the opposite. C describes irascibility; D describes obsequiousness — both unrelated."},
  {section:"Idiom",stem:"Idiom",opts:["To commit irrevocably to a course of action by making retreat impossible","To take a carefully calculated risk after weighing all options","To abandon a plan midway due to unforeseen obstacles","To destroy evidence in order to avoid consequences"],ans:0,exp:"Correct Answer: A. To commit irrevocably to a course of action by making retreat impossible. 'To burn one's boats' = to commit irrevocably to a course of action by eliminating any means of retreat — from the military tactic of burning ships so soldiers could not flee. A is correct. B implies deliberation without irreversibility. C and D are misreadings."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["approve; pragmatic; consolidate; enhancing","approve; pragmatic; erode; damaging","endorse; prudent; undermine; tarnishing","sanction; calculated; diminish; weakening"],ans:1,exp:"Correct Answer: B. approve; pragmatic; erode; damaging. All four options begin with a word meaning 'to authorise' — making blank 1 a trap. Blank 2 must frame the decision as superficially sound. At blank 3, only 'erode' (B) is both natural and negative. A fails: 'consolidate trust' is positive, contradicting the 'but' pivot. C's 'tarnishing' requires a direct object, making it grammatically awkward here. D's 'diminish; weakening' is redundant."},
  {section:"Spelling",stem:"Spelling",opts:["Supercede","Superceed","Supersede","Superseed"],ans:2,exp:"Correct Answer: C. Supersede. Supersede is the only common English word ending in -sede (not -cede or -ceed). From Latin 'supersedere'. Option A (Supercede) is the most common error — confused with precede, concede."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Loud and disorderly in character","Lacking variety; dull and monotonous","Overly cautious and risk-averse","Cheerful and pleasant in an unremarkable way"],ans:1,exp:"Correct Answer: B. Lacking variety; dull and monotonous. Humdrum = lacking excitement or variety; tediously ordinary. A describes something raucous — the opposite. C describes timidity. D describes something mildly pleasant — humdrum implies a draining dullness, not passive pleasantness."},
  {section:"Idiom",stem:"Idiom",opts:["red herrings","pie in the sky","smoke and mirrors","hot air"],ans:3,exp:"Correct Answer: D. hot air. 'Hot air' = empty, boastful talk with no substance. 'Smoke and mirrors' (C) implies deliberate deception through illusion — trickery rather than empty bluster. 'Pie in the sky' (B) = unrealistic promises — but the sentence emphasises substance-free talk, not mere unrealism. 'Red herrings' (A) = misleading distraction, not empty promises."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The doctor (A) proscribed / (B) prescribed complete rest for a week.\n2. The children were (A) quiet / (B) quite tired after the trek.\n3. The winner remained (A) stationary / (B) stationery on the podium during the anthem.\n4. The hotel (A) suite / (B) sweet overlooked the lake.\n5. The lawyer asked the witness not to (A) infer / (B) imply anything beyond what she saw; drawing conclusions was the jury's job.",opts:["BBAAA","BBABA","ABAAA","BBAAB"],ans:0,exp:"Correct Answer: A (BBAAA). 1. Prescribed = ordered as treatment; proscribed = banned. 2. Quite = to a degree (adverb); quiet = silent. 3. Stationary = not moving; stationery = writing materials. 4. Suite = set of rooms; sweet = sugary. 5. Infer = draw a conclusion (the listener infers; the speaker implies), locked by drawing conclusions was the jury's job."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["promising; flawed; damaged; uncertain","compelling; questionable; bolstered; confident","promising; questionable; undermined; sceptical","credible; unverified; eroded; cautious"],ans:2,exp:"Correct Answer: C. promising; questionable; undermined; sceptical. The 'although' signals a reversal — positive appearance, then negative finding. Blank 2 is the key trap: 'flawed' (A) is too stark — a closer review 'revealing' problems implies they were not obvious, so 'questionable' (C) is more precise. B fails at blank 3: 'bolstered' reverses the negative direction entirely. D's 'cautious' is weaker than 'sceptical' — the stakeholders are actively doubtful, not merely careful. Only C sustains a coherent, precise reversal arc."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Sudden and entirely unexpected in nature","Morally questionable in purpose or outcome","Done secretly so as to avoid detection or disapproval","Excessively cautious and reluctant to act"],ans:2,exp:"Correct Answer: C. Done secretly so as to avoid detection or disapproval. Surreptitious = kept secret, especially because it would not be approved of. A confuses it with 'surprising'. B is morally adjacent but wrong — surreptitious describes the method of action, not its morality. D describes timidity, which is unrelated."},
  {section:"Idiom",stem:"Idiom",opts:["It is so powerful it will certainly succeed","It requires careful handling by all parties involved","It can only be used once before losing its effectiveness","It carries both potential benefits and potential drawbacks"],ans:3,exp:"Correct Answer: D. It carries both potential benefits and potential drawbacks. 'A double-edged sword' = something that has both advantages and disadvantages — like a sword that cuts in both directions. D is correct. A implies only benefit. B is a literal misreading about handling. C confuses it with a one-time-use idea. The trap is A: 'sword' suggests power, tempting students to pick it."},
  {section:"Spelling",stem:"Spelling",opts:["liaise","judicious","commitee","timely"],ans:2,exp:"Correct Answer: C. commitee. Committee requires double 'm', double 't', and double 'e'. 'Commitee' has only one 't'. Liaise is correctly spelled — a common trap. Judicious and timely are both correct."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["retract; principled; cementing; undermining","publish; reckless; destroying; reinforcing","defend; cowardly; weakening; restoring","revise; naive; damaging; supporting"],ans:0,exp:"Correct Answer: A. retract; principled; cementing; undermining. She refuses to retract findings — a principled stance. This cements her credibility while undermining those who pressured her. The cascade: refuse to retract → principled → cementing credibility → undermining committee. Only A sustains this logic."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Too great or extreme to be expressed in words","Extremely difficult to simplify or explain","Deeply unpleasant and impossible to tolerate","Impossible to measure or assign a value to"],ans:0,exp:"Correct Answer: A. Too great or extreme to be expressed in words. Ineffable = beyond the power of words to describe — used for overwhelming emotion, beauty, or spiritual experience. B describes complexity, not inexpressibility. C is the trap: ineffable is confused with insufferable. D describes something immeasurable, not inexpressible."},
  {section:"Idiom",stem:"Idiom",opts:["burning one's boats","throwing the baby out with the bathwater","not seeing the wood for the trees","making a mountain out of a molehill"],ans:2,exp:"Correct Answer: C. not seeing the wood for the trees. 'Not seeing the wood for the trees' = being so preoccupied with details that one loses sight of the overall picture. The sentence describes someone who analysed minor issues while missing the central problem. 'Making a mountain out of a molehill' (D) = exaggerating a minor problem — different. 'Throwing the baby out with the bathwater' (B) = discarding something valuable — unrelated. A is unrelated."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The (A) human / (B) humane treatment of prisoners is required by law.\n2. His (A) urbane / (B) urban manners impressed the diplomats.\n3. The story was too (A) incredulous / (B) incredible to believe.\n4. She gave a (A) graphic / (B) graphical account of the accident.\n5. The (A) sceptical / (B) septic panel questioned every claim in the report.",opts:["BABAB","BABAA","BBBAA","BABBA"],ans:1,exp:"Correct Answer: B (BABAA). 1. Humane = compassionate; human = relating to people. 2. Urbane = suave and refined; urban = relating to cities. 3. Incredible = unbelievable (of things); incredulous = disbelieving (of people). 4. Graphic = vivid; graphical = relating to graphs. 5. Sceptical = doubting; septic = infected."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["destroy; welcomed; boost; accelerating","maintain; rejected; improve; strengthening","ignore; supported; damage; undermining","instil; resisted; erode; jeopardising"],ans:3,exp:"Correct Answer: D. instil; resisted; erode; jeopardising. The director tries to instil accountability — resisted by long-serving staff. This erodes morale among newer recruits, jeopardising the reform. The cascade: instil → resisted → erode → jeopardising. Only D sustains coherent logic throughout."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["A traveller who works in exchange for accommodation","A worker who is highly skilled and considered a master of their craft","A competent but undistinguished worker who has completed basic training","An apprentice in the early stages of learning a trade"],ans:2,exp:"Correct Answer: C. A competent but undistinguished worker who has completed basic training. Journeyman = a worker who has completed an apprenticeship and is competent, but has not yet attained the status of master. The key nuance: competent but not exceptional. B describes a master craftsman — the next level up. D describes an apprentice — the level below. A is a literal misreading."},
  {section:"Idiom",stem:"Idiom",opts:["Facing a situation involving both great danger and great opportunity","Forced to choose between two equally undesirable options","Experiencing intense pressure from two opposing sides","Trapped in a situation with no clear path forward"],ans:1,exp:"Correct Answer: B. Forced to choose between two equally undesirable options. 'Caught between the devil and the deep blue sea' = forced to choose between two equally bad alternatives — a forced binary with no good option. B is correct. A implies opportunity, which the idiom does not. C describes external pressure, not a forced choice between two bad options. D implies paralysis rather than a forced binary decision."},
  {section:"Spelling",stem:"Spelling",opts:["Parrallel","Paralel","Parallell","Parallel"],ans:3,exp:"Correct Answer: D. Parallel. Parallel: one 'r', double 'l' in the middle, single 'l' at the end. A doubles the 'r'. B has single 'l' in the middle. C adds an extra 'l' at the end. Pattern: p-a-r-a-l-l-e-l."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. There were (A) fewer / (B) less applicants this year than last.\n2. Mumbai is (A) further / (B) farther from Delhi than Jaipur is.\n3. The estate was divided (A) among / (B) between the three siblings.\n4. A large (A) amount / (B) number of complaints reached the ombudsman.\n5. (A) Who / (B) Whom did the committee nominate?",opts:["ABABA","AAABB","ABBBB","ABABB"],ans:3,exp:"Correct Answer: D (ABABB). 1. Fewer for countable nouns (applicants). 2. Farther for physical distance; further for figurative extension. 3. Among for three or more; between for two. 4. Number for countable nouns (complaints); amount for uncountable. 5. Whom as the object of nominate (they nominated him, not he)."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["diffuse; trivialise; alienating; difficult","defuse; minimise; unsettling; elusive","lighten; undermine; disengaging; improbable","ease; trivialise; alienating; difficult"],ans:0,exp:"Correct Answer: A. diffuse; trivialise; alienating; difficult. All four options reduce tension at blank 1 and diminish seriousness at blank 2 — the trap is at blanks 3 and 4. 'Alienating' (A, D) is more precise than 'unsettling' (B) or 'disengaging' (C) — humour trivialising a serious issue actively puts off those who care about it. 'Difficult' (A, D) is more precise than 'elusive' or 'improbable'. Between A and D: 'diffuse' is the more idiomatic word for reducing social tension; 'ease' is generic. A is the most precise."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Expert and technically skilled work","Exceptionally brilliant and inspired effort","Loyal, hardworking, and dependably useful service","Modest and self-effacing contribution"],ans:2,exp:"Correct Answer: C. Loyal, hardworking, and dependably useful service. 'Yeoman service' means staunch and dependably useful work — loyal and hardworking, especially in difficult circumstances. A describes expertise, which yeoman service does not imply. B implies brilliance — yeoman service implies solid reliability, not brilliance. D describes modesty."},
  {section:"Idiom",stem:"Idiom",opts:["bury the hatchet","let the cat out of the bag","add fuel to the fire","bite the bullet"],ans:0,exp:"Correct Answer: A. bury the hatchet. 'Bury the hatchet' = to end a conflict and make peace — from the Native American practice of literally burying weapons to signal the end of hostilities. A is correct. 'Bite the bullet' (D) = to endure a painful situation — it implies individual endurance, not mutual reconciliation. 'Let the cat out of the bag' (B) = to reveal a secret. 'Add fuel to the fire' (C) = to worsen a conflict — the opposite of reconciliation."},
  {section:"Spelling",stem:"Spelling",opts:["Effloriscence","Efflorescence","Eflorescence","Effloressence"],ans:1,exp:"Correct Answer: B. Efflorescence. Efflorescence: double 'f', -or-, double 'esc', -ence. A uses 'isc' instead of 'esc'. C has a single 'f'. D doubles the 's'. The word means flowering, blooming, or a peak of development."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The patient was told to (A) lie / (B) lay down for an hour.\n2. Parliament will (A) rise / (B) raise the retirement age next year.\n3. May I (A) borrow / (B) lend your calculator for the exam?\n4. Please (A) bring / (B) take these files to the head office when you go there.\n5. The panel (A) comprises / (B) composes nine members.",opts:["ABABA","ABBBA","ABABB","BBABA"],ans:0,exp:"Correct Answer: A (ABABA). 1. Lie = recline (no object); lay requires an object. 2. Raise = lift something (the age); rise = go up by itself. 3. Borrow = take temporarily; lend = give temporarily. 4. Take = carry away from the speaker (to the head office); bring = carry toward the speaker. 5. Comprises = consists of (the whole comprises the parts); composes = makes up."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["A deep and enduring romantic attachment built over time","An involuntary state of obsessive infatuation with another person","Nostalgia for a past relationship that has ended","Jealousy directed at a rival for someone's affection"],ans:1,exp:"Correct Answer: B. An involuntary state of obsessive infatuation with another person. Limerence = an involuntary, obsessive state of intense mental and emotional preoccupation with another person — a psychological term coined by Dorothy Tennov. A describes mature love, which is distinct. C describes nostalgia. D describes jealousy. Limerence is specifically the unbidden, overwhelming fixation."},
  {section:"Idiom",stem:"Idiom",opts:["Acting with unusual speed and efficiency under pressure","Taking a significant personal risk without adequate preparation","Behaving in a way that is dangerously close to breaking the rules","Making steady progress despite facing strong opposition"],ans:2,exp:"Correct Answer: C. Behaving in a way that is dangerously close to breaking the rules. 'Sailing close to the wind' = acting in a way that is just within the limits of what is acceptable or legal — perilously near to crossing a line. C is correct. B is the most common trap — risk is implied, but the idiom specifically denotes proximity to a boundary, not risk in general. A and D are unrelated."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["improve; erode; diminishing; targeted","enhance; undermine; sapping; criticised","enhance; erode; diminishing; criticised","elevate; erode; diminishing; scrutinised"],ans:2,exp:"Correct Answer: C. enhance; erode; diminishing; criticised. All four options share the same logical arc — the differentiation is precision. Blank 1: 'enhance' and 'elevate' are more precise than 'improve' for the intended effect of feedback. Blank 2: 'erode' (C, D) is more gradual and precise than 'undermine' (B). Blank 3: 'sapping' (B) is slightly less standard than 'diminishing'. Blank 4 is decisive: 'criticised' (C) = the specific emotional experience of feeling judged unfairly. 'Targeted' (A) implies hostility. 'Scrutinised' (D) implies examination without the emotional dimension. C is the only option where all four words form the most natural and precise cascade."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The minister refused to (A) accept / (B) except responsibility.\n2. The soldiers stood (A) besides / (B) beside the memorial in silence.\n3. The manuscript was (A) all together / (B) altogether too long for a single volume.\n4. The witness swore she was telling the truth; her account was (A) credible / (B) credulous.\n5. The (A) notorious / (B) notable smuggler was finally arrested at the border.",opts:["ABBAB","ABBBA","BBBAA","ABBAA"],ans:3,exp:"Correct Answer: D (ABBAA). 1. Accept = agree to take; except = excluding. 2. Beside = next to; besides = in addition to. 3. Altogether = completely (too long); all together = all in one place. 4. Credible = believable (of an account); credulous = too ready to believe (of a person). 5. Notorious = famous for something bad (a smuggler); notable = worthy of note, neutral."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Apparently attractive but having no real value or integrity","Excessively complimentary or flattering","Deliberately insincere in order to gain personal favour","Disproportionately extravagant in style or presentation"],ans:0,exp:"Correct Answer: A. Apparently attractive but having no real value or integrity. Meretricious = falsely attractive; showy but worthless — from Latin 'meretrix'. B describes excessive praise. C describes sycophancy — close, but meretricious implies false glitter rather than merely insincere intent. D describes extravagance, not falseness."},
  {section:"Idiom",stem:"Idiom",opts:["throw the cat among the pigeons","move the goalposts","rock the boat","upset the apple cart"],ans:1,exp:"Correct Answer: B. move the goalposts. 'Move the goalposts' = to change the criteria or rules after a process has begun, making success harder. The sentence describes success seeming near before criteria keep shifting. 'Upset the apple cart' (D) = to disrupt something working smoothly — different. 'Throw the cat among the pigeons' (A) = to introduce a controversial element and cause trouble. 'Rock the boat' (C) = to disturb a stable situation."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["tendentious; support; alienating; damaging","objective; challenge; engaging; strengthening","impartial; undermine; reassuring; boosting","innovative; question; attracting; establishing"],ans:0,exp:"Correct Answer: A. tendentious; support; alienating; damaging. The documentary is tendentious (biased). Evidence is cherry-picked to support a conclusion. This alienates viewers expecting balance and damages credibility. The cascade: tendentious → support predetermined view → alienate → damage. Only A is coherent throughout."},
  {section:"Spelling",stem:"Spelling",opts:["Accomodation","Acommodation","Acomodation","Accommodation"],ans:3,exp:"Correct Answer: D. Accommodation. Accommodation requires double 'c' AND double 'm'. A has double 'c' but single 'm' — the most common error. B has single 'c' and double 'm'. C has both single. Memory tip: two cots, two mattresses — double c, double m."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Clearly expressed and easily understood","Easily influenced by the views of others","Having a ready insight into things; shrewdly perceptive","Stubbornly attached to one's initial assessment"],ans:2,exp:"Correct Answer: C. Having a ready insight into things; shrewdly perceptive. Perspicacious = having sharp insight and perceptive understanding. A describes perspicuous — this confusion pair is one of the highest-frequency IPMAT traps. B describes susceptibility to influence. D describes obstinacy. Perspicacious is about insight; perspicuous is about clarity of expression."},
  {section:"Idiom",stem:"Idiom",opts:["A victory achieved through exceptional strategic brilliance","A victory so costly it is effectively equivalent to defeat","A narrow victory that could easily have gone the other way","A victory that has no lasting significance or impact"],ans:1,exp:"Correct Answer: B. A victory so costly it is effectively equivalent to defeat. 'A Pyrrhic victory' = a victory that inflicts such a devastating toll on the victor that it is tantamount to defeat — named after King Pyrrhus of Epirus, who routed the Romans but at catastrophic cost. B is correct. A is the opposite. C describes a close contest, not a costly one. D describes a hollow victory, which differs from a ruinously costly one."},
  {section:"Word Selection",stem:"Each sentence below contains a pair of words in brackets. Select the correct word (A or B) for each sentence, then choose the option that matches your sequence of five letters.\n\n1. The (A) momentous / (B) momentary decision to partition the province changed history.\n2. The firm was fined for (A) negligible / (B) negligent handling of customer data.\n3. The (A) industrious / (B) industrial student topped every internal test.\n4. He shared the secret only with his closest (A) confidant / (B) confident.\n5. The (A) considerate / (B) considerable donation funded the entire new wing.",opts:["ABABB","ABAAB","AAAAB","ABBAB"],ans:1,exp:"Correct Answer: B (ABAAB). 1. Momentous = of great importance (changed history); momentary = lasting a moment. 2. Negligent = careless (fined for carelessness); negligible = too small to matter. 3. Industrious = hard-working; industrial = relating to industry. 4. Confidant = person trusted with secrets; confident = self-assured. 5. Considerable = large in size (funded a wing); considerate = thoughtful of others."},
  {section:"Sentence Completion",stem:"Sentence Completion",opts:["yeoman; invaluable; unwavering; unite","exceptional; recognised; admirable; inspire","perfunctory; minimal; wavering; fracture","commendable; noticed; impressive; direct"],ans:0,exp:"Correct Answer: A. yeoman; invaluable; unwavering; unite. 'Yeoman service' is a fixed idiomatic expression meaning loyal and dependably useful work in difficult conditions. Her service is invaluable (not merely recognised), commitment unwavering, and she unites a divided team. Only A is coherent and idiomatic throughout."},
  {section:"Vocabulary",stem:"Vocabulary",opts:["Lacking in evidence or logical rigour","Excessively long and poorly organised","Relying on emotional rather than rational appeal","Promoting a particular point of view in a biased way"],ans:3,exp:"Correct Answer: D. Promoting a particular point of view in a biased way. Tendentious = expressing a point of view with the aim of promoting it — inherently biased. A describes a weak argument. B describes poor organisation. C describes pathos-based reasoning. Tendentious is specifically about partisan intent, not about quality, length, or method."},
  {section:"Idiom",stem:"Idiom",opts:["burning their boats","moving the goalposts","paying lip service","sailing close to the wind"],ans:2,exp:"Correct Answer: C. paying lip service. 'Paying lip service' = expressing support for something without taking any real action — saying the right things while doing nothing. C is correct. 'Moving the goalposts' (B) = changing criteria — the sentence is about inaction, not shifting rules. 'Burning their boats' (A) = making an irreversible commitment — the opposite of the described behaviour. 'Sailing close to the wind' (D) = acting near the limits of acceptability."},
  {section:"Story Vocabulary",stem:"Complete the narrative: What Aarav felt was not quite love but _______: an involuntary, obsessive infatuation that flared at every glance from his colleague and collapsed at every imagined slight.",opts:["MORBID","RISIBLE","SOLVENT","LIMERENCE"],ans:3,exp:"Correct Answer: D. Limerence (coined by psychologist Dorothy Tennov) is an involuntary state of obsessive romantic infatuation, locked by the definition supplied after the colon. Morbid and risible are adjectives, and solvent describes financial soundness."},
  {section:"Story Vocabulary",stem:"Complete the narrative: Her _______ fascination with accident reports worried her parents; she read each casualty list twice.",opts:["MORBID","MORTIFICATION","LIMERENCE","RISIBLE"],ans:0,exp:"Correct Answer: A. Morbid (Latin morbus: disease) means showing an unhealthy interest in disturbing subjects such as death, locked by the fascination with accident reports and casualty lists. Risible means laughable, mortification is intense embarrassment, and limerence is a noun of infatuation."},
  {section:"Story Vocabulary",stem:"Complete the narrative: The defence's claim that the CCTV footage had been staged by trained monkeys was so _______ that even the stenographer laughed aloud.",opts:["SOLVENT","RISIBLE","MORTIFICATION","MORBID"],ans:1,exp:"Correct Answer: B. Risible (Latin ridere: to laugh) means so absurd that it provokes laughter, locked by even the stenographer laughing aloud. Morbid means unhealthily gloomy, solvent means able to pay debts, and mortification is a noun."},
  {section:"Story Vocabulary",stem:"Complete the narrative: To his lasting _______, the professor discovered mid-lecture that his slides belonged to another course entirely; he still reddens at the memory.",opts:["LIMERENCE","SOLVENT","RISIBLE","MORTIFICATION"],ans:3,exp:"Correct Answer: D. Mortification (Latin mors: death, literally a deadening) means intense embarrassment or humiliation, locked by he still reddens at the memory. Limerence is obsessive infatuation, and solvent and risible are adjectives that cannot follow his lasting."},
  {section:"Story Vocabulary",stem:"Complete the narrative: After three years of repayments the firm was finally _______ again, able to meet every liability as it fell due.",opts:["SOLVENT","MORTIFICATION","MORBID","LIMERENCE"],ans:0,exp:"Correct Answer: A. Solvent (Latin solvere: to loosen, to pay) means having enough assets to meet all debts, locked by able to meet every liability as it fell due. Mortification and limerence are nouns of emotion, and morbid describes an unhealthy mindset."}
];

let studentName="",studentPin="",studentBatch="";
let currentQ=0,secondsLeft=TIMER_DURATION*60,timerInterval=null;
let userAnswers=new Array(45).fill(null);
let markedForReview=new Array(45).fill(false);
let questionTimes=new Array(45).fill(0);
let lastQ=null,qEnterTs=null;
function logQTime(){
  if(lastQ!==null&&qEnterTs!==null){questionTimes[lastQ]+=Math.round((Date.now()-qEnterTs)/1000);}
  qEnterTs=Date.now();
}
let testSubmitted=false;
/* ── SAFETY NET + MISTAKE BANK (numbered-family adapter v2) ── */
const SN_SESSION_KEY='riim_session_Test14';
const SN_PENDING_KEY='riim_pending';
const SN_STRICT_CLOCK=true;
function saveSession(){
  if(testSubmitted||!studentName)return;
  try{localStorage.setItem(SN_SESSION_KEY,JSON.stringify({
    name:studentName,pin:studentPin,batch:studentBatch,
    userAnswers:userAnswers,currentQ:currentQ,secondsLeft:secondsLeft,
    marked:(typeof markedForReview!=='undefined')?markedForReview:((typeof marked!=='undefined')?marked:null),
    visited:(typeof visitedQ!=='undefined')?visitedQ:null,
    qTimes:(typeof questionTimes!=='undefined')?questionTimes:null,
    savedAt:Date.now(),file:location.pathname.split('/').pop()
  }));}catch(e){}
}
function clearSession(){try{localStorage.removeItem(SN_SESSION_KEY);}catch(e){}}
function tryResume(){
  let s=null;
  try{s=JSON.parse(localStorage.getItem(SN_SESSION_KEY)||'null');}catch(e){}
  if(!s)return;
  let remaining=s.secondsLeft;
  if(SN_STRICT_CLOCK) remaining-=Math.floor((Date.now()-s.savedAt)/1000);
  if(remaining>0){
    const m=String(Math.floor(remaining/60)).padStart(2,'0');
    const sec=String(remaining%60).padStart(2,'0');
    if(!confirm('An unfinished attempt by '+s.name+' was found.\n\nOK = Resume with '+m+':'+sec+' remaining\nCancel = Discard it and start fresh')){clearSession();return;}
  }else{
    alert('An unfinished attempt by '+s.name+' was found, but its time has run out. It will be submitted as-is.');
  }
  document.getElementById('inputName').value=s.name;
  document.getElementById('inputPin').value=s.pin;
  document.getElementById('inputBatch').value=s.batch;
  startTest();
  const ts=document.getElementById('testScreen');
  if(!ts||ts.style.display!=='block')return;
  userAnswers=s.userAnswers;currentQ=s.currentQ;
  try{if(s.marked&&typeof markedForReview!=='undefined')markedForReview=s.marked;}catch(e){}
  try{if(s.marked&&typeof marked!=='undefined')marked=s.marked;}catch(e){}
  try{if(s.visited&&typeof visitedQ!=='undefined')visitedQ=s.visited;}catch(e){}
  try{if(s.qTimes&&typeof questionTimes!=='undefined')questionTimes=s.qTimes;}catch(e){}
  secondsLeft=Math.max(0,remaining);
  try{if(typeof buildSectionTabs==='function')buildSectionTabs();}catch(e){}
  try{if(typeof buildPalette==='function')buildPalette();}catch(e){}
  renderQuestion(currentQ);
  saveSession();
  if(secondsLeft<=0){submitTest();}
}
function queuePending(payload){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    const qid=Date.now()+'_'+Math.random().toString(36).slice(2,8);
    q.push(Object.assign({_qid:qid},payload));
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q));
    return qid;
  }catch(e){return null;}
}
function unqueuePending(qid){
  try{
    const q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');
    localStorage.setItem(SN_PENDING_KEY,JSON.stringify(q.filter(p=>p._qid!==qid)));
  }catch(e){}
}
function snSendWithQueue(opts){
  let qid=null;
  try{qid=queuePending(JSON.parse(opts.body));}catch(e){}
  const p=fetch(APPS_SCRIPT_URL,opts);
  p.then(()=>{if(qid)unqueuePending(qid);}).catch(()=>{});
  return p;
}
function flushPending(){
  let q=[];
  try{q=JSON.parse(localStorage.getItem(SN_PENDING_KEY)||'[]');}catch(e){}
  q.forEach(p=>{
    const body=Object.assign({},p); delete body._qid;
    fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
      .then(()=>unqueuePending(p._qid)).catch(()=>{});
  });
}
function bankMistakes(){
  try{
    let bank=JSON.parse(localStorage.getItem('riim_mistakes')||'[]');
    const now=Date.now(), day=86400000;
    const L=(typeof LABELS!=='undefined')?LABELS:['A','B','C','D'];
    QUESTIONS.forEach((q,i)=>{
      const ua=userAnswers[i];
      if(ua===null||ua===undefined) return;
      if(q.passage) return;
      const stem=q.stem||q.q; const opts=q.opts||q.options||q.o;
      if(!stem||!opts) return;
      const cand=(q.answer!==undefined)?q.answer:((q.ans!==undefined)?q.ans:q.a);
      let ci=-1;
      if(typeof cand==='number')ci=cand; else if(typeof cand==='string')ci=L.indexOf(cand);
      if(ci<0||ua===ci) return;
      const key='Test14-q'+(q.id||i+1);
      const card={k:key,stem:stem,opts:opts,ans:ci,chosen:ua,
        exp:q.exp||q.e||'',sub:q.qtype||q.sub||q.section||'',src:'Test 14',ts:now,box:1,due:now+day};
      const idx=bank.findIndex(c=>c.k===key);
      if(idx>=0){card.ts=bank[idx].ts;bank[idx]=card;}
      else bank.push(card);
    });
    if(bank.length>300) bank=bank.slice(bank.length-300);
    localStorage.setItem('riim_mistakes',JSON.stringify(bank));
  }catch(e){}
}
window.addEventListener('load',function(){flushPending();tryResume();});



/* ── LOGIN WHITELIST (added 8 Jul 2026) ─────────────────────
   List lives in whitelist.json at repo root. Fail-open on
   network error. PINs compared digits-only, no leading zeros. */
const WHITELIST_URL="https://sahilkanetkar-collab.github.io/Road-to-IIM/whitelist.json";
let __wl=null,__wlFetch=null;
function normPin(p){const d=String(p||"").replace(/\D/g,"");return d.replace(/^0+/,"");}
function loadWhitelist(){if(__wlFetch)return __wlFetch;__wlFetch=fetch(WHITELIST_URL,{cache:"no-store"}).then(r=>r.ok?r.json():null).then(j=>{__wl=j;return j;}).catch(()=>null);return __wlFetch;}
loadWhitelist();
async function isWhitelisted(pin,batch){const wl=__wl||(await loadWhitelist());if(!wl||!Array.isArray(wl.pins))return true;const b=String(batch||"").trim().toUpperCase();if((wl.bypass_batches||[]).includes(b))return true;const key=normPin(pin);if(!key)return false;if((wl.admin_pins||[]).includes(key))return true;return wl.pins.includes(key);}
/* ──────────────────────────────────────────────────────────── */
async function startTest(){
  const name=document.getElementById('inputName').value.trim();
  const pin=document.getElementById('inputPin').value.trim().toUpperCase();
  const batch=document.getElementById('inputBatch').value;
  const err=document.getElementById('loginErr');
  if(!name||!pin||!batch){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!/^(STU|IMS)\d{10}$/.test(pin)){err.textContent='PIN must be STU or IMS followed by exactly 10 digits.';err.style.display='block';return;}
  const isAdmin=ADMIN_PINS.includes(pin);
  if(isAdmin&&batch!=='Admin'){err.textContent='Admin PIN must be used with the Admin batch only.';err.style.display='block';return;}
  if(!isAdmin&&batch==='Admin'){err.textContent='Only Admin PINs may select the Admin batch.';err.style.display='block';return;}
  if(!(await isWhitelisted(pin,batch))){err.textContent="This PIN isn't on the active student list. Message Sahil Sir if you think this is a mistake.";err.style.display='block';return;}
  studentName=name;studentPin=pin;studentBatch=batch;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('testScreen').style.display='block';
  if(window.innerWidth>768)document.getElementById('paletteOverlay').style.display='flex';
  else document.getElementById('paletteOverlay').style.display='none';
  buildPalette();renderQuestion();startTimer();
}

function startTimer(){
  timerInterval=setInterval(()=>{
    secondsLeft--; if(secondsLeft%10===0)saveSession();
    const m=String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s=String(secondsLeft%60).padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    el.textContent=m+':'+s;
    if(secondsLeft<=300)el.classList.add('urgent');
    if(secondsLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function renderQuestion(){saveSession();
  if(lastQ!==currentQ){logQTime();lastQ=currentQ;}
  const q=QUESTIONS[currentQ];
  document.getElementById('sectionTag').textContent=q.section;
  document.getElementById('questionNumber').textContent='Question '+(currentQ+1)+' of 45';
  document.getElementById('questionStem').innerHTML=q.stem.replace(/\n/g,'<br>');
  const ol=document.getElementById('optionsList');
  ol.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.className='option-btn';
    if(userAnswers[currentQ]===i)btn.classList.add('selected');
    if(markedForReview[currentQ])btn.classList.add('marked');
    btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][i]+'</span><span class="opt-text">'+opt+'</span>';
    btn.onclick=()=>selectAnswer(i);
    li.appendChild(btn);ol.appendChild(li);
  });
  document.getElementById('submitBtn').style.display=(currentQ===44)?'block':'none';
  updatePalette();updateProgress();
}

function selectAnswer(idx){userAnswers[currentQ]=idx;renderQuestion();}
function clearAnswer(){userAnswers[currentQ]=null;renderQuestion();}
function navigate(dir){const n=currentQ+dir;if(n>=0&&n<45){currentQ=n;renderQuestion();}}

let paletteOpen=window.innerWidth>768;
function togglePalette(){
  paletteOpen=!paletteOpen;
  const mob=window.innerWidth<=768;
  const ov=document.getElementById('paletteOverlay');
  const nb=document.getElementById('navBar');
  const qa=document.getElementById('questionArea');
  if(mob){ov.classList.toggle('mobile-open',paletteOpen);}
  else{ov.style.display=paletteOpen?'flex':'none';nb.style.right=paletteOpen?'var(--panel)':'0';qa.style.maxWidth=paletteOpen?'calc(100% - var(--panel))':'100%';}
}

function markForReview(){markedForReview[currentQ]=!markedForReview[currentQ];renderQuestion();}

function buildPalette(){
  const grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  for(let i=0;i<45;i++){
    const btn=document.createElement('button');
    btn.className='pal-btn';btn.id='pb'+(i+1);btn.textContent=i+1;
    btn.onclick=(()=>{const idx=i;return()=>{currentQ=idx;renderQuestion();}})();
    grid.appendChild(btn);
  }
}

function updatePalette(){
  for(let i=0;i<45;i++){
    const btn=document.getElementById('pb'+(i+1));if(!btn)continue;
    btn.className='pal-btn';
    if(markedForReview[i])btn.classList.add('marked');
    else if(userAnswers[i]!==null)btn.classList.add('answered');
    if(i===currentQ)btn.classList.add('current');
  }
}

function updateProgress(){
  const ans=userAnswers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(ans/45*100)+'%';
}

function confirmSubmit(){
  const u=userAnswers.filter(a=>a===null).length;
  let msg='Submit the test?';
  if(u>0)msg='You have '+u+' unanswered question'+(u>1?'s':'')+'. Submit anyway?';
  if(confirm(msg))submitTest();
}

function submitTest(){
  if(testSubmitted)return;
  testSubmitted=true; clearSession(); bankMistakes();clearInterval(timerInterval);
  logQTime();
  let correct=0,wrong=0,skipped=0;
  const sectionErrors={};const wrongQuestions=[];
  QUESTIONS.forEach((q,i)=>{
    const sec=q.section;
    if(userAnswers[i]===null){skipped++;}
    else if(userAnswers[i]===q.ans){correct++;}
    else{wrong++;wrongQuestions.push(i+1);sectionErrors[sec]=(sectionErrors[sec]||0)+1;}
  });
  const score=correct*4-wrong;
  showResults(score,correct,wrong,skipped);
  saveToTracker(score,correct,wrong,skipped);
  logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions);
}

function showResults(score,correct,wrong,skipped){
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='block';
  const acc=((correct/(45-skipped||1))*100).toFixed(1);
  document.getElementById('scoreHero').innerHTML=
    '<div class="score-num">'+score+'</div>'+
    '<div class="score-sub">out of 180 &nbsp;&middot;&nbsp; '+studentName+' &nbsp;&middot;&nbsp; '+studentPin+' &nbsp;&middot;&nbsp; '+studentBatch+'</div>';
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-box correct"><div class="val">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="stat-box wrong"><div class="val">'+wrong+'</div><div class="lbl">Wrong</div></div>'+
    '<div class="stat-box"><div class="val" style="color:var(--grey)">'+skipped+'</div><div class="lbl">Skipped</div></div>'+
    '<div class="stat-box accuracy"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div>';
  buildReview();buildMisses();buildRetry();
}

function buildReview(){
  const list=document.getElementById('review-list');
  list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const ua=userAnswers[i];
    const isC=(ua===q.ans),isSk=(ua===null);
    const card=document.createElement('div');
    card.className='review-card '+(isSk?'':isC?'correct':'wrong');
    const bClass=isSk?'badge-skipped':isC?'badge-correct':'badge-wrong';
    const bText=isSk?'&mdash;':isC?'&#10003;':'&#10007;';
    const opts=q.opts.map((o,idx)=>{
      let cls='review-opt';
      if(idx===q.ans)cls+=' correct-opt';
      if(ua!==null&&ua===idx&&idx!==q.ans)cls+=' your-wrong';
      return '<div class="'+cls+'"><span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o+'</div>';
    }).join('');
    const expHtml=q.exp?'<div class="review-exp">'+q.exp+'</div>':''
    card.innerHTML=
      '<div class="review-card-header">'+
      '<div class="review-badge '+bClass+'">'+bText+'</div>'+
      '<div class="review-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>'+
      '</div><div class="review-opts">'+opts+'</div>'+expHtml;
    list.appendChild(card);
  });
}

function buildMisses(){
  const wrongQs=[];
  QUESTIONS.forEach((q,i)=>{
    if(userAnswers[i]!==null&&userAnswers[i]!==q.ans){
      wrongQs.push('Q'+(i+1)+' ['+q.section+'] '+['A','B','C','D'][q.ans]+'. '+q.opts[q.ans]);
    }
  });
  document.getElementById('missesText').value=wrongQs.length?wrongQs.join('\n'):'No misses -- perfect score!';
}

function copyMisses(e){
  e.preventDefault();
  const txt=document.getElementById('missesText').value;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=e.target;btn.textContent='Copied!';
    setTimeout(()=>{btn.textContent='Copy Misses';},2000);
  });
}

function buildRetry(){
  const rs=document.getElementById('retrySection');rs.innerHTML='';
  const wrong=[];
  QUESTIONS.forEach((q,i)=>{if(userAnswers[i]!==null&&userAnswers[i]!==q.ans)wrong.push(i);});
  if(!wrong.length)return;
  rs.innerHTML='<h3>Retry Wrong Questions ('+wrong.length+')</h3>';
  wrong.forEach(i=>{
    const q=QUESTIONS[i];
    const card=document.createElement('div');card.className='retry-card';
    card.innerHTML='<div class="r-stem"><span style="color:var(--grey);font-size:.75rem">Q'+(i+1)+' &middot; '+q.section+'</span><br>'+q.stem.replace(/\n/g,'<br>')+'</div>';
    q.opts.forEach((o,idx)=>{
      const btn=document.createElement('button');btn.className='retry-opt';
      btn.innerHTML='<span class="opt-label">'+ ['A','B','C','D'][idx]+'</span> '+o;
      btn.onclick=()=>{
        card.querySelectorAll('.retry-opt').forEach(b=>b.disabled=true);
        if(idx===q.ans)btn.classList.add('r-correct');
        else{btn.classList.add('r-wrong');card.querySelectorAll('.retry-opt')[q.ans].classList.add('r-correct');}
      };
      card.appendChild(btn);
    });
    rs.appendChild(card);
  });
}

function saveToTracker(score,correct,wrong,skipped){
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const data={testName:'Road to IIM Test 14',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})};
  try{const ex=JSON.parse(localStorage.getItem('riim_results')||'[]');ex.unshift(data);localStorage.setItem('riim_results',JSON.stringify(ex.slice(0,200)));}
  catch(e){}
}

function logToSheet(score,correct,wrong,skipped,sectionErrors,wrongQuestions){
  const notice=document.getElementById('sheet-notice');
  notice.className='submitting';notice.textContent='Submitting results...';notice.style.display='block';
  const s=TIMER_DURATION*60-secondsLeft;
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss2=String(s%60).padStart(2,'0');
  const payload={testName:'Road to IIM Test 14',name:studentName,pin:studentPin,batch:studentBatch,score:score,correct:correct,wrong:wrong,skipped:skipped,maxMarks:180,timeTaken:mm+':'+ss2,timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),sectionErrors:JSON.stringify(sectionErrors),wrongQuestions:JSON.stringify(wrongQuestions),studentAnswers:JSON.stringify(userAnswers.map(a=>a===null?null:a)),questionTimes:JSON.stringify(questionTimes)};
  snSendWithQueue({method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(()=>{notice.className='success';notice.textContent='Results saved successfully.';})
    .catch(()=>{notice.className='failure';notice.textContent='Could not reach server. Results saved locally.';});
}

function generatePDF(){
  const el=document.getElementById('review-list');
  html2pdf().set({margin:10,filename:'RoadToIIM_Test14_'+studentName.replace(/\s+/g,'_')+'.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['c','a','u','s','p'].includes(e.key.toLowerCase()))e.preventDefault();});
</script>
