<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to IIM — Your Sky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&family=Grenze+Gotisch:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ═══ sky v2 — polish pass · Jul 2026 ═══
   Same data plumbing as v1. Changes: readable hubs with progress rings,
   "Next up" card, progress strip, incomplete-first sorting with a Lit
   divider, grid leaves, animation diet, bigger sub text. */
:root{
  --sky:#0c1022; --sky-deep:#070a18;
  --ivory:#f2eede; --dim:#9298b0;
  --gold:#d9b96a; --gold-deep:#b8892e;
  --done:#6fc39a; --node:#1d2340;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at 50% -10%, #16204a 0%, var(--sky) 45%, var(--sky-deep) 100%);
  color:var(--ivory); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden;
}
canvas#stars{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}
.watermark{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Grenze Gotisch',serif;font-weight:700;white-space:nowrap;
  font-size:clamp(4.2rem,14vw,12rem); color:transparent;
  -webkit-text-stroke:1px rgba(217,185,106,.09);
  z-index:0;pointer-events:none;user-select:none;
}

/* ── login overlay ─────────────────────── */
.login-veil{
  position:fixed;inset:0;z-index:40;
  background:rgba(7,10,24,.82);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  background:linear-gradient(160deg,#141a33,#0e1226);
  border:1px solid rgba(217,185,106,.3);border-radius:16px;
  padding:34px 30px;max-width:380px;width:100%;
  box-shadow:0 0 60px rgba(217,185,106,.12);
}
.login-card h1{font-family:'Fraunces',serif;font-size:1.4rem;margin-bottom:4px;}
.login-card h1 em{font-style:normal;color:var(--gold);}
.login-card p{font-size:.82rem;color:var(--dim);margin-bottom:20px;}
.login-card label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.05em;color:var(--dim);margin:14px 0 6px;}
.login-card input{
  width:100%;padding:11px 13px;border-radius:9px;
  border:1px solid rgba(242,238,222,.2);background:rgba(242,238,222,.05);
  color:var(--ivory);font-family:'DM Sans',sans-serif;font-size:.95rem;
}
.login-card input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent;}
.login-card button{
  width:100%;margin-top:22px;padding:12px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:var(--sky-deep);
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.login-card button:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(217,185,106,.4);}
.login-err{color:#e08a8a;font-size:.78rem;margin-top:12px;display:none;}

/* ── header ─────────────────────────────── */
header{
  position:relative;z-index:2;
  padding:28px clamp(20px,6vw,72px) 4px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.brand{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(1.5rem,3vw,2.1rem);}
.brand em{font-style:normal;color:var(--gold);text-shadow:0 0 14px rgba(217,185,106,.5);}
.right-cluster{display:flex;align-items:center;gap:18px;min-width:0;flex-shrink:1;}
.tracker-link{font-size:.74rem;font-weight:700;letter-spacing:.04em;color:var(--gold);text-decoration:none;border:1px solid rgba(217,185,106,.45);border-radius:999px;padding:5px 13px;white-space:nowrap;transition:background .2s,box-shadow .2s;}
.tracker-link:hover{background:rgba(217,185,106,.12);box-shadow:0 0 12px rgba(217,185,106,.25);}
@media (max-width:560px){.tracker-link{padding:4px 10px;font-size:.68rem;}}
.northstar{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--dim);}
.northstar .flame{
  width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffe9b0, var(--gold-deep) 75%);
  box-shadow:0 0 14px rgba(217,185,106,.55);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--sky-deep);font-size:.8rem;
}
.northstar .flame.dim{background:radial-gradient(circle at 35% 30%, #3a4062, #232946 75%);color:var(--dim);box-shadow:none;}
.student{font-size:.82rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw;}
.student b{color:var(--ivory);}
.student .signout{color:var(--gold);cursor:pointer;text-decoration:underline;font-size:.72rem;margin-left:8px;}

.tagline{
  position:relative;z-index:2;
  padding:0 clamp(20px,6vw,72px) 10px;
  font-family:'Fraunces',serif;font-size:clamp(.95rem,2vw,1.2rem);color:var(--dim);
}
.tagline .stroke{color:var(--gold);}

/* ── progress strip ─────────────────────── */
.skybar{
  position:relative;z-index:2;
  padding:0 clamp(20px,6vw,72px) 22px;
  display:none;align-items:center;gap:12px;
}
.skybar .bar{
  flex:1;height:5px;border-radius:999px;background:rgba(242,238,222,.1);overflow:hidden;max-width:420px;
}
.skybar .fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--done));transition:width .8s ease;}
.skybar .count{font-size:.76rem;color:var(--dim);white-space:nowrap;}
.skybar .count b{color:var(--gold);}

/* ── next up card ───────────────────────── */
.nextup{
  position:relative;z-index:2;
  margin:0 clamp(20px,6vw,72px) 30px;
  max-width:560px;
  display:none;align-items:center;gap:16px;
  background:linear-gradient(150deg,rgba(217,185,106,.12),rgba(20,26,51,.65));
  border:1px solid rgba(217,185,106,.45);border-radius:14px;
  padding:16px 18px;cursor:pointer;text-align:left;
  color:var(--ivory);font-family:'DM Sans',sans-serif;width:calc(100% - 2*clamp(20px,6vw,72px));
  transition:box-shadow .2s ease, transform .2s ease;
}
.nextup:hover{box-shadow:0 0 26px rgba(217,185,106,.3);transform:translateY(-1px);}
.nextup:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
.nextup .spark{
  width:36px;height:36px;flex:0 0 36px;border-radius:50%;
  border:2px solid var(--gold);box-shadow:0 0 14px rgba(217,185,106,.5);
  display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1rem;
}
.nextup .nu-body{flex:1;min-width:0;}
.nextup .nu-eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.14em;color:var(--gold);margin-bottom:2px;}
.nextup .nu-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;}
.nextup .nu-sub{font-size:.74rem;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nextup .nu-go{
  flex:0 0 auto;padding:9px 16px;border-radius:999px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:var(--sky-deep);
  font-weight:700;font-size:.8rem;font-family:'DM Sans',sans-serif;
}
@media (max-width:560px){
  .nextup{flex-wrap:wrap;}
  .nextup .nu-go{width:100%;text-align:center;}
}

/* ── canopy: hubs ───────────────────────── */
.canopy{position:relative;z-index:2;padding-bottom:80px;}
svg.wires{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1;}
svg.wires path{
  fill:none;stroke:rgba(217,185,106,.32);stroke-width:1.3;stroke-linecap:round;
  stroke-dasharray:420;stroke-dashoffset:420;animation:draw .5s ease forwards;
}
svg.wires path.gold{stroke:var(--gold);filter:drop-shadow(0 0 4px rgba(217,185,106,.5));}
svg.wires path.lit{stroke:rgba(111,195,154,.35);}
@keyframes draw{to{stroke-dashoffset:0;}}

.hubs{
  display:flex;justify-content:center;gap:clamp(14px,3.6vw,52px);
  padding:8px clamp(10px,4vw,60px) 36px;
  position:relative;z-index:2;flex-wrap:wrap;
}
.hub-wrap{
  display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;background:none;border:none;
  font-family:'DM Sans',sans-serif;color:var(--ivory);width:clamp(88px,11vw,116px);
}
.hub-ring{
  width:clamp(58px,7vw,76px);height:clamp(58px,7vw,76px);border-radius:50%;
  padding:3px;background:conic-gradient(var(--done) calc(var(--pct)*1%), rgba(217,185,106,.22) 0);
  transition:transform .2s ease;
}
.hub{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #2b3358, var(--node) 70%);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:clamp(.72rem,1.1vw,.82rem);
  color:var(--ivory);letter-spacing:.02em;
  box-shadow:inset 0 0 12px rgba(0,0,0,.45);
  transition:background .2s ease, box-shadow .2s ease;
}
.hub-wrap:hover .hub-ring{transform:translateY(-3px);}
.hub-wrap:focus-visible{outline:none;}
.hub-wrap:focus-visible .hub-ring{outline:2px solid var(--gold);outline-offset:3px;}
.hub-wrap.open .hub{
  background:radial-gradient(circle at 32% 28%, #f0d896, var(--gold-deep) 75%);
  color:var(--sky-deep);
  box-shadow:0 0 26px rgba(217,185,106,.5);
}
.hub-wrap.complete .hub-ring{background:conic-gradient(var(--done) 100%, var(--done) 0);}
.hub-name{
  font-size:clamp(.72rem,1.2vw,.82rem);font-weight:700;text-align:center;
  line-height:1.3;color:var(--ivory);
}
.hub-wrap.open .hub-name{color:var(--gold);}
.hub-desc{font-size:.64rem;color:var(--dim);text-align:center;line-height:1.3;}
@media (max-width:640px){
  .hubs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 8px;justify-items:center;}
  .hub-wrap{width:100%;}
  .hub-desc{display:none;}
}

/* ── leaves ─────────────────────────────── */
.panel{position:relative;z-index:2;max-width:820px;margin:0 auto;padding:22px clamp(20px,5vw,50px) 0;}
.panel-head{font-family:'Fraunces',serif;font-size:1.05rem;color:var(--dim);padding-bottom:14px;}
.panel-head b{color:var(--ivory);}
.leaves{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:4px 18px;}
.leaf{
  display:flex;align-items:center;gap:11px;
  border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  padding:8px 12px 8px 8px;border-radius:12px;
  transition:background .15s ease;text-align:left;
  opacity:0;transform:translateY(-6px);
  animation:drop .25s ease forwards;
  animation-delay:calc(var(--i) * 30ms);
}
@keyframes drop{to{opacity:1;transform:none;}}
.leaf:hover,.leaf:focus-visible{background:rgba(242,238,222,.07);}
.leaf:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
.dot{
  width:26px;height:26px;flex:0 0 26px;border-radius:50%;
  border:2px solid var(--dim);background:transparent;position:relative;
  transition:box-shadow .2s ease;
}
.leaf:hover .dot{box-shadow:0 0 10px rgba(217,185,106,.4);}
.leaf.done .dot{background:var(--done);border-color:var(--done);box-shadow:0 0 10px rgba(111,195,154,.5);}
.leaf.done .dot::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sky-deep);font-size:.7rem;font-weight:700;}
.leaf.new .dot{border-color:var(--gold);box-shadow:0 0 12px rgba(217,185,106,.6);}
.leaf .lbl{font-size:.88rem;font-weight:500;color:var(--ivory);min-width:0;}
.leaf .sub{display:block;font-size:.74rem;color:var(--dim);font-weight:400;margin-top:1px;}
.leaf .score{color:var(--done);font-weight:700;}
.badge-new{font-size:.6rem;font-weight:700;letter-spacing:.08em;color:var(--gold);border:1px solid rgba(217,185,106,.5);border-radius:4px;padding:1px 5px;margin-left:4px;}
.leaf-divider{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;
  padding:14px 4px 6px;font-size:.66rem;font-weight:700;letter-spacing:.14em;color:var(--done);
  opacity:0;animation:drop .25s ease forwards;animation-delay:calc(var(--i) * 30ms);
}
.leaf-divider::before,.leaf-divider::after{content:'';flex:1;height:1px;background:rgba(111,195,154,.25);}

footer{position:relative;z-index:2;padding:20px clamp(20px,6vw,72px) 40px;font-size:.72rem;color:var(--dim);opacity:.8;text-align:center;}

@media (prefers-reduced-motion:reduce){
  .leaf,.leaf-divider{animation:none;opacity:1;transform:none;}
  svg.wires path{animation:none;stroke-dashoffset:0;}
  .nextup,.hub-ring{transition:none;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="watermark" aria-hidden="true">Road to IIM</div>

<!-- login -->
<div class="login-veil" id="loginVeil">
  <div class="login-card">
    <h1>Road to <em>IIM</em></h1>
    <p>Enter your PIN once — your sky remembers you on this device.</p>
    <label for="pinInput">IMS PIN</label>
    <input id="pinInput" type="text" inputmode="text" autocomplete="off" placeholder="STU0001234567">
    <button id="enterBtn">Enter the sky</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<header>
  <div class="brand">Road to <em>IIM</em></div>
  <div class="right-cluster">
    <a class="tracker-link" id="trackerLink" href="road_to_iim_tracker_v2.html" style="display:none">My Tracker</a>
    <div class="northstar" id="northstar" title="Daily streak" style="display:none">
      <div class="flame dim" id="streakFlame">0</div>
      <span id="streakLabel">day streak</span>
    </div>
    <div class="student" id="studentBox" style="display:none">
      <b id="studentName"></b> · <span id="studentBatch"></span>
      <span class="signout" id="signOut">switch</span>
    </div>
  </div>
</header>
<div class="tagline">Every test is a star. <span class="stroke">Light them up, one by one.</span></div>

<div class="skybar" id="skybar">
  <div class="bar"><div class="fill" id="skyFill"></div></div>
  <div class="count" id="skyCount"></div>
</div>

<button class="nextup" id="nextUp">
  <div class="spark">✦</div>
  <div class="nu-body">
    <div class="nu-eyebrow">NEXT UP FOR YOU</div>
    <div class="nu-title" id="nuTitle"></div>
    <div class="nu-sub" id="nuSub"></div>
  </div>
  <span class="nu-go" id="nuGo">Start now</span>
</button>

<div class="canopy" id="canopy">
  <svg class="wires" id="wires"></svg>
  <div class="hubs" id="hubs"></div>
  <div class="panel">
    <div class="panel-head" id="panelHead"></div>
    <div class="leaves" id="leaves"></div>
  </div>
</div>

<footer id="foot">Scores refresh automatically. A completed constellation glows green.</footer>

<script>
/* ═══ CONFIG ═══ */
const EXEC_URL = "https://script.google.com/macros/s/AKfycbx5Ojm_zp4LfsMeelx5e06KNjVH1wfsXdV0keS4407m4FO1HU4EpVb7GKj-ibAsxnspeA/exec";
const PORTAL_BASE = ""; // same directory as the test files

/* ═══ MANIFEST ═══
   sheetName matches the exact testName written to All Responses.
   matchNum lets "Road to IIM Test 19" and "Road to IIM Paper 19" both count. */
const MANIFEST = [
  { id:"standard", name:"Standard Tests", desc:"Full 30-minute mixed VA papers · +4 / −1",
    tests:[
      {t:"Test 9",  url:"RoadToIIM_Test9_OnlineTest.html",  matchNum:9},
      {t:"Test 11", url:"RoadToIIM_Test11_OnlineTest.html", matchNum:11},
      {t:"Test 12", url:"RoadToIIM_Test12_OnlineTest.html", matchNum:12},
      {t:"Test 13", url:"RoadToIIM_Test13_OnlineTest.html", matchNum:13},
      {t:"Test 14", url:"RoadToIIM_Test14_OnlineTest.html", matchNum:14},
      {t:"Test 15", url:"RoadToIIM_Test15_OnlineTest.html", matchNum:15},
      {t:"Test 16", url:"RoadToIIM_Test16_OnlineTest.html", matchNum:16},
      {t:"Test 17", url:"RoadToIIM_Test17_OnlineTest.html", matchNum:17},
      {t:"Test 18", url:"RoadToIIM_Test18_OnlineTest.html", matchNum:18},
      {t:"Test 19", url:"RoadToIIM_Test19_OnlineTest.html", matchNum:19},
      {t:"Test 20", url:"RoadToIIM_Test20_OnlineTest.html", matchNum:20},
      {t:"Test 21", url:"RoadToIIM_Test21_OnlineTest.html", matchNum:21},
      {t:"Test 22", url:"RoadToIIM_Test22_OnlineTest.html", matchNum:22},
      {t:"Test 23", url:"RoadToIIM_Test23_OnlineTest.html", matchNum:23},
      {t:"Test 24", url:"RoadToIIM_Test24_OnlineTest.html", matchNum:24, isNew:true},
    ]},
  { id:"rapid", name:"Rapid Fire", desc:"Short bursts, no feedback till the end",
    tests:[
      {t:"Rapid Fire 01", url:"RoadToIIM_SpeedTest01_VocabGrammar.html", sheetName:"Rapid Fire Test 01"},
      {t:"Rapid Fire 02", url:"RoadToIIM_SpeedTest02_VocabGrammar.html", sheetName:"Rapid Fire Test 02"},
      {t:"Rapid Fire 03", url:"RoadToIIM_SpeedTest03_VocabGrammar.html", sheetName:"Rapid Fire Test 03"},
      {t:"Rapid Fire 04", url:"RoadToIIM_SpeedTest04_VocabGrammar.html", sheetName:"Rapid Fire Test 04"},
      {t:"Rapid Fire 05", url:"RoadToIIM_SpeedTest05_VocabGrammar.html", sheetName:"Rapid Fire Test 05"},
      {t:"Rapid Fire 06", url:"RoadToIIM_SpeedTest06_VocabGrammar.html", sheetName:"Rapid Fire Test 6"},
      {t:"Rapid Fire 07", url:"RoadToIIM_SpeedTest07_VocabGrammar.html", sheetName:"Rapid Fire Test 07"},
      {t:"Rapid Fire 08", url:"RoadToIIM_SpeedTest08_VocabGrammar.html", sheetName:"Rapid Fire Test 08", isNew:true},
    ]},
  { id:"rc", name:"RC Series & Drills", desc:"Passages, alerts, skeletons",
    tests:[
      {t:"RC Series 01", url:"RoadToIIM_RC_Series01.html", sheetName:"RC Series 01"},
      {t:"RC Series 02", url:"RoadToIIM_RC_Series02.html", sheetName:"RC Series 02"},
      {t:"RC Series 03", url:"RoadToIIM_RC_Series03.html", sheetName:"RC Series 03"},
      {t:"RC Drill 04",  url:"RoadToIIM_RC_Series04_RCDrill.html", sheetName:"Road to IIM RC Series 04"},
      {t:"RC Drill 05",  url:"RoadToIIM_RC_Series05_RCDrill.html", sheetName:"Road to IIM RC Series 05", isNew:true},
    ]},
  { id:"concept", name:"Concept Tests", desc:"Straight from class decks",
    tests:[
      {t:"Word Web I",    url:"RoadToIIM_ConceptTest01_WordWebI.html",     sheetName:"Concept Test 1"},
      {t:"Word Web II",   url:"RoadToIIM_ConceptTest02_WordWebII.html",    sheetName:"Concept Test 2"},
      {t:"The Impostors", url:"RoadToIIM_ConceptTest03_TheImpostors.html", sheetName:"Concept Test 3"},
      {t:"Cumulative",    url:"RoadToIIM_ConceptTest04_Cumulative.html",   sheetName:"Concept Test 4", isNew:true},
    ]},
  { id:"vault", name:"The Vault", desc:"Your words and your mistakes, banked daily",
    tests:[
      {t:"The Vault",    url:"the_vault.html",    soon:true},
      {t:"Mistake Bank", url:"mistake_bank.html", soon:true},
    ]},
  { id:"skills", name:"Skill Building", desc:"Daily habits that compound",
    tests:[
      {t:"IWP", url:"iwp_week1_session.html", soon:true},
      {t:"RLS", url:"RLS_Week1.html",         soon:true},
      {t:"BYOT",url:"byot.html",              sheetPrefix:"Custom ·"},
      {t:"Aeon Condenser", url:"aeon_condenser.html", soon:true},
    ]},
];

/* ═══ STARFIELD (dieted: fewer stars, ~30fps) ═══ */
const cv=document.getElementById('stars'),cx=cv.getContext('2d');
let stars=[];const REDUCED=matchMedia('(prefers-reduced-motion: reduce)').matches;
function seedStars(){const n=Math.min(110,Math.floor(innerWidth*innerHeight/13000));
  stars=Array.from({length:n},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.3+.3,p:Math.random()*Math.PI*2,v:.4+Math.random()*.9,gold:Math.random()<.12}));}
function sizeCanvas(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;cx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);seedStars();}
sizeCanvas();addEventListener('resize',sizeCanvas);
let lastPaint=0;
function paintStars(t){
  if(t-lastPaint<33){requestAnimationFrame(paintStars);return;}
  lastPaint=t;
  cx.clearRect(0,0,innerWidth,innerHeight);
  for(const s of stars){const tw=REDUCED?.8:.5+.5*Math.sin(t/900*s.v+s.p);cx.globalAlpha=.25+.6*tw;cx.fillStyle=s.gold?'#d9b96a':'#e8ecff';cx.beginPath();cx.arc(s.x,s.y,s.r,0,7);cx.fill();}
  cx.globalAlpha=1;if(!REDUCED)requestAnimationFrame(paintStars);
}
requestAnimationFrame(paintStars);

/* ═══ PROFILE ═══ */
const PROFILE_TTL = 6*60*60*1000;
function pkey(pin){return 'riim_profile_v2_'+pin;} /* same key as v1 — caches carry over */
async function fetchProfile(pin){
  /* send BOTH param names so either doGet variant (mode= or action=) answers */
  const res = await fetch(EXEC_URL+'?mode=profile&action=profile&pin='+encodeURIComponent(pin));
  const data = await res.json();
  /* accept either response shape: {status:"success"} (v10) or {ok:true} (draft) */
  const good = data.status==='success' || data.ok===true;
  if(!good) throw new Error(data.message||data.error||'profile error');
  data._fetchedAt=Date.now();
  try{localStorage.setItem(pkey(pin),JSON.stringify(data));}catch(e){}
  return data;
}
async function getProfile(pin){
  let cached=null;
  try{cached=JSON.parse(localStorage.getItem(pkey(pin)));}catch(e){}
  if(cached && Date.now()-cached._fetchedAt<PROFILE_TTL){
    fetchProfile(pin).then(fresh=>{applyProfile(fresh);}).catch(()=>{});
    return cached;
  }
  try{return await fetchProfile(pin);}catch(e){return cached;}
}

/* match a manifest test to sheet testNames */
function isDone(test, profile){
  if(!profile||!profile.tests) return {done:false};
  const names=Object.keys(profile.tests);
  const bestOf=n=>{const b=Number(profile.tests[n]&&profile.tests[n].best);return isFinite(b)?b:null;};
  // 1) exact sheetName
  if(test.sheetName && profile.tests[test.sheetName]) return {done:true, best:bestOf(test.sheetName)};
  // 1b) prefix match (e.g. BYOT: any "Custom · …" submission counts)
  if(test.sheetPrefix){
    for(const n of names){ if(n.startsWith(test.sheetPrefix)) return {done:true, best:bestOf(n)}; }
  }
  // 2) number match against "Road to IIM Test N" / "Road to IIM Paper N"
  if(test.matchNum!=null){
    const re=new RegExp('^Road to IIM (Test|Paper)\\s*0*'+test.matchNum+'$','i');
    for(const n of names){ if(re.test(n.trim())) return {done:true, best:bestOf(n)}; }
  }
  // 3) loose contains (e.g. sheetName "Speed Test 01" vs "Road to IIM Speed Test 01")
  if(test.sheetName && !test.sheetName.startsWith('__')){
    for(const n of names){ if(n.toLowerCase().includes(test.sheetName.toLowerCase())) return {done:true, best:bestOf(n)}; }
  }
  return {done:false};
}

/* ═══ RENDER ═══ */
const hubsEl=document.getElementById('hubs'),leavesEl=document.getElementById('leaves'),
      panelHead=document.getElementById('panelHead'),wires=document.getElementById('wires'),
      canopy=document.getElementById('canopy');
let openId=MANIFEST[0].id, PROFILE=null, PIN=null;

function famProgress(fam){
  const trackable=fam.tests.filter(t=>!t.soon);
  const done=trackable.filter(t=>isDone(t,PROFILE).done).length;
  return {done, total:trackable.length};
}

function buildHubs(){
  hubsEl.innerHTML='';
  MANIFEST.forEach(fam=>{
    const {done,total}=famProgress(fam);
    const pct= total ? Math.round(done/total*100) : 0;
    const inner = total ? `${done}/${total}` : '✦';
    const b=document.createElement('button');
    b.className='hub-wrap'+(total&&done===total?' complete':'');
    b.dataset.id=fam.id;b.setAttribute('aria-label',fam.name);
    b.innerHTML=`<div class="hub-ring" style="--pct:${pct}"><div class="hub">${inner}</div></div>
      <div class="hub-name">${fam.name}</div>
      <div class="hub-desc">${fam.desc}</div>`;
    b.addEventListener('click',()=>{openId=fam.id;render();});
    hubsEl.appendChild(b);
  });
}

function updateSkybar(){
  const bar=document.getElementById('skybar');
  if(!PROFILE){bar.style.display='none';return;}
  let done=0,total=0;
  MANIFEST.forEach(fam=>{const p=famProgress(fam);done+=p.done;total+=p.total;});
  if(!total){bar.style.display='none';return;}
  bar.style.display='flex';
  document.getElementById('skyFill').style.width=Math.round(done/total*100)+'%';
  document.getElementById('skyCount').innerHTML=`<b>${done}</b> of ${total} stars lit`;
}

function computeNextUp(){
  /* priority: newest unlit → first unlit in manifest order */
  let firstUnlit=null, firstNew=null;
  MANIFEST.forEach(fam=>{
    fam.tests.forEach(test=>{
      if(test.soon) return;
      const done=isDone(test,PROFILE).done;
      if(done) return;
      if(test.isNew && !firstNew) firstNew={fam,test};
      if(!firstUnlit) firstUnlit={fam,test};
    });
  });
  return firstNew||firstUnlit;
}

function updateNextUp(){
  const card=document.getElementById('nextUp');
  const nu=computeNextUp();
  if(!nu){ card.style.display='none'; return; }
  card.style.display='flex';
  document.getElementById('nuTitle').textContent=nu.test.t;
  document.getElementById('nuSub').textContent=nu.fam.name+' · '+nu.fam.desc;
  card.onclick=()=>{ if(nu.test.url) location.href = PORTAL_BASE + nu.test.url; };
}

function render(){
  document.querySelectorAll('.hub-wrap').forEach(h=>h.classList.toggle('open',h.dataset.id===openId));
  const fam=MANIFEST.find(f=>f.id===openId);
  panelHead.innerHTML=`<b>${fam.name}</b> — ${fam.desc}`;
  leavesEl.innerHTML='';

  /* incomplete first (NEW floats to top), then a Lit divider, then done */
  const withState=fam.tests.map(t=>({t, st:isDone(t,PROFILE)}));
  const unlit=withState.filter(x=>!x.st.done);
  unlit.sort((a,b)=>(b.t.isNew?1:0)-(a.t.isNew?1:0));
  const lit=withState.filter(x=>x.st.done);

  let i=0;
  const addLeaf=(test,st)=>{
    const l=document.createElement('button');
    l.className='leaf'+(st.done?' done':'')+(test.isNew&&!st.done?' new':'');
    l.style.setProperty('--i',i++);
    const scoreBit = st.done && typeof st.best==='number' ? ` · <span class="score">${st.best}</span>` : '';
    const sub = test.soon ? 'Open anytime · tracking coming soon' : (st.done?'Best'+scoreBit:'Not yet lit');
    l.innerHTML=`<span class="dot"></span><span class="lbl">${test.t}${test.isNew&&!st.done?' <span class="badge-new">NEW</span>':''}<span class="sub">${sub}</span></span>`;
    l.addEventListener('click',()=>{ if(test.url){ location.href = PORTAL_BASE + test.url; } });
    leavesEl.appendChild(l);
  };

  unlit.forEach(x=>addLeaf(x.t,x.st));
  if(lit.length && unlit.length){
    const d=document.createElement('div');
    d.className='leaf-divider';d.style.setProperty('--i',i++);
    d.textContent='LIT';
    leavesEl.appendChild(d);
  }
  lit.forEach(x=>addLeaf(x.t,x.st));

  requestAnimationFrame(drawWires);
}

function drawWires(){
  wires.innerHTML='';
  const cRect=canopy.getBoundingClientRect();
  const hub=document.querySelector('.hub-wrap.open .hub');
  if(!hub)return;
  const h=hub.getBoundingClientRect();
  const hx=h.left+h.width/2-cRect.left,hy=h.bottom-cRect.top-4;
  document.querySelectorAll('.leaf').forEach((leaf,i)=>{
    const d=leaf.querySelector('.dot').getBoundingClientRect();
    const lx=d.left+d.width/2-cRect.left,ly=d.top+d.height/2-cRect.top;
    const mx=(hx+lx)/2+(i%2?12:-12),my=hy+(ly-hy)*0.45;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${hx} ${hy} Q ${mx} ${my} ${lx} ${ly}`);
    if(leaf.classList.contains('new'))p.classList.add('gold');
    else if(leaf.classList.contains('done'))p.classList.add('lit');
    p.style.animationDelay=(i*30)+'ms';
    wires.appendChild(p);
  });
}
addEventListener('resize',()=>requestAnimationFrame(drawWires));

function applyProfile(profile){
  PROFILE=profile;
  if(!profile) return;
  document.getElementById('studentBox').style.display='';
  document.getElementById('trackerLink').style.display='';
  document.getElementById('studentName').textContent=profile.name||'Student';
  document.getElementById('studentBatch').textContent=profile.batch||'';
  const ns=document.getElementById('northstar');
  ns.style.display='flex';
  const flame=document.getElementById('streakFlame');
  flame.textContent=profile.streak||0;
  flame.classList.toggle('dim',!(profile.streak>0));
  document.getElementById('streakLabel').textContent='day streak';
  buildHubs();render();updateSkybar();updateNextUp();
}

/* ═══ LOGIN ═══ */
const veil=document.getElementById('loginVeil');
async function enter(pin){
  PIN=pin;
  try{localStorage.setItem('riim_pin',pin);}catch(e){}
  veil.style.display='none';
  document.getElementById('trackerLink').style.display=''; /* always visible once inside — never gated on profile */
  buildHubs();render();updateNextUp(); // paint immediately (all unlit)
  const profile=await getProfile(pin);
  if(profile){ applyProfile(profile); }
  else {
    document.getElementById('foot').textContent='Could not reach the tracker — showing the sky without your progress. It will light up next time you are online.';
  }
}
document.getElementById('enterBtn').addEventListener('click',()=>{
  const pin=document.getElementById('pinInput').value.trim();
  const err=document.getElementById('loginErr');
  if(!/\d{4,}/.test(pin.replace(/\D/g,''))){err.textContent='That PIN looks too short — check and try again.';err.style.display='block';return;}
  err.style.display='none';
  enter(pin.toUpperCase());
});
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('enterBtn').click();});
document.getElementById('signOut').addEventListener('click',()=>{
  try{localStorage.removeItem('riim_pin');}catch(e){}
  location.reload();
});

/* auto-login if remembered */
(function(){
  let saved=null;
  try{saved=localStorage.getItem('riim_pin');}catch(e){}
  if(saved){ enter(saved); }
})();
</script>
