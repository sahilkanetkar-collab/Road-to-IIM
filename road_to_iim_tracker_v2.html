<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to IIM | Score Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0d1b2a;
    --navy-mid: #162032;
    --navy-light: #1e2d40;
    --gold: #e8c84a;
    --gold-dim: #c9a93a;
    --red: #e05252;
    --green: #4caf87;
    --blue: #4a9edd;
    --purple: #9b7fe8;
    --text: #e8edf2;
    --text-dim: #8a9bb0;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: radial-gradient(ellipse at 30% 20%, rgba(232,200,74,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(74,158,221,0.05) 0%, transparent 60%),
                var(--navy);
  }

  .login-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .login-logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 36px;
  }

  .login-card label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    margin-top: 20px;
  }

  .login-card label:first-of-type { margin-top: 0; }

  .login-card input,
  .login-card select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-card input:focus,
  .login-card select:focus {
    border-color: var(--gold);
  }

  .login-card select option { background: #1e2d40; color: var(--text); }

  .login-btn {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover { background: var(--gold-dim); }
  .login-btn:active { transform: scale(0.98); }

  .login-error {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(224,82,82,0.12);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 8px;
    font-size: 13px;
    color: #f08080;
    display: none;
  }

  /* ── MAIN DASHBOARD ── */
  #dashboard { display: none; }

  .topbar {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-brand {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--gold);
  }

  .topbar-meta {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  .content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

  /* ── STAT CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--gold);
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── TESTS TABLE ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: rgba(255,255,255,0.04);
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card-hover); }

  tbody td {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text);
  }

  .score-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .score-high { background: rgba(76,175,135,0.15); color: var(--green); }
  .score-mid  { background: rgba(232,200,74,0.15);  color: var(--gold); }
  .score-low  { background: rgba(224,82,82,0.15);   color: var(--red); }

  .delta-up   { color: var(--green); font-size: 12px; }
  .delta-down { color: var(--red);   font-size: 12px; }
  .delta-same { color: var(--text-dim); font-size: 12px; }

  .review-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--blue);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .review-btn:hover { border-color: var(--blue); background: rgba(74,158,221,0.08); }

  /* ── SECTION BARS ── */
  .bars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }

  .bar-label { font-size: 13px; color: var(--text); min-width: 140px; }

  .bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--gold);
    transition: width 0.6s ease;
  }

  .bar-pct {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
  }

  /* ── PARTICIPATION CHIPS ── */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
  }
  .chip.taken { background: rgba(232,200,74,0.12); border-color: rgba(232,200,74,0.3); color: var(--gold); }

  /* ── BEHAVIOUR FLAGS ── */
  .flag-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .flag-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .flag-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .flag-desc  { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* ── ADMIN SPECIFIC ── */
  .admin-badge {
    display: inline-block;
    background: rgba(155,127,232,0.15);
    border: 1px solid rgba(155,127,232,0.3);
    color: var(--purple);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 8px;
  }

  .filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--gold); }
  .filter-select option { background: #1e2d40; }

  tbody tr.student-row { cursor: pointer; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 780px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin-bottom: 4px;
  }
  .modal-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

  .q-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

  .q-chip {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--card);
    cursor: default;
  }
  .q-chip.correct  { background: rgba(76,175,135,0.15); border-color: rgba(76,175,135,0.3); color: var(--green); }
  .q-chip.wrong    { background: rgba(224,82,82,0.15);   border-color: rgba(224,82,82,0.3);   color: var(--red); }
  .q-chip.skipped  { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--text-dim); }

  .no-data-note {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ── LOADING ── */
  .loading-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(232,200,74,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 14px; color: var(--text-dim); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .footer-bar {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  @media (max-width: 600px) {
    .login-card { padding: 32px 24px; }
    .content { padding: 20px 16px; }
    .topbar { padding: 12px 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .modal-box { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════ LOGIN ══════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Road to IIM</div>
    <div class="login-sub">Score Tracker &nbsp;·&nbsp; Sahil Sir</div>

    <label>Your Name</label>
    <input type="text" id="loginName" placeholder="Enter your full name" autocomplete="off">

    <label>IMS PIN</label>
    <input type="text" id="loginPin" placeholder="e.g. STU0001184727" autocomplete="off"
           style="font-family:'DM Mono',monospace; letter-spacing:0.5px;">

    <label>Batch</label>
    <select id="loginBatch">
      <optgroup label="Classroom">
        <option value="A2701">A2701</option>
        <option value="A2702">A2702</option>
        <option value="A2703">A2703</option>
        <option value="A2704">A2704</option>
        <option value="A2705">A2705</option>
        <option value="A2706">A2706</option>
        <option value="A2707">A2707</option>
        <option value="A2708">A2708</option>
        <option value="A2709">A2709</option>
        <option value="A2710">A2710</option>
        <option value="A2711">A2711</option>
        <option value="A2712">A2712</option>
      </optgroup>
      <optgroup label="Online">
        <option value="27E101">27E101</option>
        <option value="27E102">27E102</option>
        <option value="27E103">27E103</option>
        <option value="27E104">27E104</option>
        <option value="27E105">27E105</option>
      </optgroup>
      <optgroup label="School">
        <option value="Zebar">Zebar</option>
      </optgroup>
      <optgroup label="Admin">
        <option value="Admin">Admin</option>
      </optgroup>
    </select>

    <button class="login-btn" onclick="doLogin()">View My Scores</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════════════════════════ DASHBOARD ══════════════════════════ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">Road to IIM</div>
    <div class="topbar-meta">
      <span id="topbarUser"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content" id="dashContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Fetching your data…</div>
    </div>
  </div>

  <div class="footer-bar">Road to IIM &nbsp;·&nbsp; Sahil Sir &nbsp;·&nbsp; IMS Ahmedabad</div>
</div>

<!-- ══════════════════════════ MODAL ══════════════════════════ -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Test Review</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGGxswx4hcBUFiT0QJIglowhKcJCv47MOR5LKBv9sILl-evsgZeKCms5y6s5zEXOUo6Q/exec';
const MAX_MARKS = 180;

const ADMIN_PINS = [
  'IMS1111111111','IMS2222222222','IMS3333333333',
  'IMS4444444444','IMS5555555555'
];

// PIN regex: STU or IMS followed by exactly 10 digits
const PIN_REGEX = /^(STU|IMS)\d{10}$/;

// ══════════════════════════════════════════════════════════════
//  SESSION STATE
// ══════════════════════════════════════════════════════════════
let currentUser = null; // { name, pin, batch, isAdmin }

// ══════════════════════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════════════════════
function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  document.getElementById('loginError').style.display = 'none';

  const name  = document.getElementById('loginName').value.trim();
  const pin   = document.getElementById('loginPin').value.trim().toUpperCase();
  const batch = document.getElementById('loginBatch').value;

  if (!name)  { showError('Please enter your name.'); return; }
  if (!pin)   { showError('Please enter your IMS PIN.'); return; }

  if (!PIN_REGEX.test(pin)) {
    showError('Invalid PIN format. Expected STU or IMS followed by 10 digits.');
    return;
  }

  const isAdminPin  = ADMIN_PINS.includes(pin);
  const isAdminBatch = batch === 'Admin';

  // Security gates
  if (isAdminBatch && !isAdminPin) {
    showError('This PIN is not authorised for the Admin batch.');
    return;
  }
  if (isAdminPin && !isAdminBatch) {
    showError('Admin PINs must select the Admin batch.');
    return;
  }

  currentUser = { name, pin, batch, isAdmin: isAdminPin };

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display  = 'block';
  document.getElementById('topbarUser').textContent =
    name + (isAdminPin ? '' : ' · ' + batch);

  fetchAndRender();
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginName').value = '';
  document.getElementById('loginPin').value  = '';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('dashboard').style.display  = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ══════════════════════════════════════════════════════════════
//  DATA FETCH
// ══════════════════════════════════════════════════════════════
function fetchAndRender() {
  const params = new URLSearchParams({
    pin:   currentUser.pin,
    batch: currentUser.batch,
    admin: currentUser.isAdmin ? '1' : '0'
  });

  fetch(APPS_SCRIPT_URL + '?' + params.toString())
    .then(r => r.json())
    .then(data => {
      if (currentUser.isAdmin) renderAdmin(data);
      else                     renderStudent(data);
    })
    .catch(err => {
      document.getElementById('dashContent').innerHTML = `
        <div class="empty-state">
          <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
          <div>Could not load data. Check your internet connection and try again.</div>
          <div style="margin-top:8px;font-size:12px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.3)">${err}</div>
        </div>`;
    });
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function scoreClass(score) {
  const pct = (score / MAX_MARKS) * 100;
  if (pct >= 70) return 'score-high';
  if (pct >= 40) return 'score-mid';
  return 'score-low';
}

function deltaHTML(curr, prev) {
  if (prev === null || prev === undefined) return '<span class="delta-same">–</span>';
  const d = curr - prev;
  if (d > 0) return `<span class="delta-up">▲ ${d}</span>`;
  if (d < 0) return `<span class="delta-down">▼ ${Math.abs(d)}</span>`;
  return '<span class="delta-same">→ 0</span>';
}

function timeTaken(t) {
  if (!t) return '–';
  return t; // already stored as mm:ss string
}

// ══════════════════════════════════════════════════════════════
//  STUDENT VIEW
// ══════════════════════════════════════════════════════════════
function renderStudent(data) {
  const rows = data.rows || data.data || [];

  if (!rows.length) {
    document.getElementById('dashContent').innerHTML = `
      <div class="empty-state">
        <div style="font-size:32px;margin-bottom:12px;">📋</div>
        <div>No submissions found for PIN <strong style="font-family:'DM Mono',monospace">${currentUser.pin}</strong> in batch <strong>${currentUser.batch}</strong>.</div>
        <div style="margin-top:8px;font-size:13px;">Take a test first, then come back here!</div>
      </div>`;
    return;
  }

  // Sort by test number
  rows.sort((a, b) => extractTestNum(a.testName) - extractTestNum(b.testName));

  const best    = Math.max(...rows.map(r => r.score));
  const avg     = Math.round(rows.reduce((s,r) => s + r.score, 0) / rows.length);
  const latest  = rows[rows.length - 1];
  const tests   = rows.length;

  // Participation chips: Tests 1–20 (expand as needed)
  const takenSet = new Set(rows.map(r => extractTestNum(r.testName)));
  const maxTest  = Math.max(20, ...takenSet);
  let chips = '';
  for (let i = 1; i <= maxTest; i++) {
    chips += `<div class="chip ${takenSet.has(i) ? 'taken' : ''}">T${i}</div>`;
  }

  // Section weakness (from sectionErrors, Tests 14+)
  const sectionTotals = {};
  const sectionCounts = {};
  rows.forEach(r => {
    if (!r.sectionErrors) return;
    Object.entries(r.sectionErrors).forEach(([sec, wrong]) => {
      sectionTotals[sec] = (sectionTotals[sec] || 0) + wrong;
      sectionCounts[sec] = (sectionCounts[sec] || 0) + 1;
    });
  });
  const sectionKeys = Object.keys(sectionTotals);

  let barsHtml = '';
  if (sectionKeys.length) {
    const maxWrong = Math.max(...Object.values(sectionTotals)) || 1;
    const sorted = sectionKeys.sort((a,b) => sectionTotals[b] - sectionTotals[a]);
    barsHtml = `
      <div class="section-header">Section Weakness</div>
      <div class="bars-grid" style="margin-bottom:28px;">
        ${sorted.map(sec => {
          const pct = Math.round((sectionTotals[sec] / (sectionCounts[sec] * 10)) * 100);
          const fill = Math.round((sectionTotals[sec] / maxWrong) * 100);
          return `
            <div class="bar-row">
              <div class="bar-label">${sec}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${fill}%"></div></div>
              <div class="bar-pct">${pct}%</div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // Behaviour flags
  const flags = buildBehaviourFlags(rows);

  // All tests table
  let tableRows = '';
  rows.forEach((r, i) => {
    const prev = i > 0 ? rows[i-1].score : null;
    const sc   = scoreClass(r.score);
    const hasSA = r.studentAnswers && r.studentAnswers.length > 0;
    const testNum = extractTestNum(r.testName);

    tableRows += `
      <tr>
        <td>${r.testName}</td>
        <td><span class="score-pill ${sc}">${r.score} / ${MAX_MARKS}</span></td>
        <td>${r.correct}</td>
        <td>${r.wrong}</td>
        <td>${r.skipped}</td>
        <td>${timeTaken(r.timeTaken)}</td>
        <td>${deltaHTML(r.score, prev)}</td>
        <td>
          <button class="review-btn" onclick='openReview(${JSON.stringify(r)}, ${testNum})'>
            Review
          </button>
        </td>
      </tr>`;
  });

  document.getElementById('dashContent').innerHTML = `
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Tests Taken</div>
        <div class="stat-value">${tests}</div>
        <div class="stat-sub">out of all tests</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best Score</div>
        <div class="stat-value">${best}</div>
        <div class="stat-sub">/ ${MAX_MARKS}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average</div>
        <div class="stat-value">${avg}</div>
        <div class="stat-sub">across all tests</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Latest Score</div>
        <div class="stat-value">${latest.score}</div>
        <div class="stat-sub">${latest.testName}</div>
      </div>
    </div>

    <!-- Participation -->
    <div class="section-header">Test Participation</div>
    <div class="chips-wrap" style="margin-bottom:28px;">${chips}</div>

    ${barsHtml}

    <!-- Behaviour flags -->
    ${flags.length ? `
      <div class="section-header">Behaviour Flags</div>
      <div style="margin-bottom:28px;">${flags.map(f => `
        <div class="flag-card">
          <div class="flag-icon">${f.icon}</div>
          <div>
            <div class="flag-title">${f.title}</div>
            <div class="flag-desc">${f.desc}</div>
          </div>
        </div>`).join('')}
      </div>` : ''}

    <!-- All tests table -->
    <div class="section-header">All Tests</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Test</th>
            <th>Score</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Skipped</th>
            <th>Time</th>
            <th>Change</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  BEHAVIOUR FLAGS
// ══════════════════════════════════════════════════════════════
function buildBehaviourFlags(rows) {
  const flags = [];
  if (rows.length < 2) return flags;

  // Rushing: avg time < 20 mins and wrong > 8 in last 3 tests
  const recent = rows.slice(-3);
  const avgWrong = recent.reduce((s,r) => s + (r.wrong||0), 0) / recent.length;

  function parseTime(t) {
    if (!t || typeof t !== 'string') return null;
    const parts = t.split(':');
    if (parts.length !== 2) return null;
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  }

  const times = recent.map(r => parseTime(r.timeTaken)).filter(t => t !== null);
  const avgTimeSecs = times.length ? times.reduce((s,t) => s+t, 0) / times.length : null;

  if (avgTimeSecs !== null && avgTimeSecs < 20*60 && avgWrong > 8) {
    flags.push({
      icon: '⚡',
      title: 'Rushing',
      desc: `You're finishing tests in under 20 minutes but getting ${Math.round(avgWrong)} wrong on average recently. Slow down on questions you're unsure of — a wrong answer costs −1.`
    });
  }

  // Overthinking: avg time > 45 mins and skipped > 5
  const avgSkipped = recent.reduce((s,r) => s + (r.skipped||0), 0) / recent.length;
  if (avgTimeSecs !== null && avgTimeSecs > 45*60 && avgSkipped > 5) {
    flags.push({
      icon: '🤔',
      title: 'Overthinking',
      desc: `You're spending close to the full time and still leaving ${Math.round(avgSkipped)} questions skipped recently. Practice marking and moving — every skipped question is a guaranteed 0.`
    });
  }

  // Negative marking trap: wrong > correct * 0.5 in last test
  const last = rows[rows.length - 1];
  if (last.correct > 0 && last.wrong > last.correct * 0.5) {
    flags.push({
      icon: '⚠️',
      title: 'Negative Marking Trap',
      desc: `In ${last.testName}, you got ${last.wrong} wrong vs ${last.correct} correct. That ratio is hurting your score significantly. Skip questions you're not 60%+ sure about.`
    });
  }

  // Improving streak
  if (rows.length >= 3) {
    const last3 = rows.slice(-3).map(r => r.score);
    if (last3[0] < last3[1] && last3[1] < last3[2]) {
      flags.push({
        icon: '📈',
        title: 'Improving Streak',
        desc: `Your last 3 scores have been rising: ${last3[0]} → ${last3[1]} → ${last3[2]}. Whatever you're doing, keep doing it.`
      });
    }
  }

  return flags;
}

// ══════════════════════════════════════════════════════════════
//  ADMIN VIEW
// ══════════════════════════════════════════════════════════════
let adminAllRows = [];

function renderAdmin(data) {
  adminAllRows = (data.data || data.allRows || []).filter(r => r.batch !== 'Admin');

  if (!adminAllRows.length) {
    document.getElementById('dashContent').innerHTML = `
      <div class="empty-state">
        <div style="font-size:28px;margin-bottom:12px;">📋</div>
        <div>No student submissions found yet.</div>
      </div>`;
    return;
  }

  document.getElementById('topbarUser').innerHTML =
    currentUser.name + ' <span class="admin-badge">Admin</span>';

  renderAdminView('All Batches', 'All Tests');
}

function renderAdminView(batchFilter, testFilter) {
  let rows = adminAllRows;
  if (batchFilter !== 'All Batches') rows = rows.filter(r => r.batch === batchFilter);
  if (testFilter  !== 'All Tests')   rows = rows.filter(r => r.testName === testFilter);

  // Summary stats
  const total       = rows.length;
  const uniqueStus  = new Set(rows.map(r => r.pin || r.name)).size;
  const avgScore    = total ? Math.round(rows.reduce((s,r) => s+r.score, 0) / total) : 0;
  const highest     = total ? Math.max(...rows.map(r => r.score)) : 0;
  const lowest      = total ? Math.min(...rows.map(r => r.score)) : 0;

  // Participation per test
  const testCounts  = {};
  adminAllRows.forEach(r => { testCounts[r.testName] = (testCounts[r.testName]||0)+1; });
  const testNames   = Object.keys(testCounts).sort((a,b) => extractTestNum(a)-extractTestNum(b));

  // Batch list for filter
  const batches     = [...new Set(adminAllRows.map(r => r.batch))].sort();

  // Section weakness aggregate
  const sectionTotals = {};
  rows.forEach(r => {
    if (!r.sectionErrors) return;
    Object.entries(r.sectionErrors).forEach(([sec, w]) => {
      sectionTotals[sec] = (sectionTotals[sec]||0) + w;
    });
  });
  const sectionKeys = Object.keys(sectionTotals).sort((a,b) => sectionTotals[b]-sectionTotals[a]);
  const maxSec = sectionKeys.length ? Math.max(...Object.values(sectionTotals)) : 1;

  // Leaderboard: latest score per student
  // If a specific test is selected, show only students who took that test (ranked by that test's score)
  // If "All Tests", show each student's latest test score
  const studentMap = {};
  const leaderboardSource = testFilter !== 'All Tests'
    ? adminAllRows.filter(r => r.testName === testFilter)
    : adminAllRows;
  leaderboardSource.forEach(r => {
    const key = r.pin || r.name;
    if (!studentMap[key] || extractTestNum(r.testName) > extractTestNum(studentMap[key].testName)) {
      studentMap[key] = r;
    }
  });
  let leaderboard = Object.values(studentMap);
  if (batchFilter !== 'All Batches') leaderboard = leaderboard.filter(r => r.batch === batchFilter);
  leaderboard.sort((a,b) => b.score - a.score);

  let lbRows = '';
  leaderboard.forEach((r, i) => {
    const sc = scoreClass(r.score);
    lbRows += `
      <tr class="student-row" onclick="openStudentDrill('${r.pin||''}','${r.name}','${r.batch}')">
        <td style="color:var(--text-dim);font-family:'DM Mono',monospace">${i+1}</td>
        <td>${r.name}</td>
        <td><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim)">${r.batch}</span></td>
        <td>${r.testName}</td>
        <td><span class="score-pill ${sc}">${r.score}</span></td>
      </tr>`;
  });

  const chips = testNames.map(t => {
    const n = testCounts[t];
    return `<div class="chip taken" style="cursor:default">${t}<br><span style="font-size:10px;opacity:0.7">${n} stu</span></div>`;
  }).join('');

  const barsHtml = sectionKeys.map(sec => {
    const fill = Math.round((sectionTotals[sec]/maxSec)*100);
    return `
      <div class="bar-row">
        <div class="bar-label">${sec}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${fill}%"></div></div>
        <div class="bar-pct">${sectionTotals[sec]}</div>
      </div>`;
  }).join('');

  document.getElementById('dashContent').innerHTML = `
    <div style="margin-bottom:20px;">
      <span style="font-family:'Fraunces',serif;font-size:22px;">Admin Dashboard</span>
      <span class="admin-badge">Admin</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">filtered view</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unique Students</div>
        <div class="stat-value">${uniqueStus}</div>
        <div class="stat-sub">unique PINs / names</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average Score</div>
        <div class="stat-value">${avgScore}</div>
        <div class="stat-sub">/ ${MAX_MARKS}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Highest</div>
        <div class="stat-value">${highest}</div>
        <div class="stat-sub">single submission</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Lowest</div>
        <div class="stat-value">${lowest}</div>
        <div class="stat-sub">single submission</div>
      </div>
    </div>

    <!-- Participation -->
    <div class="section-header">Participation by Test</div>
    <div class="chips-wrap" style="margin-bottom:28px;">${chips}</div>

    ${sectionKeys.length ? `
      <div class="section-header">Section Weakness (Cohort)</div>
      <div class="bars-grid" style="margin-bottom:28px;">${barsHtml}</div>
    ` : ''}

    <!-- Filters + Leaderboard -->
    <div class="section-header">
      Student Leaderboard
      <span style="font-size:12px;color:var(--text-dim)">click a row to drill down</span>
    </div>
    <div class="filter-row">
      <select class="filter-select" id="batchFilterSel" onchange="applyFilters()">
        <option value="All Batches">All Batches</option>
        ${batches.map(b => `<option value="${b}" ${b===batchFilter?'selected':''}>${b}</option>`).join('')}
      </select>
      <select class="filter-select" id="testFilterSel" onchange="applyFilters()">
        <option value="All Tests">All Tests</option>
        ${testNames.map(t => `<option value="${t}" ${t===testFilter?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Batch</th><th>${testFilter !== 'All Tests' ? 'Test' : 'Latest Test'}</th><th>${testFilter !== 'All Tests' ? 'Score' : 'Latest Score'}</th>
          </tr>
        </thead>
        <tbody>${lbRows}</tbody>
      </table>
    </div>`;
}

function applyFilters() {
  const b = document.getElementById('batchFilterSel').value;
  const t = document.getElementById('testFilterSel').value;
  renderAdminView(b, t);
}

// ══════════════════════════════════════════════════════════════
//  STUDENT DRILL-DOWN (admin)
// ══════════════════════════════════════════════════════════════
function openStudentDrill(pin, name, batch) {
  let stuRows = adminAllRows.filter(r => {
    if (pin) return r.pin === pin;
    return r.name === name && r.batch === batch;
  });
  stuRows.sort((a,b) => extractTestNum(a.testName) - extractTestNum(b.testName));

  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalSubtitle').textContent = batch + (pin ? ' · ' + pin : '');

  let html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Test</th><th>Score</th><th>Correct</th><th>Wrong</th><th>Skipped</th><th>Time</th>
          </tr>
        </thead>
        <tbody>
          ${stuRows.map(r => `
            <tr>
              <td>${r.testName}</td>
              <td><span class="score-pill ${scoreClass(r.score)}">${r.score}</span></td>
              <td>${r.correct}</td>
              <td>${r.wrong}</td>
              <td>${r.skipped}</td>
              <td>${timeTaken(r.timeTaken)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('reviewModal').classList.add('open');
}

// ══════════════════════════════════════════════════════════════
//  REVIEW MODAL (student)
// ══════════════════════════════════════════════════════════════
function openReview(rowData, testNum) {
  document.getElementById('modalTitle').textContent = rowData.testName + ' — Review';
  document.getElementById('modalSubtitle').textContent =
    `Score: ${rowData.score} / ${MAX_MARKS}  ·  Correct: ${rowData.correct}  ·  Wrong: ${rowData.wrong}  ·  Skipped: ${rowData.skipped}`;

  const sa = rowData.studentAnswers;

  if (!sa || sa.length === 0) {
    // Tests 1–15: no answer data
    let html = `<div class="no-data-note">Full question-by-question review is only available from Test 16 onwards.</div>`;

    if (rowData.wrongQuestions && rowData.wrongQuestions.length) {
      html += `
        <div style="margin-top:16px;">
          <div style="font-size:12px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Wrong Question Numbers</div>
          <div class="q-chips">
            ${rowData.wrongQuestions.map(n => `<div class="q-chip wrong">Q${n}</div>`).join('')}
          </div>
        </div>`;
    }
    document.getElementById('modalBody').innerHTML = html;
  } else {
    // Tests 16+: full breakdown
    const correct = new Set();
    const wrong   = new Set();
    if (rowData.wrongQuestions) rowData.wrongQuestions.forEach(n => wrong.add(n));

    let chips = '';
    sa.forEach((ans, i) => {
      const qn = i + 1;
      let cls = 'skipped';
      if (ans === null || ans === undefined || ans === '') cls = 'skipped';
      else if (wrong.has(qn)) cls = 'wrong';
      else cls = 'correct';
      chips += `<div class="q-chip ${cls}" title="Q${qn}: ${ans||'–'}">Q${qn}</div>`;
    });

    document.getElementById('modalBody').innerHTML = `
      <div style="display:flex;gap:20px;margin-bottom:16px;font-size:13px;">
        <span><span class="q-chip correct" style="display:inline-flex;width:20px;height:20px;font-size:10px;margin-right:6px;vertical-align:middle">✓</span>Correct</span>
        <span><span class="q-chip wrong"   style="display:inline-flex;width:20px;height:20px;font-size:10px;margin-right:6px;vertical-align:middle">✗</span>Wrong</span>
        <span><span class="q-chip skipped" style="display:inline-flex;width:20px;height:20px;font-size:10px;margin-right:6px;vertical-align:middle">–</span>Skipped</span>
      </div>
      <div class="q-chips">${chips}</div>`;
  }

  document.getElementById('reviewModal').classList.add('open');
}

function closeModal() {
  document.getElementById('reviewModal').classList.remove('open');
}

// Close modal on overlay click
document.getElementById('reviewModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════════════════════════
//  UTILITY
// ══════════════════════════════════════════════════════════════
function extractTestNum(testName) {
  if (!testName) return 0;
  const m = testName.match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

// Enter key on login
document.getElementById('loginPin').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPin').focus();
});
